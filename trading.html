<div id="trading-page" style="background: #0d1117; color: white; min-height: 100vh; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0; color: #58a6ff;">📈 Live Trading Market</h2>
        <div style="background: #161b22; padding: 5px 15px; border-radius: 20px; border: 1px solid #30363d;">
            <span style="color: #8b949e; font-size: 14px;">Pair: </span>
            <span style="color: #39d353; font-weight: bold;">SOL/USDT</span>
        </div>
    </div>

    <div style="background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; margin-bottom: 25px;">
        <div class="tradingview-widget-container" style="height: 450px; width: 100%;">
            <div id="tradingview_sol_chart"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "BINANCE:SOLUSDT",
                    "interval": "60",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "enable_publishing": false,
                    "hide_side_toolbar": false,
                    "allow_symbol_change": true,
                    "container_id": "tradingview_sol_chart"
                });
            </script>
        </div>
    </div>

    <div style="background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden;">
        <h4 style="padding: 15px; margin: 0; border-bottom: 1px solid #30363d; color: #8b949e;">Recent Trading History</h4>
        <div style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="background: #21262d; color: #8b949e; font-size: 13px;">
                        <th style="padding: 12px;">Asset</th>
                        <th style="padding: 12px;">Type</th>
                        <th style="padding: 12px;">Entry Price</th>
                        <th style="padding: 12px;">Profit</th>
                    </tr>
                </thead>
                <tbody id="trade-history-body" style="font-size: 14px;">
                    <tr style="border-bottom: 1px solid #21262d;">
                        <td style="padding: 12px;">Solana (SOL)</td>
                        <td style="padding: 12px; color: #39d353;">BUY</td>
                        <td style="padding: 12px;">$145.20</td>
                        <td style="padding: 12px; color: #39d353;">+$2.40</td>
                    </tr>
                    <tr style="border-bottom: 1px solid #21262d;">
                        <td style="padding: 12px;">Solana (SOL)</td>
                        <td style="padding: 12px; color: #ff7b72;">SELL</td>
                        <td style="padding: 12px;">$147.80</td>
                        <td style="padding: 12px; color: #39d353;">+$0.95</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
