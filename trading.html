<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF Trading Pro</title>
    <style>
        body { background-color: #0c0d15; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #131722; border-bottom: 1px solid #2a2e39; }
        .price-box { display: flex; flex-direction: column; }
        #live-price { color: #26a69a; font-size: 24px; font-weight: bold; }
        
        /* চার্টের জায়গা */
        #chart-container { width: 100%; height: 60vh; position: relative; }
        
        .footer-controls { background: #131722; padding: 20px; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .btn { padding: 15px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; transition: 0.3s; }
        .buy { background: #26a69a; }
        .buy:active { background: #1b7a71; transform: scale(0.95); }
        .sell { background: #ef5350; }
        .sell:active { background: #b13d3a; transform: scale(0.95); }
        .bal-text { text-align: center; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="header">
        <div class="price-box">
            <span style="font-size: 12px; opacity: 0.6;">AAF / BDT</span>
            <span id="live-price">৳ 1.25</span>
        </div>
        <div style="color: #26a69a; font-weight: bold;">● LIVE</div>
    </div>

    <div id="chart-container">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
          <div id="tradingview_chart"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
          <script type="text/javascript">
          new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:SOLUSDT", 
            "interval": "1",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_top_toolbar": true,
            "save_image": false,
            "container_id": "tradingview_chart"
          });
          </script>
        </div>
    </div>

    <div class="footer-controls">
        <div class="bal-text">Main Balance: <b id="main-bal">৳ 550.00</b></div>
        <div class="btn-group">
            <button class="btn buy" onclick="handleTrade('Buy')">BUY</button>
            <button class="btn sell" onclick="handleTrade('Sell')">SELL</button>
        </div>
    </div>

    <script>
        function handleTrade(type) {
            alert(type + " অর্ডার প্রসেস হচ্ছে... আপনার ব্যালেন্স চেক করা হচ্ছে।");
        }
    </script>
</body>
</html>
