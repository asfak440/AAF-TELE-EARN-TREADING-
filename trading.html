<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF Trading - Professional Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #39d353; 
            --bg: #0d1117; 
            --card-bg: #161b22;
            --border: #30363d;
            --text-gray: #8b949e;
        }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 10px;
            padding-bottom: 80px; /* নেভিগেশনের জন্য স্পেস */
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 5px;
        }

        /* চার্ট কার্ড */
        .chart-container {
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            background: var(--card-bg);
            margin-bottom: 20px;
        }

        /* হিস্ট্রি টেবিল */
        .history-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--card-bg);
            margin-bottom: 20px;
        }
        .table-scroll { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th { background: #21262d; color: var(--text-gray); font-size: 11px; padding: 12px; text-align: left; text-transform: uppercase; }
        td { padding: 12px; font-size: 13px; border-bottom: 1px solid var(--border); }

        /* অ্যাকশন প্যানেল (বাটন ও ব্যালেন্স) */
        .action-panel {
            background: #1c2128;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .bal-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-gray); }
        .bal-row strong { color: white; font-size: 15px; }
        .trade-btn { 
            background: var(--primary); 
            color: #0d1117; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer;
            transition: 0.2s;
        }
        .trade-btn:active { transform: scale(0.97); }

        /* স্লিম নেভিগেশন */
        .slim-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px;
            background: #0d1117; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid var(--border); z-index: 9999;
        }
        .nav-item { text-decoration: none; color: var(--text-gray); text-align: center; flex: 1; font-size: 10px; }
        .nav-item i { font-size: 20px; margin-bottom: 3px; display: block; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-info">
        <h3 style="margin:0; font-size: 18px;">SOL Terminal</h3>
        <span style="color: var(--primary); font-size: 12px; background: rgba(57,211,83,0.1); padding: 4px 10px; border-radius: 20px;">
            ● Live Market
        </span>
    </div>

    <div class="chart-container">
        <div id="tradingview_chart" style="height: 400px;"></div>
    </div>

    <div class="history-card">
        <div style="padding: 12px; border-bottom: 1px solid var(--border); color: var(--text-gray); font-size: 14px; font-weight: bold;">
            <i class="fas fa-history"></i> Trade History
        </div>
        <div class="table-scroll">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Entry</th>
                        <th>Profit</th>
                    </tr>
                </thead>
                <tbody id="trade-history-body">
                    <tr>
                        <td>03-14 04:23</td>
                        <td style="color: var(--primary);">BUY</td>
                        <td>$145.20</td>
                        <td style="color: var(--primary);">+৳ 2.50</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="action-panel">
        <div class="bal-row">
            <span>Entry Price: <strong>---</strong></span>
            <span>Wallet: <strong id="user-bal">৳ 505.33</strong></span>
        </div>
        <button class="trade-btn" onclick="handleTrade('BUY')">
            <i class="fas fa-bolt"></i> OPEN LONG POSITION
        </button>
    </div>

    <nav class="slim-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="task.html" class="nav-item">
            <i class="fas fa-tasks"></i>
            <span>Task</span>
        </a>
        <a href="trading.html" class="nav-item active"> <i class="fas fa-chart-line"></i>
            <span>Trade</span>
        </a>
        <a href="withdraw.html" class="nav-item">
            <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </a>
    </nav>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:SOLUSDT",
            "interval": "15",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "container_id": "tradingview_chart",
            "hide_side_toolbar": true,
            "allow_symbol_change": true
        });

        function handleTrade(type) {
            alert(type + " অর্ডার প্রসেস হচ্ছে...");
        }
    </script>
</body>
</html>
