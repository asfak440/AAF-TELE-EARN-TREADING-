<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF Trading Pro</title>
    <style>
        :root { --accent: #00ffcc; --loss: #ff5252; --dark: #090a0f; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        /* চার্ট - ৮৫% হাইট */
        #chart-container { width: 100%; height: 75vh; border-bottom: 2px solid #1e222d; }

        /* ফুটার এরিয়া */
        .footer { height: 25vh; background: #131722; padding: 15px; box-sizing: border-box; }
        
        .stats { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; opacity: 0.9; }
        
        /* প্রফিট লস ডিসপ্লে বক্স */
        #pl-box { 
            text-align: center; font-size: 22px; font-weight: bold; 
            padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.05);
            margin-bottom: 10px; border: 1px solid #2a2e39;
        }

        .action-row { display: flex; gap: 10px; align-items: center; }
        
        input { 
            width: 100px; padding: 12px; border-radius: 8px; border: 1px solid #444; 
            background: #1e222d; color: var(--accent); font-weight: bold; text-align: center;
        }

        .btn { 
            flex: 1; padding: 15px; border: none; border-radius: 12px; 
            font-size: 18px; font-weight: bold; color: white; cursor: pointer;
        }
        .buy { background: linear-gradient(135deg, #00c853, #00e676); }
        .sell { background: linear-gradient(135deg, #d50000, #ff1744); }
        
        .gain { color: var(--accent); }
        .drop { color: var(--loss); }
    </style>
</head>
<body>

    <div id="chart-container">
        <div id="tv-widget" style="height:100%;"></div>
        <script src="https://s3.tradingview.com/tv.js"></script>
        <script>
            new TradingView.widget({
                "autosize": true, "symbol": "BINANCE:SOLUSDT", "interval": "1",
                "theme": "dark", "style": "1", "container_id": "tv-widget",
                "hide_top_toolbar": true, "save_image": false
            });
        </script>
    </div>

    <div class="footer">
        <div class="stats">
            <span>Balance: <b id="bal-text">৳ 500.00</b></span>
            <span>Invested: <b id="inv-text">৳ 0.00</b></span>
        </div>

        <div id="pl-box">--- MARKET READY ---</div>

        <div class="action-row">
            <input type="number" id="amt-in" value="100" placeholder="৳">
            <button id="trade-btn" class="btn buy" onclick="handleTrade()">BUY (10% FEE)</button>
        </div>
    </div>

    <script>
        let isTrading = false;
        let entryPrice = 0;
        let currentPrice = 1.25;
        let wallet = 500.00;
        let tradeCapital = 0; // ১০% ফি বাদে আসল টাকা
        
        // ১০০ টাকায় ১ পয়সা প্রফিট লজিক (দাম ১ টাকা বাড়লে/কমলে)
        const businessRatio = 0.0001; 

        function updateLive() {
            document.getElementById('bal-text').innerText = "৳ " + wallet.toFixed(2);
            
            if(isTrading) {
                let diff = currentPrice - entryPrice;
                // আপনার রিকোয়ারমেন্ট অনুযায়ী প্রফিট ক্যালকুলেশন
                let livePL = tradeCapital * diff * (businessRatio * 100);

                const plBox = document.getElementById('pl-box');
                if(livePL >= 0) {
                    plBox.innerHTML = `P/L: <span class="gain">+৳ ${livePL.toFixed(4)}</span>`;
                } else {
                    plBox.innerHTML = `P/L: <span class="drop">৳ ${livePL.toFixed(4)}</span>`;
                }
                document.getElementById('inv-text').innerText = "৳ " + (tradeCapital + livePL).toFixed(2);
            }
        }

        async function handleTrade() {
            const btn = document.getElementById('trade-btn');
            const inp = document.getElementById('amt-in');

            if(!isTrading) {
                let amount = parseFloat(inp.value);
                if(wallet < amount) return alert("Insufficient Balance!");

                // ১০% ফি সিস্টেম
                let fee = amount * 0.10;
                tradeCapital = amount - fee;
                wallet -= amount;

                isTrading = true;
                entryPrice = currentPrice;
                btn.innerText = "CLOSE TRADE";
                btn.className = "btn sell";
                inp.disabled = true;
            } else {
                let diff = currentPrice - entryPrice;
                let finalPL = tradeCapital * diff * (businessRatio * 100);
                
                wallet += (tradeCapital + finalPL);
                isTrading = false;
                
                btn.innerText = "BUY (10% FEE)";
                btn.className = "btn buy";
                inp.disabled = false;
                document.getElementById('pl-box').innerText = "TRADE CLOSED";
                document.getElementById('inv-text').innerText = "৳ 0.00";
            }
        }

        // লাইভ ডাটা সিমুলেশন (আপনার API থেকে আসবে)
        setInterval(() => {
            currentPrice += (Math.random() - 0.5) * 0.01;
            updateLive();
        }, 1000);
    </script>
</body>
</html>
