<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF Trading Pro</title>
    <style>
        body { background-color: #0c0d15; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        /* চার্টকে ৮৫% বড় করা হয়েছে */
        #chart-container { width: 100%; height: 80vh; position: relative; }
        
        .footer-controls { height: 20vh; background: #131722; padding: 15px; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; border-top: 1px solid #2a2e39; }
        
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        #pl-display { font-weight: bold; color: #aaa; }

        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; }
        .buy { background: #00c853; }
        .close-btn { background: #ff5252; display: none; } /* শুরুতে হাইড থাকবে */
        
        .profit { color: #00ffcc !important; }
        .loss { color: #ff5252 !important; }
    </style>
</head>
<body>

    <div id="chart-container">
        <div id="tradingview_chart" style="height:100%;"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script>
            let widget = new TradingView.widget({
                "autosize": true, "symbol": "BINANCE:SOLUSDT", "interval": "1",
                "theme": "dark", "style": "1", "container_id": "tradingview_chart",
                "hide_top_toolbar": true, "save_image": false
            });
        </script>
    </div>

    <div class="footer-controls">
        <div class="status-bar">
            <span>Entry: <b id="entry-price">---</b></span>
            <span>P/L: <b id="pl-display">৳ 0.00</b></span>
            <span>Bal: <b id="user-bal">৳ 500.00</b></span>
        </div>
        
        <div class="btn-group">
            <button id="buy-btn" class="btn buy" onclick="startTrade()">BUY / LONG</button>
            <button id="close-btn" class="btn close-btn" onclick="closeTrade()">CLOSE POSITION</button>
        </div>
    </div>

    <script>
        let entryPrice = 0;
        let userBalance = 500.00;
        let currentTradePrice = 0;
        let isTrading = false;

        // এটি আপনার সার্ভার থেকে লাইভ প্রাইস নিবে
        async function fetchLivePrice() {
            // সিমুলেশনের জন্য আমরা TradingView থেকে বা আপনার API থেকে ডাটা নিব
            // এখানে ডামি হিসেবে আমরা ১.২৫ ধরছি, আপনি আপনার API লিঙ্ক বসাবেন
            currentTradePrice = 1.25 + (Math.random() * 0.1); 
            
            if (isTrading) {
                calculatePL();
            }
        }

        function startTrade() {
            entryPrice = currentTradePrice;
            isTrading = true;
            document.getElementById('entry-price').innerText = "৳ " + entryPrice.toFixed(2);
            document.getElementById('buy-btn').style.display = "none";
            document.getElementById('close-btn').style.display = "block";
        }

        function calculatePL() {
            let diff = currentTradePrice - entryPrice;
            let profitLoss = diff * 100; // ইনভেস্টমেন্ট অনুযায়ী গুণ হবে

            const plDisplay = document.getElementById('pl-display');
            plDisplay.innerText = (profitLoss >= 0 ? "+" : "") + "৳ " + profitLoss.toFixed(2);
            plDisplay.className = profitLoss >= 0 ? "profit" : "loss";

            // ব্যালেন্স খালি হওয়ার লজিক (Liquidation)
            if (userBalance + profitLoss <= 0) {
                alert("আপনার ব্যালেন্স শেষ! ট্রেডটি অটো ক্লোজ হয়ে গেছে।");
                userBalance = 0;
                closeTrade();
            }
        }

        function closeTrade() {
            let diff = currentTradePrice - entryPrice;
            let finalPL = diff * 100;
            userBalance += finalPL;
            
            isTrading = false;
            document.getElementById('user-bal').innerText = "৳ " + userBalance.toFixed(2);
            document.getElementById('buy-btn').style.display = "block";
            document.getElementById('close-btn').style.display = "none";
            document.getElementById('entry-price').innerText = "---";
            document.getElementById('pl-display').innerText = "৳ 0.00";
            document.getElementById('pl-display').className = "";
        }

        setInterval(fetchLivePrice, 2000);
    </script>
</body>
</html>
