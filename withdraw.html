<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - AAF Secure</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --nagad: #f7941d; 
            --primary: #39d353;
            --bg: #0d1117; 
            --card-bg: #161b22;
            --border: #30363d;
            --text-gray: #8b949e;
        }
        body { 
            background: var(--bg); 
            color: #f0f6fc; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 15px;
            padding-bottom: 90px; 
        }
        
        .header { text-align: center; margin: 10px 0 25px; }
        .header h2 { font-size: 20px; color: white; margin: 0; }

        /* ব্যালেন্স কার্ড */
        .balance-card { 
            background: linear-gradient(135deg, #1c2128 0%, #0d1117 100%);
            padding: 25px 20px; 
            border-radius: 16px; 
            text-align: center; 
            border: 1px solid var(--border); 
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .balance-card span { font-size: 13px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; }
        .balance-card p { font-size: 32px; font-weight: bold; margin: 10px 0 0; color: var(--primary); }

        /* উইথড্র বক্স */
        .withdraw-box { 
            background: var(--card-bg); 
            padding: 25px 20px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
        }
        
        .method-tag {
            background: rgba(247, 148, 29, 0.1); 
            color: var(--nagad); 
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 15px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: bold; 
            margin-bottom: 20px;
            border: 1px solid rgba(247, 148, 29, 0.3);
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-gray); }
        input { 
            width: 100%; padding: 14px; border-radius: 10px; 
            border: 1px solid var(--border); background: #0d1117; color: white; 
            box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--nagad); box-shadow: 0 0 8px rgba(247, 148, 29, 0.2); }

        .withdraw-btn { 
            width: 100%; padding: 16px; border: none; border-radius: 10px; 
            background: var(--nagad); color: white; font-size: 16px; 
            font-weight: bold; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 12px rgba(247, 148, 29, 0.3);
        }
        .withdraw-btn:active { transform: scale(0.97); }

        .footer-note { 
            font-size: 12px; color: var(--text-gray); 
            text-align: center; margin-top: 20px; line-height: 1.6; 
            background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px;
        }

        /* স্লিম নেভিগেশন */
        .slim-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px;
            background: #0d1117; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid var(--border); z-index: 9999;
        }
        .nav-item { text-decoration: none; color: var(--text-gray); text-align: center; flex: 1; font-size: 10px; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; display: block; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Withdraw Funds</h2>
    </div>

    <div class="balance-card">
        <span>Available Balance</span>
        <p id="current-bal">৳ 0.00</p>
    </div>

    <div class="withdraw-box">
        <div class="method-tag">
            <i class="fas fa-wallet"></i> NAGAD PERSONAL
        </div>
        
        <div class="input-group">
            <label>Nagad Account Number</label>
            <input type="number" id="account-num" placeholder="01XXXXXXXXX">
        </div>

        <div class="input-group">
            <label>Amount (Min ৳ 100)</label>
            <input type="number" id="amount" placeholder="Enter Amount">
        </div>

        <button class="withdraw-btn" onclick="requestWithdraw()">
            <i class="fas fa-paper-plane"></i> WITHDRAW NOW
        </button>
    </div>

    <div class="footer-note">
        <i class="fas fa-info-circle"></i> শুধুমাত্র নগদ পার্সোনাল নাম্বারে পেমেন্ট করা হয়।<br>
        পেমেন্ট প্রসেস হতে ১-১২ ঘণ্টা সময় লাগতে পারে।
    </div>

    <nav class="slim-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="task.html" class="nav-item">
            <i class="fas fa-tasks"></i>
            <span>Task</span>
        </a>
        <a href="trading.html" class="nav-item">
            <i class="fas fa-chart-line"></i>
            <span>Trade</span>
        </a>
        <a href="withdraw.html" class="nav-item active"> <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </a>
    </nav>

    <script>
        const API_URL = "https://aaf-api-free.onrender.com";
        const USER_ID = localStorage.getItem('user_id');
        let userBalance = 0;

        // ডাটাবেস থেকে রিয়েল ব্যালেন্স লোড করা
        async function loadBalance() {
            if(!USER_ID) return;
            try {
                const response = await fetch(`${API_URL}/api/user_data/${USER_ID}`);
                const data = await response.json();
                if(data.status === "success") {
                    userBalance = data.main_balance;
                    document.getElementById('current-bal').innerText = "৳ " + userBalance.toFixed(2);
                }
            } catch (err) { console.log("Balance load failed"); }
        }

        async function requestWithdraw() {
            const number = document.getElementById('account-num').value;
            const amount = parseFloat(document.getElementById('amount').value);

            if(number.length < 11) return alert("সঠিক নগদ নাম্বার দিন (১১ ডিজিট)!");
            if(isNaN(amount) || amount < 100) return alert("সর্বনিম্ন ১০০ টাকা উইথড্র করতে হবে।");
            if(amount > userBalance) return alert("আপনার একাউন্টে পর্যাপ্ত ব্যালেন্স নেই!");

            const btn = document.querySelector('.withdraw-btn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/api/withdraw`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        method: "Nagad",
                        number: number,
                        amount: amount
                    })
                });
                
                alert("আপনার উইথড্র রিকোয়েস্টটি সফল হয়েছে! অ্যাডমিন চেক করে পেমেন্ট করে দিবে।");
                loadBalance(); // ব্যালেন্স আপডেট
            } catch (e) {
                alert("সার্ভারে সমস্যা হচ্ছে। দয়া করে কিছুক্ষণ পর চেষ্টা করুন।");
            } finally {
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> WITHDRAW NOW';
                btn.disabled = false;
            }
        }

        loadBalance();
    </script>
</body>
</html>
