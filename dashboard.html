<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF Strong - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #39d353; 
            --bg: #0d1117; 
            --card-bg: #161b22;
            --border: #30363d;
            --text-gray: #8b949e;
            --accent-cyan: #00ffcc;
        }
        body { 
            background: var(--bg); 
            color: #f0f6fc; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding-bottom: 90px; 
        }
        
        .top-bar { 
            padding: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            background: var(--card-bg);
        }
        .user-info h3 { margin: 0; font-size: 18px; color: var(--primary); }
        .user-info span { font-size: 11px; color: var(--text-gray); }

        /* Balance Grid - Updated for Side-by-Side Balance & Account */
        .balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        
        .card { 
            background: var(--card-bg); 
            padding: 18px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            text-align: left; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* মেইন ব্যালেন্স এবং অ্যাক্টিভ অ্যাকাউন্ট কার্ড */
        .card.main-row {
            border-color: var(--primary);
            background: linear-gradient(135deg, #1c2128 0%, #0d1117 100%);
        }
        .card.account-row {
            border-color: var(--accent-cyan);
        }

        .card h4 { margin: 0; font-size: 10px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 0.5px; }
        .card p { margin: 8px 0 0; font-size: 20px; font-weight: bold; color: white; }
        .card p span.currency { font-size: 14px; color: var(--primary); margin-right: 2px; }
        .card p span#active-acc { color: var(--accent-cyan); }

        /* নিচের কার্ডগুলো */
        .card.full-width { grid-column: span 2; }

        /* Status Section */
        .status-box { 
            margin: 15px; 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
        }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
        .stat-label { color: var(--text-gray); }

        .btn-join { 
            display: flex; align-items: center; justify-content: center;
            gap: 10px; background: #2ea043; color: white; padding: 14px; 
            margin: 15px; border-radius: 8px; text-decoration: none; 
            font-weight: bold; font-size: 14px; 
        }

        .slim-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px;
            background: #0d1117; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid var(--border); z-index: 9999;
        }
        .nav-item { text-decoration: none; color: var(--text-gray); text-align: center; flex: 1; font-size: 10px; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; display: block; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        .ad-container { text-align: center; margin: 10px 0; padding: 0 15px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="user-info">
            <h3 id="u-name">Loading...</h3>
            <span id="u-id">UID: #AAF----</span>
        </div>
        <div style="text-align:right;">
            <div id="status-dot" style="color: var(--primary); font-size: 12px; font-weight: bold;">● Online</div>
            <div style="font-size: 9px; color: var(--text-gray);">v2.0 Standard</div>
        </div>
    </div>

    <div class="ad-container">
        <iframe data-aa='2430456' src='//ad.a-ads.com/2430456/?size=320x50' style='border:0; padding:0; width:320px; height:50px; overflow:hidden; display:block; margin:auto;'></iframe>
    </div>

    <div class="balance-grid">
        <div class="card main-row">
            <h4><i class="fas fa-wallet"></i> Main Balance</h4>
            <p><span class="currency">৳</span><span id="m-bal">0.00</span></p>
        </div>

        <div class="card account-row">
            <h4><i class="fas fa-users"></i> Active Account</h4>
            <p><span id="active-acc">60</span></p>
        </div>

        <div class="card">
            <h4>Task</h4>
            <p><span id="t-bal">0.00</span></p>
        </div>
        <div class="card">
            <h4>Trade</h4>
            <p><span id="tr-bal">0.00</span></p>
        </div>

        <div class="card full-width">
            <h4>Total Withdraw (Live)</h4>
            <p style="color: #58a6ff;"><span class="currency">৳</span><span id="w-total">0.00</span></p>
        </div>
    </div>

    <a href="https://t.me/aaf_tele_earn" target="_blank" class="btn-join">
        <i class="fab fa-telegram"></i> Join Official Channel
    </a>

    <div class="ad-container">
        <iframe data-aa='2430456' src='//ad.a-ads.com/2430456/?size=320x50' style='border:0; padding:0; width:320px; height:50px; overflow:hidden; display:block; margin:auto;'></iframe>
    </div>

    <div class="status-box">
        <div class="stat-row">
            <span class="stat-label">Telegram Status:</span> 
            <b id="acc-status" style="color: var(--primary);">Checking...</b>
        </div>
        <div class="stat-row">
            <span class="stat-label">Added Accounts:</span> 
            <span id="acc-count" style="font-weight: bold;">0</span>
        </div>
        <p style="font-size: 11px; color: #ff7b72; margin-top: 10px;">
            <i class="fas fa-exclamation-triangle"></i> চ্যানেল লিভ করলে ইনকাম অটো বন্ধ হয়ে যাবে।
        </p>
    </div>

    <nav class="slim-nav">
        <a href="index.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="task.html" class="nav-item">
            <i class="fas fa-tasks"></i>
            <span>Task</span>
        </a>
        <a href="trading.html" class="nav-item">
            <i class="fas fa-chart-line"></i>
            <span>Trade</span>
        </a>
        <a href="withdraw.html" class="nav-item">
            <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </a>
    </nav>

    <script>
        const API_URL = "https://aaf-api-free.onrender.com"; 
        const USER_ID = localStorage.getItem('user_id'); 
        const USER_NAME = localStorage.getItem('user_name');

        if(!USER_ID) {
            window.location.href = "login.html";
        }

        async function updateDashboard() {
            try {
                const response = await fetch(`${API_URL}/api/user_data/${USER_ID}`);
                const data = await response.json();

                if(data.status === "success") {
                    document.getElementById('u-name').innerText = data.name || USER_NAME;
                    document.getElementById('u-id').innerText = "UID: #AAF" + USER_ID;
                    document.getElementById('m-bal').innerText = data.main_balance.toFixed(2);
                    document.getElementById('t-bal').innerText = data.task_balance.toFixed(2);
                    document.getElementById('tr-bal').innerText = data.trade_balance.toFixed(2);
                    document.getElementById('acc-count').innerText = data.added_accounts || 0;
                    
                    // সার্ভার থেকে একটিভ একাউন্ট ডাটা আসলে নিচের লাইনটি আনকমেন্ট করুন
                    // document.getElementById('active-acc').innerText = data.active_all_accounts || 60;

                    if(data.total_withdraw) {
                        document.getElementById('w-total').innerText = data.total_withdraw.toFixed(2);
                    }

                    const status = document.getElementById('acc-status');
                    status.innerText = data.acc_status;
                    status.style.color = data.acc_status === "Active" ? "#39d353" : "#ff7b72";
                }
            } catch (err) {
                console.log("Connection Error");
            }
        }
        updateDashboard();
    </script>
</body>
</html>
