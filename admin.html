<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f0f1e; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #1e1e2f; padding: 25px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
        .card h3 { margin-top: 0; color: #00c853; font-size: 16px; text-transform: uppercase; }
        .withdraw-list { margin-top: 40px; background: #1e1e2f; padding: 20px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #333; }
        th { color: #00c853; }
        .approve-btn { background: #00c853; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .approve-btn:hover { background: #00e676; transform: scale(1.05); }
        .status-online { color: #00e676; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>AAF <span style="color: #00c853;">Control Center</span></h2>
        <div id="server-status">Status: <span class="status-online" id="status-text">Connecting...</span></div>
    </div>

    <div class="stats-grid">
        <div class="card">
            <h3>Total Users</h3>
            <p id="total-users" style="font-size: 28px; font-weight: bold;">0</p>
        </div>
        <div class="card">
            <h3>Total Paid Out</h3>
            <p id="total-withdraw" style="font-size: 28px; font-weight: bold;">0.00 BDT</p>
        </div>
        <div class="card">
            <h3>Live AAF Coin Price</h3>
            <p id="coin-price" style="font-size: 28px; font-weight: bold; color: #ffeb3b;">৳ 0.00</p>
        </div>
    </div>

    <div class="withdraw-list">
        <h3>Pending Withdraw Requests</h3>
        <table>
            <thead>
                <tr>
                    <th>User ID</th>
                    <th>Amount</th>
                    <th>Phone / Method</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="request-table">
                </tbody>
        </table>
    </div>
</div>

<script>
    // --- আপনার Render URL টি এখানে দিন ---
    const API_BASE = "https://aaf-api-free.onrender.com"; 

    // ১. স্ট্যাটাস এবং কয়েন প্রাইস লোড করা
    async function loadStats() {
        try {
            // জেনারেল স্ট্যাটাস
            const statsRes = await fetch(`${API_BASE}/admin/stats`);
            const statsData = await statsRes.json();
            document.getElementById('total-users').innerText = statsData.total_users;
            document.getElementById('total-withdraw').innerText = statsData.total_withdrawn_amount + " BDT";
            document.getElementById('status-text').innerText = "Online";

            // কয়েন প্রাইস (মার্কেট এপিআই থেকে)
            const marketRes = await fetch(`${API_BASE}/api/aaf_market`);
            const marketData = await marketRes.json();
            document.getElementById('coin-price').innerText = "৳ " + marketData.aaf_price_bdt;

            // উইথড্র রিকোয়েস্ট লোড করা
            loadWithdrawals();
        } catch (e) { 
            console.log("Connection Error", e);
            document.getElementById('status-text').innerText = "Offline";
            document.getElementById('status-text').style.color = "red";
        }
    }

    // ২. পেন্ডিং উইথড্র রিকোয়েস্ট লোড করা
    async function loadWithdrawals() {
        try {
            const response = await fetch(`${API_BASE}/admin/pending_withdrawals`);
            const requests = await response.json();
            const tableBody = document.getElementById('request-table');
            tableBody.innerHTML = "";

            requests.forEach(req => {
                tableBody.innerHTML += `
                    <tr>
                        <td>${req.user_id}</td>
                        <td>${req.amount} BDT</td>
                        <td>${req.phone}</td>
                        <td><button class="approve-btn" onclick="approve('${req.id}')">Approve</button></td>
                    </tr>
                `;
            });
        } catch (e) { console.log("Withdrawal fetch error", e); }
    }

    // ৩. উইথড্র অ্যাপ্রুভ করা
    async function approve(id) {
        if(!confirm("Are you sure you paid this user?")) return;

        const response = await fetch(`${API_BASE}/admin/approve_withdraw`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: id})
        });

        if (response.ok) {
            alert("Withdrawal Approved Successfully!");
            loadStats();
        }
    }

    // প্রতি ১০ সেকেন্ড পর পর অটো আপডেট
    setInterval(loadStats, 10000);
    loadStats();
</script>

</body>
</html>
