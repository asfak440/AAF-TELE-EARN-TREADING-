<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF Admin - Earnings & Control</title>
    <style>
        body { background: #0a0b10; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { background: #161b22; padding: 20px; border-radius: 12px; border-left: 5px solid #00ffcc; }
        .stat-card h3 { margin: 0; font-size: 14px; opacity: 0.7; }
        .stat-card p { font-size: 24px; margin: 10px 0 0; font-weight: bold; color: #00ffcc; }
        
        .trade-table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #161b22; border-radius: 10px; overflow: hidden; }
        .trade-table th, .trade-table td { padding: 12px; text-align: left; border-bottom: 1px solid #2d333b; }
        .trade-table th { background: #21262d; color: #00ffcc; }
        
        .refresh-btn { background: #00ffcc; color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2>Admin Dashboard (AAF STRONG)</h2>
    <button class="refresh-btn" onclick="loadStats()">Refresh Stats</button>

    <div class="card-grid">
        <div class="stat-card">
            <h3>Total Admin Profit (Fees)</h3>
            <p id="total-profit">৳ 0.00</p>
        </div>
        <div class="stat-card" style="border-left-color: #ff5252;">
            <h3>Active Users Trading</h3>
            <p id="active-trades">0</p>
        </div>
    </div>

    <h3>Recent Trade Logs</h3>
    <table class="trade-table">
        <thead>
            <tr>
                <th>User ID</th>
                <th>Invested</th>
                <th>Fee (10%)</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="trade-logs">
            </tbody>
    </table>

    <script>
        async function loadStats() {
            try {
                // আপনার রেন্ডার সার্ভার লিঙ্ক এখানে হবে
                const res = await fetch('https://aaf-api-free.onrender.com/api/admin/total_earnings');
                const data = await res.json();
                
                document.getElementById('total-profit').innerText = "৳ " + data.total_admin_profit.toFixed(2);
                
                // এখানে আরও ডাটা ফেচ করার লজিক যোগ করা যাবে
            } catch (e) {
                console.log("Error loading stats");
            }
        }

        // পেজ লোড হলে ডাটা দেখাবে
        window.onload = loadStats;
    </script>
</body>
</html>
