<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card h3 { margin-top: 0; color: #ff4d4d; }
        .withdraw-list { margin-top: 30px; background: #1e1e1e; padding: 20px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #333; }
        th { color: #ff4d4d; }
        .approve-btn { background: #00c853; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .approve-btn:hover { background: #00e676; }
        .status-online { color: #00e676; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>AAF <span style="color: #ff4d4d;">Control Center</span></h2>
        <div id="server-status">Status: <span class="status-online">Fetching...</span></div>
    </div>

    <div class="stats-grid">
        <div class="card">
            <h3>Total Users</h3>
            <p id="total-users" style="font-size: 24px; font-weight: bold;">0</p>
        </div>
        <div class="card">
            <h3>Total Withdraw</h3>
            <p id="total-withdraw" style="font-size: 24px; font-weight: bold;">0.00 BDT</p>
        </div>
        <div class="card">
            <h3>AAF Coin Price</h3>
            <p id="coin-price" style="font-size: 24px; font-weight: bold;">0.00</p>
        </div>
    </div>

    <div class="withdraw-list">
        <h3>Pending Withdraw Requests</h3>
        <table>
            <thead>
                <tr>
                    <th>User ID</th>
                    <th>Amount</th>
                    <th>Payment Info</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="request-table">
                </tbody>
        </table>
    </div>
</div>

<script>
    // আপনার সার্ভারের URL এখানে দিতে হবে
    const API_BASE = "http://your-server-ip:5000"; 

    async function loadStats() {
        try {
            const response = await fetch(`${API_BASE}/admin/stats`);
            const data = await response.json();
            document.getElementById('total-users').innerText = data.server_total_users;
            document.getElementById('total-withdraw').innerText = data.total_withdraw_amount + " BDT";
        } catch (e) { console.log("Stats error", e); }
    }

    async function approve(id) {
        const response = await fetch(`${API_BASE}/admin/approve_withdraw`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: id})
        });
        if (response.ok) {
            alert("Withdrawal Approved Successfully!");
            location.reload();
        }
    }

    // প্রতি ৫ সেকেন্ড পর পর অটো আপডেট হবে
    setInterval(loadStats, 5000);
    loadStats();
</script>

</body>
</html>
