<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF Strong - Admin Panel</title>
    <style>
        :root { --neon: #00ffcc; --red: #ff5252; }
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; }
        
        .user-table { width: 100%; border-collapse: collapse; background: #111; border-radius: 10px; overflow: hidden; }
        .user-table th, .user-table td { padding: 15px; text-align: left; border-bottom: 1px solid #222; font-size: 14px; }
        .user-table th { background: #1a1a1a; color: var(--neon); }

        .btn-control { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-login { background: var(--neon); color: black; }
        .btn-block { background: var(--red); color: white; margin-left: 5px; }

        .search-box { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; }
    </style>
</head>
<body>

    <div class="admin-header">
        <h2>AAF Admin Control</h2>
        <div>Total Users: <span id="total-users">0</span></div>
    </div>

    <input type="text" class="search-box" placeholder="Search by User ID or Phone..." id="searchUser">

    <table class="user-table">
        <thead>
            <tr>
                <th>User ID</th>
                <th>Phone</th>
                <th>Balance</th>
                <th>Status</th>
                <th>Control / Session</th>
            </tr>
        </thead>
        <tbody id="user-list">
            <tr>
                <td colspan="5" style="text-align:center;">Loading user data from MongoDB...</td>
            </tr>
        </tbody>
    </table>

    <script>
        const API_URL = "https://your-render-app.onrender.com"; // আপনার সার্ভার লিঙ্ক

        async function loadAdminData() {
            try {
                const response = await fetch(`${API_URL}/api/admin/all_users`);
                const users = await response.json();
                
                const tbody = document.getElementById('user-list');
                tbody.innerHTML = "";
                document.getElementById('total-users').innerText = users.length;

                users.forEach(user => {
                    tbody.innerHTML += `
                        <tr>
                            <td>#AAF${user.telegram_id.toString().slice(-4)}</td>
                            <td>${user.phone || 'N/A'}</td>
                            <td>৳ ${user.main_balance.toFixed(2)}</td>
                            <td style="color:${user.status === 'Active' ? '#00ffcc' : '#ff5252'}">${user.status}</td>
                            <td>
                                <button class="btn-control btn-login" onclick="controlUser('${user.telegram_id}')">Control Account</button>
                                <button class="btn-control btn-block" onclick="blockUser('${user.telegram_id}')">Block</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (e) {
                console.log("Error loading admin data.");
            }
        }

        // ইউজার কন্ট্রোল লজিক (লগইন করা)
        function controlUser(userId) {
            if(confirm("আপনি কি এই ইউজারের সেশনে প্রবেশ করতে চান?")) {
                // সেশন টোকেন নিয়ে ড্যাশবোর্ডে রিডাইরেক্ট করা
                localStorage.setItem('user_id', userId);
                window.location.href = "dashboard.html"; 
                // এতে আপনি ওই ইউজারের ড্যাশবোর্ড দেখতে এবং পরিবর্তন করতে পারবেন
            }
        }

        function blockUser(userId) {
            alert("User " + userId + " has been blocked.");
            // এখানে সার্ভারে ব্লক এপিআই কল হবে
        }

        window.onload = loadAdminData;
    </script>
</body>
</html>
