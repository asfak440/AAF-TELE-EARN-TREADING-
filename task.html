<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF Tasks - Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #39d353; 
            --bg: #0d1117; 
            --card-bg: #161b22;
            --border: #30363d;
            --text-secondary: #8b949e;
        }
        body { 
            background: var(--bg); 
            color: #c9d1d9; 
            font-family: 'Inter', sans-serif; 
            padding: 15px; 
            margin: 0; 
            padding-bottom: 80px; 
        }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 22px; color: white; margin: 0; font-weight: 600; }

        .balance-box { 
            background: linear-gradient(145deg, #1c2128, #161b22);
            padding: 20px; border-radius: 16px; text-align: center; 
            margin-bottom: 25px; border: 1px solid var(--border);
        }
        .balance-box h2 { margin: 10px 0 0; color: var(--primary); font-size: 28px; }

        .task-card { 
            background: var(--card-bg); border-radius: 12px; padding: 16px; 
            margin-bottom: 15px; border: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .task-info h3 { margin: 0; font-size: 15px; color: #f0f6fc; }
        
        .claim-btn { 
            background: var(--primary); color: #0d1117; border: none; 
            padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer;
        }

        /* Slim Navigation */
        .slim-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px;
            background: #0d1117; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid var(--border); z-index: 9999;
        }
        .nav-item { text-decoration: none; color: var(--text-secondary); text-align: center; flex: 1; font-size: 10px; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; display: block; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Tasks Center</h1>
    </div>

    <div class="balance-box">
        <span>Current Earnings</span>
        <h2 id="task-bal">৳ 0.00</h2>
    </div>

    <div class="task-card">
        <div class="task-info">
            <h3 id="t1-title">Task Name 1</h3>
            <p id="t1-reward" style="color: var(--primary); font-size: 12px;">Reward: 0.00</p>
        </div>
        <button class="claim-btn" onclick="handleTask(1)">Start</button>
    </div>

    <div class="task-card">
        <div class="task-info">
            <h3 id="t2-title">Task Name 2</h3>
            <p id="t2-reward" style="color: var(--primary); font-size: 12px;">Reward: 0.00</p>
        </div>
        <button class="claim-btn" onclick="handleTask(2)">Start</button>
    </div>

    <nav class="slim-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="task.html" class="nav-item active"><i class="fas fa-tasks"></i><span>Task</span></a>
        <a href="trading.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Trade</span></a>
        <a href="withdraw.html" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
    </nav>

    <script>
        const API_URL = "https://aaf-api-free.onrender.com";
        const USER_ID = localStorage.getItem('user_id');

        // ব্যালেন্স লোড করা
        async function loadData() {
            if(!USER_ID) return;
            try {
                const res = await fetch(`${API_URL}/api/user_data/${USER_ID}`);
                const data = await res.json();
                if(data.status === "success") {
                    document.getElementById('task-bal').innerText = "৳ " + data.task_balance.toFixed(2);
                }
            } catch (e) { console.log("Load error"); }
        }
        loadData();

        // এই ফাংশনটি আপনি আপনার লিঙ্ক বা লজিক দিয়ে কাস্টমাইজ করবেন
        function handleTask(id) {
            console.log("Task clicked: " + id);
            alert("আপনি এই টাস্কটি কাস্টমাইজ করতে পারবেন।");
            // এখানে আপনার window.open বা অন্য লজিক বসান
        }
    </script>
</body>
</html>
