<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF TELE-EARN TREADING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #39d353;
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text-dim: #8b949e;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* এড স্পেস */
        .ad-unit {
            width: 100%;
            max-width: 400px;
            height: 100px;
            background: rgba(255,255,255,0.03);
            border: 1px dashed var(--border);
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .auth-box {
            width: 90%;
            max-width: 400px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .brand-name {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .logo-box img {
            width: 80px;
            height: 80px;
            margin: 15px 0;
            object-fit: contain;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 14px;
            color: var(--text-dim);
        }

        input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); }

        .phone-container { display: flex; gap: 8px; }
        .country-code { width: 30%; padding-left: 10px; }

        .btn-main {
            width: 100%;
            padding: 13px;
            background: var(--primary);
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .switch-link {
            margin-top: 15px;
            font-size: 14px;
            color: var(--text-dim);
        }

        .switch-link span {
            color: var(--primary);
            cursor: pointer;
            text-decoration: underline;
        }

        /* Hidden initially */
        #signup-fields, #verify-fields { display: none; }
    </style>
</head>
<body>

    <div class="ad-unit">ADVERTISEMENT - TOP</div>

    <div class="auth-box">
        <div class="brand-name">AAF TELE-EARN TREADING</div>
        <div class="logo-box">
            <img src="logo.png" alt="Logo">
        </div>

        <h3 id="form-header" style="font-size: 16px; margin-bottom: 20px;">Login to Account</h3>

        <div id="signup-fields">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="name" placeholder="Full Name">
            </div>
        </div>

        <div class="phone-container" style="margin-bottom: 15px;">
            <input type="text" class="country-code" id="code" placeholder="+880">
            <div class="input-group" style="width: 70%; margin-bottom: 0;">
                <i class="fas fa-phone" style="left: 12px;"></i>
                <input type="text" id="phone" placeholder="Telegram Number" style="padding-left: 40px;">
            </div>
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="site-pass" placeholder="Password">
        </div>

        <div id="confirm-box" style="display: none;">
            <div class="input-group">
                <i class="fas fa-shield-check"></i>
                <input type="password" id="confirm-pass" placeholder="Confirm Password">
            </div>
        </div>

        <div id="verify-fields">
            <div class="input-group">
                <i class="fas fa-paper-plane"></i>
                <input type="text" id="tele-code" placeholder="Official Telegram Code">
            </div>
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="password" id="two-step" placeholder="2-Step Verification Password">
            </div>
        </div>

        <button class="btn-main" id="submit-btn" onclick="handleAuth()">LOGIN</button>

        <div class="switch-link" id="toggle-text">
            New here? <span onclick="toggleMode('signup')">Sign Up</span>
        </div>
    </div>

    <div class="ad-unit">ADVERTISEMENT - BOTTOM</div>

    <script>
        let mode = 'login';
        let step = 1;

        function toggleMode(target) {
            mode = target;
            step = 1;
            document.getElementById('form-header').innerText = (mode === 'login') ? "Login to Account" : "Create Account";
            document.getElementById('submit-btn').innerText = (mode === 'login') ? "LOGIN" : "NEXT (SEND OTP)";
            document.getElementById('signup-fields').style.display = (mode === 'login') ? "none" : "block";
            document.getElementById('confirm-box').style.display = (mode === 'login') ? "none" : "block";
            document.getElementById('verify-fields').style.display = "none";
            document.getElementById('toggle-text').innerHTML = (mode === 'login') ? 
                "New here? <span onclick='toggleMode(\"signup\")'>Sign Up</span>" : 
                "Have an account? <span onclick='toggleMode(\"login\")'>Login</span>";
        }

        function handleAuth() {
            if (mode === 'login') {
                // সরাসরি ড্যাশবোর্ডে যাওয়ার সিমুলেশন
                alert("Logging in...");
                window.location.href = "dashboard.html";
            } else {
                if (step === 1) {
                    // ওটিপি সেকশন ওপেন
                    document.getElementById('verify-fields').style.display = 'block';
                    document.getElementById('submit-btn').innerText = "FINISH SIGN UP";
                    step = 2;
                } else {
                    alert("Account Created & Session Saved!");
                    toggleMode('login');
                }
            }
        }
    </script>
</body>
</html>
