<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Master | Secure Task Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --bg: #020617;
            --glass-card: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #00f2fe; 
            --active-green: #00ff88;
            --danger: #ff4d4d;
            --gold: #ffaa00;
            --text-main: #f1f5f9;
            --text-gray: #94a3b8;
        }

        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: 'Rajdhani', sans-serif; margin: 0; padding-bottom: 100px;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.1) 0%, transparent 70%);
        }

        /* Top Header */
        .header { 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000;
        }
        .header h2 { font-family: 'Syncopate'; font-size: 14px; color: var(--primary); margin: 0; }
        .balance-badge { background: rgba(0,255,136,0.1); padding: 5px 12px; border-radius: 12px; border: 1px solid var(--active-green); font-size: 14px; color: var(--active-green); font-weight: bold; }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }

        /* Ad System (From Code 2) */
        .ad-slot { 
            margin: 10px 0 20px; text-align: center; background: rgba(0,0,0,0.4); border-radius: 15px; 
            border: 1px solid var(--glass-border); min-height: 60px; display: flex; align-items: center; 
            justify-content: center; overflow: hidden; transition: 0.5s;
        }

        /* IP Security Warning */
        .ip-alert { 
            background: rgba(255, 77, 77, 0.1); border: 1px dashed var(--danger); padding: 12px; border-radius: 15px; 
            margin-bottom: 20px; font-size: 12px; text-align: center; color: #ff9999; line-height: 1.5;
        }

        /* Task Stats (From Code 1) */
        .task-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: var(--glass-card); border: 1px solid var(--glass-border); padding: 12px; border-radius: 18px; text-align: center; }
        .stat-box i { font-size: 18px; color: var(--gold); margin-bottom: 5px; }
        .stat-box span { display: block; font-size: 10px; color: var(--text-gray); text-transform: uppercase; }
        .stat-box b { font-size: 14px; color: #fff; }

        /* Combined Task Card Design */
        .task-card {
            background: var(--glass-card); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 18px; margin-bottom: 15px;
            position: relative; transition: 0.3s;
        }
        .task-card.locked { opacity: 0.6; filter: grayscale(1); border-color: var(--danger); }
        .task-card.fresh { border-color: var(--active-green); box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); }

        .task-top { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .task-icon { width: 50px; height: 50px; border-radius: 15px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 22px; border: 1px solid var(--glass-border); }
        
        .task-info { flex: 1; }
        .task-info h4 { margin: 0; font-size: 16px; color: #fff; }
        .task-info p { margin: 4px 0 0; font-size: 12px; color: var(--text-gray); }

        .reward-tag { text-align: right; }
        .reward-tag b { display: block; color: var(--gold); font-size: 18px; }
        .reward-tag small { font-size: 9px; color: var(--active-green); text-transform: uppercase; }

        /* Lock Overlay & Messages */
        .ip-lock-msg { background: rgba(255, 77, 77, 0.15); color: var(--danger); font-size: 11px; padding: 8px; border-radius: 10px; text-align: center; margin-bottom: 10px; border: 1px solid rgba(255,77,77,0.2); font-weight: bold; }
        .bonus-msg { background: rgba(0, 255, 136, 0.1); color: var(--active-green); font-size: 11px; padding: 8px; border-radius: 10px; text-align: center; margin-bottom: 10px; border: 1px solid rgba(0,255,136,0.2); font-weight: bold; }

        .btn-claim { 
            width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; 
            cursor: pointer; transition: 0.3s; font-family: 'Rajdhani'; font-size: 15px;
            background: linear-gradient(90deg, var(--primary), var(--active-green)); color: #020617;
        }
        .btn-claim:disabled { background: var(--glass-border); color: var(--text-gray); cursor: not-allowed; }

        /* Dock Navigation (Sleek) */
        .dock-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 10px 0 25px 0; z-index: 2000; display: flex; justify-content: center; }
        .dock-nav { width: 92%; max-width: 500px; height: 65px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(30px); border-radius: 30px; border: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: var(--text-gray); text-decoration: none; text-align: center; font-size: 10px; transition: 0.3s; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <h2><i class="fas fa-shield-alt"></i> AAF STRONG</h2>
        <div class="balance-badge">৳ <span id="u-bal">0.00</span></div>
    </div>

    <div class="container">
        <div class="ad-slot" id="dynamic-ad">
            <small style="color: var(--text-gray)">Checking Sponsor Ads...</small>
        </div>

        <div class="ip-alert">
            <i class="fas fa-fingerprint"></i> <b>IP SECURITY ACTIVE:</b> এক আইপি দিয়ে একবারই কাজ করা যাবে। কাজ শেষে অবশ্যই <b>Airplane Mode</b> চালু করে আইপি পরিবর্তন করুন।
        </div>

        <div class="task-stats">
            <div class="stat-box">
                <i class="fas fa-check-double"></i>
                <span>Tasks Done</span>
                <b id="tasks-done">0</b>
            </div>
            <div class="stat-box">
                <i class="fas fa-bolt"></i>
                <span>UID Status</span>
                <b id="u-id" style="color: var(--primary);">#---</b>
            </div>
        </div>

        <div id="main-task-list">
            <div style="text-align:center; padding:40px; color:var(--text-gray);">
                <i class="fas fa-circle-notch fa-spin" style="font-size:30px; margin-bottom:10px;"></i>
                <p>Syncing Secure Tasks...</p>
            </div>
        </div>
    </div>

    <div class="dock-container">
        <nav class="dock-nav">
            <a href="#" class="nav-item active"><i class="fas fa-house"></i><span>Home</span></a>
            <a href="javascript:void(0)" onclick="smartRedirect('task')" class="nav-item"><i class="fas fa-tasks"></i><span>Task</span></a>
            <a href="javascript:void(0)" onclick="smartRedirect('trading')" class="nav-item"><i class="fas fa-chart-line"></i><span>Trading</span></a>
            <a href="javascript:void(0)" onclick="smartRedirect('wallet')" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
            <a href="javascript:void(0)" onclick="smartRedirect('account')" class="nav-item"><i class="fas fa-user-circle"></i><span>Account</span></a>
        </nav>
    </div>

    <script>
        const API_URL = "https://aaf-tele-earn-treading.onrender.com";
        const USER_ID = localStorage.getItem('user_id') || "DEMO_USER";

        // ১. অ্যাড রোটেশন (অ্যাডমিন প্যানেলের অ্যাড রিফ্লেক্ট করবে)
        async function loadAds() {
            try {
                const res = await fetch(`${window.location.origin}/get_admin_config`);
                const data = await res.json();
                const adBox = document.getElementById('dynamic-ad');
                // অ্যাডমিন প্যানেল থেকে আসা প্রথম স্লটের অ্যাড দেখাবে
                if(data.ad_code_1) {
                    adBox.innerHTML = data.ad_code_1;
                }
            } catch(e) { console.log("Ad sync failed"); }
        }

        // ২. মেইন টাস্ক ইঞ্জিন (IP Lock Logic সহ)
        async function loadTaskSystem() {
            try {
                const res = await fetch(`${API_URL}/api/user/tasks/v2?user_id=${USER_ID}`);
                const data = await res.json();
                
                if (data.status === "success") {
                    document.getElementById('u-bal').innerText = data.balance.toFixed(2);
                    document.getElementById('u-id').innerText = "#" + (data.uid || "----");
                    document.getElementById('tasks-done').innerText = data.completed_count || 0;

                    const container = document.getElementById('main-task-list');
                    container.innerHTML = "";
                    
                    data.tasks.forEach(task => {
                        let isIpUsed = task.is_ip_used; 
                        let cardStatus = isIpUsed ? "locked" : "fresh";
                        
                        // আইকন নির্বাচন
                        let icon = "fa-link";
                        let color = "var(--primary)";
                        if(task.type === 'video') { icon = "fa-play-circle"; color = "#ff0000"; }
                        if(task.type === 'telegram') { icon = "fa-paper-plane"; color = "#0088cc"; }

                        container.innerHTML += `
                            <div class="task-card ${cardStatus}">
                                ${!isIpUsed ? `<div class="bonus-msg"><i class="fas fa-unlock"></i> FRESH IP BONUS ACTIVE</div>` : 
                                `<div class="ip-lock-msg"><i class="fas fa-user-secret"></i> IP ALREADY USED! CHANGE IP</div>`}
                                
                                <div class="task-top">
                                    <div class="task-icon" style="color:${color}"><i class="fas ${icon}"></i></div>
                                    <div class="task-info">
                                        <h4>${task.title}</h4>
                                        <p>${task.desc || 'Complete mission to earn'}</p>
                                    </div>
                                    <div class="reward-tag">
                                        <b>৳${task.reward.toFixed(2)}</b>
                                        <small>${isIpUsed ? 'Blocked' : 'Verified'}</small>
                                    </div>
                                </div>

                                <button class="btn-claim" 
                                    onclick="startSecureTask('${task.id}', '${task.link}')" 
                                    ${isIpUsed ? 'disabled' : ''}>
                                    ${isIpUsed ? 'SYSTEM LOCKED' : 'START MISSION'}
                                </button>
                            </div>
                        `;
                    });
                }
            } catch (e) { 
                document.getElementById('main-task-list').innerHTML = `<p style="text-align:center; color:var(--danger);">SERVER SYNC ERROR!</p>`;
            }
        }

        // ৩. টাস্ক ভেরিফিকেশন ও টাইমার
        function startSecureTask(taskId, url) {
            window.open(url, '_blank');
            const btn = event.target;
            btn.disabled = true;
            
            let waitTime = 15; 
            const timer = setInterval(() => {
                btn.innerText = `Securing... ${waitTime}s`;
                waitTime--;
                if(waitTime < 0) {
                    clearInterval(timer);
                    btn.innerText = "VERIFYING...";
                    claimReward(taskId);
                }
            }, 1000);
        }
        
        async function claimReward(taskId) {
            try {
                const res = await fetch(`${API_URL}/api/user/tasks/claim`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: USER_ID, task_id: taskId })
                });
                const result = await res.json();
                
                if(result.success) {
                    alert(`✅ MISSION SUCCESS! ৳${result.reward} Added.`);
                    loadTaskSystem();
                } else { 
                    alert(`❌ ERROR: ${result.message}`); 
                    loadTaskSystem();
                }
            } catch (e) { alert("Verification Failed!"); }
        }

        window.onload = () => {
            loadTaskSystem();
            loadAds();
        };
    </script>
</body>
</html>
