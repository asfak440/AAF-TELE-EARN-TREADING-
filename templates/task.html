<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Master | Secure Task Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --bg: #020617;
            --glass-card: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.06);
            --primary: #00f2fe; 
            --active-green: #00ff88;
            --danger: #ff0055;
            --gold: #ffaa00;
            --text-main: #f1f5f9;
            --text-gray: #94a3b8;
        }

        /* কম্প্যাক্ট টাস্ক কার্ড */
        .task-card {
            padding: 10px !important;
            margin-bottom: 8px !important;
        }
        .task-icon {
            width: 28px !important;
            height: 28px !important;
            font-size: 12px !important;
        }
        .task-info h4 {
            font-size: 11px !important;
            font-weight: 600 !important;
        }
        .task-info p {
            font-size: 8px !important;
        }
        .reward-tag {
            font-size: 9px !important;
        }
        .btn-claim {
            padding: 6px !important;
            font-size: 7px !important;
        }
        .task-top {
            gap: 6px !important;
            margin-bottom: 6px !important;
        }
        .container {
            max-width: 450px !important;
            padding: 8px !important;
        }

        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: 'Rajdhani', sans-serif; margin: 0; padding-bottom: 120px;
            background-image: radial-gradient(circle at 50% 0%, rgba(112, 0, 255, 0.15) 0%, transparent 70%);
            overflow-x: hidden;
        }

        .header { 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000;
        }
        .header h2 { font-family: 'Syncopate'; font-size: 11px; color: var(--primary); margin: 0; text-shadow: 0 0 10px rgba(0, 242, 254, 0.4); letter-spacing: 1px; }
        .header-bal-box {
            background: rgba(0,0,0,0.4); padding: 7px 12px; border-radius: 20px;
            border: 1px solid var(--glass-border); font-family: 'Syncopate'; font-size: 10px; font-weight: bold;
            display: flex; align-items: center; gap: 5px;
        }
        .container { padding: 15px; max-width: 550px; margin: 0 auto; }

        .banner-ad-box { 
            width: 100%; min-height: 70px; border-radius: 16px; overflow: hidden; margin-bottom: 15px; 
            border: 1px dashed rgba(255,255,255,0.1); display: flex; align-items: center; 
            justify-content: center; background: rgba(0,0,0,0.25); color: var(--text-gray); 
            text-align: center; box-sizing: border-box; padding: 10px;
        }

        .join-warn { 
            display: none; background: rgba(255, 0, 85, 0.1); border: 1px solid rgba(255,0,85,0.2); 
            padding: 10px; border-radius: 12px; text-align: center; color: #ff99bb; 
            font-size: 11px; margin-bottom: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* নতুন মাইলস্টোন কার্ড স্টাইল */
        #milestones-container {
            margin-bottom: 15px;
        }
        .milestone-item {
            background: var(--glass-card);
            border: 1px solid rgba(255, 170, 0, 0.15);
            border-radius: 18px;
            padding: 12px;
            margin-bottom: 12px;
            text-align: left;
        }
        .milestone-item h4 {
            font-size: 11px;
            margin: 0 0 4px;
            color: var(--gold);
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 6px 0;
        }
        .progress-fill {
            height: 50%;
            background: linear-gradient(90deg, var(--gold), #ffdd00);
            width: 0%;
            transition: 0.5s;
        }
        .btn-milestone-claim {
            background: var(--gold);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 6px;
            color: #000;
        }

        /* টাস্ক কার্ড মূল স্টাইল */
        .task-card { 
            background: var(--glass-card); border: 1px solid var(--glass-border); border-radius: 20px; 
            padding: 18px; margin-bottom: 12px; transition: 0.3s; position: relative; backdrop-filter: blur(20px); 
            box-sizing: border-box;
        }
        .task-card.locked { opacity: 0.45; filter: grayscale(1); pointer-events: none; }
        .task-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .task-icon { width: 40px; height: 40px; border-radius: 12px; background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--primary); border: 1px solid var(--glass-border); flex-shrink: 0; }
        .task-info { flex-grow: 1; overflow: hidden; }
        .task-info h4 { margin: 0; font-size: 14px; color: #fff; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .task-info p { margin: 2px 0 0; font-size: 10px; color: var(--text-gray); }
        .reward-tag { text-align: right; color: var(--active-green); font-size: 12px; font-family: 'Syncopate'; font-weight: bold; flex-shrink: 0; margin-left: auto;}
        
        .btn-claim { 
            width: 100%; padding: 14px; border-radius: 14px; border: none; font-weight: bold; 
            cursor: pointer; transition: 0.3s; font-family: 'Syncopate'; font-size: 9px; letter-spacing: 1px;
            background: linear-gradient(135deg, var(--primary), #0088cc); color: #000;
            box-shadow: 0 4px 12px rgba(0, 242, 254, 0.15);
        }
        .btn-claim:active { transform: scale(0.97); }

        /* নেভিগেশন ডক */
        .dock-container { position: fixed; bottom: 15px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 2000; padding: 0 10px; box-sizing: border-box; }
        .dock-nav { 
            width: 100%; max-width: 420px; height: 70px; background: rgba(15, 23, 42, 0.96); 
            border-radius: 35px; border: 1px solid var(--glass-border); display: flex; 
            justify-content: space-around; align-items: center; backdrop-filter: blur(25px);
            box-shadow: 0 -8px 30px rgba(0,0,0,0.4);
        }
        .nav-item { color: var(--text-gray); text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 9px; transition: 0.2s; flex: 1; text-align: center; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; display: block; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); font-weight: 600; }
    </style>
</head>
<body>

    <header class="header">
        <h2>AAF TASK ENGINE</h2>
        <div class="header-bal-box">
            <span style="color: var(--active-green);">৳ <span id="u-bal">0.00</span></span>
            <span style="color: var(--glass-border); margin: 0 5px;">|</span>
            <span style="color: var(--gold);">AAF <span id="u-coin">0.00</span></span>
        </div>
    </header>

    <div class="container">
        <div class="banner-ad-box" id="banner-ad">
            <p style="font-size: 9px; letter-spacing: 2px; color: var(--text-gray); margin: 0;">
                <i class="fas fa-ad" style="margin-right:5px;"></i> GLOBAL ADVERTISING UNIT
            </p>
        </div>

        <div class="join-warn" id="join-warning">
            <i class="fas fa-exclamation-triangle"></i> বোনাস আনলক করতে অফিশিয়াল চ্যানেলে জয়েন করুন!
        </div>

        <!-- 🆕 মাইলস্টোন কন্টেইনার (এডমিন প্যানেল থেকে কন্ট্রোল) -->
        <div id="milestones-container"></div>

        <div id="main-task-list">
            <div style="text-align:center; padding:40px; color:var(--text-gray); font-size: 11px;">
                <i class="fas fa-spinner fa-spin" style="margin-right: 5px;"></i> এএএফ ইঞ্জিন লোড হচ্ছে...
            </div>
        </div>
    </div>

    <div class="dock-container">
        <nav class="dock-nav">
            <a href="/dashboard" class="nav-item"><i class="fas fa-house"></i><span>Home</span></a>
            <a href="/task" class="nav-item active"><i class="fas fa-tasks"></i><span>Task</span></a>
            <a href="/trading" class="nav-item"><i class="fas fa-chart-line"></i><span>Trading</span></a>
            <a href="/wallet" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
            <a href="/account" class="nav-item"><i class="fas fa-user-circle"></i><span>Account</span></a>
        </nav>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
<script>
const API = window.location.origin;
const TG_KEY = "telegram_id";

let DEVICE_ID = "";
let USER_JOINED = false;

function getTG(){
  const id = localStorage.getItem(TG_KEY);
  if(!id) location.href="/login";
  return id;
}

window.addEventListener('load', async () => {
  const fp = await FingerprintJS.load();
  const result = await fp.get();
  DEVICE_ID = result.visitorId;
  await initTaskPage();
  setInterval(initTaskPage, 15000);
});

async function initTaskPage(){
  const TG_ID = getTG();
  try{
    const res = await fetch(`${API}/api/user/data/${TG_ID}`,{
      headers:{ 'x-device-id': DEVICE_ID },
      credentials:"include"
    });
    const data = await res.json();
    if(data.status !== "success") return;
    const tasksRes = await fetch(`${API}/api/tasks`);
    const tasksData = await tasksRes.json();
    const tasks = tasksData.tasks || [];
    const milestonesRes = await fetch(`${API}/api/user/milestones`, { credentials: 'include' });
    const milestonesData = await milestonesRes.json();
    const milestones = milestonesData.milestones || [];
    renderTaskUI(data.user, data.admin, tasks, milestones);
  } catch(err){ console.log("Init Error", err); }
}

function renderTaskUI(user, admin, tasks, milestones){
  updateBalance(user.cash, user.aaf);
  USER_JOINED = user.is_joined;
  document.getElementById('join-warning').style.display = USER_JOINED ? 'none':'flex';
  
  renderMilestones(milestones);   // নতুন মাইলস্টোন রেন্ডার
  renderTasks(tasks);
  
  if(admin.banner_ad_code && admin.banner_ad_code.trim() !== ""){
    injectSafeAdHTML(admin.banner_ad_code);
  }
  showTimedAd(admin.popup_ad_code);
}

function updateBalance(cash, coin){
  const balEl = document.getElementById('u-bal');
  const coinEl = document.getElementById('u-coin');
  if (balEl) balEl.innerText = parseFloat(cash || 0).toFixed(2);
  if (coinEl) coinEl.innerText = parseFloat(coin || 0).toFixed(2);
}

function renderTasks(tasks){
  const list = document.getElementById('main-task-list');
  list.innerHTML = "";
  tasks.forEach(t=>{
    const locked = t.is_device_used;
    const reward = t.currency === 'aaf' ? `AAF ${t.reward}` : `৳${t.reward}`;
    list.innerHTML += `
      <div class="task-card ${locked?'locked':''}">
        <div class="task-top">
          <div class="task-icon">
            <i class="fas ${t.type==='video'?'fa-play':'fa-link'}"></i>
          </div>
          <div class="task-info">
            <h4>${escapeHtml(t.title)}</h4>
            <p>${locked?'DEVICE ALREADY USED':`Required Time: ${t.timer}s`}</p>
          </div>
          <div class="reward-tag">${reward}</div>
        </div>
        <button class="btn-claim" id="btn-${t.id}" ${locked?'disabled':''} onclick="startTask('${t.id}','${t.link}',${t.timer})">
          ${locked?'ALREADY CLAIMED':'START EARNING'}
        </button>
      </div>`;
  });
}

function startTask(id, url, sec){
  if(!USER_JOINED && !confirm("Join না করলে Bonus পাবেন না. চালাবেন?")) return;
  window.open(url,'_blank');
  const btn = document.getElementById(`btn-${id}`);
  btn.disabled = true;
  let t = sec;
  const timer = setInterval(()=>{
    btn.innerText = `WAIT ${t}s`;
    if(t<=0){
      clearInterval(timer);
      btn.innerText="VERIFYING...";
      claimTask(id);
    }
    t--;
  },1000);
}

async function claimTask(id){
  const TG_ID = getTG();
  try{
    const r = await fetch(`${API}/api/user/tasks/claim`,{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ telegram_id: TG_ID, task_id: id, device_id: DEVICE_ID })
    });
    const d = await r.json();
    if(d.blocked) alert("⚠️ "+d.message);
    else alert(d.message);
    initTaskPage();
  } catch(e){ alert("Server Busy"); }
}

function injectSafeAdHTML(htmlString) {
  const container = document.getElementById('banner-ad');
  if (!container) return;
  container.innerHTML = '';
  const temp = document.createElement('div');
  temp.innerHTML = htmlString;
  const scripts = Array.from(temp.querySelectorAll('script'));
  for (let node of temp.childNodes) {
      if (node.nodeType === 1 && node.tagName === 'SCRIPT') continue;
      container.appendChild(node.cloneNode(true));
  }
  scripts.forEach(oldScript => {
      const newScript = document.createElement('script');
      if (oldScript.src) {
          newScript.src = oldScript.src;
          newScript.async = false;
      } else {
          newScript.textContent = oldScript.textContent;
      }
      container.appendChild(newScript);
  });
}

function showTimedAd(adCode) {
  if (!adCode || adCode.trim() === "") return;
  const TG_ID = getTG();
  const key = `popup_ad_seen_${TG_ID}`;
  const last = localStorage.getItem(key);
  const SIX_HOURS = 21600000;
  if (!last || Date.now() - last > SIX_HOURS) {
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = adCode;
      const scripts = tempDiv.getElementsByTagName('script');
      for (let script of scripts) {
          const newScript = document.createElement('script');
          if (script.src) newScript.src = script.src;
          else newScript.textContent = script.textContent;
          document.body.appendChild(newScript);
      }
      localStorage.setItem(key, Date.now());
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
  });
}

// ================== মাইলস্টোন রেন্ডার ও ক্লেইম ==================
function renderMilestones(milestones) {
  const container = document.getElementById('milestones-container');
  if (!container) return;
  if (!milestones || milestones.length === 0) {
      container.innerHTML = '<div class="milestone-item" style="text-align:center;">🎯 কোনো মাইলস্টোন সক্রিয় নেই</div>';
      return;
  }
  let html = '';
  for (let m of milestones) {
      let percent = (m.progress / m.target) * 100;
      let statusText = '';
      let claimButton = '';
      if (m.already_claimed) {
          statusText = '<span style="color:var(--active-green);">✅ বোনাস প্রাপ্ত</span>';
      } else if (m.achieved) {
          statusText = '<span style="color:var(--gold);">🎉 বোনাস নিন!</span>';
          claimButton = `<button class="btn-milestone-claim" onclick="claimMilestone('${m.id}')">বোনাস নিন</button>`;
      } else {
          statusText = `<span>অগ্রগতি: ${m.progress}/${m.target}</span>`;
      }
      html += `
        <div class="milestone-item">
          <h4>🎯 ${m.type === 'task' ? 'টাস্ক' : m.type === 'referral' ? 'রেফারেল' : 'ডিপোজিট'} – ${m.target} টি</h4>
          <div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
            <div class="milestone-reward">পুরস্কার: ${m.reward_amount} ${m.reward_type === 'bdt' ? '৳' : 'AAF'}</div>
            <div>${statusText}</div>
          </div>
          ${claimButton}
        </div>
      `;
  }
  container.innerHTML = html;
}

async function claimMilestone(milestoneId) {
  try {
      const res = await fetch('/api/user/claim_milestone', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          credentials: 'include',
          body: JSON.stringify({ milestone_id: milestoneId })
      });
      const data = await res.json();
      if (data.success) {
          alert('✅ বোনাস আপনার ওয়ালেটে জমা হয়েছে!');
          initTaskPage(); // সম্পূর্ণ পেজ রিফ্রেশ
      } else {
          alert('❌ ' + (data.error || 'বোনাস নেওয়া যায়নি'));
      }
  } catch(e) {
      alert('সার্ভার ত্রুটি');
  }
}
</script>
</body>
    </html>
