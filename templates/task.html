<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Master | Secure Task Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --bg: #020617;
            --glass-card: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #00f2fe; 
            --active-green: #00ff88;
            --danger: #ff4d4d;
            --gold: #ffaa00;
            --text-main: #f1f5f9;
            --text-gray: #94a3b8;
        }

        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: 'Rajdhani', sans-serif; margin: 0; padding-bottom: 120px;
            background-image: radial-gradient(circle at 50% 0%, rgba(112, 0, 255, 0.15) 0%, transparent 70%);
            overflow-x: hidden;
        }

        /* Header */
        .header { 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000;
        }
        .header h2 { font-family: 'Syncopate'; font-size: 13px; color: var(--primary); margin: 0; text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }
        .balance-badge { background: rgba(0,0,0,0.4); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--glass-border); font-size: 13px; color: var(--active-green); font-weight: bold; font-family: 'Syncopate'; }

        .container { padding: 20px 15px; max-width: 600px; margin: 0 auto; }

        .ip-alert { 
            background: rgba(255, 77, 77, 0.1); border: 1px dashed var(--danger); padding: 12px; border-radius: 15px; 
            margin-bottom: 20px; font-size: 12px; text-align: center; color: #ff9999; line-height: 1.5;
        }

        .task-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: var(--glass-card); border: 1px solid var(--glass-border); padding: 15px; border-radius: 20px; text-align: center; backdrop-filter: blur(20px); }
        .stat-box i { font-size: 18px; color: var(--gold); margin-bottom: 8px; }
        .stat-box span { display: block; font-size: 9px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; }
        .stat-box b { font-size: 14px; color: #fff; font-family: 'Syncopate'; }

        /* Task Card */
        .task-card { background: var(--glass-card); border: 1px solid var(--glass-border); border-radius: 22px; padding: 20px; margin-bottom: 15px; transition: 0.3s; position: relative; backdrop-filter: blur(20px); }
        .task-card.locked { opacity: 0.6; filter: grayscale(1); }
        .task-top { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .task-icon { width: 45px; height: 45px; border-radius: 12px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid var(--glass-border); color: var(--primary); }
        .task-info h4 { margin: 0; font-size: 15px; color: #fff; }
        .task-info p { margin: 3px 0 0; font-size: 11px; color: var(--text-gray); }
        .reward-tag { text-align: right; margin-left: auto; }
        .reward-tag b { display: block; color: var(--active-green); font-size: 14px; font-family: 'Syncopate'; }

        .btn-claim { 
            width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; 
            cursor: pointer; transition: 0.3s; font-family: 'Syncopate'; font-size: 10px;
            background: linear-gradient(135deg, var(--primary), #0088cc); color: #000;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.2);
        }
        .btn-claim:active { transform: scale(0.95); }
        .btn-claim:disabled { background: #1e293b; color: #475569; cursor: not-allowed; box-shadow: none; }

        /* Navigation Bar (aaf442 Style) */
        .dock-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 10px 0 25px 0; z-index: 2000; display: flex; justify-content: center; }
        .dock-nav {
            width: 92%; max-width: 500px; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(30px);
            border-radius: 35px; border: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .nav-item { color: var(--text-gray); text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 11px; transition: 0.3s; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 15px var(--primary); }
        .nav-item i { font-size: 22px; margin-bottom: 5px; }

        .ip-lock-msg { background: rgba(255, 77, 77, 0.1); color: var(--danger); font-size: 10px; padding: 8px; border-radius: 10px; text-align: center; margin-bottom: 12px; border: 1px solid rgba(255,77,77,0.2); font-weight: bold; }
        .bonus-msg { background: rgba(0, 255, 136, 0.1); color: var(--active-green); font-size: 10px; padding: 8px; border-radius: 10px; text-align: center; margin-bottom: 12px; border: 1px solid rgba(0,255,136,0.2); font-weight: bold; }
    </style>
</head>
<body>

    <header class="header">
        <h2>AAF SECURE ENGINE</h2>
        <div class="balance-badge">৳ <span id="u-bal">0.00</span></div>
    </header>

    <div class="container">
        <div id="banner-ad-place" style="margin-bottom:15px; text-align:center;"></div>

        <div class="ip-alert">
            <i class="fas fa-fingerprint"></i> <b>SECURITY PROTOCOL:</b> Toggle Airplane Mode to refresh IP after each claim to avoid account lock.
        </div>

        <div class="task-stats">
            <div class="stat-box">
                <i class="fas fa-check-double"></i>
                <span>Completed</span>
                <b id="tasks-done">0</b>
            </div>
            <div class="stat-box">
                <i class="fas fa-bolt"></i>
                <span>Status</span>
                <b id="u-status" style="color: var(--active-green);">SECURE</b>
            </div>
        </div>

        <div id="main-task-list">
            <div style="text-align:center; padding:40px; color:var(--text-gray);">
                <i class="fas fa-circle-notch fa-spin"></i> Initializing Task Engine...
            </div>
        </div>
    </div>

    <div class="dock-container">
        <nav class="dock-nav">
            <a href="/dashboard" class="nav-item"><i class="fas fa-house"></i><span>Home</span></a>
            <a href="/task" class="nav-item active"><i class="fas fa-tasks"></i><span>Task</span></a>
            <a href="/trading" class="nav-item"><i class="fas fa-chart-line"></i><span>Trading</span></a>
            <a href="/wallet" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
            <a href="/account" class="nav-item"><i class="fas fa-user-circle"></i><span>Account</span></a>
        </nav>
    </div>

    <script>
        // API URL এখন আপনার app.py এর সাথে কানেক্টেড (Relative Path)
        const API_BASE = window.location.origin;
        const USER_ID = localStorage.getItem('user_id');

        async function loadTasks() {
            try {
                // app.py থেকে ডাটা কল করা হচ্ছে
                const res = await fetch(`${API_BASE}/api/user/tasks?user_id=${USER_ID}`);
                const data = await res.json();
                
                if (data.status === "success") {
                    document.getElementById('u-bal').innerText = data.balance;
                    document.getElementById('tasks-done').innerText = data.completed_count;

                    const list = document.getElementById('main-task-list');
                    list.innerHTML = "";
                    
                    data.tasks.forEach(t => {
                        let locked = t.is_ip_used;
                        list.innerHTML += `
                            <div class="task-card ${locked ? 'locked' : ''}">
                                ${locked ? `<div class="ip-lock-msg">IP USED - PLEASE CHANGE IP</div>` : `<div class="bonus-msg">READY TO CLAIM - SECURE IP</div>`}
                                <div class="task-top">
                                    <div class="task-icon"><i class="fas ${t.type === 'telegram' ? 'fa-paper-plane' : 'fa-play'}"></i></div>
                                    <div class="task-info">
                                        <h4>${t.title}</h4>
                                        <p>Wait 15s to verify completion</p>
                                    </div>
                                    <div class="reward-tag"><b>৳${t.reward}</b></div>
                                </div>
                                <button class="btn-claim" onclick="startTask('${t.id}', '${t.link}', this)" ${locked ? 'disabled' : ''}>
                                    ${locked ? 'ALREADY CLAIMED' : 'START EARNING'}
                                </button>
                            </div>
                        `;
                    });
                }
            } catch (e) { 
                document.getElementById('main-task-list').innerHTML = `<p style="text-align:center; color:red;">Failed to connect to Server.</p>`;
            }
        }

        function startTask(id, url, btn) {
            window.open(url, '_blank');
            btn.disabled = true;
            let time = 15;
            let timer = setInterval(() => {
                btn.innerText = `VERIFYING IN ${time}s...`;
                if(time-- <= 0) {
                    clearInterval(timer);
                    btn.innerText = "PROCESSING...";
                    submitClaim(id);
                }
            }, 1000);
        }

        async function submitClaim(taskId) {
            try {
                const res = await fetch(`${API_BASE}/api/user/tasks/claim`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: USER_ID, task_id: taskId })
                });
                const out = await res.json();
                if(out.success) { 
                    alert("Success! ৳" + out.reward + " added to your balance."); 
                    loadTasks(); 
                } else { 
                    alert("Error: " + out.message); 
                    loadTasks();
                }
            } catch (e) { alert("Claim failed. Server busy."); }
        }

        window.onload = loadTasks;
    </script>
</body>
</html>
