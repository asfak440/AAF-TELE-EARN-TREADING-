<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Master | Secure Task Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --bg: #020617;
            --glass-card: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #00f2fe; 
            --active-green: #00ff88;
            --danger: #ff4d4d;
            --gold: #ffaa00;
            --text-main: #f1f5f9;
            --text-gray: #94a3b8;
            --nav-bg: #0b0f1a;
        }

        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: 'Rajdhani', sans-serif; margin: 0; padding-bottom: 120px;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.1) 0%, transparent 70%);
        }

        /* Header */
        .header { 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000;
        }
        .header h2 { font-family: 'Syncopate'; font-size: 14px; color: var(--primary); margin: 0; }
        .balance-badge { background: rgba(0,255,136,0.1); padding: 5px 12px; border-radius: 12px; border: 1px solid var(--active-green); font-size: 14px; color: var(--active-green); font-weight: bold; }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }

        /* IP Security Warning */
        .ip-alert { 
            background: rgba(255, 77, 77, 0.1); border: 1px dashed var(--danger); padding: 12px; border-radius: 15px; 
            margin-bottom: 20px; font-size: 12px; text-align: center; color: #ff9999; line-height: 1.5;
        }

        /* Task Stats */
        .task-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: var(--glass-card); border: 1px solid var(--glass-border); padding: 12px; border-radius: 18px; text-align: center; }
        .stat-box i { font-size: 18px; color: var(--gold); margin-bottom: 5px; }
        .stat-box span { display: block; font-size: 10px; color: var(--text-gray); text-transform: uppercase; }
        .stat-box b { font-size: 14px; color: #fff; }

        /* Task Card */
        .task-card { background: var(--glass-card); border: 1px solid var(--glass-border); border-radius: 20px; padding: 18px; margin-bottom: 15px; transition: 0.3s; position: relative; }
        .task-card.locked { opacity: 0.6; filter: grayscale(1); }
        .task-top { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .task-icon { width: 45px; height: 45px; border-radius: 12px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid var(--glass-border); }
        .task-info h4 { margin: 0; font-size: 15px; color: #fff; }
        .task-info p { margin: 3px 0 0; font-size: 11px; color: var(--text-gray); }
        .reward-tag { text-align: right; margin-left: auto; }
        .reward-tag b { display: block; color: var(--gold); font-size: 16px; }

        .btn-claim { 
            width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; 
            cursor: pointer; transition: 0.3s; font-family: 'Rajdhani'; font-size: 14px;
            background: linear-gradient(90deg, var(--primary), var(--active-green)); color: #020617;
        }
        .btn-claim:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }

        /* Pop-up Ad Overlay (Admin Controlled) */
        #admin-pop-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10001;
            display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px);
        }
        .pop-box {
            width: 85%; max-width: 320px; background: #0f172a; border-radius: 25px;
            border: 1px solid var(--primary); padding: 20px; position: relative; text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.2);
        }
        .pop-box img { width: 100%; border-radius: 15px; margin: 15px 0; border: 1px solid var(--glass-border); }
        .close-pop { position: absolute; top: 10px; right: 15px; color: #fff; font-size: 25px; cursor: pointer; }

        /* Navigation Bar (Screenshot Style) */
        .nav-container { position: fixed; bottom: 25px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 9999; }
        .nav-bar { 
            width: 92%; max-width: 450px; background: var(--nav-bg); 
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 100px; 
            display: flex; justify-content: space-around; padding: 12px 10px; backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item { text-decoration: none; text-align: center; color: #6b7280; font-size: 11px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .nav-item i { font-size: 22px; margin-bottom: 5px; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active i { filter: drop-shadow(0 0 8px var(--primary)); }

        /* Status Messages */
        .ip-lock-msg { background: rgba(255, 77, 77, 0.1); color: var(--danger); font-size: 10px; padding: 6px; border-radius: 8px; text-align: center; margin-bottom: 10px; border: 1px solid rgba(255,77,77,0.2); }
        .bonus-msg { background: rgba(0, 255, 136, 0.1); color: var(--active-green); font-size: 10px; padding: 6px; border-radius: 8px; text-align: center; margin-bottom: 10px; border: 1px solid rgba(0,255,136,0.2); }
    </style>
</head>
<body>

    <header class="header">
        <h2>AAF STRONG</h2>
        <div class="balance-badge">৳ <span id="u-bal">0.00</span></div>
    </header>

    <div class="container">
        <div id="banner-ad-place" style="margin-bottom:15px; text-align:center;"></div>

        <div class="ip-alert">
            <i class="fas fa-fingerprint"></i> <b>IP SECURITY:</b> Use Airplane Mode to change IP after each task.
        </div>

        <div class="task-stats">
            <div class="stat-box">
                <i class="fas fa-check-circle"></i>
                <span>Completed</span>
                <b id="tasks-done">0</b>
            </div>
            <div class="stat-box">
                <i class="fas fa-id-badge"></i>
                <span>User ID</span>
                <b id="u-id" style="color: var(--primary);">#---</b>
            </div>
        </div>

        <div id="main-task-list">
            <div style="text-align:center; padding:40px; color:var(--text-gray);">
                <i class="fas fa-sync fa-spin"></i> Loading Secure Tasks...
            </div>
        </div>
    </div>

    <div id="admin-pop-overlay">
        <div class="pop-box">
            <span class="close-pop" onclick="closePop()">&times;</span>
            <h4 style="font-family:'Syncopate'; font-size:12px; color:var(--primary); margin:0;">SYSTEM NOTIFICATION</h4>
            <a id="pop-link" href="#" target="_blank">
                <img id="pop-img" src="" alt="Sponsor">
            </a>
            <p id="pop-text" style="font-size:13px; color:var(--text-gray); margin-bottom:15px;">Check out this special task!</p>
            <button class="btn-claim" onclick="closePop()">CONFIRM & CLOSE</button>
        </div>
    </div>

    <div class="nav-container">
        <nav class="nav-bar">
            <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="/task" class="nav-item active"><i class="fas fa-tasks"></i><span>Task</span></a>
            <a href="/trade" class="nav-item"><i class="fas fa-chart-line"></i><span>Trading</span></a>
            <a href="/wallet" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
            <a href="/account" class="nav-item"><i class="fas fa-user-circle"></i><span>Account</span></a>
        </nav>
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = { apiKey: "AIzaSyAJ5cl8HOMpmeREyWu19EKZQsNgrEY_zL4", databaseURL: "https://teleearnbd-781d6-default-rtdb.firebaseio.com", projectId: "teleearnbd-781d6" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const API_URL = "https://aaf-tele-earn-treading.onrender.com";
        const USER_ID = localStorage.getItem('user_id') || "USER_123";

        // ১. পপ-আপ অ্যাড কন্ট্রোল (Admin Panel-র সাথে সরাসরি যুক্ত)
        function initAdminControls() {
            // পপ-আপ চেক
            db.ref('admin/ads/popup').on('value', (s) => {
                const data = s.val();
                if(data && data.status === 'active') {
                    document.getElementById('pop-img').src = data.img;
                    document.getElementById('pop-link').href = data.link;
                    document.getElementById('pop-text').innerText = data.notice || "Complete tasks to earn more!";
                    document.getElementById('admin-pop-overlay').style.display = 'flex';
                }
            });

            // ব্যানার অ্যাড চেক
            db.ref('admin/ads/banner').on('value', (s) => {
                const b = s.val();
                if(b && b.status === 'active') {
                    document.getElementById('banner-ad-place').innerHTML = `<a href="${b.link}"><img src="${b.img}" style="width:100%; border-radius:15px; border:1px solid var(--glass-border);"></a>`;
                }
            });
        }

        function closePop() { document.getElementById('admin-pop-overlay').style.display = 'none'; }

        // ২. টাস্ক লোডার (IP চেক সহ)
        async function loadTasks() {
            try {
                const res = await fetch(`${API_URL}/api/user/tasks/v2?user_id=${USER_ID}`);
                const data = await res.json();
                
                if (data.status === "success") {
                    document.getElementById('u-bal').innerText = data.balance.toFixed(2);
                    document.getElementById('u-id').innerText = "#" + (data.uid || "0000");
                    document.getElementById('tasks-done').innerText = data.completed_count || 0;

                    const list = document.getElementById('main-task-list');
                    list.innerHTML = "";
                    
                    data.tasks.forEach(t => {
                        let locked = t.is_ip_used;
                        list.innerHTML += `
                            <div class="task-card ${locked ? 'locked' : ''}">
                                ${locked ? `<div class="ip-lock-msg">IP USED - CHANGE VIA AIRPLANE MODE</div>` : `<div class="bonus-msg">FRESH IP DETECTED - BONUS ACTIVE</div>`}
                                <div class="task-top">
                                    <div class="task-icon"><i class="fas ${t.type === 'telegram' ? 'fa-paper-plane' : 'fa-play-circle'}"></i></div>
                                    <div class="task-info">
                                        <h4>${t.title}</h4>
                                        <p>Rewards after 15s verification</p>
                                    </div>
                                    <div class="reward-tag"><b>৳${t.reward}</b></div>
                                </div>
                                <button class="btn-claim" onclick="startTask('${t.id}', '${t.link}')" ${locked ? 'disabled' : ''}>
                                    ${locked ? 'LOCKED' : 'START TASK'}
                                </button>
                            </div>
                        `;
                    });
                }
            } catch (e) { console.log("Task Load Error"); }
        }

        // ৩. টাস্ক কমপ্লিশন লজিক
        function startTask(id, url) {
            window.open(url, '_blank');
            let btn = event.target;
            btn.disabled = true;
            let time = 15;
            let timer = setInterval(() => {
                btn.innerText = `WAITING ${time}s...`;
                if(time-- <= 0) {
                    clearInterval(timer);
                    btn.innerText = "VERIFYING...";
                    submitTask(id);
                }
            }, 1000);
        }

        async function submitTask(taskId) {
            const res = await fetch(`${API_URL}/api/user/tasks/claim`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: USER_ID, task_id: taskId })
            });
            const out = await res.json();
            if(out.success) { alert("৳" + out.reward + " Added!"); loadTasks(); }
            else { alert("Error: " + out.message); loadTasks(); }
        }

        window.onload = () => {
            initAdminControls();
            loadTasks();
        };
    </script>
</body>
</html>
