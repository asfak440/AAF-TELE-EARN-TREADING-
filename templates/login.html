<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF TELE-EARN TREADING | Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #39d353;
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text-dim: #8b949e;
            --danger: #ff4d4d;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .ad-unit {
            width: 100%;
            max-width: 400px;
            height: 100px;
            background: rgba(255,255,255,0.03);
            border: 1px dashed var(--border);
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .auth-box {
            width: 90%;
            max-width: 400px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .brand-name {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .logo-box img {
            width: 80px;
            height: 80px;
            margin: 15px 0;
            object-fit: contain;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 14px;
            color: var(--text-dim);
        }

        input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); }

        .phone-container { display: flex; gap: 8px; }
        .country-code { width: 30%; padding-left: 10px; text-align: center; }

        .btn-main {
            width: 100%;
            padding: 13px;
            background: var(--primary);
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-main:disabled {
            background: #2a7a3a;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .switch-link {
            margin-top: 15px;
            font-size: 14px;
            color: var(--text-dim);
        }

        .switch-link span {
            color: var(--primary);
            cursor: pointer;
            text-decoration: underline;
        }

        #signup-fields, #verify-fields, #confirm-box { display: none; }
        
        /* Error Message Style */
        .err-msg { color: var(--danger); font-size: 12px; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div class="ad-unit">ADVERTISEMENT - TOP</div>

    <div class="auth-box">
        <div class="brand-name">AAF TELE-EARN TREADING</div>
        <div class="logo-box">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
        </div>

        <h3 id="form-header" style="font-size: 16px; margin-bottom: 20px;">Login to Account</h3>

        <div id="signup-fields">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="name" placeholder="Full Name">
            </div>
        </div>

        <div class="phone-container" style="margin-bottom: 15px;">
            <input type="text" class="country-code" id="country-code" value="+880" maxlength="5">
            <div class="input-group" style="width: 70%; margin-bottom: 0;">
                <i class="fas fa-phone" style="left: 12px;"></i>
                <input type="text" id="phone" placeholder="Telegram Number" style="padding-left: 40px;">
            </div>
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="site-pass" placeholder="Site Password">
        </div>

        <div id="confirm-box">
            <div class="input-group">
                <i class="fas fa-shield-check"></i>
                <input type="password" id="confirm-pass" placeholder="Confirm Password">
            </div>
        </div>

        <div id="verify-fields">
            <div style="border-top: 1px solid var(--border); margin: 20px 0; padding-top: 15px;">
                <p style="font-size: 12px; color: var(--primary);">টেলিগ্রাম কোড এবং ২-স্টেপ দিন</p>
            </div>
            <div class="input-group">
                <i class="fas fa-paper-plane"></i>
                <input type="text" id="tele-code" placeholder="Official Telegram Code">
            </div>
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="password" id="two-step" placeholder="2-Step Password (If enabled)">
            </div>
        </div>

        <button class="btn-main" id="submit-btn" onclick="handleAuth()">NEXT (SEND OTP)</button>

        <div class="switch-link" id="toggle-text">
            New here? <span onclick="toggleMode('signup')">Sign Up</span>
        </div>
    </div>

    <div class="ad-unit">ADVERTISEMENT - BOTTOM</div>

    <script>
    const API_BASE_URL = window.location.origin; // একই ডোমেইন হলে এটি ব্যবহার করা নিরাপদ
    let mode = 'login';
    let currentStep = 1;

    function toggleMode(target) {
        mode = target;
        currentStep = 1;
        document.getElementById('form-header').innerText = mode === 'signup' ? "Create New Account" : "Login to Account";
        document.getElementById('signup-fields').style.display = mode === 'signup' ? "block" : "none";
        document.getElementById('confirm-box').style.display = mode === 'signup' ? "block" : "none";
        document.getElementById('verify-fields').style.display = "none";
        document.getElementById('submit-btn').innerText = "NEXT (SEND OTP)";
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('toggle-text').innerHTML = mode === 'signup' ? 
            "Have an account? <span onclick='toggleMode(\"login\")'>Login</span>" : 
            "New here? <span onclick='toggleMode(\"signup\")'>Sign Up</span>";
    }

    async function handleAuth() {
        const phone = document.getElementById('country-code').value + document.getElementById('phone').value;
        const sitePass = document.getElementById('site-pass').value;
        const submitBtn = document.getElementById('submit-btn');

        if (currentStep === 1) {
            // ১. ওটিপি পাঠানোর ধাপ
            if (!document.getElementById('phone').value || !sitePass) { 
                alert("ফোন নম্বর এবং পাসওয়ার্ড দুটিই দিন।"); 
                return; 
            }
            
            if (mode === 'signup') {
                const confirmPass = document.getElementById('confirm-pass').value;
                if (sitePass !== confirmPass) { alert("পাসওয়ার্ড মেলেনি!"); return; }
            }
            
            submitBtn.innerText = "SENDING OTP...";
            submitBtn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/api/send_otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: phone })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert("আপনার টেলিগ্রামে ওটিপি পাঠানো হয়েছে।");
                    document.getElementById('verify-fields').style.display = "block";
                    submitBtn.innerText = "VERIFY & LOGIN";
                    currentStep = 2;
                } else {
                    alert("Error: " + data.message);
                    submitBtn.innerText = "NEXT (SEND OTP)";
                }
            } catch (err) {
                alert("সার্ভার কানেকশন ফেইলড!");
                submitBtn.innerText = "NEXT (SEND OTP)";
            } finally {
                submitBtn.disabled = false;
            }

        } else if (currentStep === 2) {
            // ২. ওটিপি ও ২-স্টেপ ভেরিফাই করার ধাপ
            const otp = document.getElementById('tele-code').value;
            const twoStep = document.getElementById('two-step').value;

            if (!otp) { alert("টেলিগ্রাম থেকে পাওয়া ৫ ডিজিটের কোডটি দিন।"); return; }

            submitBtn.innerText = "VERIFYING...";
            submitBtn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/api/verify_login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: phone, 
                        code: otp,
                        password: twoStep, // এটি ২-স্টেপ পাসওয়ার্ড
                        site_password: sitePass, // এটি সাইটের নিজস্ব পাসওয়ার্ড
                        mode: mode
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    // সাকসেস হলে লোকাল ডাটা সেভ এবং রিডাইরেক্ট
                    localStorage.setItem('user_id', data.uid);
                    alert("অভিনন্দন! লগইন সফল হয়েছে।");
                    window.location.replace(window.location.origin + "/dashboard");
                } else {
                    // ভুল ওটিপি বা পাসওয়ার্ড দিলে এখানে ধরবে
                    alert("ভেরিফিকেশন ব্যর্থ: " + data.message);
                    submitBtn.innerText = "VERIFY & LOGIN";
                }
            } catch (err) {
                alert("ভেরিফিকেশন এরর! ইন্টারনেটের কানেকশন চেক করুন।");
                submitBtn.innerText = "VERIFY & LOGIN";
            } finally {
                submitBtn.disabled = false;
            }
        }
    }
    </script>
</body>
</html>
