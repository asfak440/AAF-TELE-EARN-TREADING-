<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF | Central Wallet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --bg: #030712;
            --card: #0d111c;
            --border: rgba(255, 255, 255, 0.1);
            --cyan: #00f2fe;
            --primary: #39d353;
            --gold: #ffaa00;
            --nagad: #f47321;
            --binance: #F3BA2F;
            --text-dim: #8b949e;
            --glass: rgba(255, 255, 255, 0.03);
            --nav-bg: #0d111c;
            --neon-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            margin: 0; padding-bottom: 120px;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.08), transparent);
        }

        /* --- Header --- */
        .nav-header { 
            padding: 15px 20px; border-bottom: 1px solid var(--border); background: var(--card); 
            display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;
        }
        .u-info { display: flex; align-items: center; gap: 12px; }
        .u-info i { font-size: 32px; color: var(--cyan); filter: drop-shadow(0 0 5px var(--cyan)); }
        .u-name-box h2 { font-family: 'Syncopate'; font-size: 11px; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        
        /* --- Balance Cards --- */
        .balance-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .bal-box { 
            background: var(--glass); border: 1px solid var(--border); padding: 18px 10px; border-radius: 20px; 
            text-align: center; position: relative; overflow: hidden;
        }
        .bal-box::after { content: ""; position: absolute; bottom: 0; left: 10%; width: 80%; height: 2px; background: var(--cyan); border-radius: 10px; }
        .bal-box.coin::after { background: var(--gold); }
        .bal-box span { font-size: 9px; font-family: 'Syncopate'; color: var(--text-dim); display: block; margin-bottom: 5px; }
        .bal-box h3 { font-size: 18px; margin: 0; font-family: 'Syncopate'; }

        /* --- New Tab Style (As per Image) --- */
        .tab-menu { 
            display: flex; 
            background: #080c14; 
            margin: 15px; 
            border-radius: 30px; 
            border: 1px solid var(--border); 
            padding: 6px;
            justify-content: space-between;
        }
        .tab-btn { 
            flex: 1; 
            padding: 14px 5px; 
            border: none; 
            background: none; 
            color: var(--text-dim); 
            font-family: 'Syncopate'; 
            font-size: 9px; 
            cursor: pointer; 
            transition: 0.3s;
            border-radius: 25px;
            text-align: center;
        }
        .tab-btn.active { 
            color: #000; 
            background: var(--cyan); 
            font-weight: 800; 
            box-shadow: var(--neon-shadow);
        }

        .container { padding: 0 15px; max-width: 500px; margin: auto; }
        .wallet-page { display: none; animation: fadeIn 0.4s ease; }
        .wallet-page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Inputs & Buttons --- */
        .input-box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        .input-box label { display: block; font-size: 10px; color: var(--cyan); margin-bottom: 12px; font-family: 'Syncopate'; }
        .info-tile { background: rgba(0, 242, 254, 0.05); padding: 12px; border-radius: 10px; border: 1px dashed var(--cyan); margin-bottom: 15px; font-size: 13px; text-align: center; }
        
        select, input { 
            width: 100%; background: #050912; border: 1px solid var(--border); 
            padding: 14px; border-radius: 12px; color: white; margin-bottom: 15px; font-family: 'Rajdhani'; outline: none; box-sizing: border-box;
        }

        .action-btn { 
            width: 100%; background: var(--cyan); color: #000; border: none; 
            padding: 16px; border-radius: 12px; font-weight: 800; font-family: 'Syncopate'; font-size: 10px; cursor: pointer;
        }

        /* --- Floating Navigation --- */
        .bottom-nav-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 450px; z-index: 2000; }
        .bottom-nav { background: #0d111c; display: flex; justify-content: space-around; align-items: center; border: 1px solid var(--border); border-radius: 50px; padding: 12px 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .nav-item { flex: 1; text-align: center; color: #94a3b8; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 10px; }
        .nav-item.active { color: var(--cyan); }
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="u-info">
            <i class="fas fa-user-circle"></i>
            <div class="u-name-box">
                <h2 id="u-name">LOADING...</h2>
                <span id="u-tg-val" style="font-size: 10px; color: var(--primary);">ID: N/A</span>
            </div>
        </div>
        <div id="status-tag" style="font-size: 9px; color: var(--primary); font-family: 'Syncopate';"><i class="fas fa-circle" style="font-size: 7px;"></i> ONLINE</div>
    </div>

    <div class="balance-container">
        <div class="bal-box">
            <span>CASH BALANCE</span>
            <h3 id="wallet-bal">৳ 0.00</h3>
        </div>
        <div class="bal-box coin">
            <span>AAF COINS</span>
            <h3 id="coin-bal">0.00</h3>
        </div>
    </div>

    <!-- Tab Menu (New Pro Look) -->
    <div class="tab-menu">
        <button class="tab-btn" id="tab-deposit" onclick="showPage(event, 'deposit')">DEPOSIT</button>
        <button class="tab-btn" id="tab-transfer" onclick="showPage(event, 'transfer')">TRANSFER</button>
        <button class="tab-btn" id="tab-withdraw" onclick="showPage(event, 'withdraw')">WITHDRAW</button>
    </div>

    <div class="container">
        <div id="deposit" class="wallet-page">
            <div class="input-box">
                <label>ADD FUNDS</label>
                <div id="admin-payment-info" style="font-size: 13px; text-align: center; margin-bottom: 10px; color: var(--cyan);">Select method...</div>
                <select id="dep-method" onchange="updateAdminInfo()">
                    <option value="Nagad">Nagad (Send Money)</option>
                    <option value="Binance">Bkash (Send Money)</option>
                </select>
                <input type="number" id="dep-amount" placeholder="Amount">
                <input type="text" id="dep-trx" placeholder="Sender Number">
                <button class="action-btn" onclick="submitDeposit()">SUBMIT REQUEST</button>
            </div>
        </div>

        <div id="transfer" class="wallet-page">
            <div class="input-box">
                <label>P2P TRANSFER</label>
                <select id="trans-type">
                    <option value="cash">Cash Wallet (৳)</option>
                    <option value="coin">AAF Coins (🪙)</option>
                </select>
                <input type="number" id="trans-id" placeholder="Receiver Telegram ID">
                <input type="number" id="trans-amount" placeholder="Enter Amount">
                <button class="action-btn" onclick="processTransfer()">CONFIRM TRANSFER</button>
            </div>
        </div>

        <div id="withdraw" class="wallet-page">
            <div class="input-box">
                <label>WITHDRAW CASH</label>
                <input type="number" id="wit-num" placeholder="Nagad/Bkash Number">
                <input type="number" id="wit-amt" placeholder="Withdraw Amount">
                <button class="action-btn" style="background: var(--nagad); color: #fff;" onclick="processWithdraw()">SUBMIT WITHDRAW</button>
            </div>
        </div>
    </div>
    

    <div class="bottom-nav-container">
        <nav class="bottom-nav">
            <a href="dashboard" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="task" class="nav-item"><i class="fas fa-list-ul"></i><span>Task</span></a>
            <a href="trading" class="nav-item"><i class="fas fa-chart-line"></i><span>Trading</span></a>
            <a href="wallet" class="nav-item active"><i class="fas fa-wallet"></i><span>Wallet</span></a>
            <a href="account" class="nav-item"><i class="fas fa-user-circle"></i><span>Account</span></a>
        </nav>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const API_URL = "https://aaf-tele-earn-treading.onrender.com";
const USER_ID = localStorage.getItem('user_id');

if(!USER_ID){ alert("Login required"); location.href="/login"; }

// Firebase (Popup Ad) — safe init
const fbConfig = { databaseURL: "https://teleearnbd-781d6-default-rtdb.firebaseio.com" };
if (!firebase.apps.length) firebase.initializeApp(fbConfig);
const fb_db = firebase.database();

window.adminWallet = { nagad:"", binance:"" };

// Popup Ad
function loadPopupAd(){
  fb_db.ref('popup_ads/wallet').once('value').then(s=>{
    const ad=s.val();
    if(ad && ad.active && ad.message){
      alert("📢 "+ad.message);
    }
  });
}

// Live User Sync
async function syncData() {
  try{
    const res = await fetch(`${API_URL}/api/user/profile/${USER_ID}`);
    const d = await res.json();

    if(!d) return;

    document.getElementById('u-name').innerText = d.user_name || "USER";
    document.getElementById('u-tg-val').innerText = "ID: " + (d.tg_id || USER_ID);
    document.getElementById('wallet-bal').innerText = "৳ " + (d.cash_balance || 0).toFixed(2);
    document.getElementById('coin-bal').innerText = (d.aaf_balance || 0).toFixed(2);

    window.adminWallet = d.admin_wallet || window.adminWallet;
    updateAdminInfo();

  }catch(e){ console.log("Sync error", e); }
}

// Admin Wallet Info
function updateAdminInfo(){
  const methodEl = document.getElementById('dep-method');
  const box = document.getElementById('admin-payment-info');
  if(!methodEl || !box) return;

  const method = methodEl.value;

  if(window.adminWallet){
    if(method==="Nagad")
      box.innerHTML = `Send Money to: <b>${window.adminWallet.nagad}</b>`;
    else
      box.innerHTML = `Send Money to: <b>${window.adminWallet.binance}</b>`;
  }
}

// Deposit API
async function submitDeposit(){
  const amount = parseFloat(document.getElementById('dep-amount').value);
  const trx = document.getElementById('dep-trx').value;

  if(!amount || !trx) return alert("Enter amount & TRX");

  try{
    await fetch(`${API_URL}/api/wallet/deposit`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        user_id:USER_ID,
        tg_id: document.getElementById('u-tg-val').innerText.replace('ID: ',''),
        user_name: document.getElementById('u-name').innerText,
        amount,
        trx,
        method:document.getElementById('dep-method').value
      })
    });

    alert("Deposit request sent");
    syncData();

  }catch(e){ alert("Network error"); }
}

// Withdraw API (pending request)
async function processWithdraw(){
  const amount = parseFloat(document.getElementById('wit-amt').value);
  const number = document.getElementById('wit-num').value;

  if(!amount || !number) return alert("Enter amount & number");

  try{
    await fetch(`${API_URL}/api/wallet/withdraw`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        user_id:USER_ID,
        tg_id: document.getElementById('u-tg-val').innerText.replace('ID: ',''),
        user_name: document.getElementById('u-name').innerText,
        amount,
        number
      })
    });

    alert("Withdraw request sent (Pending Admin Approval)");
    syncData();

  }catch(e){ alert("Network error"); }
}

// Transfer API
async function processTransfer(){
  const to = document.getElementById('trans-id').value;
  const amount = parseFloat(document.getElementById('trans-amount').value);

  if(!to || !amount) return alert("Enter receiver & amount");

  try{
    await fetch(`${API_URL}/api/wallet/transfer`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        from:USER_ID,
        from_name: document.getElementById('u-name').innerText,
        to,
        amount,
        type:document.getElementById('trans-type').value
      })
    });

    alert("Transfer request sent");
    syncData();

  }catch(e){ alert("Network error"); }
}

// Tab System
function showPage(event, pageId) {
  document.querySelectorAll('.wallet-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

  const page = document.getElementById(pageId);
  if(page) page.classList.add('active');

  const btn = document.getElementById('tab-'+pageId);
  if(btn) btn.classList.add('active');
}

// Load
window.onload = ()=>{
  syncData();
  loadPopupAd();
  setInterval(syncData,15000);

  const methodEl = document.getElementById('dep-method');
  if(methodEl) methodEl.addEventListener('change', updateAdminInfo);
    document.getElementById('tab-deposit').classList.add('active');

  const urlParams = new URLSearchParams(window.location.search);
  showPage(null, urlParams.get('page') || 'deposit');
}
    </script>
    
    </body>
    </html>
