<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF | Central Wallet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --bg: #030712;
            --card: #0d111c;
            --border: rgba(255, 255, 255, 0.1);
            --cyan: #00f2fe;
            --primary: #39d353;
            --gold: #ffaa00;
            --nagad: #f47321;
            --binance: #F3BA2F;
            --text-dim: #8b949e;
            --glass: rgba(255, 255, 255, 0.03);
            --nav-bg: #0d111c;
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            margin: 0; padding-bottom: 120px; /* Space for floating nav */
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.08), transparent);
        }

        /* --- Profile Header --- */
        .nav-header { 
            padding: 15px 20px; border-bottom: 1px solid var(--border); background: var(--card); 
            display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;
        }
        .u-info { display: flex; align-items: center; gap: 12px; }
        .u-info i { font-size: 32px; color: var(--cyan); filter: drop-shadow(0 0 5px var(--cyan)); }
        .u-name-box h2 { font-family: 'Syncopate'; font-size: 12px; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        
        /* --- Dual Balance Card --- */
        .balance-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .bal-box { 
            background: var(--glass); border: 1px solid var(--border); padding: 18px 10px; border-radius: 20px; 
            text-align: center; position: relative; overflow: hidden; backdrop-filter: blur(5px);
        }
        .bal-box::after { content: ""; position: absolute; bottom: 0; left: 10%; width: 80%; height: 2px; background: var(--cyan); border-radius: 10px; }
        .bal-box.coin::after { background: var(--gold); }
        .bal-box span { font-size: 9px; font-family: 'Syncopate'; color: var(--text-dim); display: block; margin-bottom: 5px; }
        .bal-box h3 { font-size: 18px; margin: 0; font-family: 'Syncopate'; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }

        /* --- Tabs --- */
        .tab-menu { display: flex; background: var(--card); margin: 10px 15px; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--text-dim); font-family: 'Syncopate'; font-size: 8px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { color: #000; background: var(--cyan); font-weight: bold; }

        .container { padding: 0 15px; max-width: 500px; margin: auto; }
        .wallet-page { display: none; animation: slideUp 0.4s ease; }
        .wallet-page.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Form Elements --- */
        .input-box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        .input-box label { display: block; font-size: 10px; color: var(--cyan); margin-bottom: 12px; font-family: 'Syncopate'; }
        
        .info-tile { background: rgba(0, 242, 254, 0.05); padding: 12px; border-radius: 10px; border: 1px dashed var(--cyan); margin-bottom: 15px; font-size: 13px; text-align: center; }

        select, input { 
            width: 100%; background: #050912; border: 1px solid var(--border); 
            padding: 14px; border-radius: 12px; color: white; margin-bottom: 15px; font-family: 'Rajdhani'; outline: none; box-sizing: border-box;
        }

        .action-btn { 
            width: 100%; background: var(--cyan); color: #000; border: none; 
            padding: 16px; border-radius: 12px; font-weight: 800; font-family: 'Syncopate'; font-size: 10px; cursor: pointer;
        }

        /* --- Floating Navigation (As per screenshot) --- */
        .bottom-nav-container {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 450px;
            z-index: 2000;
        }

        .bottom-nav { 
            background: #0d111c;
            display: flex; 
            justify-content: space-around;
            align-items: center;
            border: 1px solid var(--border); 
            border-radius: 50px; /* Pill shape */
            padding: 12px 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
        }

        .nav-item { 
            flex: 1; 
            text-align: center; 
            color: #94a3b8; 
            text-decoration: none; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px;
            transition: 0.3s;
        }

        .nav-item i { 
            font-size: 22px; 
            transition: 0.3s;
        }

        .nav-item span { 
            font-size: 11px; 
            font-weight: 500;
        }

        /* Active State Style from Screenshot */
        .nav-item.active { 
            color: var(--cyan); 
        }

        .nav-item.active i { 
            filter: drop-shadow(0 0 8px var(--cyan));
            transform: translateY(-2px);
        }

    </style>
</head>
<body>

    <div class="nav-header">
        <div class="u-info">
            <i class="fas fa-user-circle"></i>
            <div class="u-name-box">
                <h2 id="u-name">LOADING...</h2>
                <span id="u-tg-val" style="font-size: 10px; color: var(--primary); font-weight: bold;">ID: N/A</span>
            </div>
        </div>
        <div style="text-align: right;">
            <div id="status-tag" style="font-size: 9px; color: var(--primary); font-family: 'Syncopate';"><i class="fas fa-circle" style="font-size: 7px;"></i> ONLINE</div>
        </div>
    </div>

    <div class="balance-container">
        <div class="bal-box">
            <span>CASH BALANCE</span>
            <h3 id="wallet-bal">৳ 0.00</h3>
        </div>
        <div class="bal-box coin">
            <span>APP COINS</span>
            <h3 id="coin-bal">0.00</h3>
        </div>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="showPage(event, 'deposit')">DEPOSIT</button>
        <button class="tab-btn" onclick="showPage(event, 'transfer')">TRANSFER</button>
        <button class="tab-btn" onclick="showPage(event, 'withdraw')">WITHDRAW</button>
    </div>

    <div class="container">
        <div id="deposit" class="wallet-page active">
            <div class="input-box">
                <label>ADD FUNDS TO WALLET</label>
                <div class="info-tile" id="admin-payment-info">Select method to see payment details.</div>
                <select id="dep-method" onchange="updateAdminInfo()">
                    <option value="Nagad">Nagad (Manual)</option>
                    <option value="Binance">Binance USDT (BEP20)</option>
                </select>
                <input type="number" id="dep-amount" placeholder="Amount (৳ / $)">
                <input type="text" id="dep-trx" placeholder="Transaction ID (TrxID)">
                <button class="action-btn" onclick="submitDeposit()">SUBMIT REQUEST</button>
            </div>
        </div>

        <div id="transfer" class="wallet-page">
            <div class="input-box">
                <label>P2P ASSET TRANSFER</label>
                <select id="trans-type">
                    <option value="cash">Cash Wallet (৳)</option>
                    <option value="coin">App Coins (🪙)</option>
                </select>
                <input type="number" id="trans-id" placeholder="Receiver Telegram ID">
                <input type="number" id="trans-amount" placeholder="Enter Amount">
                <button class="action-btn" onclick="processTransfer()">CONFIRM TRANSFER</button>
            </div>
        </div>

        <div id="withdraw" class="wallet-page">
            <div class="input-box">
                <label>WITHDRAW CASH (NAGAD)</label>
                <input type="number" id="wit-num" placeholder="Nagad Personal Number">
                <input type="number" id="wit-amt" placeholder="Withdraw Amount">
                <button class="action-btn" style="background: var(--nagad); color: #fff;" onclick="processWithdraw()">SUBMIT WITHDRAW</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav-container">
        <nav class="bottom-nav">
            <a href="/dashboard" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="/task" class="nav-item">
                <i class="fas fa-list-ul"></i>
                <span>Task</span>
            </a>
            <a href="/trading" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Trading</span>
            </a>
            <a href="/wallet" class="nav-item active">
                <i class="fas fa-wallet"></i>
                <span>Wallet</span>
            </a>
            <a href="/account" class="nav-item">
                <i class="fas fa-user-circle"></i>
                <span>Account</span>
            </a>
        </nav>
    </div>

    <script>
    const API_URL = "https://aaf-tele-earn-treading.onrender.com";
    const USER_ID = localStorage.getItem('user_id') || "12345";
    window.adminWallet = {nagad: "01XXXXXXXXX", binance: "T-Address-XYZ"};

    async function syncData() {
        try {
            const res = await fetch(`${API_URL}/api/user/data/${USER_ID}`);
            const data = await res.json();
            if (data.status === "success") {
                document.getElementById('u-name').innerText = data.user_name || "USER";
                document.getElementById('u-tg-val').innerText = "ID: " + (data.tg_id || USER_ID);
                document.getElementById('wallet-bal').innerText = "৳ " + (data.balance || 0).toFixed(2);
                document.getElementById('coin-bal').innerText = (data.coins || 0).toFixed(2);
                window.adminWallet = data.admin_wallet || window.adminWallet;
                updateAdminInfo();
            }
        } catch (e) { console.error("Sync Error:", e); }
    }

    function updateAdminInfo() {
        const method = document.getElementById('dep-method').value;
        const infoBox = document.getElementById('admin-payment-info');
        if(window.adminWallet) {
            if(method === "Nagad") infoBox.innerHTML = `Send Money to: <b>${window.adminWallet.nagad}</b>`;
            else infoBox.innerHTML = `USDT (BEP20): <b>${window.adminWallet.binance}</b>`;
        }
    }

    function showPage(event, pageId) {
        document.querySelectorAll('.wallet-page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        const target = document.getElementById(pageId);
        if(target) target.classList.add('active');
        
        if(event && event.currentTarget) {
            event.currentTarget.classList.add('active');
        }
    }

    // পেমেন্ট সাবমিট ফাংশন (এগুলো না থাকলে এরর আসবে)
    function submitDeposit() { alert("Deposit Request Sent!"); }
    function processTransfer() { alert("Transfer Processing..."); }
    function processWithdraw() { alert("Withdraw Request Sent!"); }

    // মেইন লোডার
    window.onload = () => {
        syncData(); 

        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('page');

        if (page) {
            document.querySelectorAll('.wallet-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            const targetPage = document.getElementById(page);
            if (targetPage) {
                targetPage.classList.add('active');
                const tabButtons = document.querySelectorAll('.tab-btn');
                
                if (page === 'deposit' && tabButtons[0]) tabButtons[0].classList.add('active');
                if (page === 'transfer' && tabButtons[1]) tabButtons[1].classList.add('active');
                if (page === 'withdraw' && tabButtons[2]) tabButtons[2].classList.add('active');
            }
        }
    };
    </script>
    
</body>
</html>
