<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF | Central Wallet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --bg: #030712;
            --card: #0d111c;
            --border: rgba(255, 255, 255, 0.1);
            --cyan: #00f2fe;
            --primary: #39d353;
            --gold: #ffaa00;
            --nagad: #f47321;
            --text-dim: #8b949e;
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            margin: 0; padding-bottom: 100px;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.05), transparent);
        }

        /* Ad Slot Rotation */
        #top-ad-slot { 
            width: 100%; min-height: 60px; background: #000; 
            border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
        }

        /* Balance Section */
        .balance-card {
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.1), rgba(13, 17, 28, 0.9));
            padding: 30px 20px; margin: 20px; border-radius: 25px; border: 1px solid var(--border);
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .balance-card span { font-size: 11px; font-family: 'Syncopate'; color: var(--text-dim); }
        .balance-card h2 { font-size: 38px; margin: 10px 0; color: var(--cyan); font-family: 'Syncopate'; text-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }

        /* Tab Navigation */
        .tab-menu { display: flex; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 18px; border: none; background: none; color: var(--text-dim); font-family: 'Syncopate'; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { color: var(--cyan); border-bottom: 3px solid var(--cyan); background: rgba(0, 242, 254, 0.05); }

        .container { padding: 20px; max-width: 500px; margin: auto; }
        .wallet-page { display: none; animation: slideUp 0.4s ease; }
        .wallet-page.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Column Style Deposit Gateways */
        .gateway-list { display: flex; flex-direction: column; gap: 12px; }
        .gateway-item {
            background: var(--card); border: 1px solid var(--border); padding: 15px;
            border-radius: 15px; display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: 0.3s;
        }
        .gateway-item:active { transform: scale(0.97); border-color: var(--cyan); }
        .gw-info { display: flex; align-items: center; gap: 15px; }
        .gw-info img { width: 35px; border-radius: 8px; }
        .gw-info span { font-weight: 700; font-size: 16px; }

        /* Input Styles */
        .input-box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; position: relative; }
        .input-box label { display: block; font-size: 12px; color: var(--cyan); margin-bottom: 12px; font-family: 'Syncopate'; }
        .input-group input { 
            width: 100%; background: #050912; border: 1px solid var(--border); 
            padding: 15px; border-radius: 12px; color: white; outline: none; box-sizing: border-box; font-size: 16px; margin-bottom: 15px;
        }

        .action-btn { 
            width: 100%; background: var(--cyan); color: #000; border: none; 
            padding: 18px; border-radius: 15px; font-weight: 800; font-family: 'Syncopate'; font-size: 12px; cursor: pointer; 
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.2);
        }

        /* Feature Lock Overlay */
        .locked-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(3, 7, 18, 0.96); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 50; border-radius: 20px;
            color: #ff3e3e; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .locked-overlay i { font-size: 40px; margin-bottom: 15px; color: #ff3e3e; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: #0d111c; display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: var(--text-dim); text-decoration: none; padding-top: 15px; font-size: 10px; display: flex; flex-direction: column; align-items: center; }
        .nav-item i { font-size: 22px; margin-bottom: 5px; }
        .nav-item.active { color: var(--cyan); }
    </style>
</head>
<body>

    <div id="top-ad-slot">
        <span style="font-size: 10px; color: var(--text-dim);">ADS LOADING...</span>
    </div>

    <div class="balance-card">
        <span>MAIN CASH BALANCE</span>
        <h2 id="wallet-bal">৳ 0.00</h2>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="showPage(event, 'deposit')">DEPOSIT</button>
        <button class="tab-btn" onclick="showPage(event, 'transfer')">TRANSFER</button>
        <button class="tab-btn" onclick="showPage(event, 'withdraw')">WITHDRAW</button>
    </div>

    <div class="container">
        <div id="deposit" class="wallet-page active">
            <div class="input-box">
                <label>SELECT GATEWAY</label>
                <div class="gateway-list">
                    <div class="gateway-item" onclick="window.open('https://t.me/your_bot', '_blank')">
                        <div class="gw-info">
                            <img src="https://raw.githubusercontent.com/Mohidul77/logo/main/bkash.png" alt="bKash">
                            <span>bKash Manual</span>
                        </div>
                        <i class="fas fa-chevron-right" style="color: var(--text-dim);"></i>
                    </div>
                    <div class="gateway-item" onclick="window.open('https://t.me/your_bot', '_blank')">
                        <div class="gw-info">
                            <img src="https://raw.githubusercontent.com/Mohidul77/logo/main/nagad.png" alt="Nagad">
                            <span>Nagad Manual</span>
                        </div>
                        <i class="fas fa-chevron-right" style="color: var(--text-dim);"></i>
                    </div>
                </div>
                <p style="font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 15px;">Contact Admin to add funds instantly.</p>
                
                <div class="locked-overlay" id="lock-deposit">
                    <i class="fas fa-lock"></i>
                    <p>FEATURE LOCKED!<br>Complete 10 trades to unlock.</p>
                </div>
            </div>
        </div>

        <div id="transfer" class="wallet-page">
            <div class="input-box">
                <label>P2P TRANSFER</label>
                <div class="input-group">
                    <input type="number" id="transfer-id" placeholder="Receiver Telegram ID">
                    <input type="number" id="transfer-amount" placeholder="Amount (৳)">
                </div>
                <button class="action-btn" id="transfer-btn" onclick="processTransfer()">CONFIRM SEND</button>
                
                <div class="locked-overlay" id="lock-transfer">
                    <i class="fas fa-lock"></i>
                    <p>FEATURE LOCKED!<br>Complete 10 trades to unlock.</p>
                </div>
            </div>
        </div>

        <div id="withdraw" class="wallet-page">
            <div class="input-box">
                <label>WITHDRAW (NAGAD)</label>
                <div class="input-group">
                    <input type="number" id="withdraw-num" placeholder="Nagad Personal Number">
                    <input type="number" id="withdraw-amount" placeholder="Amount (Min ৳50)">
                </div>
                <button class="action-btn" id="withdraw-btn" onclick="processWithdraw()" style="background: var(--nagad); color: white;">SUBMIT REQUEST</button>
                
                <div class="locked-overlay" id="lock-withdraw">
                    <i class="fas fa-lock"></i>
                    <p>FEATURE LOCKED!<br>Complete 10 trades to unlock.</p>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="/task" class="nav-item"><i class="fas fa-tasks"></i><span>Task</span></a>
        <a href="/trade" class="nav-item"><i class="fas fa-chart-line"></i><span>Trading</span></a>
        <a href="/wallet" class="nav-item active"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="/account" class="nav-item"><i class="fas fa-user-circle"></i><span>Account</span></a>
    </nav>

    <script>
        const API_URL = "https://aaf-tele-earn-treading.onrender.com";
        const USER_ID = localStorage.getItem('user_id') || "12345";

        // ১. অ্যাড রোটেশন (এডমিন কন্ট্রোলড)
        async function loadAds() {
            try {
                const res = await fetch(`${API_URL}/api/get_active_ads`);
                const data = await res.json();
                if (data.ads && data.ads.length > 0) {
                    let i = 0;
                    const slot = document.getElementById('top-ad-slot');
                    setInterval(() => {
                        slot.innerHTML = data.ads[i].code;
                        i = (i + 1) % data.ads.length;
                    }, 8000);
                }
            } catch (e) { console.log("Ads Error"); }
        }

        // ২. ডাটা চেক ও লক সিস্টেম
        async function syncWallet() {
            try {
                const res = await fetch(`${API_URL}/api/user/data/${USER_ID}`);
                const data = await res.json();
                
                if (data.status === "success") {
                    document.getElementById('wallet-bal').innerText = "৳ " + parseFloat(data.balance || 0).toFixed(2);
                    
                    // ট্রেড লিমিট চেক
                    if ((data.total_trades || 0) < 10) {
                        document.getElementById('lock-deposit').style.display = 'flex';
                        document.getElementById('lock-transfer').style.display = 'flex';
                        document.getElementById('lock-withdraw').style.display = 'flex';
                    }
                }
            } catch (e) { console.log("Sync Error"); }
        }

        function showPage(event, pageId) {
            document.querySelectorAll('.wallet-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // ৩. ট্রান্সফার ফাংশন
        async function processTransfer() {
            const rid = document.getElementById('transfer-id').value;
            const amt = document.getElementById('transfer-amount').value;
            if(!rid || !amt) return alert("All fields required!");
            
            try {
                const res = await fetch(`${API_URL}/api/wallet/transfer`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({sender_id: USER_ID, receiver_id: rid, amount: parseFloat(amt)})
                });
                const resData = await res.json();
                alert(resData.message);
                if(resData.status === "success") location.reload();
            } catch (e) { alert("Server Error!"); }
        }

        window.onload = () => {
            syncWallet();
            loadAds();
        };
    </script>
</body>
</html>
