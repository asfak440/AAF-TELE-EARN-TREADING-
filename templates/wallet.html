<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF | Central Wallet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #39d353; --bg: #0d1117; --card: #161b22; --border: #30363d; --text-dim: #8b949e; --nagad: #f47321; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 80px; }

        /* Balance Card */
        .balance-card { background: linear-gradient(135deg, #1c2128, #0d1117); padding: 25px; margin: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .balance-card h2 { color: var(--primary); font-size: 30px; margin: 10px 0; }

        /* Tabs Navigation */
        .tab-menu { display: flex; justify-content: space-around; background: var(--card); border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: var(--text-dim); font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .container { padding: 20px; max-width: 500px; margin: auto; }
        .wallet-page { display: none; }
        .wallet-page.active { display: block; }

        /* Forms */
        .input-box { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; position: relative; }
        .input-box label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
        .input-box input { width: 100%; background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; outline: none; box-sizing: border-box; }
        
        .action-btn { width: 100%; background: var(--primary); color: #0d1117; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Lock Overlay */
        .locked-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 17, 23, 0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; z-index: 10; text-align: center; color: #ff7b72; }
        .locked-overlay i { font-size: 30px; margin-bottom: 10px; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: var(--card); display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: var(--text-dim); text-decoration: none; padding-top: 12px; font-size: 10px; display: flex; flex-direction: column; align-items: center; }
        .nav-item i { font-size: 18px; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="balance-card">
        <span style="font-size: 12px; color: var(--text-dim);">Available Balance</span>
        <h2 id="wallet-bal">৳ 0.00</h2>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="showPage('deposit')">Deposit</button>
        <button class="tab-btn" onclick="showPage('transfer')">Transfer</button>
        <button class="tab-btn" onclick="showPage('withdraw')">Withdraw</button>
    </div>

    <div class="container">
        
        <div id="deposit" class="wallet-page active">
            <div class="input-box" id="deposit-box">
                <label>Add Money to Wallet</label>
                <p style="font-size: 14px; margin: 10px 0;">ডিপোজিট করতে নিচের বাটনে ক্লিক করে এডমিনকে মেসেজ দিন।</p>
                <button class="action-btn" onclick="window.open('https://t.me/aaf_tele_earn_bot', '_blank')">Contact Admin</button>
            </div>
        </div>

        <div id="transfer" class="wallet-page">
            <div class="input-box" style="position: relative;" id="transfer-container">
                <label>Transfer to Another Account</label>
                <input type="number" id="transfer-id" placeholder="Receiver Telegram ID">
                <br><br>
                <input type="number" id="transfer-amount" placeholder="Amount (৳)">
                <br><br>
                <button class="action-btn" onclick="processTransfer()">Send Money</button>
                <div id="transfer-lock"></div> </div>
        </div>

        <div id="withdraw" class="wallet-page">
            <div class="input-box" style="position: relative;" id="withdraw-container">
                <label>Withdraw to Nagad</label>
                <div style="display: flex; align-items: center; margin-bottom: 10px; color: var(--nagad);">
                    <i class="fas fa-money-bill-wave"></i>&nbsp;<b>Nagad Personal</b>
                </div>
                <input type="number" id="withdraw-num" placeholder="01XXXXXXXXX">
                <br><br>
                <input type="number" id="withdraw-amount" placeholder="Min ৳ 50.00">
                <br><br>
                <button class="action-btn" onclick="processWithdraw()">Withdraw Now</button>
                <div id="withdraw-lock"></div> </div>
        </div>

    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
        <a href="task.html" class="nav-item"><i class="fas fa-tasks"></i><span>Task</span></a>
        <a href="trading.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Trading</span></a>
        <a href="account.html" class="nav-item"><i class="fas fa-user-circle"></i><span>Account</span></a>
        <a href="wallet.html" class="nav-item active"><i class="fas fa-wallet"></i><span>Wallet</span></a>
    </nav>

    <script>
        const API_URL = "https://aaf-api-free.onrender.com";
        const USER_ID = localStorage.getItem('user_id');

        async function initWallet() {
            try {
                const res = await fetch(`${API_URL}/api/user_wallet_data?user_id=${USER_ID}`);
                const data = await res.json();

                document.getElementById('wallet-bal').innerText = "৳ " + data.balance.toFixed(2);

                // লক সিস্টেম চেক (১০টি ট্রেড না করলে)
                if (data.total_trades < 10) {
                    const lockHTML = `
                        <div class="locked-overlay">
                            <i class="fas fa-lock"></i>
                            <p>ন্যূনতম ১০টি ট্রেড সম্পন্ন করুন<br>ট্যাবটি আনলক করতে।</p>
                        </div>`;
                    
                    document.getElementById('transfer-lock').innerHTML = lockHTML;
                    document.getElementById('withdraw-lock').innerHTML = lockHTML;
                    document.getElementById('deposit-box').innerHTML += lockHTML;
                }
            } catch (e) { console.log("Error loading wallet"); }
        }

        function showPage(pageId) {
            document.querySelectorAll('.wallet-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.target.classList.add('active');
        }

        async function processTransfer() {
            const targetId = document.getElementById('transfer-id').value;
            const amount = document.getElementById('transfer-amount').value;
            // API Call logic for Transfer
            alert("Transfer request sent to ID: " + targetId);
        }

        async function processWithdraw() {
            const amount = parseFloat(document.getElementById('withdraw-amount').value);
            if (amount < 50) return alert("সর্বনিম্ন ৫০ টাকা তুলতে হবে!");
            // API Call logic for Withdraw
            alert("Withdrawal request submitted! Pending Admin Approval.");
        }

        window.onload = initWallet;
    </script>
</body>
</html>
