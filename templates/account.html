<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF | Account Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --bg: #030712; --card: #0d111c; --border: rgba(255, 255, 255, 0.1);
            --cyan: #00f2fe; --primary: #39d353; --gold: #ffaa00;
            --danger: #ff4444; --text-dim: #8b949e; 
        }

        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding-bottom: 130px; overflow-x: hidden; }

        /* --- Sliding Cover Section --- */
        .profile-container { position: relative; width: 100%; height: 210px; overflow: hidden; background: #000; }
        .cover-slider { position: absolute; width: 200%; height: 100%; display: flex; transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { width: 50%; height: 100%; background-size: cover; background-position: center; }
        .slide-default { background-image: url('cb5ab54f-d9c5-41f6-9a24-fe714060a2f6.jpeg'); }
        .slide-ad { background-color: #0d111c; background-size: cover; background-position: center; }

        .profile-info-overlay { 
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px 0; 
            background: linear-gradient(to top, var(--bg) 20%, transparent); z-index: 5; text-align: center; 
        }

        /* --- Avatar --- */
        .avatar-wrapper { position: relative; width: 85px; height: 85px; margin: -45px auto 10px; z-index: 10; }
        .tg-avatar { 
            width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--cyan); 
            overflow: hidden; background: #1e293b; box-shadow: 0 0 20px rgba(0,242,254,0.4); 
            display: flex; align-items: center; justify-content: center; font-size: 30px; 
        }
        .tg-avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* --- Info Grid --- */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px 20px; }
        .info-card { background: var(--card); border: 1px solid var(--border); padding: 15px 10px; border-radius: 18px; text-align: center; }
        .info-card span { font-size: 8px; font-family: 'Syncopate'; color: var(--text-dim); display: block; margin-bottom: 5px; }
        .info-card h4 { margin: 0; font-size: 15px; font-family: 'Syncopate'; letter-spacing: 1px; }

        /* --- Account List Styling --- */
        .account-item { 
            background: var(--card); border: 1px solid var(--border); padding: 12px; 
            border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; 
        }

        /* --- Action Buttons --- */
        .action-btn { margin: 12px 20px; padding: 16px; border-radius: 15px; text-align: center; font-family: 'Syncopate'; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .btn-offer { background: linear-gradient(90deg, #00f2fe, #0088cc); color: #000; font-weight: bold; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2); }
        .btn-add { border: 1px dashed var(--cyan); color: var(--cyan); }
        .btn-logout { border: 1px solid var(--danger); color: var(--danger); }

        /* --- Ad Modal --- */
        #ad-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 380px; background: var(--card); border: 1px solid var(--cyan); border-radius: 25px; padding: 25px; text-align: center; }
        .modal-content img { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); }

        /* --- Navigation --- */
        .bottom-nav-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 450px; z-index: 2000; }
        .bottom-nav { background: #0d111c; display: flex; justify-content: space-around; padding: 12px; border: 1px solid var(--border); border-radius: 50px; backdrop-filter: blur(10px); }
        .nav-item { color: #94a3b8; text-decoration: none; font-size: 10px; text-align: center; flex: 1; }
        .nav-item i { font-size: 18px; margin-bottom: 4px; display: block; }
        .nav-item.active { color: var(--cyan); text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }
    </style>
</head>
<body>

    <!-- Popup Modal -->
    <div id="ad-modal">
        <div class="modal-content">
            <img id="popup-img" src="" alt="Ad">
            <h3 id="popup-title" style="color: var(--cyan); margin: 0 0 10px 0; font-family: 'Syncopate'; font-size: 16px;">OFFER</h3>
            <p id="popup-desc" style="font-size: 13px; color: var(--text-dim); line-height: 1.5; margin-bottom: 20px;"></p>
            <button onclick="closePopup()" style="width: 100%; background: var(--cyan); border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: 'Syncopate';">CLOSE</button>
        </div>
    </div>

    <!-- Top Banner Section -->
    <div class="profile-container">
        <div class="cover-slider" id="main-slider">
            <div class="slide slide-default"></div>
            <div class="slide slide-ad" id="admin-banner-slide"></div>
        </div>
        <div class="profile-info-overlay">
            <h2 id="u-name" style="margin:0; font-family: 'Syncopate'; font-size: 15px; letter-spacing: 1px;">LOADING...</h2>
            <span id="u-id" style="font-size: 10px; color: var(--text-dim);">UID: 000000</span>
        </div>
    </div>

    <!-- Avatar Section -->
    <div class="avatar-wrapper">
        <div class="tg-avatar" id="main-avatar">
            <i class="fas fa-user-circle"></i>
        </div>
    </div>

    <!-- Offer Button -->
    <div class="action-btn btn-offer" onclick="showOfferPopup()">
        <i class="fas fa-bolt"></i> &nbsp; VIEW SPECIAL OFFER
    </div>

    <!-- Wallets -->
    <div class="info-grid">
        <div class="info-card">
            <span>CASH WALLET</span>
            <h4 id="cash-bal">৳ 0.00</h4>
        </div>
        <div class="info-card" style="border-color: var(--gold);">
            <span>AAF COINS</span>
            <h4 id="coin-bal" style="color: var(--gold);">0.00</h4>
        </div>
    </div>

    <!-- Connected Accounts List -->
    <div style="padding: 10px 20px 0;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <span style="font-size: 10px; font-family: 'Syncopate'; color: var(--text-dim);">SAVED ACCOUNTS</span>
            <span onclick="clearAllData()" style="font-size: 9px; color: var(--danger); cursor: pointer; font-family: 'Syncopate';">REMOVE ALL</span>
        </div>
        <div id="accounts-display">
            <!-- Accounts will be injected here -->
        </div>
    </div>

    <!-- Buttons -->
    <!-- Action Buttons Section -->
<div style="padding: 5px 0;">

    <!-- Add Account Link -->
    <a href="login" class="action-btn btn-add" style="display: block; text-decoration: none;">
        <i class="fas fa-plus-circle"></i> &nbsp; ADD TELEGRAM ACCOUNT
    </a>

    <!-- Logout Link -->
    <a href="login" class="action-btn btn-logout" style="display: block; text-decoration: none;" onclick="localStorage.removeItem('user_id');">
        <i class="fas fa-sign-out-alt"></i> &nbsp; LOGOUT CURRENT SESSION
    </a>

</div>
    
    <!-- Navigation Bar -->
    <div class="bottom-nav-container">
        <nav class="bottom-nav">
            <a href="dashboard" class="nav-item"><i class="fas fa-home"></i>Home</a>
            <a href="task" class="nav-item"><i class="fas fa-tasks"></i>Task</a>
            <a href="trading" class="nav-item"><i class="fas fa-chart-line"></i>Trade</a>
            <a href="wallet" class="nav-item"><i class="fas fa-wallet"></i>Wallet</a>
            <a href="account" class="nav-item active"><i class="fas fa-user"></i>Account</a>
        </nav>
    </div>

    <script>
        const API_URL = "https://aaf-tele-earn-treading.onrender.com";
        let popupData = null;

        // --- 1. স্লাইডার কন্ট্রোল (Auto Slide) ---
        let currentSlide = 0;
        setInterval(() => {
            const slider = document.getElementById('main-slider');
            if(slider) {
                currentSlide = (currentSlide === 0) ? 50 : 0;
                slider.style.transform = `translateX(-${currentSlide}%)`;
            }
        }, 6000);

        // --- 2. ডাটা ইনিশিয়ালাইজেশন ---
        async function initializeApp() {
            const userId = localStorage.getItem('user_id');
            if(!userId) return;
            
            try {
                const [userRes, adRes] = await Promise.all([
                    fetch(`${API_URL}/api/user/data/${userId}`),
                    fetch(`${API_URL}/api/ads/control`)
                ]);

                // ইউজার ইনফো আপডেট
                const userData = await userRes.json();
                if (userData.status === "success") {
                    document.getElementById('u-name').innerText = userData.name.toUpperCase();
                    document.getElementById('u-id').innerText = "UID: " + userData.uid;
                    document.getElementById('cash-bal').innerText = "৳ " + parseFloat(userData.balance || 0).toFixed(2);
                    document.getElementById('coin-bal').innerText = parseFloat(userData.aaf_coins || 0).toFixed(2);
                    if (userData.photo) {
                        document.getElementById('main-avatar').innerHTML = `<img src="${userData.photo}" alt="User">`;
                    }
                }

                // অ্যাডমিন অ্যাড কন্ট্রোল
                const adData = await adRes.json();
                if (adData.banner && adData.banner.enabled) {
                    document.getElementById('admin-banner-slide').style.backgroundImage = `url('${adData.banner.image}')`;
                } else {
                    document.getElementById('main-slider').style.width = "100%";
                }
                popupData = adData.popup;

            } catch (error) {
                console.error("Init Error:", error);
                document.getElementById('u-name').innerText = "OFFLINE";
            }
        }

        // --- 3. পপআপ ফাংশন ---
        function showOfferPopup() {
            if (popupData && popupData.enabled) {
                document.getElementById('popup-img').src = popupData.image;
                document.getElementById('popup-title').innerText = popupData.title;
                document.getElementById('popup-desc').innerText = popupData.desc;
                document.getElementById('ad-modal').style.display = 'block';
            } else {
                alert("No active offers at this moment!");
            }
        }

        function closePopup() {
            document.getElementById('ad-modal').style.display = 'none';
        }

        // --- 4. মাল্টি-অ্যাকাউন্ট লজিক ---
        async function loadSavedList() {
            const displayArea = document.getElementById('accounts-display');
            const currentId = localStorage.getItem('user_id');
            let saved = JSON.parse(localStorage.getItem('saved_accounts') || "[]");

            displayArea.innerHTML = ''; 

            for (let accId of saved) {
                if (accId === currentId) continue; 

                try {
                    const res = await fetch(`${API_URL}/api/user/data/${accId}`);
                    const data = await res.json();

                    if (data.status === "success") {
                        displayArea.innerHTML += `
                            <div class="account-item">
                                <div style="display:flex; align-items:center; gap:10px; cursor:pointer; flex:1;" onclick="switchAccount('${accId}')">
                                    <img src="${data.photo || 'https://via.placeholder.com/40'}" style="width:35px; height:35px; border-radius:50%; border: 1px solid var(--cyan);">
                                    <div style="text-align: left;">
                                        <h5 style="margin:0; font-size:12px;">${data.name}</h5>
                                        <span style="font-size:9px; color: var(--text-dim);">UID: ${data.uid}</span>
                                    </div>
                                </div>
                                <div style="display:flex; gap:15px; align-items:center;">
                                    <i class="fas fa-exchange-alt" style="color: var(--cyan); font-size:12px; cursor:pointer;" onclick="switchAccount('${accId}')"></i>
                                    <i class="fas fa-trash-alt" style="color: var(--danger); font-size:12px; cursor:pointer;" onclick="removeOne('${accId}')"></i>
                                </div>
                            </div>`;
                    }
                } catch (e) { console.error(e); }
            }
        }

        function switchAccount(targetId) {
            const currentId = localStorage.getItem('user_id');
            let saved = JSON.parse(localStorage.getItem('saved_accounts') || "[]");

            if (currentId && !saved.includes(currentId)) saved.push(currentId);
            
            localStorage.setItem('user_id', targetId);
            localStorage.setItem('saved_accounts', JSON.stringify(saved.filter(id => id !== targetId)));
            location.reload();
        }

        function removeOne(id) {
            if(confirm("Remove this account from saved list?")) {
                let saved = JSON.parse(localStorage.getItem('saved_accounts') || "[]");
                localStorage.setItem('saved_accounts', JSON.stringify(saved.filter(i => i !== id)));
                loadSavedList();
            }
        }

        function addNewAccount() {
            const currentId = localStorage.getItem('user_id');
            let saved = JSON.parse(localStorage.getItem('saved_accounts') || "[]");
            if (currentId && !saved.includes(currentId)) {
                saved.push(currentId);
                localStorage.setItem('saved_accounts', JSON.stringify(saved));
            }
            localStorage.removeItem('user_id');
            window.location.href = 'login.html';
        }

        function logoutSession() {
            if(confirm("Logout from current session? It will be saved in your list.")) {
                addNewAccount(); // একই কাজ করবে
            }
        }

        function clearAllData() {
            if(confirm("This will permanently remove ALL saved accounts from this device. Continue?")) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }

        // --- পেজ স্টার্ট ---
        window.onload = async () => {
            await initializeApp();
            await loadSavedList();
        };
    </script>
</body>
</html>
