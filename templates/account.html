<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF | Multi-Account Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0088cc; --bg: #0e1621; --card: #17212b; --border: #242f3d; --text: #f5f5f5; --text-dim: #708499; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }

        /* Profile Section */
        .profile-card { background: var(--card); padding: 25px; text-align: center; border-bottom: 1px solid var(--border); }
        .tg-avatar { width: 75px; height: 75px; border-radius: 50%; background: #2b5278; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 28px; font-weight: bold; color: white; }
        .user-name { font-size: 18px; margin: 0; }
        .user-phone { color: var(--text-dim); font-size: 13px; margin-top: 5px; }

        /* Multi-Account Switching (Telegram Style) */
        .account-box { margin: 15px; background: var(--card); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
        .acc-item { display: flex; align-items: center; padding: 12px 15px; cursor: pointer; border-bottom: 1px solid var(--border); transition: 0.2s; }
        .acc-item:last-child { border-bottom: none; }
        .acc-item.active { background: rgba(0, 136, 204, 0.1); border-left: 4px solid var(--primary); }
        
        .acc-circle { width: 40px; height: 40px; border-radius: 50%; background: #2b5278; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 14px; }
        .acc-details { flex: 1; }
        .acc-details h4 { margin: 0; font-size: 14px; }
        .acc-details p { margin: 2px 0 0; font-size: 11px; color: var(--text-dim); }

        .add-acc-btn { color: var(--primary); padding: 15px; cursor: pointer; font-size: 14px; display: flex; align-items: center; font-weight: 600; }
        .add-acc-btn i { margin-right: 12px; font-size: 18px; }

        /* Wallet/Stats Section */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .stat-box label { font-size: 10px; color: var(--text-dim); display: block; margin-bottom: 5px; }
        .stat-box p { margin: 0; font-size: 16px; font-weight: bold; color: var(--primary); }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: var(--card); display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: var(--text-dim); text-decoration: none; padding-top: 12px; font-size: 10px; display: flex; flex-direction: column; align-items: center; }
        .nav-item i { font-size: 18px; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="tg-avatar" id="main-avatar">?</div>
        <h3 class="user-name" id="main-name">Loading...</h3>
        <p class="user-phone" id="main-phone">+880 1XXX-XXXXXX</p>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <label>Main Balance</label>
            <p id="main-bal">৳ 0.00</p>
        </div>
        <div class="stat-box">
            <label>Withdrawals</label>
            <p id="with-bal" style="color:#ef5350;">৳ 0.00</p>
        </div>
    </div>

    <div style="padding: 0 15px; font-size: 12px; color: var(--text-dim);">My Accounts</div>
    <div class="account-box" id="account-list">
        </div>

    <div class="account-box">
        <div class="add-acc-btn" onclick="addTelegramAccount()">
            <i class="fas fa-plus-circle"></i> Add Telegram Account
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
        <a href="task.html" class="nav-item"><i class="fas fa-tasks"></i><span>Task</span></a>
        <a href="trading.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Trading</span></a>
        <a href="account.html" class="nav-item active"><i class="fas fa-user-circle"></i><span>Account</span></a>
        <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
    </nav>

    <script>
        // আপনার এপিআই ইউআরএল
        const API_URL = "https://aaf-api-free.onrender.com";

        // ১. সেভ করা অ্যাকাউন্টগুলো লোড করা
        let allAccounts = JSON.parse(localStorage.getItem('aaf_sessions')) || [];
        let currentSessionIndex = localStorage.getItem('aaf_active_index') || 0;

        function refreshPageData() {
            const listDiv = document.getElementById('account-list');
            listDiv.innerHTML = "";

            if (allAccounts.length === 0) {
                listDiv.innerHTML = "<p style='padding:15px; font-size:12px; color:var(--text-dim);'>No accounts added yet.</p>";
                return;
            }

            allAccounts.forEach((acc, index) => {
                const isActive = (index == currentSessionIndex);
                
                // লিস্ট আইটেম তৈরি
                const item = `
                    <div class="acc-item ${isActive ? 'active' : ''}" onclick="switchSession(${index})">
                        <div class="acc-circle">${acc.name.charAt(0)}</div>
                        <div class="acc-details">
                            <h4>${acc.name}</h4>
                            <p>${acc.phone}</p>
                        </div>
                        ${isActive ? '<i class="fas fa-check-circle" style="color:var(--primary)"></i>' : ''}
                    </div>
                `;
                listDiv.innerHTML += item;

                // যদি এটি বর্তমান সেশন হয়, তবে ড্যাশবোর্ড ডাটা আপডেট করো
                if (isActive) {
                    document.getElementById('main-avatar').innerText = acc.name.charAt(0);
                    document.getElementById('main-name').innerText = acc.name;
                    document.getElementById('main-phone').innerText = acc.phone;
                    document.getElementById('main-bal').innerText = "৳ " + acc.balance.toFixed(2);
                    
                    // ব্রাউজারের মেইন ইউজার আইডি আপডেট (যাতে অন্য পেজগুলো এই ডাটা পায়)
                    localStorage.setItem('user_id', acc.user_id); 
                }
            });
        }

        // ২. সেশন সুইচ করা (টেলিগ্রাম স্টাইল)
        function switchSession(index) {
            localStorage.setItem('aaf_active_index', index);
            currentSessionIndex = index;
            
            // ডাটাবেজ থেকে লেটেস্ট ডাটা নিতে পেজ রিলোড হবে
            // এতে ড্যাশবোর্ড, ট্রেডিং, টাস্ক সব ওই অ্যাকাউন্টের হয়ে যাবে
            location.reload(); 
        }

        // ৩. নতুন টেলিগ্রাম অ্যাকাউন্ট যোগ করা (OTP লজিক)
        async function addTelegramAccount() {
            const phoneNumber = prompt("আপনার টেলিগ্রাম নম্বর দিন (+880XXXX...):");
            if (!phoneNumber) return;

            alert("OTP পাঠানো হয়েছে! আপনার টেলিগ্রাম অ্যাপ চেক করুন।");
            const otpCode = prompt("টেলিগ্রাম থেকে পাওয়া ৫ ডিজিটের কোডটি দিন:");

            if (otpCode) {
                // সাকসেসফুল লগইন হলে ডাটাবেজ থেকে রেসপন্স আসবে
                const dummyNewAcc = {
                    user_id: "ID_" + Math.floor(Math.random()*10000),
                    name: "User_" + phoneNumber.slice(-4),
                    phone: phoneNumber,
                    balance: 0.00
                };

                allAccounts.push(dummyNewAcc);
                localStorage.setItem('aaf_sessions', JSON.stringify(allAccounts));
                localStorage.setItem('aaf_active_index', allAccounts.length - 1);
                
                location.reload();
            }
        }

        window.onload = refreshPageData;
    </script>
</body>
</html>
