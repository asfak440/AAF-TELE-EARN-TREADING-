<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment History - AAF Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@400;600;700&display=swap');
        body {
            background: #020617; color: #fff; font-family: 'Rajdhani', sans-serif;
            margin: 0; padding: 20px;
        }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .title { font-family: 'Syncopate'; font-size: 18px; color: #ffaa00; }
        
        .history-card {
            background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .pay-info b { font-size: 18px; color: #00ff88; display: block; }
        .pay-info small { color: #94a3b8; }
        .pay-status { text-align: right; }
        .st-badge { font-size: 10px; padding: 4px 10px; border-radius: 20px; font-weight: bold; text-transform: uppercase; }
        .success { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .pending { background: rgba(255, 170, 0, 0.2); color: #ffaa00; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" style="color:#fff; text-decoration:none;"><i class="fas fa-arrow-left"></i></a>
        <div class="title">PAYMENT HISTORY</div>
    </div>

    <div id="payment-list">
        <div class="history-card">
            <div class="pay-info">
                <b>৳ 500.00</b>
                <small>Bkash | 25 Mar 2026</small>
            </div>
            <div class="pay-status">
                <div class="st-badge success">Completed</div>
                <small style="font-size:10px; color:#94a3b8">TrxID: AX782K</small>
            </div>
        </div>
        
        <div class="history-card">
            <div class="pay-info">
                <b>৳ 200.00</b>
                <small>Nagad | 30 Mar 2026</small>
            </div>
            <div class="pay-status">
                <div class="st-badge pending">Pending</div>
            </div>
        </div>
    </div>

    <script>
        async function fetchPayments() {
            try {
                const res = await fetch('/get_payment_data');
                const data = await res.json();
                // এখানে লুপ চালিয়ে ডাটাবেজ থেকে আসা পেমেন্টগুলো দেখাবেন
            } catch(e) {}
        }
        // window.onload = fetchPayments;
    </script>
</body>
</html>
