<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Payment History - AAF Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div style="max-width: 1000px; margin: 0 auto; padding: 15px;">
    
    <!-- হেডার -->
    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">
        <a href="/dashboard" style="color: #fff; text-decoration: none; font-size: 20px;"><i class="fas fa-arrow-left"></i></a>
        <div style="font-family: 'Syncopate'; font-size: 16px; color: #ffaa00; letter-spacing: 1px;">PAYMENT HISTORY</div>
    </div>

    <!-- দুই কলাম (পাশাপাশি) - ফোর্সড গ্রিড -->
    <div style="display: flex; flex-wrap: wrap; gap: 20px;">
        
        <!-- বাম পাশে: DEPOSIT -->
        <div style="flex: 1; min-width: 250px; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 15px;">
            <div style="font-family: 'Syncopate'; font-size: 14px; color: #00f2fe; margin-bottom: 15px; border-left: 3px solid #00f2fe; padding-left: 10px;">
                <i class="fas fa-download"></i> DEPOSIT REQUESTS
            </div>
            <div id="deposits-list">
                <div style="text-align: center; padding: 30px; color: #94a3b8;"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
            </div>
        </div>

        <!-- ডান পাশে: WITHDRAW -->
        <div style="flex: 1; min-width: 250px; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 15px;">
            <div style="font-family: 'Syncopate'; font-size: 14px; color: #00f2fe; margin-bottom: 15px; border-left: 3px solid #00f2fe; padding-left: 10px;">
                <i class="fas fa-upload"></i> WITHDRAWAL REQUESTS
            </div>
            <div id="withdraws-list">
                <div style="text-align: center; padding: 30px; color: #94a3b8;"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
            </div>
        </div>
        
    </div>
</div>

<script>
const API = window.location.origin;
const TG_KEY = "telegram_id";

function getTG(){
    const id = localStorage.getItem(TG_KEY);
    if(!id) location.href = "/login";
    return id;
}

function formatDate(dateStr) {
    if(!dateStr) return 'N/A';
    let date = new Date(dateStr);
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function getStatusBadge(status) {
    if(status === 'approved') {
        return '<span style="background:rgba(0,255,136,0.15); color:#00ff88; border:1px solid rgba(0,255,136,0.3); padding:4px 10px; border-radius:20px; font-size:10px; font-weight:bold;">✅ APPROVED</span>';
    } else if(status === 'pending') {
        return '<span style="background:rgba(255,170,0,0.15); color:#ffaa00; border:1px solid rgba(255,170,0,0.3); padding:4px 10px; border-radius:20px; font-size:10px; font-weight:bold;">⏳ PENDING</span>';
    } else if(status === 'rejected') {
        return '<span style="background:rgba(255,0,85,0.15); color:#ff5555; border:1px solid rgba(255,0,85,0.3); padding:4px 10px; border-radius:20px; font-size:10px; font-weight:bold;">❌ REJECTED</span>';
    }
    return '<span style="background:rgba(255,170,0,0.15); color:#ffaa00; padding:4px 10px; border-radius:20px; font-size:10px;">⏳ PENDING</span>';
}

async function loadPaymentHistory(){
    const tg = getTG();
    
    try{
        const res = await fetch(`${API}/api/user/payments/${tg}`, { credentials:"include" });
        const data = await res.json();
        
        // ========== DEPOSITS (বাম পাশে) ==========
        let depositsHtml = '';
        if(data.deposits && data.deposits.length > 0){
            data.deposits.forEach(d => {
                depositsHtml += `
                    <div style="background:#0d111c; border:1px solid rgba(0,242,254,0.15); border-radius:16px; padding:15px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <b style="font-size:18px; color:#00ff88; display:block;">৳ ${parseFloat(d.amount).toFixed(2)}</b>
                            <small style="color:#94a3b8; font-size:11px;">${d.method || 'Nagad'}</small>
                        </div>
                        <div style="text-align:right;">
                            <div>${getStatusBadge(d.status)}</div>
                            <small style="color:#94a3b8; font-size:10px;">${formatDate(d.created_at)}</small>
                        </div>
                    </div>
                `;
            });
        } else {
            depositsHtml = `<div style="text-align:center; padding:30px; color:#94a3b8;"><i class="fas fa-inbox"></i> No deposit requests found.</div>`;
        }
        
        // ========== WITHDRAWS (ডান পাশে) ==========
        let withdrawsHtml = '';
        if(data.withdraws && data.withdraws.length > 0){
            data.withdraws.forEach(w => {
                let number = w.number || w.account_number || 'Unknown';
                if(number === 'N/A') number = 'Unknown';
                
                withdrawsHtml += `
                    <div style="background:#0d111c; border:1px solid rgba(0,242,254,0.15); border-radius:16px; padding:15px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <b style="font-size:18px; color:#00ff88; display:block;">৳ ${parseFloat(w.amount).toFixed(2)}</b>
                            <small style="color:#94a3b8; font-size:11px;">To: ${number}</small>
                        </div>
                        <div style="text-align:right;">
                            <div>${getStatusBadge(w.status)}</div>
                            <small style="color:#94a3b8; font-size:10px;">${formatDate(w.created_at)}</small>
                        </div>
                    </div>
                `;
            });
        } else {
            withdrawsHtml = `<div style="text-align:center; padding:30px; color:#94a3b8;"><i class="fas fa-inbox"></i> No withdrawal requests found.</div>`;
        }
        
        document.getElementById('deposits-list').innerHTML = depositsHtml;
        document.getElementById('withdraws-list').innerHTML = withdrawsHtml;
        
    } catch(e){ 
        console.error("Payment history error:", e);
        document.getElementById('deposits-list').innerHTML = '<div style="text-align:center; padding:30px; color:#ff5555;">⚠️ Failed to load</div>';
        document.getElementById('withdraws-list').innerHTML = '<div style="text-align:center; padding:30px; color:#ff5555;">⚠️ Failed to load</div>';
    }
}

window.addEventListener('load', loadPaymentHistory);
</script>
</body>
</html>
