<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Payment History - AAF Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div class="header">
        <a href="/dashboard" class="back-link"><i class="fas fa-arrow-left"></i></a>
        <div class="title">PAYMENT HISTORY</div>
    </div>

    <div id="payment-history-container">
        <div id="loader"><i class="fas fa-circle-notch fa-spin"></i> Loading Data...</div>
    </div>

<script>
const API = window.location.origin;
const TG_KEY = "telegram_id";

function getTG(){
    const id = localStorage.getItem(TG_KEY);
    if(!id) location.href = "/login";
    return id;
}

async function loadPaymentHistory(){
    const tg = getTG();
    const container = document.getElementById('payment-history-container');
    container.innerHTML = '<div id="loader"><i class="fas fa-circle-notch fa-spin"></i> Loading Data...</div>';
    
    try{
        const res = await fetch(`${API}/api/user/payments/${tg}`, { credentials:"include" });
        const data = await res.json();
        
        let html = '';
        
        // Deposit Section
        html += `<div class="section-title"><i class="fas fa-download"></i> DEPOSIT REQUESTS</div>`;
        if(data.deposits && data.deposits.length > 0){
            data.deposits.forEach(d => {
                let statusClass = '';
                if(d.status === 'approved') statusClass = 'status-success';
                else if(d.status === 'pending') statusClass = 'status-pending';
                else if(d.status === 'rejected') statusClass = 'status-rejected';
                else statusClass = 'status-pending';
                
                html += `
                    <div class="history-card">
                        <div class="pay-info">
                            <b>৳ ${parseFloat(d.amount).toFixed(2)}</b>
                            <small>${d.method || 'Nagad'}</small>
                        </div>
                        <div class="pay-status">
                            <div class="st-badge ${statusClass}">${d.status.toUpperCase()}</div>
                            <small class="trx-id">${d.trx || d.created_at?.slice(0,10) || ''}</small>
                        </div>
                    </div>
                `;
            });
        } else {
            html += `<div class="empty-message"><i class="fas fa-history"></i> No deposit requests found.</div>`;
        }
        
        // Withdraw Section
        html += `<div class="section-title"><i class="fas fa-upload"></i> WITHDRAWAL REQUESTS</div>`;
        if(data.withdraws && data.withdraws.length > 0){
            data.withdraws.forEach(w => {
                let statusClass = '';
                if(w.status === 'approved') statusClass = 'status-success';
                else if(w.status === 'pending') statusClass = 'status-pending';
                else if(w.status === 'rejected') statusClass = 'status-rejected';
                else statusClass = 'status-pending';
                
                html += `
                    <div class="history-card">
                        <div class="pay-info">
                            <b>৳ ${parseFloat(w.amount).toFixed(2)}</b>
                            <small>To: ${w.number}</small>
                        </div>
                        <div class="pay-status">
                            <div class="st-badge ${statusClass}">${w.status.toUpperCase()}</div>
                            <small class="trx-id">${w.created_at?.slice(0,10) || ''}</small>
                        </div>
                    </div>
                `;
            });
        } else {
            html += `<div class="empty-message"><i class="fas fa-history"></i> No withdrawal requests found.</div>`;
        }
        
        container.innerHTML = html;
    } catch(e){ 
        console.error("Payment history error:", e);
        container.innerHTML = '<div class="empty-message">Failed to load data. Try again later.</div>';
    }
}

window.addEventListener('load', loadPaymentHistory);
</script>
</body>
</html>
