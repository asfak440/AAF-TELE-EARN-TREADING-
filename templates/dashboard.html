<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Master Dashboard v10.0 Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --bg: #020617;
            --glass-card: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #00f2fe; 
            --secondary: #7000ff; 
            --danger: #ff0055;
            --gold: #ffaa00;
            --active-green: #00ff88;
            --neon-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
            --grad-primary: linear-gradient(135deg, #00f2fe 0%, #7000ff 100%);
            --grad-gold: linear-gradient(135deg, #ffaa00 0%, #d97706 100%);
        }

        .light-mode {
            --bg: #e5e9f0;
            --glass-card: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(30, 41, 59, 0.1);
            --text-main: #0f172a;
            --text-muted: #475569;
            --neon-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
        }

        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; padding-bottom: 120px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
            background-attachment: fixed;
            background-image: radial-gradient(circle at 50% 0%, rgba(112, 0, 255, 0.1) 0%, transparent 60%);
        }

        .premium-card {
            background: var(--glass-card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            box-shadow: var(--neon-shadow); transition: 0.4s ease;
        }

        .nav-header { 
            background: var(--glass-card); backdrop-filter: blur(20px);
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--glass-border);
        }
        
        .u-profile { display: flex; flex-direction: column; gap: 2px; }
        .u-info { font-size: 14px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 6px; font-family: 'Syncopate', sans-serif;}
        .u-id { font-size: 11px; color: var(--danger); font-weight: bold; }

        .header-mid-bal {
            flex: 1; text-align: center; background: rgba(0,0,0,0.3);
            margin: 0 10px; padding: 6px; border-radius: 12px; border: 1px solid var(--glass-border);
        }
        .header-mid-bal .title { font-size: 9px; color: var(--text-muted); text-transform: uppercase; font-weight: bold; margin-bottom: 4px; display: block; letter-spacing: 1px;}
        .bal-items { display: flex; justify-content: center; align-items: center; gap: 10px; }
        .bal-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: bold; }
        
        .aaf-logo-mini {
            width: 16px; height: 16px; background: var(--grad-gold); color: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 900;
        }

        .status-light {
            width: 12px; height: 12px; border-radius: 50%; background: var(--danger); 
            box-shadow: 0 0 10px var(--danger); border: 2px solid var(--glass-card); transition: 0.5s;
        }
        .status-light.active { background: var(--active-green); box-shadow: 0 0 10px var(--active-green); }

        .pop-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(8px);
        }
        .pop-box {
            background: var(--glass-card); width: 85%; max-width: 350px; border-radius: 25px;
            padding: 30px 20px; text-align: center; border: 1px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2); transform: scale(0.8); transition: 0.4s;
        }
        .pop-box.show { transform: scale(1); }
        .pop-icon { font-size: 45px; margin-bottom: 15px; }
        .pop-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: var(--primary); font-family: 'Syncopate', sans-serif; }
        .pop-msg { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 25px; }
        .pop-btn { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; font-family: 'Syncopate', sans-serif;
            font-weight: bold; cursor: pointer; transition: 0.2s; background: var(--grad-primary); color: #fff; text-transform: uppercase;
        }

        .container { padding: 20px 15px; max-width: 600px; margin: 0 auto; }
        .analytics-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
        .stat-card { padding: 12px 2px; text-align: center; cursor: pointer; border: 1px solid var(--glass-border); }
        .stat-card:active { transform: scale(0.95); }
        .stat-card i { font-size: 16px; margin-bottom: 6px; color: var(--primary); }
        .stat-card h4 { margin: 0; font-size: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        .stat-card p { margin: 5px 0 0; font-size: 12px; font-weight: bold; font-family: 'Syncopate', sans-serif; }

        .income-box { padding: 15px 20px; margin-bottom: 20px; }
        .income-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--glass-border); font-size: 14px; font-weight: 600; }

        .balance-card { 
            padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 15px; position: relative; overflow: hidden;
        }
        .bal-info { display: flex; align-items: center; gap: 12px; }
        .bal-icon-circle { width: 45px; height: 45px; border-radius: 50%; background: var(--grad-primary); display: flex; align-items: center; justify-content: center; font-size: 20px; color:#fff; box-shadow: 0 0 15px rgba(0,242,254,0.3); }
        .aaf-logo-big { width: 45px; height: 45px; background: var(--grad-gold); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; box-shadow: 0 0 15px rgba(255,170,0,0.3); }
        
        .btn-action { 
            padding: 10px 15px; border-radius: 12px; font-size: 11px; font-weight: bold; font-family: 'Syncopate', sans-serif;
            border: none; cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .btn-primary { background: var(--grad-primary); color: #fff; box-shadow: 0 5px 15px rgba(112,0,255,0.3); }
        .btn-gold { background: var(--grad-gold); color: #fff; box-shadow: 0 5px 15px rgba(255,170,0,0.3);}

        .join-box { padding: 18px; display: flex; align-items: center; gap: 15px; border-left: 4px solid var(--danger); margin-top: 20px; }
        .join-box.active-border { border-left-color: var(--active-green); background: rgba(0, 255, 136, 0.05); }
        .btn-join { background: var(--danger); color: #fff; border: none; padding: 12px 18px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Syncopate', sans-serif; font-size: 10px;}
        .btn-join.btn-active { background: var(--active-green); color: #000; box-shadow: 0 0 15px rgba(0,255,136,0.4); }

        .dock-container {
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 10px 0 20px 0; z-index: 2000;
            display: flex; justify-content: center;
        }
        .dock-nav {
            width: 92%; max-width: 500px; height: 70px;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px);
            border-radius: 28px; border: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        .nav-item { 
            position: relative; color: var(--text-muted); text-decoration: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 18%; transition: 0.4s;
        }
        .nav-item i { font-size: 22px; margin-bottom: 5px; }
        .nav-item span { font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--text-main); }
        .nav-item.active i { color: var(--primary); transform: translateY(-5px); filter: drop-shadow(0 0 10px var(--primary)); }
        .sparkle { position: absolute; top: -5px; right: 5px; font-size: 16px; color: #fff; opacity: 0; transform: scale(0); transition: 0.5s; }
        .nav-item.active .sparkle { opacity: 1; transform: scale(1); }

    </style>
</head>
<body>

    <div class="pop-overlay" id="master-pop">
        <div class="pop-box" id="pop-box">
            <div class="pop-icon" id="pop-icon">⚠️</div>
            <div class="pop-title" id="pop-title">Alert</div>
            <div class="pop-msg" id="pop-msg">Connecting to database...</div>
            <button class="pop-btn" id="pop-btn" onclick="closePop()">OK</button>
        </div>
    </div>

    <div class="nav-header">
        <div class="u-profile">
            <div class="u-info"><i class="fas fa-user-astronaut"></i> <span id="u-name">LOADING...</span></div>
            <div class="u-id"><i class="fas fa-satellite-dish"></i> <span id="u-phone">...</span></div>
        </div>
        <div class="header-mid-bal">
            <span class="title">Balance Summary</span>
            <div class="bal-items">
                <div class="bal-item"><i class="fas fa-money-bill-wave" style="color:var(--primary)"></i> ৳ <span id="h-cash">0.00</span></div>
                <div class="bal-item"><div class="aaf-logo-mini">AAF</div><span id="h-aaf">0</span></div>
            </div>
        </div>
        <div class="status-light" id="status-dot"></div>
    </div>

    <div class="container">
        <div class="analytics-row">
            <div class="premium-card stat-card" onclick="goToPage('/refer')"><i class="fas fa-users-viewfinder"></i><h4>REFER</h4><p>LIST</p></div>
            <div class="premium-card stat-card"><h4>TOTAL</h4><p id="total-users">0</p></div>
            <div class="premium-card stat-card"><h4>ACTIVE</h4><p id="active-users" style="color:var(--primary)">0</p></div>
            <div class="premium-card stat-card"><h4>OFF</h4><p id="inactive-users" style="color:var(--danger)">0</p></div>
            <div class="premium-card stat-card" onclick="goToPage('/paid_log')"><i class="fas fa-receipt"></i><h4>PAID</h4><p>LOG</p></div>
        </div>

        <div class="premium-card income-box">
            <div class="income-row"><span>Task Income</span><b id="task-inc">0.00 AAF</b></div>
            <div class="income-row"><span>Daily Bonus</span><b id="bonus-inc" style="color:var(--primary)">0.00 AAF</b></div>
            <div class="income-row"><span>Trading Profit</span><b style="color:var(--active-green)">৳ <span id="trade-profit">0.00</span></b></div>
        </div>

        <div class="premium-card balance-card">
            <div class="bal-info">
                <div class="bal-icon-circle"><i class="fas fa-wallet"></i></div>
                <div><span style="font-size:10px; color:var(--text-muted);">CASH BALANCE</span><div style="font-size:24px; font-weight:800; font-family:'Syncopate';">৳ <span id="m-bal">0.00</span></div></div>
            </div>
            <button class="btn-action btn-primary" onclick="handleAction('/withdraw')">Withdraw</button>
        </div>

        <div class="premium-card balance-card">
            <div class="bal-info">
                <div class="aaf-logo-big">AAF</div>
                <div><span style="font-size:10px; color:var(--text-muted);">AAF COIN</span><div style="font-size:24px; font-weight:800; color:var(--gold); font-family:'Syncopate';"><span id="aaf-bal">0</span></div></div>
            </div>
            <button class="btn-action btn-gold" onclick="handleAction('/convert')">Convert</button>
        </div>

        <div class="premium-card join-box" id="join-card">
            <div class="join-info"><span>Status Control</span><b id="display-acc-no">OFFLINE</b></div>
            <button class="btn-join" id="channel-btn" onclick="triggerJoinFlow()">JOIN NOW</button>
        </div>
    </div>

    <div class="dock-container">
        <nav class="dock-nav">
            <a href="#" class="nav-item active"><i class="fas fa-house"></i><span>Home</span><div class="sparkle">✦</div></a>
            <a href="#" class="nav-item" onclick="goToPage('/task')"><i class="fas fa-clipboard-check"></i><span>Task</span><div class="sparkle">✦</div></a>
            <a href="#" class="nav-item" onclick="goToPage('/trading')"><i class="fas fa-chart-line"></i><span>Trading</span><div class="sparkle">✦</div></a>
            <a href="#" class="nav-item" onclick="goToPage('/wallet')"><i class="fas fa-wallet"></i><span>Wallet</span><div class="sparkle">✦</div></a>
            <a href="#" class="nav-item" onclick="goToPage('/account')"><i class="fas fa-circle-user"></i><span>Account</span><div class="sparkle">✦</div></a>
        </nav>
    </div>

    <script>
        let isUserJoined = false;

        function showPop(title, msg, type = 'info', callback = null) {
            const overlay = document.getElementById('master-pop');
            document.getElementById('pop-title').innerText = title;
            document.getElementById('pop-msg').innerText = msg;
            document.getElementById('pop-icon').innerText = (type === 'warning') ? "⚠️" : "✅";
            overlay.style.display = 'flex';
            setTimeout(() => document.getElementById('pop-box').classList.add('show'), 10);
            window.currentPopAction = callback;
        }

        function closePop() {
            document.getElementById('pop-box').classList.remove('show');
            setTimeout(() => {
                document.getElementById('master-pop').style.display = 'none';
                if(window.currentPopAction) window.currentPopAction();
            }, 300);
        }

        // --- Real Database Interaction (Fetch from app.py) ---
        async function fetchRealData() {
            try {
                // আপনার app.py এর API এন্ডপয়েন্ট
                const response = await fetch('/get_user_data'); 
                const data = await response.json();
                if(data) updateUI(data);
            } catch (err) {
                console.error("Database connection failed:", err);
                showPop("Error", "সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না!", "warning");
            }
        }

        function updateUI(data) {
            document.getElementById('u-name').innerText = data.username || "USER";
            document.getElementById('u-phone').innerText = data.phone || "---";
            document.getElementById('h-cash').innerText = data.cash || "0.00";
            document.getElementById('m-bal').innerText = data.cash || "0.00";
            document.getElementById('h-aaf').innerText = data.aaf || "0";
            document.getElementById('aaf-bal').innerText = data.aaf || "0";
            document.getElementById('total-users').innerText = data.total_ref || "0";
            document.getElementById('active-users').innerText = data.active_ref || "0";
            document.getElementById('inactive-users').innerText = data.off_ref || "0";
            document.getElementById('display-acc-no').innerText = data.phone || "---";
            
            if(data.is_joined) {
                isUserJoined = true;
                document.getElementById('status-dot').classList.add('active');
                document.getElementById('join-card').classList.add('active-border');
                document.getElementById('channel-btn').classList.add('btn-active');
                document.getElementById('channel-btn').innerText = "JOINED";
            }
        }

        function triggerJoinFlow() {
            showPop("Attention!", "চ্যানেলে জয়েন না করলে অফার বাতিল হতে পারে।", "warning", () => {
                window.open('https://t.me/your_channel', '_blank');
                // জয়েন হওয়ার পর ডাটাবেজ আপডেট করার ফাংশন এখানে কল করতে পারেন
            });
        }

        function handleAction(url) {
            if(!isUserJoined) showPop("Join Required", "আগে চ্যানেলে জয়েন করুন!", "warning");
            else window.location.href = url;
        }

        function goToPage(url) { window.location.href = url; }

        window.onload = () => {
            if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
            fetchRealData(); // পেজ লোড হলেই রিয়েল ডাটা কল হবে
        };
    </script>
</body>
    </html>
