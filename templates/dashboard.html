<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Master Dashboard v18.0 Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --bg: #020617;
            --glass-card: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #00f2fe; 
            --active-green: #00ff88;
            --danger: #ff0055;
            --gold: #ffaa00;
        }

        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; padding-bottom: 120px;
            background-image: radial-gradient(circle at 50% 0%, rgba(112, 0, 255, 0.15) 0%, transparent 70%);
            overflow-x: hidden;
        }

        .premium-card {
            background: var(--glass-card); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .nav-header { 
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px);
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--glass-border);
        }
        
        .u-info { font-size: 13px; font-weight: 700; color: var(--primary); font-family: 'Syncopate'; text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }
        
        .container { padding: 20px 15px; max-width: 600px; margin: 0 auto; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        
        .stat-card { padding: 15px 5px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid var(--glass-border); }
        .stat-card:active { transform: scale(0.95); }
        .stat-card i { font-size: 20px; margin-bottom: 8px; }
        .stat-card h4 { margin: 0; font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { font-size: 11px; font-weight: bold; margin-top: 5px; font-family: 'Syncopate'; color: #fff; }

        .action-grid-card {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 15px;
            margin: 20px 0;
            background: rgba(15, 23, 42, 0.5);
        }
        .btn-main {
            padding: 18px 10px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            color: #fff;
            font-family: 'Syncopate';
            font-size: 10px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .btn-main:active { transform: scale(0.92); filter: brightness(1.2); }
        .btn-main i { font-size: 22px; }

        .btn-dep { border-color: var(--active-green); color: var(--active-green); box-shadow: 0 0 15px rgba(0, 255, 136, 0.15); }
        .btn-wit { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 15px rgba(0, 242, 254, 0.15); }
        .btn-tra { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 15px rgba(255, 170, 0, 0.15); }
        .btn-con { border-color: var(--danger); color: var(--danger); box-shadow: 0 0 15px rgba(255, 0, 85, 0.15); }

        #active-user-bar {
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            padding: 8px 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            animation: fadeIn 0.5s ease;
        }
        #active-user-bar img {
            width: 25px; height: 25px; border-radius: 50%; border: 1px solid var(--active-green);
        }
        #active-user-bar span {
            font-size: 11px; font-weight: bold; color: var(--active-green); font-family: 'Syncopate';
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .dock-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 10px 0 25px 0; z-index: 2000; display: flex; justify-content: center; }
        .dock-nav {
            width: 92%; max-width: 500px; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(30px);
            border-radius: 35px; border: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .nav-item { color: var(--text-muted); text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 11px; transition: 0.3s; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 15px var(--primary); }
        .nav-item i { font-size: 22px; margin-bottom: 5px; }

        .banner-ad-box { width: 100%; min-height: 65px; margin: 15px 0; border-radius: 15px; background: rgba(0,0,0,0.3); border: 1px dashed var(--glass-border); display: flex; align-items: center; justify-content: center; overflow: hidden;}
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="u-profile">
            <div class="u-info"><i class="fas fa-user-astronaut"></i> <span id="u-name">LOADING...</span></div>
            <div style="font-size: 10px; color: var(--active-green); font-weight: bold; margin-top: 2px;">
                <i class="fab fa-telegram-plane"></i> ID: <span id="u-tg-id">N/A</span>
            </div>
        </div>
        
        <div class="header-mid-bal" style="background:rgba(0,0,0,0.4); padding:10px 18px; border-radius:20px; border:1px solid var(--glass-border); box-shadow: inset 0 0 10px rgba(0,0,0,0.5);">
            <div style="display:flex; gap:15px; font-size:12px; font-weight:bold; font-family: 'Syncopate';">
                <span style="color: var(--active-green);">৳<span id="h-cash">0.00</span></span>
                <span style="color:var(--gold)">A<span id="h-aaf">0</span></span>
            </div>
        </div>
        <div id="status-dot" style="width:12px; height:12px; border-radius:50%; background:var(--danger); box-shadow: 0 0 15px var(--danger);"></div>
    </div>

    <div class="container">
        
        <div class="grid-3">
            <div class="premium-card stat-card">
                <i class="fas fa-server" style="color:var(--active-green); text-shadow: 0 0 10px var(--active-green);"></i>
                <h4>Server Income</h4>
                <p id="srv-total-income">৳0.00</p>
            </div>
            <div class="premium-card stat-card">
                <i class="fas fa-chart-line" style="color:var(--primary); text-shadow: 0 0 10px var(--primary);"></i>
                <h4>Server Trading</h4>
                <p id="srv-total-trading">৳0.00</p>
            </div>
            <div class="premium-card stat-card">
                <i class="fas fa-globe" style="color:#fff;"></i>
                <h4>Global Users</h4>
                <p id="total-users-global">0</p>
            </div>
        </div>

        <div class="premium-card action-grid-card">
            <div class="btn-main btn-dep" onclick="smartRedirect('wallet?action=deposit')">
                <i class="fas fa-plus-circle"></i> DEPOSIT
            </div>
            <div class="btn-main btn-wit" onclick="smartRedirect('wallet?action=withdraw')">
                <i class="fas fa-wallet"></i> WITHDRAW
            </div>
            <div class="btn-main btn-tra" onclick="smartRedirect('wallet?action=transfer')">
                <i class="fas fa-exchange-alt"></i> TRANSFER
            </div>
            <div class="btn-main btn-con" onclick="smartRedirect('trading')">
                <i class="fas fa-sync-alt"></i> CONVERT
            </div>
        </div>

        <div class="grid-3">
            <div class="premium-card stat-card" onclick="smartRedirect('refer_list')">
                <i class="fas fa-users" style="color:var(--primary)"></i>
                <h4>Refer Center</h4>
                <p id="total-ref">0</p>
            </div>
            <div class="premium-card stat-card" onclick="smartRedirect('trading')">
                <i class="fas fa-coins" style="color:var(--gold)"></i>
                <h4>My Trading</h4>
                <p id="my-trading-income">৳0.00</p>
            </div>
            <div class="premium-card stat-card" onclick="smartRedirect('payment_history')">
                <i class="fas fa-file-invoice-dollar" style="color:var(--active-green)"></i>
                <h4>Payments</h4>
                <p>HISTORY</p>
            </div>
        </div>

        <div class="banner-ad-box" id="banner-top">
            <small style="color:gray;">ADVERTISEMENT</small>
        </div>

        <div id="active-user-bar">
            <img src="https://i.ibb.co/vz6mXvK/tele-logo.png" alt="Channel Logo">
            <span id="active-user-info">ID: LOADING... IS NOW ACTIVE</span>
        </div>

        <div class="premium-card" id="join-card" style="padding:18px; display:flex; align-items:center; gap:15px; border-left:5px solid var(--danger); margin-top:5px;">
            <div style="flex:1">
                <small style="color: var(--text-muted);">COMMUNITY STATUS</small>
                <b id="join-status" style="display:block; font-family:'Syncopate'; margin-top:5px; font-size: 14px;">OFFLINE</b>
            </div>
            <button id="main-join-btn" style="background:var(--danger); border:none; padding:12px 22px; border-radius:12px; color:#fff; font-weight:bold; cursor:pointer; font-family: 'Rajdhani'; transition: 0.3s;" onclick="joinChannel()">JOIN NOW</button>
        </div>
    </div>

    <div class="dock-container">
        <nav class="dock-nav">
            <a href="#" class="nav-item active"><i class="fas fa-house"></i><span>Home</span></a>
            <a href="javascript:void(0)" onclick="smartRedirect('task')" class="nav-item"><i class="fas fa-tasks"></i><span>Task</span></a>
            <a href="javascript:void(0)" onclick="smartRedirect('trading')" class="nav-item"><i class="fas fa-chart-line"></i><span>Trading</span></a>
            <a href="javascript:void(0)" onclick="smartRedirect('wallet')" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
            <a href="javascript:void(0)" onclick="smartRedirect('account')" class="nav-item"><i class="fas fa-user-circle"></i><span>Account</span></a>
        </nav>
    </div>

    <script>
        let userData = {};
        let adminConfig = {};

        // ১. মেইন ড্যাশবোর্ড আপডেট ফাংশন
        async function initDashboard() {
            try {
                const response = await fetch('/get_user_data');
                if (!response.ok) throw new Error("API Error");
                const data = await response.json();
                
                userData = data.user;
                adminConfig = data.admin;

                updateUI(userData, adminConfig);

            } catch (e) { 
                console.error("Dashboard Init Error");
                document.getElementById('u-name').innerText = "ERROR";
            }
        }

        // ২. ডাটা রেন্ডার করার জন্য আলাদা ফাংশন (যাতে বার বার কল করা যায়)
        function updateUI(user, admin) {
            document.getElementById('u-name').innerText = user.username || "USER";
            document.getElementById('u-tg-id').innerText = user.telegram_id || "NOT SET";
            document.getElementById('h-cash').innerText = user.cash;
            document.getElementById('h-aaf').innerText = user.aaf;
            
            document.getElementById('srv-total-income').innerText = '৳' + admin.server_income;
            document.getElementById('srv-total-trading').innerText = '৳' + admin.server_trading;
            document.getElementById('total-users-global').innerText = admin.total_users;
            document.getElementById('total-ref').innerText = user.total_refer;
            document.getElementById('my-trading-income').innerText = '৳' + user.trading_profit;

            // ইউজার একটিভ থাকলে ডিজাইন পরিবর্তন
            if(user.is_active) {
                document.getElementById('status-dot').style.background = 'var(--active-green)';
                document.getElementById('status-dot').style.boxShadow = '0 0 20px var(--active-green)';
                document.getElementById('join-status').innerText = "CONNECTED";
                document.getElementById('join-status').style.color = 'var(--active-green)';
                document.getElementById('join-card').style.borderLeftColor = 'var(--active-green)';
                
                const activeBar = document.getElementById('active-user-bar');
                activeBar.style.display = 'flex';
                document.getElementById('active-user-info').innerText = "ID: " + (user.telegram_id || "USER") + " IS NOW ACTIVE";
                
                document.getElementById('main-join-btn').style.background = 'var(--primary)';
                document.getElementById('main-join-btn').innerText = "VISIT CHANNEL";
            }
            document.getElementById('banner-top').innerHTML = admin.banner_ad_code;
        }

        // ৩. অটো-রিফ্রেশ লজিক: প্রতি ১০ সেকেন্ডে চেক করবে
        setInterval(async () => {
            // যদি ইউজার এখনো একটিভ না থাকে, তবেই রিকোয়েস্ট পাঠাবে
            if (userData && !userData.is_active) {
                try {
                    const response = await fetch('/get_user_data');
                    const data = await response.json();
                    
                    // ব্যাকএন্ড থেকে যদি একটিভ স্ট্যাটাস আসে, তবে UI আপডেট করে দিবে
                    if (data.user.is_active) {
                        userData.is_active = true;
                        updateUI(data.user, data.admin);
                        console.log("Status Updated: USER IS NOW ACTIVE");
                    }
                } catch (e) { console.log("Auto-check failed"); }
            }
        }, 10000); 

        function joinChannel() {
            window.open(adminConfig.channel_url || "https://t.me/aafteleearn", "_blank");
        }

        function smartRedirect(page) {
            window.location.href = `/${page}`;
        }

        window.onload = initDashboard;
    </script>
</body>
                </html>
