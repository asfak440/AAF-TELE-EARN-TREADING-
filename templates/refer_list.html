<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referral Center - AAF Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@400;600;700&display=swap');
        
        :root {
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #00f2fe;
            --active: #00ff88;
            --gold: #ffaa00;
        }

        body {
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif;
            margin: 0; padding: 20px; padding-bottom: 50px;
            background-image: radial-gradient(circle at top, rgba(112, 0, 255, 0.15), transparent);
        }

        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .back-btn { color: #fff; text-decoration: none; font-size: 20px; cursor: pointer; }
        .title { font-family: 'Syncopate'; font-size: 16px; color: var(--primary); letter-spacing: 1px; }

        /* Referral Link Card */
        .refer-link-card {
            background: var(--glass); border: 1px solid var(--primary);
            padding: 20px; border-radius: 20px; margin-bottom: 25px;
            text-align: center; box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
        }
        .refer-link-card h3 { margin: 0 0 10px 0; font-size: 14px; color: var(--text-muted); }
        .link-box {
            background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px;
            border: 1px dashed var(--border); display: flex; justify-content: space-between;
            align-items: center; margin-top: 10px;
        }
        #my-ref-link { font-size: 12px; color: var(--primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%; }
        .copy-btn { background: var(--primary); color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }

        /* Bonus Info */
        .bonus-badge { font-size: 11px; margin-top: 15px; color: var(--gold); font-weight: bold; }

        /* Referral List Section */
        .section-label { font-family: 'Syncopate'; font-size: 12px; margin-bottom: 15px; display: block; color: var(--active); }
        
        .list-container { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
        .ref-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid var(--border);
        }
        .ref-item:last-child { border-bottom: none; }
        .u-info-box { display: flex; align-items: center; gap: 12px; }
        .u-avatar { width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); border: 1px solid var(--border); }
        .u-name { font-weight: bold; font-size: 15px; display: block; }
        .u-date { font-size: 11px; color: #94a3b8; }
        .status-tag { font-size: 9px; padding: 4px 10px; border-radius: 6px; font-weight: 900; letter-spacing: 0.5px; }
        .active-tag { background: rgba(0, 255, 136, 0.15); color: var(--active); border: 1px solid var(--active); }
        .inactive-tag { background: rgba(255, 0, 85, 0.1); color: #ff0055; border: 1px solid #ff0055; }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></div>
        <div class="title">REFERRAL CENTER</div>
    </div>

    <div class="refer-link-card">
        <h3>YOUR REFERRAL LINK</h3>
        <div class="link-box">
            <span id="my-ref-link">https://t.me/aaf_tele_earn_bot?start=loading...</span>
            <button class="copy-btn" onclick="copyLink()">COPY</button>
        </div>
        <div class="bonus-badge">
            <i class="fas fa-gift"></i> Get 1 AAF per Refer + 0.30 AAF Task Bonus
        </div>
    </div>

    <span class="section-label">MY REFERRALS (<span id="ref-count">0</span>)</span>
    <div class="list-container" id="list-items">
        <div style="padding:40px; text-align:center; color:#94a3b8;">
            <i class="fas fa-spinner fa-spin"></i> Loading Referrals...
        </div>
    </div>

    <script>
        let userId = "00000"; // ডাইনামিক হবে

        async function fetchReferralData() {
            try {
                const response = await fetch('/get_user_data');
                const data = await response.json();
                
                if(data.user) {
                    userId = data.user.user_id;
                    document.getElementById('my-ref-link').innerText = `https://t.me/aaf_tele_earn_bot?start=${userId}`;
                    document.getElementById('ref-count').innerText = data.user.total_refer || 0;
                    
                    // এখানে আপনি আলাদা একটি API কল করে রেফারেল লিস্ট আনতে পারেন
                    loadList(data.user.referrals_list); // আপনার ডাটাবেজ অনুযায়ী
                }
            } catch (e) { console.log("Error loading data"); }
        }

        function loadList(users) {
            const container = document.getElementById('list-items');
            if(!users || users.length === 0) {
                container.innerHTML = `<div style="padding:30px; text-align:center; color:#94a3b8;">No referrals found yet!</div>`;
                return;
            }

            let html = '';
            users.forEach(u => {
                html += `
                <div class="ref-item">
                    <div class="u-info-box">
                        <div class="u-avatar"><i class="fas fa-user"></i></div>
                        <div>
                            <span class="u-name">${u.name}</span>
                            <span class="u-date">${u.date}</span>
                        </div>
                    </div>
                    <div class="status-tag ${u.is_active ? 'active-tag' : 'inactive-tag'}">
                        ${u.is_active ? 'ACTIVE' : 'INACTIVE'}
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function copyLink() {
            const linkText = document.getElementById('my-ref-link').innerText;
            navigator.clipboard.writeText(linkText).then(() => {
                alert("Referral Link Copied!");
            });
        }

        window.onload = fetchReferralData;
    </script>
</body>
  </html>
