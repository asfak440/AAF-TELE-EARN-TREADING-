<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Referrals - AAF Master</title>
    <style>
        /* ড্যাশবোর্ডের মত একই রকম ব্যাকগ্রাউন্ড ও কালার */
        body { background: #020617; color: white; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 20px; }
        .refer-card { 
            background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); 
            padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between;
        }
        .status-active { color: #00ff88; font-weight: bold; }
        .back-btn { color: #00f2fe; text-decoration: none; font-weight: bold; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>
    <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    
    <h2>My Referral List</h2>
    <div id="referral-container">
        <p>Loading your partners...</p>
    </div>

    <script>
        async function loadReferrals() {
            const userId = localStorage.getItem('user_id');
            const response = await fetch(`/api/user/referrals/${userId}`);
            const data = await response.json();
            
            const container = document.getElementById('referral-container');
            container.innerHTML = ""; // আগের লেখা মুছে দিবে

            if (data.referrals && data.referrals.length > 0) {
                data.referrals.forEach(ref => {
                    container.innerHTML += `
                        <div class="refer-card">
                            <div>
                                <b>Name: ${ref.name}</b><br>
                                <small>ID: ${ref.telegram_id}</small>
                            </div>
                            <div class="status-active">Active</div>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = "<p>No referrals found yet.</p>";
            }
        }
        window.onload = loadReferrals;
    </script>
</body>
</html>
