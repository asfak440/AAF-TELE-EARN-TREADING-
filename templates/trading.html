<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Pro Terminal | Spot Trading</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Rajdhani:wght@600;700&display=swap');
        
        :root {
            --bg: #05080d;
            --card-bg: #0f172a;
            --border: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --cyan: #00f2fe;
            --green: #00ffa3;
            --red: #ff3366;
        }

        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: 'Hind Siliguri', sans-serif; 
            margin: 0; padding-bottom: 100px;
        }

        /* --- Sticky Header & Chart Section --- */
        .sticky-top {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
        }

        .header { padding: 15px 20px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .header h2 { font-size: 14px; margin: 0; color: var(--cyan); font-family: 'Rajdhani'; text-transform: uppercase; }
        #live-price { font-family: 'Rajdhani'; font-size: 20px; color: var(--green); font-weight: 700; }
        
        .tf-bar { background: #000; display: flex; gap: 5px; padding: 10px; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tf-btn { background: transparent; border: 1px solid transparent; color: var(--text-muted); padding: 5px 12px; font-size: 12px; border-radius: 4px; cursor: pointer; font-family: 'Rajdhani'; }
        .tf-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0, 242, 254, 0.05); }

        #chart-wrapper { width: 100%; height: 320px; background: #000; border-bottom: 1px solid var(--border); }
        #chart-container { width: 100%; height: 100%; }

        /* --- Scrollable Content --- */
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-card span { font-size: 11px; color: var(--text-muted); display: block; }
        .stat-card b { font-family: 'Rajdhani'; font-size: 18px; }

        .trade-box { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
        .input-group-row { display: flex; gap: 10px; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .input-box { flex: 1; position: relative; }
        .input-box span { position: absolute; right: 12px; top: 15px; color: var(--text-muted); font-size: 11px; font-weight: bold; }
        .input-box input { 
            width: 100%; background: #000; border: 1px solid var(--border); 
            padding: 15px 40px 15px 12px; color: var(--cyan); font-size: 18px; 
            border-radius: 10px; outline: none; font-family: 'Rajdhani'; box-sizing: border-box;
        }

        .fee-label { 
            background: rgba(0, 242, 254, 0.05); border-radius: 8px; border: 1px dashed var(--border);
            padding: 12px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px;
        }
        .fee-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); }
        .fee-row b { font-family: 'Rajdhani'; font-size: 14px; }
        .text-green { color: var(--green); }
        .text-red { color: var(--red); }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .buy { background: var(--green); color: #000; }
        .sell { background: var(--red); color: #fff; }

        .bottom-nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 65px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000; }
        .nav-item { text-align: center; color: var(--text-muted); text-decoration: none; flex: 1; }
        .nav-item i { font-size: 20px; display: block; }
        .nav-item span { font-size: 10px; }
        .nav-item.active { color: var(--cyan); }
    </style>
</head>
<body>

    <div class="sticky-top">
        <header class="header">
            <h2>AAF PRO TERMINAL</h2>
            <span id="live-price">৳ 0.0000</span>
        </header>

        <div class="tf-bar">
            <button class="tf-btn active" onclick="changeTF('1m', this)">1M</button>
            <button class="tf-btn" onclick="changeTF('5m', this)">5M</button>
            <button class="tf-btn" onclick="changeTF('1h', this)">1H</button>
            <button class="tf-btn" onclick="changeTF('4h', this)">4H</button>
            <button class="tf-btn" onclick="changeTF('1d', this)">1D</button>
        </div>

        <div id="chart-wrapper"><div id="chart-container"></div></div>
    </div>

    <div class="container">
        <div class="stat-grid">
            <div class="stat-card"><span>আপনার AAF</span><b id="user-aaf">0.00</b></div>
            <div class="stat-card"><span>ক্যাশ ব্যালেন্স</span><b id="user-cash">৳ 0.00</b></div>
        </div>

        <div class="trade-box">
            <div class="input-group-row">
                <div class="input-box">
                    <input type="number" id="taka-input" placeholder="0.00">
                    <span>BDT</span>
                </div>
                <i class="fas fa-exchange-alt" style="color:var(--text-muted)"></i>
                <div class="input-box">
                    <input type="number" id="coin-input" placeholder="0.00">
                    <span>AAF</span>
                </div>
            </div>
            
            <div class="fee-label">
                <div class="fee-row">
                    <span><i class="fas fa-arrow-down text-green"></i> BUY করলে পাবেন:</span>
                    <b class="text-green" id="buy-receive">0.0000 AAF</b>
                </div>
                <div class="fee-row">
                    <span><i class="fas fa-arrow-up text-red"></i> SELL করলে পাবেন:</span>
                    <b class="text-red" id="sell-receive">৳ 0.00</b>
                </div>
                <div id="fee-text" style="text-align:center; font-size:10px; color:#64748b; margin-top:5px;">
                    *০.১% ট্রেডিং ফি বাদ দিয়ে হিসাব করা হয়েছে
                </div>
            </div>

            <div class="btn-group">
                <button class="btn buy" onclick="processTrade('BUY')">BUY SPOT</button>
                <button class="btn sell" onclick="processTrade('SELL')">SELL SPOT</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="#" class="nav-item"><i class="fas fa-list-check"></i><span>Task</span></a>
        <a href="#" class="nav-item active"><i class="fas fa-chart-line"></i><span>Trading</span></a>
        <a href="#" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="#" class="nav-item"><i class="fas fa-user-circle"></i><span>Account</span></a>
    </nav>

    <script>
        const firebaseConfig = { databaseURL: "https://teleearnbd-781d6-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let chart, candleSeries, lastPrice = 0, currentFee = 0.1;
        const takaInput = document.getElementById('taka-input');
        const coinInput = document.getElementById('coin-input');

        function initChart() {
            chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
                layout: { backgroundColor: '#000000', textColor: '#94a3b8' },
                grid: { vertLines: { color: '#121926' }, horzLines: { color: '#121926' } },
                timeScale: { timeVisible: true },
                watermark: { visible: false } // লোগো রিমুভ
            });
            candleSeries = chart.addCandlestickSeries({ upColor: '#00ffa3', downColor: '#ff3366' });

            db.ref('trading/aaf_coin').on('value', (snap) => {
                const data = snap.val();
                if(data) {
                    lastPrice = parseFloat(data.price);
                    document.getElementById('live-price').innerText = `৳ ${lastPrice.toFixed(4)}`;
                    candleSeries.update({
                        time: Math.floor(Date.now() / 1000 / 60) * 60,
                        open: lastPrice, high: lastPrice + 0.02, low: lastPrice - 0.02, close: lastPrice
                    });
                    calculateTrade();
                }
            });
            loadDummyData();
        }

        async function updateUserData() {
            try {
                const response = await fetch('/get_user_stats');
                const data = await response.json();
                document.getElementById('user-aaf').innerText = data.aaf_balance.toFixed(2);
                document.getElementById('user-cash').innerText = `৳ ${data.cash_balance.toFixed(2)}`;
                
                if(data.fee_percent !== undefined) {
                    currentFee = parseFloat(data.fee_percent);
                    document.getElementById('fee-text').innerText = `*${currentFee}% ট্রেডিং ফি বাদ দিয়ে হিসাব করা হয়েছে`;
                }
            } catch (e) { console.log("Sync error"); }
        }

        function calculateTrade(source) {
            if(lastPrice <= 0) return;
            let tkVal = parseFloat(takaInput.value) || 0;
            let cnVal = parseFloat(coinInput.value) || 0;

            if (source === 'taka') {
                cnVal = tkVal / lastPrice;
                coinInput.value = cnVal > 0 ? cnVal.toFixed(4) : '';
            } else if (source === 'coin') {
                tkVal = cnVal * lastPrice;
                takaInput.value = tkVal > 0 ? tkVal.toFixed(2) : '';
            }

            let feeRate = currentFee / 100;
            document.getElementById('buy-receive').innerText = `${(cnVal - (cnVal * feeRate)).toFixed(4)} AAF`;
            document.getElementById('sell-receive').innerText = `৳ ${(tkVal - (tkVal * feeRate)).toFixed(2)}`;
        }

        takaInput.addEventListener('input', () => calculateTrade('taka'));
        coinInput.addEventListener('input', () => calculateTrade('coin'));

        function changeTF(tf, btn) {
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function loadDummyData() {
            let data = [];
            let time = Math.floor(Date.now() / 1000) - 100 * 60;
            for(let i=0; i<100; i++) { data.push({ time: time + i*60, open: 120, high: 124, low: 118, close: 122 }); }
            candleSeries.setData(data);
        }

        window.onload = () => { initChart(); updateUserData(); };
    </script>
</body>
    </html>
