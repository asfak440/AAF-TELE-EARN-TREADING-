<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Trading | Pro Terminal</title>
    
    <!-- External Tools -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Hind+Siliguri:wght@400;600&display=swap');
        
        :root {
            --bg: #05080d; 
            --card: #0f172a; 
            --border: rgba(255, 255, 255, 0.05);
            --cyan: #00f2fe; 
            --green: #00ffa3; 
            --red: #ff3366; 
            --text: #94a3b8;
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Hind Siliguri', sans-serif; 
            margin: 0; 
            padding-bottom: 100px;
            overflow-x: hidden;
        }



    /* হেডার, অ্যাড এবং চার্ট স্থির করার ম্যাজিক কোড */
        .header { 
    position: fixed; top: 0; left: 0; width: 95%; height: 30px;
    z-index: 3000; background: #0f172a; display: flex; 
    justify-content: space-between; align-items: center; padding: 0 10px;
}
#admin-ad-box {
    position: fixed; top: 30px; left: 0; width: 100%; height: 20px;
    background: #1e293b; z-index: 2999; display: flex; align-items: center;
}
.tf-bar { 
    position: fixed; top: 50px; left: 0; width: 100%; height: 15px;
    z-index: 2998; background: #000; display: flex; gap: 4px; padding: 5px;
}
.tf-btn { 
    background: #1e293b; border: 1px solid rgba(255,255,255,0.1); 
    color: #94a3b8; padding: 4px 5px; border-radius: 2px; 
    font-size: 10px; cursor: pointer; white-space: nowrap;
}
.tf-btn.active { border-color: #00f2fe; color: #00f2fe; background: rgba(0, 242, 254, 0.1); }
#chart-container { 
    position: fixed; top: 75px; left: 0; width: 100%; height: 250px; 
    z-index: 2997; background: #000;
}
.container { 
    padding-top: 320px; padding-bottom: 100px; max-width: 330px; margin: auto;
}

        /* কম্প্যাক্ট ডিজাইন – ড্যাশবোর্ড স্টাইলে */
.header h2 { font-size: 10px !important; }
#live-price { font-size: 10px !important; }
#admin-ad-box marquee { font-size: 9px !important; }
.tf-btn { padding: 2px 4px !important; font-size: 8px !important; }
.stat-card { padding: 8px !important; }
.stat-card span { font-size: 9px !important; }
.stat-card b { font-size: 14px !important; }
.input-box input { padding: 8px !important; font-size: 14px !important; }
.input-box span { font-size: 8px !important; top: 12px !important; }
.fee-card { padding: 8px !important; }
.fee-row { font-size: 10px !important; }
.btn { padding: 8px !important; font-size: 10px !important; }
.bottom-nav { height: 55px !important; }
.nav-item i { font-size: 16px !important; }
.nav-item span { font-size: 8px !important; }
        
        
        /* Stats */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-card span { font-size: 11px; color: var(--text); display: block; }
        .stat-card b { font-family: 'Rajdhani'; font-size: 18px; }

        /* Trade Box & Lock Overlay */
        .trade-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        
        #lock-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98); z-index: 500;
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        #lock-overlay i { font-size: 40px; color: var(--red); margin-bottom: 15px; }
        .join-btn { background: var(--cyan); color: #000; padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 15px; }

        /* Inputs */
        .input-group { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; }
        .input-box { flex: 1; position: relative; }
        .input-box input { 
            width: 100%; background: #000; border: 1px solid var(--border); 
            padding: 15px; color: var(--cyan); font-size: 18px; 
            border-radius: 10px; box-sizing: border-box; font-family: 'Rajdhani'; outline: none; 
        }
        .input-box span { position: absolute; right: 12px; top: 18px; color: var(--text); font-size: 11px; }

        /* Fees & Warning */
        .fee-card { background: rgba(255, 255, 255, 0.02); padding: 15px; border-radius: 12px; border: 1px dashed var(--border); margin-bottom: 15px; }
        .fee-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
        .warning { color: var(--red); font-size: 11px; text-align: center; display: none; margin-top: 5px; font-weight: bold; }

        /* Buttons */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 16px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 14px; transition: 0.3s; text-transform: uppercase; }
        .buy { background: var(--green); color: #000; }
        .sell { background: var(--red); color: #fff; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 15px; left: 5%; width: 90%; height: 70px;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px);
            border-radius: 35px; border: 1px solid rgba(0, 242, 254, 0.2);
            display: flex; justify-content: space-around; align-items: center; z-index: 2000;
        }
        .nav-item { text-decoration: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--cyan); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item span { font-size: 10px; font-weight: 700; }
    </style>
</head>
<body>

    <header class="header">
        <h2>AAF TRADING</h2>
        <span id="live-price">৳ 0.0000</span>
    </header>
    
    <div id="admin-ad-box">
    <marquee id="admin-ad-text" behavior="scroll" direction="left" style="color: #00f2fe; font-size: 12px; width: 100%;">
        অ্যাডমিন প্যানেল থেকে ঘোষণা এখানে লোড হবে...
    </marquee>
    </div>

    <div class="tf-bar" id="timeframe-bar">
        <button class="tf-btn active">1M</button>
        <button class="tf-btn">5M</button>
        <button class="tf-btn">15M</button>
        <button class="tf-btn">1H</button>
        <button class="tf-btn">4H</button>
        <button class="tf-btn">1D</button>
    </div>

    <div id="chart-container"></div>

    <div class="container">
        <div class="stat-grid">
            <div class="stat-card"><span>আপনার AAF</span><b id="user-aaf">0.00</b></div>
            <div class="stat-card"><span>টাকা ব্যালেন্স</span><b id="user-cash">৳ 0.00</b></div>
        </div>

        <div class="trade-box">
            <div id="lock-overlay">
                <i class="fas fa-lock"></i>
                <p>ট্রেড করতে অফিসিয়াল চ্যানেলে জয়েন করুন</p>
                <a href="https://t.me/your_channel" class="join-btn">Join Telegram</a>
            </div>

            <div class="input-group">
                <div class="input-box"><input type="number" id="taka-input" placeholder="0.00"><span>BDT</span></div>
            <i class="fas fa-exchange-alt" style="color:var(--text)"></i>
                <div class="input-box"><input type="number" id="coin-input" placeholder="0.00"><span>AAF</span></div>
            </div>
            
            <div class="fee-card">
                <div class="fee-row"><span>ফি (<span id="fee-perc">0.5</span>%):</span><b id="fee-amount">৳ 0.00</b></div>
                <div class="fee-row"><span>মোট খরচ:</span><b id="total-cost" style="color:var(--cyan)">৳ 0.00</b></div>
                <div id="balance-warning" class="warning">⚠️ পর্যাপ্ত ব্যালেন্স নেই (সর্বনিম্ন ১০ টাকা)</div>
            </div>

            <div class="btn-group">
                <button id="buy-btn" class="btn buy" onclick="executeTrade('BUY')">BUY SPOT</button>
                <button id="sell-btn" class="btn sell" onclick="executeTrade('SELL')">SELL SPOT</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="/task" class="nav-item"><i class="fas fa-tasks"></i><span>Task</span></a>
        <a href="/trading" class="nav-item active"><i class="fas fa-chart-line"></i><span>Trading</span></a>
        <a href="/wallet" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="/account" class="nav-item"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/vconsole"></script>
    <script>
      var vConsole = new VConsole();
    </script>

    <script>
    const API = window.location.origin;
    let chart, candleSeries, lastPrice = 1.0;
    let userCash = 100.00, userAAF = 50.00, currentFee = 0.5, minTradeAmount = 10;
    let tradingEnabled = true;
    let fallbackInterval = null;
    let mockPrice = 1.0;
    let historicalLoaded = false;
    let candleDataSet = false;      // চার্টে কোনো ডাটা সেট হয়েছে কিনা

    // Firebase রিয়েলটাইম লিসেনার (অ্যাডমিন কনফিগ)
    if (typeof firebase !== 'undefined' && firebase.database) {
        try {
            const db = firebase.database();
            const adminConfigRef = db.ref('admin/config');
            adminConfigRef.on('value', (snap) => {
                const cfg = snap.val();
                if (cfg) {
                    if (cfg.trading_enabled !== undefined) tradingEnabled = cfg.trading_enabled;
                    if (cfg.trading_fee !== undefined) currentFee = cfg.trading_fee;
                    if (cfg.min_trade_amount !== undefined) minTradeAmount = cfg.min_trade_amount;
                    if (cfg.message) document.getElementById('admin-ad-text').innerText = cfg.message;
                    document.getElementById('fee-perc').innerText = currentFee;
                    const lockDiv = document.getElementById('lock-overlay');
                    if (lockDiv) lockDiv.style.display = tradingEnabled ? 'none' : 'flex';
                    calculateLogic();
                }
            });
        } catch(e) { console.warn("Firebase লিসেনার সেটআপ ব্যর্থ", e); }
    }

    function getTG() {
        const id = localStorage.getItem("telegram_id");
        if (!id) { alert("Login required"); location.href = "/login"; }
        return id;
    }

    function initChart() {
        const container = document.getElementById('chart-container');
        if (!container) return;
        container.style.height = '240px';
        container.style.width = '100%';
        container.style.display = 'block';
        chart = LightweightCharts.createChart(container, {
            layout: { backgroundColor: '#000', textColor: '#ccc', fontSize: 10 },
            timeScale: { timeVisible: true, rightOffset: 12, barSpacing: 8 },
            width: container.clientWidth,
            height: 240
        });
        candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88', downColor: '#ff3366', borderVisible: false
        });
        chart.timeScale().fitContent();
        window.addEventListener('resize', () => {
            if (chart) {
                chart.applyOptions({ width: container.clientWidth });
                setTimeout(() => chart.timeScale().fitContent(), 100);
            }
        });
    }

    // ইতিহাস লোড ফাংশন (পুনরায় কলযোগ্য)
    async function loadHistoricalCandles() {
        try {
            const res = await fetch(`${API}/api/candles?timeframe=minutes`);
            const data = await res.json();
            if (data.candles && data.candles.length) {
                const sorted = data.candles.sort((a,b) => a.time - b.time);
                candleSeries.setData(sorted);
                console.log(`${sorted.length} টি ঐতিহাসিক ক্যান্ডেল লোড হয়েছে`);
                historicalLoaded = true;
                candleDataSet = true;
                chart.timeScale().fitContent();
            } else {
                console.log("কোন ঐতিহাসিক ডাটা নেই, লাইভ ক্যান্ডেল অপেক্ষা করছে");
                historicalLoaded = false;
                candleDataSet = false;
            }
        } catch(e) {
            console.warn("হিস্টরি লোড ব্যর্থ:", e);
            historicalLoaded = false;
            candleDataSet = false;
        }
    }

    async function syncUserData() {
        try {
            const res = await fetch(`${API}/api/user/me`, { credentials: "include" });
            const data = await res.json();
            if (data.status === "success") {
                userCash = data.user.cash || 0;
                userAAF = data.user.aaf || 0;
                if (data.admin) {
                    currentFee = data.admin.trading_fee ?? currentFee;
                    minTradeAmount = data.admin.min_trade_amount ?? minTradeAmount;
                    tradingEnabled = data.admin.trading_enabled ?? tradingEnabled;
                    if (data.admin.message) document.getElementById('admin-ad-text').innerText = data.admin.message;
                }
            } else throw new Error("API error");
        } catch(e) {
            console.warn("ব্যাকএন্ড ব্যালেন্স পাইনি, মক ডাটা রেখেছি", e);
        }
        document.getElementById('user-cash').innerText = `৳ ${userCash.toFixed(2)}`;
        document.getElementById('user-aaf').innerText = userAAF.toFixed(2);
        document.getElementById('fee-perc').innerText = currentFee;
        const lockDiv = document.getElementById('lock-overlay');
        if (lockDiv) lockDiv.style.display = tradingEnabled ? 'none' : 'flex';
        calculateLogic();
    }

    // মূল মার্কেট ডাটা ফেচ – এবার হ্যান্ডলিং উন্নত
    async function fetchMarketData() {
        try {
            const priceRes = await fetch(`${API}/api/market/price`, { signal: AbortSignal.timeout(3000) });
            const priceData = await priceRes.json();
            if (priceData && typeof priceData.price === 'number' && priceData.price > 0) {
                lastPrice = priceData.price;
                document.getElementById('live-price').innerText = `৳ ${lastPrice.toFixed(4)}`;
                // API সফল হলে ফলব্যাক বন্ধ
                if (fallbackInterval) {
                    clearInterval(fallbackInterval);
                    fallbackInterval = null;
                }
            } else throw new Error("No price");

            const candleRes = await fetch(`${API}/api/market/live-candle`);
            const candle = await candleRes.json();
            if (candle && candle.time && !isNaN(candle.open) && !isNaN(candle.high) && !isNaN(candle.low) && !isNaN(candle.close)) {
                const newCandle = {
                    time: Number(candle.time),
                    open: parseFloat(candle.open),
                    high: parseFloat(candle.high),
                    low: parseFloat(candle.low),
                    close: parseFloat(candle.close)
                };
                // যদি ইতিহাস না লোড হয়, তাহলে আগে ইতিহাস আনার চেষ্টা কর
                if (!historicalLoaded) {
                    await loadHistoricalCandles();
                    // ইতিহাস লোড হওয়ার পর এই কল পুনরায় run করবে? আমরা এই ফাংশনকে recurse করব না।
                    // বরং নিচে চার্ট আপডেট করার চেষ্টা চলবে।
                }
                // এখন চার্টে ডাটা আছে কিনা দেখি
                if (!candleDataSet && candleSeries) {
                    // প্রথম ক্যান্ডেল বসান
                    candleSeries.setData([newCandle]);
                    candleDataSet = true;
                    console.log("প্রথম লাইভ ক্যান্ডেল সেট করা হয়েছে");
                } else if (candleSeries) {
                    candleSeries.update(newCandle);
                }
                // fitContent শুধুমাত্র প্রথমবার বা ইতিহাস লোডের সময় করেছি, এখানে করব না (যাতে জুম নষ্ট না হয়)
            } else throw new Error("Invalid candle");
        } catch(e) {
            console.warn("মার্কেট ডাটা পাইনি, ফলব্যাক চালু", e);
            if (!fallbackInterval) startFallback();
        }
        calculateLogic();
    }

    function startFallback() {
        if (fallbackInterval) clearInterval(fallbackInterval);
        mockPrice = lastPrice || 1.0;
        let lastCandleTime = Math.floor(Date.now() / 1000);
        // যদি চার্টে কোনো ডাটা না থাকে, একটি ডামি ক্যান্ডেল সেট কর
        if (!candleDataSet && candleSeries) {
            const now = Math.floor(Date.now() / 1000);
            candleSeries.setData([{
                time: now,
                open: mockPrice,
                high: mockPrice,
                low: mockPrice,
                close: mockPrice
            }]);
            candleDataSet = true;
            historicalLoaded = false; // ফলব্যাক মোডে ইতিহাস লোড নেই
            chart.timeScale().fitContent();
        }
        fallbackInterval = setInterval(() => {
            mockPrice += (Math.random() - 0.5) * 0.02;
            mockPrice = Math.min(2.5, Math.max(0.5, mockPrice));
            document.getElementById('live-price').innerText = `৳ ${mockPrice.toFixed(4)}`;
            lastPrice = mockPrice;
            const now = Math.floor(Date.now() / 1000);
            if (now - lastCandleTime >= 15) {
                const newCandle = {
                    time: now,
                    open: mockPrice,
                    high: mockPrice * (1 + Math.random() * 0.02),
                    low: mockPrice * (1 - Math.random() * 0.02),
                    close: mockPrice
                };
                if (candleSeries) candleSeries.update(newCandle);
                lastCandleTime = now;
                // ফলব্যাকে fitContent করলে ব্যবহারকারীর জুম নষ্ট হবে, তাই করব না
            }
        }, 2000);
    }

    const tkIn = document.getElementById('taka-input');
    const coIn = document.getElementById('coin-input');
    const buyBtn = document.getElementById('buy-btn');
    const sellBtn = document.getElementById('sell-btn');

    function calculateLogic() {
        let tk = parseFloat(tkIn.value) || 0;
        let fee = tk * currentFee / 100;
        let total = tk + fee;
        document.getElementById('fee-amount').innerText = `৳ ${fee.toFixed(2)}`;
        document.getElementById('total-cost').innerText = `৳ ${total.toFixed(2)}`;
        buyBtn.disabled = !(tradingEnabled && tk >= minTradeAmount && total <= userCash);
        sellBtn.disabled = !(tradingEnabled && parseFloat(coIn.value) <= userAAF);
    }

    tkIn.oninput = () => {
        if (lastPrice) coIn.value = (tkIn.value / lastPrice).toFixed(4);
        calculateLogic();
    };
    coIn.oninput = () => {
        if (lastPrice) tkIn.value = (coIn.value * lastPrice).toFixed(2);
        calculateLogic();
    };

    async function executeTrade(type) {
        const side = type.toLowerCase();
        if (!tradingEnabled) return alert("ট্রেডিং বন্ধ আছে, পরে চেষ্টা করুন।");
        if (side === 'buy' && buyBtn.disabled) return alert(`পর্যাপ্ত টাকা নেই (সর্বনিম্ন ${minTradeAmount} টাকা)`);
        if (side === 'sell' && sellBtn.disabled) return alert("পর্যাপ্ত AAF নেই");
        try {
            const res = await fetch(`${API}/api/trade/execute`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    telegram_id: localStorage.getItem('telegram_id'),
                    type: side,
                    taka: parseFloat(tkIn.value) || 0,
                    coin: parseFloat(coIn.value) || 0,
                    price: lastPrice
                })
            });
            const data = await res.json();
            alert(data.message);
            await syncUserData();
            tkIn.value = '';
            coIn.value = '';
            calculateLogic();
        } catch(e) { alert("ট্রেড ব্যর্থ: " + e.message); }
    }

    buyBtn.onclick = () => executeTrade('BUY');
    sellBtn.onclick = () => executeTrade('SELL');

    window.addEventListener('load', async () => {
        initChart();
        await loadHistoricalCandles();   // ইতিহাস লোড চেষ্টা
        await syncUserData();
        await fetchMarketData();          // লাইভ ডাটা নিবে
        setInterval(fetchMarketData, 10000);
        setInterval(syncUserData, 15000);
    });
 </script>
 </body>
     </html>
