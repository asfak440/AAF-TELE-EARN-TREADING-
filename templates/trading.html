<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Pro Terminal | Spot Trading</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Rajdhani:wght@600;700&display=swap');
        
        :root {
            --bg: #05080d;
            --card-bg: #0f172a;
            --border: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --cyan: #00f2fe;
            --green: #00ffa3;
            --red: #ff3366;
        }

        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: 'Hind Siliguri', sans-serif; 
            margin: 0; padding-bottom: 110px;
            overflow-x: hidden;
        }

        /* Sticky Header */
        .sticky-top { position: sticky; top: 0; z-index: 100; background: var(--bg); }
        .header { padding: 15px 20px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .header h2 { font-size: 14px; margin: 0; color: var(--cyan); font-family: 'Rajdhani'; text-transform: uppercase; }
        #live-price { font-family: 'Rajdhani'; font-size: 20px; color: var(--green); font-weight: 700; }
        
        .tf-bar { background: #000; display: flex; gap: 5px; padding: 10px; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tf-btn { background: transparent; border: 1px solid transparent; color: var(--text-muted); padding: 5px 12px; font-size: 12px; border-radius: 4px; cursor: pointer; font-family: 'Rajdhani'; }
        .tf-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0, 242, 254, 0.05); }

        /* Chart */
        #chart-wrapper { width: 100%; height: 300px; background: #000; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
        #chart-container { width: 100%; height: 340px; margin-top: -10px; }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-card span { font-size: 11px; color: var(--text-muted); display: block; }
        .stat-card b { font-family: 'Rajdhani'; font-size: 18px; }

        .trade-box { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
        .input-group-row { display: flex; gap: 10px; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .input-box { flex: 1; position: relative; }
        .input-box span { position: absolute; right: 12px; top: 15px; color: var(--text-muted); font-size: 11px; font-weight: bold; }
        .input-box input { width: 100%; background: #000; border: 1px solid var(--border); padding: 15px 40px 15px 12px; color: var(--cyan); font-size: 18px; border-radius: 10px; outline: none; font-family: 'Rajdhani'; box-sizing: border-box; }

        /* Updated Fee Label & Calculation Card */
        .fee-label { background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid var(--border); padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .fee-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); }
        .fee-row b { font-family: 'Rajdhani'; font-size: 14px; }
        
        .fee-calc-card { 
            background: rgba(255, 51, 102, 0.08); 
            border: 1px dashed rgba(255, 51, 102, 0.3);
            padding: 10px;
            border-radius: 10px;
            margin-top: 5px;
        }
        .fee-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .fee-item:last-child { margin-bottom: 0; }
        .fee-item span { font-size: 11px; color: var(--text-muted); }
        .fee-item b { font-family: 'Rajdhani'; font-size: 13px; color: var(--red); }
        .fee-badge { background: var(--red); color: white; padding: 2px 6px; border-radius: 4px; font-size: 9px; margin-left: 5px; vertical-align: middle; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .buy { background: var(--green); color: #000; }
        .sell { background: var(--red); color: #fff; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 500px; height: 75px; background: #0f172a; border-radius: 40px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-item { text-align: center; color: #94a3b8; text-decoration: none; flex: 1; transition: 0.3s; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item span { font-size: 11px; font-weight: 500; }
        .nav-item.active { color: var(--cyan); }
    </style>
</head>
<body>

    <div class="sticky-top">
        <header class="header">
            <h2>AAF PRO TERMINAL</h2>
            <span id="live-price">৳ 0.0000</span>
        </header>
        <div class="tf-bar">
            <button class="tf-btn active" onclick="changeTF('1m', this)">1M</button>
            <button class="tf-btn" onclick="changeTF('5m', this)">5M</button>
            <button class="tf-btn" onclick="changeTF('1h', this)">1H</button>
            <button class="tf-btn" onclick="changeTF('4h', this)">4H</button>
            <button class="tf-btn" onclick="changeTF('1d', this)">1D</button>
        </div>
        <div id="chart-wrapper"><div id="chart-container"></div></div>
    </div>

    <div class="container">
        <div class="stat-grid">
            <div class="stat-card"><span>আপনার AAF</span><b id="user-aaf">0.00</b></div>
            <div class="stat-card"><span>টাকা ব্যালেন্স</span><b id="user-cash">৳ 0.00</b></div>
        </div>

        <div class="trade-box">
            <div class="input-group-row">
                <div class="input-box"><input type="number" id="taka-input" placeholder="0.00"><span>BDT</span></div>
                <i class="fas fa-exchange-alt" style="color:var(--text-muted)"></i>
                <div class="input-box"><input type="number" id="coin-input" placeholder="0.00"><span>AAF</span></div>
            </div>
            
            <div class="fee-label">
                <div class="fee-row"><span>BUY করলে পাবেন:</span><b style="color:var(--green)" id="buy-receive">0.0000 AAF</b></div>
                <div class="fee-row"><span>SELL করলে পাবেন:</span><b style="color:var(--red)" id="sell-receive">৳ 0.00</b></div>
                
                <div class="fee-calc-card">
                    <div class="fee-item">
                        <span><i class="fas fa-percentage"></i> বর্তমান ট্রেডিং ফি:</span>
                        <b id="fee-percent-display">0.1%</b>
                    </div>
                    <div class="fee-item">
                        <span><i class="fas fa-coins"></i> মোট ফি (AAF):</span>
                        <b id="fee-aaf-show">0.0000 AAF</b>
                    </div>
                    <div class="fee-item">
                        <span><i class="fas fa-wallet"></i> মোট ফি (টাকা):</span>
                        <b id="fee-taka-show">৳ 0.00</b>
                    </div>
                </div>

                <div id="fee-text" style="text-align:center; font-size:10px; color:#64748b; margin-top:2px;">
                    *বোনাস ও ফি রিয়েল-টাইমে হিসাব করা হচ্ছে
                </div>
            </div>

            <div class="btn-group">
                <button class="btn buy" onclick="processTrade('BUY')">BUY SPOT</button>
                <button class="btn sell" onclick="processTrade('SELL')">SELL SPOT</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="tasks.html" class="nav-item"><i class="fas fa-tasks"></i><span>Task</span></a>
        <a href="trading.html" class="nav-item active"><i class="fas fa-chart-line"></i><span>Trading</span></a>
        <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="account.html" class="nav-item"><i class="fas fa-user-circle"></i><span>Account</span></a>
    </nav>

    <script>

        function processTrade(type) {
    if(!takaInput.value || takaInput.value <= 0) return alert("পরিমাণ লিখুন!");

    // ব্যাকএন্ডে ট্রেড ডাটা পাঠানো
    fetch('/api/execute_trade', {
        method: 'POST',
        body: JSON.stringify({ type: type, amount: takaInput.value })
    }).then(() => {
        alert(`${type} রিকোয়েস্ট সফল!`);
        updateUserData(); // ব্যালেন্স ও ট্রেড সংখ্যা আপডেট হবে
    });
        }
        
        const firebaseConfig = { databaseURL: "https://teleearnbd-781d6-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let chart, candleSeries, lastPrice = 0, currentFee = 0.1;
        const takaInput = document.getElementById('taka-input');
        const coinInput = document.getElementById('coin-input');

        function initChart() {
            chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
                layout: { backgroundColor: '#000000', textColor: '#94a3b8' },
                grid: { vertLines: { visible: false }, horzLines: { color: '#121926' } },
                timeScale: { borderVisible: false, timeVisible: true },
                priceScale: { borderVisible: false },
            });
            candleSeries = chart.addCandlestickSeries({ upColor: '#00ffa3', downColor: '#ff3366', borderVisible: false, wickUpColor: '#00ffa3', wickDownColor: '#ff3366' });

            db.ref('trading/history').limitToLast(100).once('value', (snap) => {
                const history = [];
                snap.forEach(c => history.push(c.val()));
                if(history.length > 0) candleSeries.setData(history);
            });

            setInterval(async () => {
                try {
                    const res = await fetch('/api/get_live_candle'); 
                    const data = await res.json(); 
                    if(data && data.close) {
                        lastPrice = parseFloat(data.close);
                        document.getElementById('live-price').innerText = `৳ ${lastPrice.toFixed(4)}`;
                        candleSeries.update(data);
                        calculateConversion('taka');
                    }
                } catch (e) {}
            }, 2000);
        }

        async function updateUserData() {
            try {
                const res = await fetch('/api/user/profile');
                const data = await res.json();
                if(data) {
                    document.getElementById('user-aaf').innerText = parseFloat(data.aaf_balance).toFixed(2);
                    document.getElementById('user-cash').innerText = `৳ ${parseFloat(data.cash_balance).toFixed(2)}`;
                    currentFee = parseFloat(data.fee) || 0.1;
                    document.getElementById('fee-percent-display').innerText = currentFee + "%";
                }
            } catch (e) {}
        }

        function calculateConversion(source) {
            if(lastPrice <= 0) return;
            let tk = parseFloat(takaInput.value) || 0;
            let cn = parseFloat(coinInput.value) || 0;

            if (source === 'taka') {
                cn = tk / lastPrice;
                coinInput.value = tk > 0 ? cn.toFixed(4) : '';
            } else {
                tk = cn * lastPrice;
                takaInput.value = cn > 0 ? tk.toFixed(2) : '';
            }

            // Calculations
            let feeFactor = (100 - currentFee) / 100;
            let feeTaka = tk * (currentFee / 100);
            let feeAaf = cn * (currentFee / 100);

            // Display Updates
            document.getElementById('buy-receive').innerText = `${(cn * feeFactor).toFixed(4)} AAF`;
            document.getElementById('sell-receive').innerText = `৳ ${(tk * feeFactor).toFixed(2)}`;
            
            // Fee Detail Card Updates
            document.getElementById('fee-taka-show').innerText = `৳ ${feeTaka.toFixed(2)}`;
            document.getElementById('fee-aaf-show').innerText = `${feeAaf.toFixed(4)} AAF`;
        }

        takaInput.addEventListener('input', () => calculateConversion('taka'));
        coinInput.addEventListener('input', () => calculateConversion('coin'));

        function processTrade(type) {
            if(!takaInput.value || takaInput.value <= 0) return alert("পরিমাণ লিখুন!");
            alert(`${type} রিকোয়েস্ট পাঠানো হয়েছে!`);
        }

        function changeTF(tf, btn) {
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        window.onload = () => { initChart(); updateUserData(); };
    </script>
</body>
</html>
