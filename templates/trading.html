<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Trading | Pro Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #05080d;
            color: #fff;
            font-family: 'Segoe UI', 'Rajdhani', sans-serif;
            padding-bottom: 80px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #0f172a;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h2 { font-size: 14px; color: #00f2fe; }
        #live-price { font-size: 18px; color: #00ffa3; font-weight: bold; }
        .tf-bar {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            background: #000;
            overflow-x: auto;
            border-bottom: 1px solid #1e293b;
        }
        .tf-btn {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        .tf-btn.active {
            border-color: #00f2fe;
            color: #00f2fe;
            background: rgba(0,242,254,0.1);
        }
        #chart-container {
            width: 100%;
            height: 280px;
            background: #000;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #0f172a;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        .stat-card span { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 6px; }
        .stat-card b { font-size: 18px; color: #fff; }
        .trade-box {
            background: #0f172a;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(0,242,254,0.2);
        }
        .input-group {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
        }
        .input-box {
            flex: 1;
            position: relative;
        }
        .input-box input {
            width: 100%;
            background: #000;
            border: 1px solid #1e293b;
            padding: 14px 12px;
            border-radius: 12px;
            color: #00f2fe;
            font-size: 16px;
            font-weight: bold;
            outline: none;
        }
        .input-box span {
            position: absolute;
            right: 12px;
            top: 15px;
            color: #64748b;
            font-size: 12px;
        }
        .fee-card {
            background: rgba(0,0,0,0.4);
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 20px;
            border: 1px dashed #334155;
        }
        .fee-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .btn {
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn.buy { background: #00ffa3; color: #000; }
        .btn.sell { background: #ff3366; color: #fff; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #0f172a;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #1e293b;
            z-index: 1000;
        }
        .nav-item {
            color: #94a3b8;
            text-decoration: none;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .nav-item i { font-size: 18px; }
        .nav-item.active { color: #00f2fe; }
        #active-user-bar {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: #0f172a;
            border: 1px solid #00f2fe;
            padding: 10px 16px;
            border-radius: 40px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 9999;
            backdrop-filter: blur(10px);
            font-size: 13px;
        }
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #00f2fe;
            border-radius: 50%;
            animation: spin 0.5s linear infinite;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="active-user-bar">
        <i class="fas fa-bolt" style="color:#00f2fe"></i>
        <span id="popup-text"></span>
    </div>

    <div class="header">
        <h2>AAF TRADING</h2>
        <span id="live-price">৳ 0.0000</span>
    </div>

    <div class="tf-bar">
        <button class="tf-btn" data-tf="1">1M</button>
        <button class="tf-btn" data-tf="5">5M</button>
        <button class="tf-btn" data-tf="15">15M</button>
        <button class="tf-btn" data-tf="60">1H</button>
        <button class="tf-btn" data-tf="240">4H</button>
        <button class="tf-btn" data-tf="1440">1D</button>
    </div>

    <div id="chart-container"></div>

    <div class="container">
        <div class="stat-grid">
            <div class="stat-card"><span>আপনার AAF</span><b id="user-aaf">0.00</b></div>
            <div class="stat-card"><span>টাকা ব্যালেন্স</span><b id="user-cash">৳ 0.00</b></div>
        </div>
        <div class="trade-box">
            <div class="input-group">
                <div class="input-box">
                    <input type="number" id="taka-input" placeholder="0.00" step="any">
                    <span>BDT</span>
                </div>
                <i class="fas fa-exchange-alt" style="color:#64748b"></i>
                <div class="input-box">
                    <input type="number" id="coin-input" placeholder="0.00" step="any">
                    <span>AAF</span>
                </div>
            </div>
            <div class="fee-card">
                <div class="fee-row"><span>ফি (<span id="fee-perc">0.5</span>%) :</span><b id="fee-amount">৳ 0.00</b></div>
                <div class="fee-row"><span>মোট খরচ/প্রাপ্তি :</span><b id="total-cost" style="color:#00f2fe">৳ 0.00</b></div>
            </div>
            <div class="btn-group">
                <button id="buy-btn" class="btn buy">BUY SPOT</button>
                <button id="sell-btn" class="btn sell">SELL SPOT</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="/task" class="nav-item"><i class="fas fa-tasks"></i><span>Task</span></a>
        <a href="/trading" class="nav-item active"><i class="fas fa-chart-line"></i><span>Trading</span></a>
        <a href="/wallet" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="/account" class="nav-item"><i class="fas fa-user"></i><span>Account</span></a>
    </div>

    <script>
        // ========== সেশন চেক (ড্যাশবোর্ডের মতো) ==========
        const TG_KEY = "telegram_id";
        if (!localStorage.getItem(TG_KEY)) {
            window.location.href = "/login";
        }

        // ========== গ্লোবাল ভেরিয়েবল ==========
        let chart, candleSeries;
        let currentCandles = [];
        let lastPrice = 1.0;
        let userCash = 0, userAAF = 0, currentFee = 0.5;
        let isProcessing = false;
        let currentTimeframe = 1;
        let candlesCache = {};

        // ========== হেল্পার ফাংশন ==========
        function showPopup(msg) {
            const bar = document.getElementById('active-user-bar');
            const text = document.getElementById('popup-text');
            if (!bar) return;
            text.innerText = msg;
            bar.style.display = "flex";
            setTimeout(() => bar.style.display = "none", 3500);
        }

        // ========== ইউজার ডাটা সিঙ্ক (সেশন এক্সপায়ার হ্যান্ডলিং সহ) ==========
        async function syncUserData() {
            try {
                const res = await fetch('/api/user/me', {
                    credentials: 'include',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                if (res.status === 401) {
                    localStorage.removeItem(TG_KEY);
                    window.location.href = "/login";
                    return false;
                }
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (data.status === "success") {
                    userCash = parseFloat(data.user.cash) || 0;
                    userAAF = parseFloat(data.user.aaf) || 0;
                    lastPrice = parseFloat(data.admin.live_price) || 1.0;
                    currentFee = parseFloat(data.admin.trading_fee) || 0.5;

                    document.getElementById('user-cash').innerHTML = `৳ ${userCash.toFixed(2)}`;
                    document.getElementById('user-aaf').innerHTML = userAAF.toFixed(4);
                    document.getElementById('live-price').innerHTML = `৳ ${lastPrice.toFixed(4)}`;
                    document.getElementById('fee-perc').innerHTML = currentFee;

                    calculateTradeCost();
                    if (candleSeries) updateChartWithPrice(lastPrice);
                    return true;
                }
            } catch (err) {
                console.error("Sync error", err);
            }
            return false;
        }

        // ========== ক্যান্ডেল লোড (আপনার ব্যাকএন্ডের /api/candles) ==========
        async function loadCandles(timeframe = currentTimeframe) {
            try {
                if (candlesCache[timeframe]) {
                    currentCandles = [...candlesCache[timeframe]];
                    candleSeries?.setData(currentCandles);
                    return;
                }
                const res = await fetch('/api/candles', { credentials: 'include' });
                if (!res.ok) throw new Error('Candles API error');
                const data = await res.json();
                let candles = data.candles || [];
                // ডুপ্লিকেট রিমুভ ও সর্ট
                const unique = [];
                const seen = new Set();
                for (let c of candles) {
                    if (!seen.has(c.time)) {
                        seen.add(c.time);
                        unique.push({
                            time: c.time,
                            open: parseFloat(c.open),
                            high: parseFloat(c.high),
                            low: parseFloat(c.low),
                            close: parseFloat(c.close)
                        });
                    }
                }
                unique.sort((a,b) => a.time - b.time);
                candlesCache[timeframe] = unique;
                currentCandles = [...unique];
                candleSeries?.setData(currentCandles);
            } catch (err) {
                console.error("Candles error, using mock", err);
                generateMockCandles(timeframe);
            }
        }

        function generateMockCandles(timeframe) {
            const mock = [];
            const now = Math.floor(Date.now() / 1000);
            const interval = timeframe * 60;
            let price = lastPrice;
            for (let i = 100; i >= 0; i--) {
                const t = now - (i * interval);
                const change = (Math.random() - 0.5) * 0.02;
                const close = price * (1 + change);
                mock.push({
                    time: t,
                    open: price,
                    high: Math.max(price, close) * (1 + Math.random()*0.005),
                    low: Math.min(price, close) * (1 - Math.random()*0.005),
                    close: close
                });
                price = close;
            }
            currentCandles = mock;
            candleSeries?.setData(currentCandles);
        }

        function updateChartWithPrice(price) {
            if (!candleSeries) return;
            const now = Math.floor(Date.now() / 1000);
            const intervalSec = currentTimeframe * 60;
            const currentBar = Math.floor(now / intervalSec) * intervalSec;
            if (currentCandles.length === 0) generateMockCandles(currentTimeframe);
            const last = currentCandles[currentCandles.length - 1];
            if (!last || last.time !== currentBar) {
                currentCandles.push({
                    time: currentBar,
                    open: price,
                    high: price,
                    low: price,
                    close: price
                });
                candleSeries.setData(currentCandles);
            } else {
                last.high = Math.max(last.high, price);
                last.low = Math.min(last.low, price);
                last.close = price;
                candleSeries.update(last);
            }
        }

        // ========== ট্রেড কস্ট ক্যালকুলেশন ও ইনপুট লিংক ==========
        function calculateTradeCost() {
            let taka = parseFloat(document.getElementById('taka-input').value) || 0;
            let coin = parseFloat(document.getElementById('coin-input').value) || 0;
            const active = document.activeElement;
            if (active === document.getElementById('taka-input') && taka > 0) {
                coin = taka / lastPrice;
                document.getElementById('coin-input').value = coin.toFixed(4);
            } else if (active === document.getElementById('coin-input') && coin > 0) {
                taka = coin * lastPrice;
                document.getElementById('taka-input').value = taka.toFixed(2);
            }
            const fee = (taka * currentFee) / 100;
            const total = taka + fee;
            document.getElementById('fee-amount').innerText = `৳ ${fee.toFixed(2)}`;
            document.getElementById('total-cost').innerText = `৳ ${total.toFixed(2)}`;

            const buyBtn = document.getElementById('buy-btn');
            const sellBtn = document.getElementById('sell-btn');
            buyBtn.disabled = (taka < 10 || total > userCash);
            sellBtn.disabled = (coin <= 0 || coin > userAAF);
        }

        // ========== ট্রেড এক্সিকিউট ==========
        async function executeTrade(type) {
            if (isProcessing) return showPopup("⏳ আগের লেনদেন প্রসেসিং...");
            let taka = parseFloat(document.getElementById('taka-input').value) || 0;
            let coin = parseFloat(document.getElementById('coin-input').value) || 0;

            if (type === 'buy') {
                if (taka < 10) return showPopup("❌ ন্যূনতম ১০ টাকা ট্রেড করুন");
                const fee = (taka * currentFee) / 100;
                if (taka + fee > userCash) return showPopup(`❌ টাকা কম: প্রয়োজন ${(taka+fee).toFixed(2)} টাকা`);
                if (coin <= 0) coin = taka / lastPrice;
            } else {
                if (coin <= 0) return showPopup("❌ সঠিক কয়েন পরিমাণ দিন");
                if (coin > userAAF) return showPopup(`❌ আপনার কাছে ${userAAF.toFixed(4)} AAF আছে`);
                if (taka <= 0) taka = coin * lastPrice;
            }

            isProcessing = true;
            const buyBtn = document.getElementById('buy-btn'), sellBtn = document.getElementById('sell-btn');
            buyBtn.disabled = sellBtn.disabled = true;
            const originalBuy = buyBtn.innerHTML, originalSell = sellBtn.innerHTML;
            buyBtn.innerHTML = '<span class="loading-spinner"></span> প্রসেসিং...';
            sellBtn.innerHTML = '<span class="loading-spinner"></span> প্রসেসিং...';

            try {
                const res = await fetch('/api/trade/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ type, taka, coin, price: lastPrice })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    showPopup(`✅ ${data.message}`);
                    document.getElementById('taka-input').value = '';
                    document.getElementById('coin-input').value = '';
                    await syncUserData();
                } else {
                    showPopup(`❌ ${data.message || 'ট্রেড ব্যর্থ'}`);
                }
            } catch (err) {
                showPopup("❌ সার্ভার ত্রুটি");
            } finally {
                isProcessing = false;
                buyBtn.disabled = sellBtn.disabled = false;
                buyBtn.innerHTML = originalBuy;
                sellBtn.innerHTML = originalSell;
                calculateTradeCost();
            }
        }

        // ========== টাইমফ্রেম পরিবর্তন ==========
        async function setTimeframe(minutes) {
            currentTimeframe = minutes;
            document.querySelectorAll('.tf-btn').forEach(btn => {
                if (parseInt(btn.getAttribute('data-tf')) === minutes) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            await loadCandles(minutes);
        }

        // ========== চার্ট ইনিশিয়ালাইজ ==========
        function initChart() {
            const container = document.getElementById('chart-container');
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 280,
                layout: { background: { color: '#000' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
                timeScale: { timeVisible: true, secondsVisible: currentTimeframe < 60 }
            });
            candleSeries = chart.addCandlestickSeries({
                upColor: '#00ffa3', downColor: '#ff3366', borderVisible: false,
                wickUpColor: '#00ffa3', wickDownColor: '#ff3366'
            });
            window.addEventListener('resize', () => chart.applyOptions({ width: container.clientWidth }));
        }

        // ========== ইভেন্ট লিসেনার ==========
        document.getElementById('taka-input').addEventListener('input', calculateTradeCost);
        document.getElementById('coin-input').addEventListener('input', calculateTradeCost);
        document.getElementById('buy-btn').addEventListener('click', () => executeTrade('buy'));
        document.getElementById('sell-btn').addEventListener('click', () => executeTrade('sell'));
        document.querySelectorAll('.tf-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tf = parseInt(btn.getAttribute('data-tf'));
                if (!isNaN(tf)) setTimeframe(tf);
            });
        });

        // ========== পেজ লোড ==========
        window.addEventListener('DOMContentLoaded', async () => {
            initChart();
            await syncUserData();
            await loadCandles(1);
            setTimeframe(1);
            setInterval(syncUserData, 5000);
        });
    </script>
</body>
</html>
