<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Trading | Pro Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Lightweight Charts CDN (প্রফেশনাল চার্ট) -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Hind+Siliguri:wght@400;600&family=Syncopate:wght@400;700&display=swap');
        
        :root {
            --bg: #05080d; --card: #0f172a; --border: rgba(255,255,255,0.05);
            --cyan: #00f2fe; --green: #00ffa3; --red: #ff3366; --text: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding-bottom: 110px; overflow-x: hidden; }
        
        .header { position: fixed; top: 0; left: 0; width: 100%; height: 35px; z-index: 3000; background: #0f172a; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; box-sizing: border-box; border-bottom: 1px solid var(--border); }
        #admin-ad-box { position: fixed; top: 35px; left: 0; width: 100%; height: 25px; background: #1e293b; z-index: 2999; display: flex; align-items: center; }
        .tf-bar { position: fixed; top: 60px; left: 0; width: 100%; height: 35px; z-index: 2998; background: #000; display: flex; gap: 8px; padding: 5px 15px; box-sizing: border-box; overflow-x: auto; }
        
        #chart-wrapper { position: fixed; top: 95px; left: 0; width: 100%; height: 250px; z-index: 2997; background: #000; border-bottom: 1px solid var(--border); }
        #chart-container { width: 100%; height: 100% !important; min-height: 250px; }
        .tv-lightweight-charts-logo { display: none !important; }

        #chart-theme-toggle { 
            position: absolute; left: 10px; bottom: 10px; z-index: 3001; 
            padding: 4px 8px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); 
            background: #1e293b; color: white; display: flex; align-items: center; gap: 6px;
            font-size: 9px;
        }

        /* ক্যান্ডেল শার্প দেখানোর জন্য */
        #candleCanvas {
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* চার্ট কন্টেইনার */
        #chart-container {
            background: #131722;
        }
        /* চার্ট কন্টেইনার ব্যাকগ্রাউন্ড */
        #chart-wrapper, #chart-container {
            background: #0f172a;
         }

        /* ক্যান্ডেল পরিষ্কার দেখানোর জন্য */
        #candleCanvas {
            image-rendering: crisp-edges;
            image-rendering: pixelated;
         }
           
         /* লাইট থিমের জন্য */
         body.light, .light #chart-wrapper {
             background: #ffffff;
         }


        .container { padding-top: 360px; padding-bottom: 100px; max-width: 350px; margin: auto; padding-left: 15px; padding-right: 15px; }
        .tf-btn { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; transition: 0.2s; }
        .tf-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,242,254,0.1); }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-card span { font-size: 10px; color: var(--text); display: block; }
        .stat-card b { font-family: 'Rajdhani'; font-size: 16px; color: #fff; }
        
        .trade-box { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); position: relative; }
        .input-group { display: flex; gap: 8px; align-items: center; margin-bottom: 15px; }
        .input-box { flex: 1; position: relative; }
        .input-box input { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; color: var(--cyan); font-size: 16px; border-radius: 8px; box-sizing: border-box; outline: none; }
        .input-box span { position: absolute; right: 8px; top: 14px; color: var(--text); font-size: 10px; }
        
        .fee-card { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 10px; border: 1px dashed var(--border); margin-bottom: 15px; }
        .fee-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 12px; text-transform: uppercase; transition: 0.2s; }
        .buy { background: var(--green); color: #000; }
        .sell { background: var(--red); color: #fff; }
        .btn:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }

        #active-user-bar { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(15, 23, 42, 0.95); border: 1px solid var(--cyan); padding: 10px; border-radius: 12px; display: none; align-items: center; gap: 10px; z-index: 9999; backdrop-filter: blur(10px); animation: slideDown 0.4s forwards; }
        @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 80px; opacity: 1; } }

        .dock-container { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; z-index: 5000; }
        .dock-nav {
            width: 90%; max-width: 400px; height: 55px; background: rgba(15, 23, 42, 0.95);
            border-radius: 35px; border: 1px solid var(--glass-border); display: flex;
            justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }
        .nav-item { color: #94a3b8; text-decoration: none; font-size: 8px; text-align: center; transition: 0.3s; display: flex; flex-direction: column; align-items: center; font-family: 'Rajdhani'; font-weight: 600; text-transform: uppercase; }
        .nav-item i { font-size: 16px; display: block; margin-bottom: 2px; }
        .nav-item.active { color: var(--cyan); text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }
        
        .loading-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: var(--cyan); animation: spin 0.6s linear infinite; margin-right: 5px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="active-user-bar">
        <i class="fas fa-bolt" style="color: var(--cyan);"></i>
        <span id="popup-text" style="font-size: 12px; color: #fff; font-weight: bold;"></span>
    </div>

    <header class="header">
        <h2 style="font-size: 10px; margin: 0; font-family: 'Syncopate';">AAF TRADING</h2>
        <span id="live-price" style="font-size: 12px; color: var(--green); font-family: 'Rajdhani';">৳ 0.0000</span>
    </header>

    <div id="admin-ad-box">
        <marquee id="admin-ad-text" behavior="scroll" direction="left" style="color: #00f2fe; font-size: 10px;">লোড হচ্ছে...</marquee>
    </div>

    <div class="tf-bar">
        <button class="tf-btn" data-tf="1">1M</button>
        <button class="tf-btn" data-tf="5">5M</button>
        <button class="tf-btn" data-tf="15">15M</button>
        <button class="tf-btn" data-tf="60">1H</button>
        <button class="tf-btn" data-tf="240">4H</button>
        <button class="tf-btn" data-tf="1440">1D</button>
    </div>

    <div id="chart-wrapper">
        <div id="chart-theme-toggle">
            <i class="fas fa-moon"></i>
            <span id="theme-status">DARK</span>
        </div>
        <div id="chart-container"></div>
    </div>

    <div class="container">
        <div class="stat-grid">
            <div class="stat-card"><span>আপনার AAF</span><b id="user-aaf">0.00</b></div>
            <div class="stat-card"><span>টাকা ব্যালেন্স</span><b id="user-cash">৳ 0.00</b></div>
        </div>

        <div class="trade-box">
            <div class="input-group">
                <div class="input-box"><input type="number" id="taka-input" placeholder="0.00" step="any"><span>BDT</span></div>
                <i class="fas fa-exchange-alt" style="color:var(--text)"></i>
                <div class="input-box"><input type="number" id="coin-input" placeholder="0.00" step="any"><span>AAF</span></div>
            </div>
            <div class="fee-card">
                <div class="fee-row"><span>ফি (<span id="fee-perc">0.5</span>%):</span><b id="fee-amount">৳ 0.00</b></div>
                <div class="fee-row"><span>মোট খরচ:</span><b id="total-cost" style="color:var(--cyan)">৳ 0.00</b></div>
            </div>
            <div class="btn-group">
                <button id="buy-btn" class="btn buy">BUY SPOT</button>
                <button id="sell-btn" class="btn sell">SELL SPOT</button>
            </div>
        </div>
    </div>

    <div class="dock-container">
        <nav class="dock-nav">
            <a href="/dashboard" class="nav-item"><i class="fas fa-house"></i>Home</a>
            <a href="/task" class="nav-item"><i class="fas fa-tasks"></i>Task</a>
            <a href="/trading" class="nav-item active"><i class="fas fa-chart-line"></i>Trading</a>
            <a href="/wallet" class="nav-item"><i class="fas fa-wallet"></i>Wallet</a>
            <a href="/account" class="nav-item"><i class="fas fa-user-circle"></i>Account</a>
        </nav>
    </div>
    <script>
    (function(){
    // ---------- ডিবাগ ----------
    let dbgDiv = document.createElement('div');
    dbgDiv.id = 'live-debug';
    dbgDiv.style.cssText = 'position:fixed; bottom:80px; left:5px; right:5px; background:#000; color:#0f0; font-size:10px; padding:5px; border-radius:6px; z-index:9999; font-family:monospace; border:1px solid #0f0; word-break:break-all;';
    document.body.appendChild(dbgDiv);
    function log(msg) {
        console.log(msg);
        if(dbgDiv) {
            dbgDiv.innerHTML = new Date().toLocaleTimeString() + ' | ' + msg + '<br>' + dbgDiv.innerHTML;
            if(dbgDiv.innerHTML.split('<br>').length > 6) dbgDiv.innerHTML = dbgDiv.innerHTML.split('<br>').slice(0,6).join('<br>');
        }
    }

    // ---------- ক্যানভাস চার্ট সেটআপ ----------
    const canvas = document.createElement('canvas');
    canvas.id = 'candleCanvas';
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    const container = document.getElementById('chart-container');
    if(container) {
        container.innerHTML = '';
        container.appendChild(canvas);
    }
    let ctx = canvas.getContext('2d');
    let currentCandles = [];
    let lastPrice = 1.0, userCash = 0, userAAF = 0, currentFee = 0.5;
    let currentTimeframe = 1, isProcessing = false;
    let candlesCache = {};
    let isDarkTheme = true;
    // ---------- জুম ও প্যানের জন্য ভেরিয়েবল ----------
    let scale = 1.0;        // জুম লেভেল
    let offsetX = 0;        // প্যান অফসেট (পিক্সেলে)
    let startX = 0, startOffset = 0;
    let touchDistance = 0, startScale = 1;

    // ---------- ক্যান্ডেল অঙ্কন (প্রফেশনাল স্টাইল) ----------
    function drawCandles() {
    if (!canvas || !currentCandles.length) return;
    const w = canvas.clientWidth, h = canvas.clientHeight;
    if (w < 30 || h < 30) return;
    canvas.width = w; canvas.height = h;
    ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, w, h);
    
    // লাইট থিমের ব্যাকগ্রাউন্ড (সাদা)
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);
    
    const total = currentCandles.length;
    if (total === 0) return;
    
    // ক্যান্ডেলের প্রস্থ ও ব্যবধান
    let candleWidth = Math.max(2, (w / total) * 0.65);
    let spacing = Math.max(0.5, candleWidth * 0.25);
    
    // মূল্য সীমা
    let maxP = Math.max(...currentCandles.map(c => c.high));
    let minP = Math.min(...currentCandles.map(c => c.low));
    let padding = (maxP - minP) * 0.05;
    maxP = maxP + padding;
    minP = minP - padding;
    if (maxP === minP) { maxP += 0.01; minP -= 0.01; }
    const range = maxP - minP;
    const yScale = (h - 40) / range;
    const zeroY = h - 20;
    
    // ✅ লাইট থিমের ক্যান্ডেল রং (উজ্জ্বল)
    const UP_COLOR = '#00ffa3';   // সবুজ
    const DOWN_COLOR = '#ff3366'; // লাল
    
    for (let i = 0; i < total; i++) {
        const c = currentCandles[i];
        const x = i * (candleWidth + spacing);
        const openY = zeroY - (c.open - minP) * yScale;
        const closeY = zeroY - (c.close - minP) * yScale;
        const highY = zeroY - (c.high - minP) * yScale;
        const lowY = zeroY - (c.low - minP) * yScale;
        const isGreen = c.close >= c.open;
        const candleColor = isGreen ? UP_COLOR : DOWN_COLOR;
        
        // উইক
        ctx.beginPath();
        ctx.strokeStyle = candleColor;
        ctx.lineWidth = 1.5;
        ctx.moveTo(x + candleWidth / 2, highY);
        ctx.lineTo(x + candleWidth / 2, lowY);
        ctx.stroke();
        
        // বডি
        const bodyTop = Math.min(openY, closeY);
        let bodyHeight = Math.abs(closeY - openY);
        if (bodyHeight < 1.5) bodyHeight = 1.5;
        ctx.fillStyle = candleColor;
        ctx.fillRect(x, bodyTop, candleWidth, bodyHeight);
    }
    
    // নিচে টাইম লেবেল (গাঢ় ধূসর)
    ctx.fillStyle = '#555555';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    
    for (let i = 0; i <= 5; i++) {
        let idx = Math.floor((total - 1) * (i / 5));
        if (idx >= 0 && idx < total) {
            let date = new Date(currentCandles[idx].time * 1000);
            let timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            let xPos = idx * (candleWidth + spacing) + candleWidth/2;
            if (xPos > 10 && xPos < w - 10) {
                ctx.fillText(timeStr, xPos, h - 18);
            }
        }
    }
    
    // ডান পাশে প্রাইস লেভেল (গাঢ় ধূসর)
    ctx.fillStyle = '#555555';
    ctx.font = '9px monospace';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    
    for (let i = 0; i <= 5; i++) {
        let price = minP + (maxP - minP) * (i / 5);
        let yPos = zeroY - (price - minP) * yScale;
        if (yPos > 10 && yPos < h - 15) {
            ctx.fillText(price.toFixed(5), w - 5, yPos);
        }
    }
    
    // বর্তমান প্রাইস (সবুজ)
    ctx.fillStyle = UP_COLOR;
    ctx.font = 'bold 10px monospace';
    ctx.fillText(lastPrice.toFixed(5), w - 5, zeroY - (lastPrice - minP) * yScale);
    
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
                }
    // ---------- ক্যান্ডেল লোড (API + মক) ----------
    async function loadCandles(timeframe = currentTimeframe) {
        log("📡 ক্যান্ডেল API কল...");
        try {
            const res = await fetch('/api/candles', { credentials: 'include' });
            if(!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            let raw = data.candles || [];
            if(raw.length) {
                let parsed = [];
                for(let c of raw) {
                    let t = c.time;
                    if(t > 1e11) t = Math.floor(t/1000);
                    t = parseInt(t);
                    if(isNaN(t)) continue;
                    parsed.push({ time:t, open:parseFloat(c.open), high:parseFloat(c.high), low:parseFloat(c.low), close:parseFloat(c.close) });
                }
                if(parsed.length) {
                    parsed.sort((a,b)=>a.time-b.time);
                    let unique=[], seen=new Set();
                    for(let p of parsed) if(!seen.has(p.time)) { seen.add(p.time); unique.push(p); }
                    candlesCache[timeframe] = unique;
                    currentCandles = [...unique];
                    drawCandles();
                    log(`✅ রিয়েল ক্যান্ডেল লোড (${currentCandles.length})`);
                    return;
                }
            }
            throw new Error("No valid candles");
        } catch(e) {
            log(`⚠️ API ব্যর্থ, মক ডাটা: ${e.message}`);
            if(!candlesCache[timeframe]) candlesCache[timeframe] = generateMockCandles(timeframe);
            currentCandles = [...candlesCache[timeframe]];
            drawCandles();
            log(`🎲 মক ক্যান্ডেল সেট (${currentCandles.length})`);
        }
    }

    function updateChartWithPrice(price) {
        if(!currentCandles.length) return;
        const now = Math.floor(Date.now()/1000);
        const interval = currentTimeframe * 60;
        const barTime = Math.floor(now/interval)*interval;
        let last = currentCandles[currentCandles.length-1];
        if(!last || last.time !== barTime) {
            const newCandle = { time:barTime, open:price, high:price, low:price, close:price };
            currentCandles.push(newCandle);
            if(candlesCache[currentTimeframe]) candlesCache[currentTimeframe].push(newCandle);
        } else {
            last.high = Math.max(last.high, price);
            last.low = Math.min(last.low, price);
            last.close = price;
        }
        drawCandles();
    }

    // ---------- ইউজার ডাটা ----------
    async function syncUserData() {
        try {
            const res = await fetch('/api/user/me', { credentials: 'include', headers: { 'Cache-Control': 'no-cache' } });
            if(res.status === 401) { window.location.href = '/login'; return; }
            if(!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if(data.status === 'success') {
                userCash = parseFloat(data.user.cash) || 0;
                userAAF = parseFloat(data.user.aaf) || 0;
                lastPrice = parseFloat(data.admin.live_price) || 1.0;
                currentFee = parseFloat(data.admin.trading_fee) || 0.5;
                document.getElementById('user-cash').innerHTML = `৳ ${userCash.toFixed(2)}`;
                document.getElementById('user-aaf').innerHTML = userAAF.toFixed(4);
                document.getElementById('live-price').innerHTML = `৳ ${lastPrice.toFixed(4)}`;
                document.getElementById('fee-perc').innerHTML = currentFee;
                document.getElementById('admin-ad-text').innerHTML = data.admin.trading_ad_text || "✅ ট্রেডিং লাইভ";
                calculateTradeCost();
                if(lastPrice) updateChartWithPrice(lastPrice);
                log(`✅ সিঙ্ক সফল | প্রাইস: ${lastPrice.toFixed(4)}`);
            }
        } catch(e) { log(`❌ সিঙ্ক এরর: ${e.message}`); }
    }

    function calculateTradeCost() {
        let taka = parseFloat(document.getElementById('taka-input').value) || 0;
        let coin = parseFloat(document.getElementById('coin-input').value) || 0;
        if(document.activeElement === document.getElementById('taka-input') && taka>0) {
            coin = taka / lastPrice;
            document.getElementById('coin-input').value = coin.toFixed(4);
        } else if(document.activeElement === document.getElementById('coin-input') && coin>0) {
            taka = coin * lastPrice;
            document.getElementById('taka-input').value = taka.toFixed(2);
        }
        const fee = (taka * currentFee) / 100;
        const total = taka + fee;
        document.getElementById('fee-amount').innerHTML = `৳ ${fee.toFixed(2)}`;
        document.getElementById('total-cost').innerHTML = `৳ ${total.toFixed(2)}`;
        document.getElementById('buy-btn').disabled = (taka < 10 || total > userCash);
        document.getElementById('sell-btn').disabled = (coin <= 0 || coin > userAAF);
    }

    async function executeTrade(type) {
        if(isProcessing) { showPopup("⏳ আগের লেনদেন প্রসেসিং..."); return; }
        let taka = parseFloat(document.getElementById('taka-input').value) || 0;
        let coin = parseFloat(document.getElementById('coin-input').value) || 0;
        if(type === 'buy') {
            if(taka < 10) { showPopup("❌ ন্যূনতম ১০ টাকা ট্রেড করতে হবে!"); return; }
            const fee = (taka * currentFee)/100;
            if(taka+fee > userCash) { showPopup(`❌ টাকা কম! প্রয়োজন ${(taka+fee).toFixed(2)}`); return; }
            if(coin <= 0) coin = taka / lastPrice;
        } else {
            if(coin <= 0) { showPopup("❌ সঠিক কয়েন দিন!"); return; }
            if(coin > userAAF) { showPopup(`❌ আপনার কাছে ${userAAF.toFixed(4)} AAF আছে`); return; }
            if(taka <= 0) taka = coin * lastPrice;
        }
        isProcessing = true;
        const buyBtn = document.getElementById('buy-btn'), sellBtn = document.getElementById('sell-btn');
        const origBuy = buyBtn.innerHTML, origSell = sellBtn.innerHTML;
        buyBtn.disabled = sellBtn.disabled = true;
        buyBtn.innerHTML = '<span class="loading-spinner"></span> প্রসেসিং...';
        sellBtn.innerHTML = '<span class="loading-spinner"></span> প্রসেসিং...';
        try {
            const res = await fetch('/api/trade/execute', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
                body: JSON.stringify({ type, taka, coin, price: lastPrice })
            });
            const data = await res.json();
            if(data.status === 'success') {
                showPopup(`✅ ${data.message}`);
                document.getElementById('taka-input').value = '';
                document.getElementById('coin-input').value = '';
                await syncUserData();
            } else { showPopup(`❌ ${data.message || 'ট্রেড ব্যর্থ!'}`); }
        } catch(e) { showPopup("❌ সার্ভার ত্রুটি"); }
        finally {
            isProcessing = false;
            buyBtn.disabled = sellBtn.disabled = false;
            buyBtn.innerHTML = origBuy; sellBtn.innerHTML = origSell;
            calculateTradeCost();
        }
    }

    function showPopup(msg) {
        const bar = document.getElementById('active-user-bar');
        if(bar) { document.getElementById('popup-text').innerText = msg; bar.style.display = 'flex'; setTimeout(()=>bar.style.display='none',4000); }
        else alert(msg);
    }

    async function setTimeframe(minutes) {
    currentTimeframe = minutes;
    document.querySelectorAll('.tf-btn').forEach(btn => {
        if(parseInt(btn.dataset.tf) === minutes) btn.classList.add('active');
        else btn.classList.remove('active');
    });
    await loadCandles(minutes);
    drawCandles();  // ← এই লাইনটি যোগ করুন
    }

function toggleTheme() {
    isDarkTheme = !isDarkTheme;
    const themeSpan = document.getElementById('theme-status');
    const themeBtn = document.getElementById('chart-theme-toggle');
    
    if(isDarkTheme) {
        themeSpan.innerText = 'DARK';
        themeBtn.innerHTML = '<i class="fas fa-moon"></i> DARK';
        document.getElementById('chart-wrapper').style.background = '#131722';
    } else {
        themeSpan.innerText = 'LIGHT';
        themeBtn.innerHTML = '<i class="fas fa-sun"></i> LIGHT';
        document.getElementById('chart-wrapper').style.background = '#ffffff';
    }
    drawCandles();
}

            // ---------- জুম ও প্যান ইভেন্ট লিসেনার ----------
function handleTouchStart(e) {
    e.preventDefault();
    if (e.touches.length === 1) {
        startX = e.touches[0].clientX;
        startOffset = offsetX;
    } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touchDistance = Math.hypot(dx, dy);
        startScale = scale;
    }
}

function handleTouchMove(e) {
    e.preventDefault();
    if (e.touches.length === 1 && startX !== null) {
        const delta = e.touches[0].clientX - startX;
        offsetX = startOffset + delta;
        const maxOffset = 0;
        const minOffset = - (currentCandles.length * (canvas.clientWidth / currentCandles.length) - canvas.clientWidth);
        offsetX = Math.min(maxOffset, Math.max(minOffset, offsetX));
        drawCandles();
    } else if (e.touches.length === 2 && touchDistance > 0) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const newDistance = Math.hypot(dx, dy);
        let newScale = startScale * (newDistance / touchDistance);
        newScale = Math.min(5, Math.max(0.5, newScale));
        if (newScale !== scale) {
            scale = newScale;
            drawCandles();
        }
    }
}

function handleTouchEnd(e) {
    startX = null;
    touchDistance = 0;
}

function handleMouseDown(e) {
    e.preventDefault();
    startX = e.clientX;
    startOffset = offsetX;
    window.addEventListener('mousemove', handleMouseMove);
    window.addEventListener('mouseup', handleMouseUp);
}

function handleTouchMove(e) {
    e.preventDefault();
    if (e.touches.length === 1 && startX !== null) {
        const delta = e.touches[0].clientX - startX;
        offsetX = startOffset + delta;
        // প্যান সীমাবদ্ধতা
        const totalWidth = currentCandles.length * (canvas.clientWidth / currentCandles.length * 0.6 * scale);
        const minOffset = Math.min(0, canvas.clientWidth - totalWidth);
        const maxOffset = 0;
        offsetX = Math.min(maxOffset, Math.max(minOffset, offsetX));
        drawCandles();
    } else if (e.touches.length === 2 && touchDistance > 0) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const newDistance = Math.hypot(dx, dy);
        let newScale = startScale * (newDistance / touchDistance);
        newScale = Math.min(5, Math.max(0.5, newScale));
        if (newScale !== scale) {
            scale = newScale;
            drawCandles();
        }
    }
}

function handleMouseUp() {
    startX = null;
    window.removeEventListener('mousemove', handleMouseMove);
    window.removeEventListener('mouseup', handleMouseUp);
}

function handleWheel(e) {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    let newScale = scale * delta;
    newScale = Math.min(5, Math.max(0.5, newScale));
    if (newScale !== scale) {
        // জুমের কেন্দ্র বিন্দু ঠিক রাখা
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const oldWidth = (canvas.clientWidth / currentCandles.length) * 0.6 * scale;
        const newWidth = (canvas.clientWidth / currentCandles.length) * 0.6 * newScale;
        offsetX = offsetX - (mouseX - offsetX) * (newWidth / oldWidth - 1);
        scale = newScale;
        drawCandles();
    }
}
// ক্যানভাসে ইভেন্ট লিসেনার যোগ করুন
canvas.addEventListener('touchstart', handleTouchStart);
canvas.addEventListener('touchmove', handleTouchMove);
canvas.addEventListener('touchend', handleTouchEnd);
canvas.addEventListener('mousedown', handleMouseDown);
canvas.addEventListener('wheel', handleWheel);
    // ---------- ইভেন্ট লিসেনার ----------
    document.getElementById('taka-input')?.addEventListener('input', calculateTradeCost);
    document.getElementById('coin-input')?.addEventListener('input', calculateTradeCost);
    document.getElementById('buy-btn')?.addEventListener('click', () => executeTrade('buy'));
    document.getElementById('sell-btn')?.addEventListener('click', () => executeTrade('sell'));
    document.querySelectorAll('.tf-btn').forEach(btn => {
        btn.addEventListener('click', () => { let tf = parseInt(btn.dataset.tf); if(!isNaN(tf)) setTimeframe(tf); });
    });
    document.getElementById('chart-theme-toggle')?.addEventListener('click', toggleTheme);
    window.addEventListener('resize', () => { if(currentCandles.length) drawCandles(); });

        // ---------- স্টার্ট ----------
    window.addEventListener('DOMContentLoaded', async () => {
        log("🚀 অ্যাপ শুরু");
        await syncUserData();
        await loadCandles(1);
        setTimeframe(1);
        setInterval(syncUserData, 5000);
        setInterval(() => { if(lastPrice) updateChartWithPrice(lastPrice); }, 3000);
        log("✅ প্রস্তুত, ক্যান্ডেল চার্ট দেখা যাবে");
    });
})();   // <-- এই লাই
</script>
