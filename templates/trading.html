<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Trading | লাইভ টার্মিনাল</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        *{box-sizing:border-box;}
        body { background: #05080d; color: #fff; font-family: 'Hind Siliguri', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .header { position: fixed; top: 0; left: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; z-index: 3000; }
        .header h2 { font-size: 14px; margin: 0; }
        #live-price { font-size: 12px; color: #00f2fe; font-weight: bold; }
        #admin-ad-box { position: fixed; top: 38px; left: 0; width: 100%; background: #1e293b; padding: 5px 10px; z-index: 2999; }
        #admin-ad-text { font-size: 10px; color: #00f2fe; }
        .tf-bar { position: fixed; top: 70px; left: 0; width: 100%; background: #000; display: flex; gap: 5px; padding: 6px 10px; overflow-x: auto; z-index: 2998; }
        .tf-btn { background: #1e293b; border: none; color: #94a3b8; padding: 4px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; }
        .tf-btn.active { background: #00f2fe; color: #000; }
        #chart-container { position: fixed; top: 105px; left: 0; width: 100%; height: 240px; background: #000; z-index: 2997; }
        .container { padding-top: 360px; padding-left: 12px; padding-right: 12px; padding-bottom: 90px; max-width: 500px; margin: 0 auto; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #0f172a; padding: 12px; border-radius: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card span { font-size: 11px; color: #94a3b8; }
        .stat-card b { font-size: 20px; display: block; margin-top: 4px; color: #00ff88; }
        .trade-box { background: #0f172a; border-radius: 20px; padding: 16px; border: 1px solid rgba(255,255,255,0.08); }
        .input-group { display: flex; gap: 12px; align-items: center; margin-bottom: 15px; }
        .input-box { flex: 1; position: relative; }
        .input-box input { width: 100%; background: #000; border: 1px solid #334155; padding: 12px 10px; border-radius: 12px; color: #00f2fe; font-size: 16px; font-weight: 500; text-align: right; }
        .input-box span { position: absolute; right: 10px; top: 12px; color: #94a3b8; font-size: 12px; }
        .fee-card { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; margin-bottom: 18px; }
        .fee-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
        .fee-row b { color: #00ff88; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 14px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; transition: 0.2s; }
        .buy { background: #00ffa3; color: #000; }
        .sell { background: #ff3366; color: #fff; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .bottom-nav { position: fixed; bottom: 15px; left: 5%; width: 90%; background: #0f172a; border-radius: 40px; display: flex; justify-content: space-around; padding: 8px 0; z-index: 2000; border: 1px solid rgba(0,242,254,0.2); }
        .nav-item { text-decoration: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; font-size: 10px; }
        .nav-item.active { color: #00f2fe; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>
    <header class="header">
        <h2>AAF TRADING</h2>
        <span id="live-price">৳ 1.2345</span>
    </header>
    <div id="admin-ad-box"><marquee id="admin-ad-text">🔹 ট্রেডিং চালু আছে | সতর্কতার সাথে লেনদেন করুন 🔹</marquee></div>
    <div class="tf-bar">
        <button class="tf-btn active">1M</button><button class="tf-btn">5M</button><button class="tf-btn">15M</button>
        <button class="tf-btn">1H</button><button class="tf-btn">4H</button><button class="tf-btn">1D</button>
    </div>
    <div id="chart-container"></div>
    <div class="container">
        <div class="stat-grid">
            <div class="stat-card"><span>আপনার AAF</span><b id="user-aaf">0.00</b></div>
            <div class="stat-card"><span>টাকা ব্যালেন্স</span><b id="user-cash">৳ 0.00</b></div>
        </div>
        <div class="trade-box">
            <div class="input-group">
                <div class="input-box"><input type="number" id="taka-input" placeholder="0.00"><span>BDT</span></div>
                <div class="input-box"><input type="number" id="coin-input" placeholder="0.00"><span>AAF</span></div>
            </div>
            <div class="fee-card">
                <div class="fee-row"><span>ফি (<span id="fee-perc">0.5</span>%):</span><b id="fee-amount">৳ 0.00</b></div>
                <div class="fee-row"><span>মোট খরচ:</span><b id="total-cost" style="color:#00f2fe">৳ 0.00</b></div>
            </div>
            <div class="btn-group">
                <button id="buy-btn" class="btn buy">BUY</button>
                <button id="sell-btn" class="btn sell">SELL</button>
            </div>
        </div>
    </div>
    <nav class="bottom-nav">
        <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="/task" class="nav-item"><i class="fas fa-tasks"></i><span>Task</span></a>
        <a href="/trading" class="nav-item active"><i class="fas fa-chart-line"></i><span>Trading</span></a>
        <a href="/wallet" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="/account" class="nav-item"><i class="fas fa-user-circle"></i><span>Account</span></a>
    </nav>
    <script>
        // ======================= এই স্ক্রিপ্ট প্রথম লোড থেকেই চার্ট ও ব্যালেন্স দেখাবে =======================
        const API = window.location.origin;
        let chart, candleSeries, lastPrice = 1.2345;
        let userCash = 100.00, userAAF = 50.00, currentFee = 0.5;
        let fallbackInterval = null;
        let mockPrice = 1.2345;

        // চার্ট ইন্সট্যান্স তৈরি (প্রথম লোডেই মক ক্যান্ডেল সহ)
        function initChart() {
            const container = document.getElementById('chart-container');
            if (!container) return;
            container.style.height = '240px';
            container.style.width = '100%';
            container.style.display = 'block';
            chart = LightweightCharts.createChart(container, {
                layout: { backgroundColor: '#000', textColor: '#ccc', fontSize: 10 },
                timeScale: { timeVisible: true, rightOffset: 12, barSpacing: 8 },
                width: container.clientWidth,
                height: 240
            });
            candleSeries = chart.addCandlestickSeries({
                upColor: '#00ff88', downColor: '#ff3366', borderVisible: false
            });
            const now = Math.floor(Date.now() / 1000);
            candleSeries.setData([
                { time: now - 120, open: 1.00, high: 1.05, low: 0.98, close: 1.02 },
                { time: now - 60, open: 1.02, high: 1.04, low: 1.01, close: 1.03 },
                { time: now, open: 1.03, high: 1.06, low: 1.02, close: 1.05 }
            ]);
            chart.timeScale().fitContent();
            window.addEventListener('resize', () => {
                chart.applyOptions({ width: container.clientWidth });
                chart.timeScale().fitContent();
            });
        }

        // ইউজারের আসল ব্যালেন্স আনা (যদি ব্যাকএন্ড কাজ করে)
        async function syncUserData() {
            try {
                const res = await fetch(`${API}/api/user/me`, { credentials: "include" });
                const data = await res.json();
                if (data.status === "success") {
                    userCash = data.user.cash || 0;
                    userAAF = data.user.aaf || 0;
                    currentFee = data.admin.trading_fee || 0.5;
                } else throw new Error();
            } catch(e) {
                console.warn("ব্যাকএন্ড ব্যালেন্স পাইনি, মক ডাটা ব্যবহার করা হচ্ছে");
                // মক ডাটা ইতিমধ্যেই সেট করা আছে
            }
            document.getElementById('user-cash').innerText = `৳ ${userCash.toFixed(2)}`;
            document.getElementById('user-aaf').innerText = userAAF.toFixed(2);
            document.getElementById('fee-perc').innerText = currentFee;
            document.getElementById('admin-ad-text').innerText = "🔹 ট্রেডিং চালু আছে";
            calculateLogic();
        }

        // লাইভ প্রাইস ও ক্যান্ডেল আনা (ব্যাকএন্ড ঠিক থাকলে)
        async function fetchMarketData() {
            try {
                const priceRes = await fetch(`${API}/api/market/price`, { signal: AbortSignal.timeout(2000) });
                const priceData = await priceRes.json();
                if (priceData && typeof priceData.price === 'number' && priceData.price > 0) {
                    lastPrice = priceData.price;
                    document.getElementById('live-price').innerText = `৳ ${lastPrice.toFixed(4)}`;
                    if (fallbackInterval) {
                        clearInterval(fallbackInterval);
                        fallbackInterval = null;
                    }
                } else {
                    throw new Error("No price");
                }
                const candleRes = await fetch(`${API}/api/market/live-candle`);
                const candle = await candleRes.json();
                if (candle && candle.time && !isNaN(candle.open) && !isNaN(candle.high) && !isNaN(candle.low) && !isNaN(candle.close)) {
                    candleSeries.update({
                        time: Number(candle.time),
                        open: parseFloat(candle.open),
                        high: parseFloat(candle.high),
                        low: parseFloat(candle.low),
                        close: parseFloat(candle.close)
                    });
                } else {
                    throw new Error("Invalid candle");
                }
            } catch(e) {
                console.warn("মার্কেট ডাটা পাইনি, ফলব্যাক মোড চালু", e);
                if (!fallbackInterval) startFallback();
            }
            calculateLogic();
        }

        // ফলব্যাক মোড (ব্যাকএন্ড ডাউন থাকলেও চার্ট ও প্রাইজ আপডেট হবে)
        function startFallback() {
            if (fallbackInterval) clearInterval(fallbackInterval);
            mockPrice = lastPrice || 1.0;
            let lastCandleTime = Date.now() / 1000;
            fallbackInterval = setInterval(() => {
                mockPrice += (Math.random() - 0.5) * 0.02;
                mockPrice = Math.min(2.5, Math.max(0.5, mockPrice));
                document.getElementById('live-price').innerText = `৳ ${mockPrice.toFixed(4)}`;
                lastPrice = mockPrice;
                const now = Date.now() / 1000;
                if (now - lastCandleTime >= 15) {
                    const newCandle = {
                        time: Math.floor(now),
                        open: mockPrice,
                        high: mockPrice * (1 + Math.random() * 0.02),
                        low: mockPrice * (1 - Math.random() * 0.02),
                        close: mockPrice
                    };
                    if (candleSeries) candleSeries.update(newCandle);
                    lastCandleTime = now;
                }
            }, 2000);
        }

        // ইনপুট ও ক্যালকুলেশন
        const tkIn = document.getElementById('taka-input');
        const coIn = document.getElementById('coin-input');
        const buyBtn = document.getElementById('buy-btn');
        const sellBtn = document.getElementById('sell-btn');

        function calculateLogic() {
            let tk = parseFloat(tkIn.value) || 0;
            let fee = tk * currentFee / 100;
            let total = tk + fee;
            document.getElementById('fee-amount').innerText = `৳ ${fee.toFixed(2)}`;
            document.getElementById('total-cost').innerText = `৳ ${total.toFixed(2)}`;
            buyBtn.disabled = !(tk >= 10 && total <= userCash);
            sellBtn.disabled = !(parseFloat(coIn.value) <= userAAF);
        }

        tkIn.oninput = () => {
            if (lastPrice) coIn.value = (tkIn.value / lastPrice).toFixed(4);
            calculateLogic();
        };
        coIn.oninput = () => {
            if (lastPrice) tkIn.value = (coIn.value * lastPrice).toFixed(2);
            calculateLogic();
        };

        // ট্রেড এক্সিকিউট (রিয়েল ব্যাকএন্ড কল)
        async function executeTrade(type) {
            const side = type.toLowerCase();
            if (side === 'buy' && buyBtn.disabled) return alert("পর্যাপ্ত টাকা নেই (সর্বনিম্ন ১০ টাকা)");
            if (side === 'sell' && sellBtn.disabled) return alert("পর্যাপ্ত AAF নেই");
            try {
                const res = await fetch(`${API}/api/trade/execute`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        telegram_id: localStorage.getItem('telegram_id'),
                        type: side,
                        taka: parseFloat(tkIn.value) || 0,
                        coin: parseFloat(coIn.value) || 0,
                        price: lastPrice
                    })
                });
                const data = await res.json();
                alert(data.message);
                await syncUserData();   // ট্রেডের পর সাথে সাথে ব্যালেন্স রিফ্রেশ
                tkIn.value = '';
                coIn.value = '';
                calculateLogic();
            } catch(e) { alert("ট্রেড ব্যর্থ: " + e.message); }
        }

        buyBtn.onclick = () => executeTrade('BUY');
        sellBtn.onclick = () => executeTrade('SELL');

        // পেজ লোড হলে সব শুরু
        window.addEventListener('load', () => {
            initChart();               // চার্ট দেখাবে (মক ক্যান্ডেল)
            syncUserData();           // ব্যালেন্স দেখাবে (মক ডাটা, ব্যাকএন্ড এলে আপডেট)
            fetchMarketData();        // প্রাইস ও ক্যান্ডেল আনার চেষ্টা
            setInterval(fetchMarketData, 5000);
            setInterval(syncUserData, 10000);
        });
    </script>
</body>
</html>
