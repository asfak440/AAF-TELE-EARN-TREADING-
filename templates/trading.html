<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Trading | Pro Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Lightweight Charts CDN (প্রফেশনাল চার্ট) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.1/lightweight-charts.standalone.production.min.js"></script>
    <style>
           @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Hind+Siliguri:wght@400;600&family=Syncopate:wght@400;700&display=swap');

:root {
    --bg: #05080d;
    --card: #0f172a;
    --border: rgba(255, 255, 255, 0.05);
    --cyan: #00f2fe;
    --green: #00ffa3;
    --red: #ff3366;
    --text: #94a3b8;
    --glass-border: rgba(255, 255, 255, 0.1);
}

/* ---------- বেস স্টাইল ---------- */
body {
    background: #0f172a;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    margin: 0;
    padding-bottom: 110px;
    overflow-x: hidden;
}

/* ---------- হেডার ও ফিক্সড এলিমেন্ট ---------- */
.header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 35px;
    z-index: 3000;
    background: #0f172a;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 15px;
    box-sizing: border-box;
    border-bottom: 1px solid var(--border);
}

#admin-ad-box {
    position: fixed;
    top: 35px;
    left: 0;
    width: 100%;
    height: 25px;
    background: #1e293b;
    z-index: 2999;
    display: flex;
    align-items: center;
}

.tf-bar {
    position: fixed;
    top: 60px;
    left: 0;
    width: 100%;
    height: 35px;
    z-index: 2998;
    background: #000;
    display: flex;
    gap: 8px;
    padding: 5px 15px;
    overflow-x: auto;
    box-sizing: border-box;
}

.tf-btn {
    background: #1e293b;
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #94a3b8;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.tf-btn.active {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0, 242, 254, 0.1);
}

/* ---------- চার্ট এলিমেন্ট ---------- */
#chart-wrapper {
    position: fixed;
    top: 95px;
    left: 0;
    width: 100%;
    height: 250px;
    z-index: 2997;
    background: #0f172a;
    border-bottom: 1px solid var(--border);
}

#chart-container {
    width: 100%;
    height: 100% !important;
    min-height: 250px;
    background: #0f172a;
    touch-action: none;
    overflow: hidden;
    position: relative;
}

.tv-lightweight-charts-logo {
    display: none !important;
}

/* ক্যান্ডেল ক্যানভাস */
#candleCanvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: crisp-edges;
    image-rendering: pixelated;
}

#chart-theme-toggle {
    position: absolute;
    left: 10px;
    bottom: 10px;
    z-index: 3001;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: #1e293b;
    color: white;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
}

/* ---------- কন্টেইনার ও কার্ড ---------- */
.container {
    padding-top: 360px;
    padding-bottom: 100px;
    max-width: 350px;
    margin: auto;
    padding-left: 15px;
    padding-right: 15px;
}

.stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 15px;
}

.stat-card {
    background: var(--card);
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    text-align: center;
}

.stat-card span {
    font-size: 10px;
    color: var(--text);
    display: block;
}

.stat-card b {
    font-family: 'Rajdhani';
    font-size: 16px;
    color: #fff;
}

.trade-box {
    background: var(--card);
    padding: 15px;
    border-radius: 15px;
    border: 1px solid var(--border);
    position: relative;
}

.input-group {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 15px;
}

.input-box {
    flex: 1;
    position: relative;
}

.input-box input {
    width: 100%;
    background: #000;
    border: 1px solid var(--border);
    padding: 12px;
    color: var(--cyan);
    font-size: 16px;
    border-radius: 8px;
    box-sizing: border-box;
    outline: none;
}

.input-box span {
    position: absolute;
    right: 8px;
    top: 14px;
    color: var(--text);
    font-size: 10px;
}

.fee-card {
    background: rgba(255, 255, 255, 0.02);
    padding: 12px;
    border-radius: 10px;
    border: 1px dashed var(--border);
    margin-bottom: 15px;
}

.fee-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 4px;
}

.btn-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.btn {
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    font-size: 12px;
    text-transform: uppercase;
    transition: 0.2s;
}

.buy {
    background: var(--green);
    color: #000;
}

.sell {
    background: var(--red);
    color: #fff;
}

.btn:disabled {
    opacity: 0.3;
    filter: grayscale(1);
    cursor: not-allowed;
}

/* ---------- পপআপ ও নেভিগেশন ---------- */
#active-user-bar {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid var(--cyan);
    padding: 10px;
    border-radius: 12px;
    display: none;
    align-items: center;
    gap: 10px;
    z-index: 9999;
    backdrop-filter: blur(10px);
    animation: slideDown 0.4s forwards;
}

@keyframes slideDown {
    from {
        top: -50px;
        opacity: 0;
    }
    to {
        top: 80px;
        opacity: 1;
    }
}

.dock-container {
    position: fixed;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
    z-index: 5000;
}

.dock-nav {
    width: 90%;
    max-width: 400px;
    height: 55px;
    background: rgba(15, 23, 42, 0.95);
    border-radius: 35px;
    border: 1px solid var(--glass-border);
    display: flex;
    justify-content: space-around;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(10px);
}

.nav-item {
    color: #94a3b8;
    text-decoration: none;
    font-size: 8px;
    text-align: center;
    transition: 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Rajdhani';
    font-weight: 600;
    text-transform: uppercase;
}

.nav-item i {
    font-size: 16px;
    display: block;
    margin-bottom: 2px;
}

.nav-item.active {
    color: var(--cyan);
    text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
}

.loading-spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    border-top-color: var(--cyan);
    animation: spin 0.6s linear infinite;
    margin-right: 5px;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

/* ========== লাইট থিম ওভাররাইড ========== */
body.light {
    background: #ffffff;
}

body.light #chart-wrapper,
body.light #chart-container {
    background: #ffffff;
}

body.light .header,
body.light .dock-nav {
    background: #f0f0f0;
    border-bottom: 1px solid #ddd;
}

body.light .tf-btn {
    background: #e0e0e0;
    color: #333;
    border: none;
}

body.light .tf-btn.active {
    background: #2962ff;
    color: #fff;
}

body.light .stat-card {
    background: #f5f5f5;
    border: 1px solid #ddd;
}

body.light .stat-card span,
body.light .stat-card b {
    color: #333;
}

body.light .trade-box {
    background: #f5f5f5;
    border: 1px solid #ddd;
}

body.light .fee-card {
    background: #e8e8e8;
}

body.light .fee-row span,
body.light .fee-row b {
    color: #333;
}

body.light #candleCanvas {
    background: #ffffff;
}

body.light #chart-theme-toggle {
    background: #e0e0e0;
    border: 1px solid #ccc;
    color: #333;
        }
    </style>
</head>

                <button id="buy-btn" class="btn buy">BUY SPOT</button>

        </div>
    </div>

    <div class="dock-container">
        <nav class="dock-nav">
            <a href="/dashboard" class="nav-item"><i class="fas fa-house"></i>Home</a>
            <a href="/task" class="nav-item"><i class="fas fa-tasks"></i>Task</a>
            <a href="/trading" class="nav-item active"><i class="fas fa-chart-line"></i>Trading</a>
            <a href="/wallet" class="nav-item"><i class="fas fa-wallet"></i>Wallet</a>
            <a href="/account" class="nav-item"><i class="fas fa-user-circle"></i>Account</a>
        </nav>
    </div>
    <script src="/static/js/lightweight-charts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.1/lightweight-charts.standalone.production.min.js"></script>

<script>
// ============================================================================
// 1. TRADINGVIEW LIGHTWEIGHT CHARTS OFFICIAL CORE ENGINE
// ============================================================================

// ============================================================================
// 2. AAF SMART TRADING, TIMEFRAME & THEME TOGGLE ENGINE
// ============================================================================
(function(){
    const container = document.getElementById('chart-container');
    const wrapper = document.getElementById('chart-wrapper');
    if (container) container.style.cssText = "width: 100%; height: 260px; min-height: 260px; display: block; position: relative;";
    if (wrapper) wrapper.style.cssText = "width: 100%; height: auto; display: block; margin-bottom: 10px;";

    let dbgDiv = document.getElementById('live-debug');
    if(!dbgDiv) {
        dbgDiv = document.createElement('div');
        dbgDiv.id = 'live-debug';
        dbgDiv.style.cssText = 'position:fixed; bottom:75px; left:5px; right:5px; background:rgba(15,23,42,0.95); color:#00ffa3; font-size:10px; padding:6px; border-radius:6px; z-index:9999; font-family:monospace; border:1px solid #00f2fe; pointer-events:none;';
        document.body.appendChild(dbgDiv);
    }
    
    function log(msg) {
        if(dbgDiv) {
            dbgDiv.innerHTML = new Date().toLocaleTimeString() + ' | ' + msg + '<br>' + dbgDiv.innerHTML;
            let lines = dbgDiv.innerHTML.split('<br>');
            if(lines.length > 4) dbgDiv.innerHTML = lines.slice(0,4).join('<br>');
        }
    }

    let lastPrice = 1.0, userCash = 0, userAAF = 0, currentFee = 0.5;
    let currentTimeframe = 1; 
    let isDarkTheme = true; // ডিফল্ট ডার্ক মোড ট্র্যাকার
    let isProcessing = false;
    let candleSeries = null;
    let chart = null;

    // চার্ট ইনিশিয়ালাইজেশন
    function initPersonalChart() {
        if (!container) return;
        container.innerHTML = ''; 
        try {
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth || window.innerWidth,
                height: 260,
                layout: { theme: isDarkTheme ? 'dark' : 'light' }
            });
            candleSeries = chart.addCandlestickSeries();
            log(`📊 চার্ট রেডি (টাইমফ্রেম: ${currentTimeframe}M | থিম: ${isDarkTheme ? 'DARK' : 'LIGHT'})`);
        } catch (err) {
            log("❌ ইঞ্জিন এরর: " + err.message);
        }
    }

    // 🎨 লাইট মোড / ডার্ক মোড ফাংশন ফিক্স
    function initThemeToggler() {
        const themeBtn = document.getElementById('chart-theme-toggle');
        const themeStatus = document.getElementById('theme-status');
        
        if (!themeBtn) return;

        // পুরনো ইভেন্ট জ্যাম কাটাতে বাটন ক্লোন করা
        themeBtn.replaceWith(themeBtn.cloneNode(true));
        const newThemeBtn = document.getElementById('chart-theme-toggle');

        newThemeBtn.addEventListener('click', function() {
            isDarkTheme = !isDarkTheme; // থিম স্টেট উল্টে দেওয়া
            
            if (isDarkTheme) {
                if (themeStatus) themeStatus.innerText = "DARK";
                newThemeBtn.querySelector('i').className = "fas fa-moon";
                newThemeBtn.style.color = "#fff";
                // চার্ট অপশন ডার্ক করা
                if (chart) chart.applyOptions({ layout: { theme: 'dark' } });
                log("🌙 ডার্ক মোড অ্যাক্টিভেটেড");
            } else {
                if (themeStatus) themeStatus.innerText = "LIGHT";
                newThemeBtn.querySelector('i').className = "fas fa-sun";
                newThemeBtn.style.color = "#ffb703";
                // চার্ট অপশন লাইট করা
                if (chart) chart.applyOptions({ layout: { theme: 'light' } });
                log("☀️ লাইট মোড অ্যাক্টিভেটেড");
            }
        });
    }

    // ব্যাকএন্ড ক্যান্ডেল জেনারেটর
    async function loadYourCandles() {
        try {
            const res = await fetch('/api/candles?_cb=' + Date.now(), { credentials: 'include' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            let raw = data.candles || [];
            
            if (candleSeries) {
                let parsed = [];
                let baseTime = Math.floor(Date.now() / 1000) - (60 * currentTimeframe * 60);

                if (raw.length < 5) {
                    let tempPrice = lastPrice || 1.0;
                    for (let i = 0; i < 60; i++) {
                        let open = tempPrice;
                        let close = tempPrice + (Math.random() - 0.5) * 0.02;
                        parsed.push({
                            time: baseTime + (i * currentTimeframe * 60),
                            open: open,
                            high: Math.max(open, close) + 0.005,
                            low: Math.min(open, close) - 0.005,
                            close: close
                        });
                        tempPrice = close;
                    }
                } else {
                    parsed = raw.map((c, index) => ({
                        time: baseTime + (index * currentTimeframe * 60),
                        open: parseFloat(c.open) || lastPrice,
                        high: parseFloat(c.high) || (lastPrice * 1.01),
                        low: parseFloat(c.low) || (lastPrice * 0.99),
                        close: parseFloat(c.close) || lastPrice
                    }));
                }
                candleSeries.setData(parsed);
                log(`✅ ${parsed.length}টি মোমবাতি চার্টে সাজানো হয়েছে`);
            }
        } catch (e) {
            log("⚠️ ক্যান্ডেল ডাটা লোড প্রবলেম");
        }
    }

    // লাইভ প্রাইস আপডেট
    function updateChartWithYourPrice(price) {
        if (!candleSeries || !price) return;
        const now = Math.floor(Date.now() / 1000);
        const interval = currentTimeframe * 60;
        const barTime = Math.floor(now / interval) * interval;

        candleSeries.update({
            time: barTime,
            open: lastPrice || price,
            high: Math.max(lastPrice, price) * 1.001,
            low: Math.min(lastPrice, price) * 0.999,
            close: price
        });
    }

    // টাইমফ্রেম বাটন হ্যান্ডলার
    function initTimeframeButtons() {
        document.querySelectorAll('.tf-btn').forEach(btn => {
            btn.replaceWith(btn.cloneNode(true));
        });

        document.querySelectorAll('.tf-btn').forEach(btn => {
            if (parseInt(btn.getAttribute('data-tf')) === currentTimeframe) {
                btn.style.background = "var(--cyan, #00f2fe)";
                btn.style.color = "#000";
            } else {
                btn.style.background = "";
                btn.style.color = "";
            }

            btn.addEventListener('click', function() {
                const tfValue = parseInt(this.getAttribute('data-tf'));
                if (tfValue) {
                    currentTimeframe = tfValue;
                    log(`⏳ টাইমফ্রেম পরিবর্তন: ${currentTimeframe}M...`);
                    initPersonalChart();
                    loadYourCandles();
                    initTimeframeButtons();
                }
            });
        });
    }

    // ইউজার ও এপিআই ডাটা সিঙ্ক
    async function syncUserData() {
        try {
            const res = await fetch('/api/user/me?_cb=' + Date.now(), { credentials: 'include' });
            if (res.status === 401) { window.location.href = '/login'; return; }
            const data = await res.json();
            
            if (data.status === 'success') {
                userCash = parseFloat(data.user.cash) || 0;
                userAAF = parseFloat(data.user.aaf) || 0;
                const newPrice = parseFloat(data.admin.live_price) || 1.0; 
                currentFee = parseFloat(data.admin.trading_fee) || 0.5;
                
                if(document.getElementById('user-cash')) document.getElementById('user-cash').innerHTML = `৳ ${userCash.toFixed(2)}`;
                if(document.getElementById('user-aaf')) document.getElementById('user-aaf').innerHTML = userAAF.toFixed(4);
                if(document.getElementById('fee-perc')) document.getElementById('fee-perc').innerHTML = currentFee;
                if(document.getElementById('admin-ad-text')) document.getElementById('admin-ad-text').innerHTML = data.admin.trading_ad_text || "✅ ট্রেডিং লাইভ";
                
                const priceEl = document.getElementById('live-price');
                if (priceEl) {
                    priceEl.innerHTML = `৳ ${newPrice.toFixed(4)}`;
                    priceEl.style.color = (newPrice >= lastPrice) ? '#00ffa3' : '#ff3366';
                }

                updateChartWithYourPrice(newPrice);
                lastPrice = newPrice;
                calculateTradeCost();
            }
        } catch (e) { 
            log("❌ ডাটা সিঙ্ক হচ্ছে না"); 
        }
    }

    function calculateTradeCost() {
        let taka = parseFloat(document.getElementById('taka-input').value) || 0;
        let coin = parseFloat(document.getElementById('coin-input').value) || 0;
        if (document.activeElement === document.getElementById('taka-input') && taka > 0) {
            coin = taka / lastPrice;
            document.getElementById('coin-input').value = coin.toFixed(4);
        } else if (document.activeElement === document.getElementById('coin-input') && coin > 0) {
            taka = coin * lastPrice;
            document.getElementById('taka-input').value = taka.toFixed(2);
        }
        if(document.getElementById('fee-amount')) document.getElementById('fee-amount').innerHTML = `৳ ${(taka * currentFee / 100).toFixed(2)}`;
        if(document.getElementById('total-cost')) document.getElementById('total-cost').innerHTML = `৳ ${(taka + (taka * currentFee / 100)).toFixed(2)}`;
    }

    // অ্যাপ বুটস্ট্র্যাপ রানার
    function startTradingApp() {
        initPersonalChart();
        syncUserData();
        loadYourCandles();
        initTimeframeButtons();
        initThemeToggler(); // থিম বাটন অ্যাক্টিভেট করা হলো
        setInterval(syncUserData, 3000); 
    }

    if (document.readyState === 'complete') {
        startTradingApp();
    } else {
        window.addEventListener('load', startTradingApp);
    }
})();
</script>
</script>
