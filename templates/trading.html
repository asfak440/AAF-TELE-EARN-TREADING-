<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Trading | Pro Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght=600;700&family=Hind+Siliguri:wght=400;600&family=Syncopate:wght=400;700&display=swap');

        :root {
            --bg: #05080d;
            --card: #0f172a;
            --border: rgba(255, 255, 255, 0.05);
            --cyan: #00f2fe;
            --green: #00ffa3;
            --red: #ff3366;
            --text: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --body-text: #ffffff;     /* 🎯 ডার্ক মোডে লেখার রঙ কড়া সাদা */
            --balance-color: #ffffff; /* 🎯 ডার্ক মোডে ব্যালেন্স সংখ্যার রঙ */
        }

        /* 🎨 লাইট থিম ভ্যারিয়েবল ফিক্স */
        body.light {
            --bg: #ffffff;
            --card: #f8fafc;
            --border: #e2e8f0;
            --text: #64748b;
            --body-text: #0f172a;
            --balance-color: #0f172a; /* 🎯 লাইট মোডে ব্যালেন্স সংখ্যার রঙ কালো */
        }

        body {
            background-color: var(--bg);
            color: var(--body-text); /* 🎯 ভুল কন্ডিশনাল কোড বাদ দিয়ে ভ্যারিয়েবল বসানো হয়েছে */
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding-bottom: 110px;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* হেডার ও ফিক্সড এলিমেন্ট */
        .header {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 35px; z-index: 3000;
            background: var(--card);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; box-sizing: border-box;
            border-bottom: 1px solid var(--border);
        }
        body.light .header h2 { color: #0f172a; }

        #admin-ad-box {
            position: fixed; top: 35px; left: 0; width: 100%; height: 25px;
            background: var(--card); z-index: 2999; display: flex; align-items: center;
        }

        .tf-bar {
            position: fixed; top: 60px; left: 0; width: 100%; height: 35px;
            z-index: 2998; background: #000; display: flex; gap: 8px; padding: 5px 15px;
            overflow-x: auto; box-sizing: border-box;
        }

        .tf-btn {
            background: #1e293b; border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8; padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer;
        }
        .tf-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0, 242, 254, 0.1); }

        /* 📉 চার্ট কন্টেইনার ফিক্স (উচ্চতা মোবাইল ফ্রেন্ডলি ১৮০px এ লক করা হয়েছে) */
        #chart-wrapper {
            position: fixed; top: 95px; left: 0; width: 100%; height: 180px;
            z-index: 2997; background: var(--bg); border-bottom: 1px solid var(--border);
            transition: background 0.3s;
        }

        #chart-container {
            width: 100%; height: 180px !important;
            background: var(--bg); touch-action: none; overflow: hidden; position: relative;
            transition: background 0.3s;
        }

        #chart-theme-toggle {
            position: absolute; left: 10px; bottom: 10px; z-index: 3001;
            padding: 4px 8px; border-radius: 4px; cursor: pointer;
            border: 1px solid var(--border); background: var(--card); color: var(--body-text);
            display: flex; align-items: center; gap: 6px; font-size: 9px;
        }

        /* কন্টেইনার ও কার্ডের রি-পজিশন */
        .container {
            padding-top: 295px !important; /* 🎯 চার্টের ১৮০px উচ্চতা অনুযায়ী পারফেক্ট দূরত্ব */
            padding-bottom: 100px; max-width: 350px; margin: auto; padding-left: 15px; padding-right: 15px;
        }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-card span { font-size: 10px; color: var(--text); display: block; margin-bottom: 2px; }
        
        /* 🎯 ব্যালেন্স সংখ্যার কালার ফিক্স */
        .stat-card b { font-family: 'Rajdhani'; font-size: 18px; color: var(--balance-color) !important; font-weight: 700; display: inline-block; }

        .trade-box { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); position: relative; }
        .input-group { display: flex; gap: 8px; align-items: center; margin-bottom: 15px; }
        .input-box { flex: 1; position: relative; }
        .input-box input {
            width: 100%; background: #000; border: 1px solid var(--border);
            padding: 12px; color: var(--cyan); font-size: 16px; border-radius: 8px; box-sizing: border-box; outline: none;
        }
        body.light .input-box input { background: #fff; color: #000; border: 1px solid #cbd5e1; }
        .input-box span { position: absolute; right: 8px; top: 14px; color: var(--text); font-size: 10px; }

        .fee-card { background: rgba(255, 255, 255, 0.02); padding: 12px; border-radius: 10px; border: 1px dashed var(--border); margin-bottom: 15px; }
        .fee-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: var(--body-text); }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 12px; text-transform: uppercase; }
        .buy { background: var(--green); color: #000; }
        .sell { background: var(--red); color: #fff; }

        /* ডক নেভিগেশন */
        .dock-container { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; z-index: 5000; }
        .dock-nav {
            width: 90%; max-width: 400px; height: 55px; background: rgba(15, 23, 42, 0.95);
            border-radius: 35px; border: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center;
        }
        body.light .dock-nav { background: rgba(255, 255, 255, 0.95); border: 1px solid #cbd5e1; }
        .nav-item { color: #94a3b8; text-decoration: none; font-size: 8px; text-align: center; display: flex; flex-direction: column; align-items: center; font-family: 'Rajdhani'; font-weight: 600; text-transform: uppercase; }
        .nav-item i { font-size: 16px; display: block; margin-bottom: 2px; }
        .nav-item.active { color: var(--cyan); }
    </style>
</head>
<body>
    <div id="active-user-bar">
        <i class="fas fa-bolt" style="color: var(--cyan);"></i>
        <span id="popup-text" style="font-size: 12px; color: #fff; font-weight: bold;"></span>
    </div>

    <header class="header">
        <h2 style="font-size: 10px; margin: 0; font-family: 'Syncopate';">AAF TRADING</h2>
        <span id="live-price" style="font-size: 12px; color: var(--green); font-family: 'Rajdhani';">৳ 0.0000</span>
    </header>

    <div id="admin-ad-box">
        <marquee id="admin-ad-text" behavior="scroll" direction="left" style="color: #00f2fe; font-size: 10px;">로드 হচ্ছে...</marquee>
    </div>

    <div class="tf-bar">
        <button class="tf-btn" data-tf="1">1M</button>
        <button class="tf-btn" data-tf="5">5M</button>
        <button class="tf-btn" data-tf="15">15M</button>
        <button class="tf-btn" data-tf="60">1H</button>
        <button class="tf-btn" data-tf="240">4H</button>
        <button class="tf-btn" data-tf="1440">1D</button>
    </div>

    <div id="chart-wrapper">
        <div id="chart-theme-toggle">
            <i class="fas fa-moon"></i>
            <span id="theme-status">DARK</span>
        </div>
        <div id="chart-container"></div>
    </div>

    <div class="container">
        <div class="stat-grid">
            <div class="stat-card"><span>আপনার AAF</span><b id="user-aaf">0.00</b></div>
            <div class="stat-card"><span>টাকা ব্যালেন্স</span><b id="user-cash">৳ 0.00</b></div>
        </div>

        <div class="trade-box">
            <div class="input-group">
                <div class="input-box"><input type="number" id="taka-input" placeholder="0.00" step="any"><span>BDT</span></div>
                <i class="fas fa-exchange-alt" style="color:var(--text)"></i>
                <div class="input-box"><input type="number" id="coin-input" placeholder="0.00" step="any"><span>AAF</span></div>
            </div>
            <div class="fee-card">
                <div class="fee-row"><span>ফি (<span id="fee-perc">0.5</span>%):</span><b id="fee-amount">৳ 0.00</b></div>
                <div class="fee-row"><span>মোট খরচ:</span><b id="total-cost" style="color:var(--cyan)">৳ 0.00</b></div>
            </div>
            <div class="btn-group">
                <button id="buy-btn" class="btn buy">BUY SPOT</button>
                <button id="sell-btn" class="btn sell">SELL SPOT</button>
            </div>
        </div>
    </div>

    <div class="dock-container">
        <nav class="dock-nav">
            <a href="/dashboard" class="nav-item"><i class="fas fa-house"></i>Home</a>
            <a href="/task" class="nav-item"><i class="fas fa-tasks"></i>Task</a>
            <a href="/trading" class="nav-item active"><i class="fas fa-chart-line"></i>Trading</a>
            <a href="/wallet" class="nav-item"><i class="fas fa-wallet"></i>Wallet</a>
            <a href="/account" class="nav-item"><i class="fas fa-user-circle"></i>Account</a>
        </nav>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.1/lightweight-charts.standalone.production.min.js"></script>

    <script>
    (function() {
        const container = document.getElementById('chart-container');
        if (!container) return;

        // লাইভ ডিবাগ লগ স্ক্রিন
        let dbgDiv = document.getElementById('live-debug');
        if(!dbgDiv) {
            dbgDiv = document.createElement('div');
            dbgDiv.id = 'live-debug';
            dbgDiv.style.cssText = 'position:fixed; bottom:75px; left:5px; right:5px; background:rgba(15,23,42,0.95); color:#00ffa3; font-size:10px; padding:6px; border-radius:6px; z-index:9999; font-family:monospace; border:1px solid #00f2fe; pointer-events:none;';
            document.body.appendChild(dbgDiv);
        }
        
        function log(msg) {
            if(dbgDiv) {
                dbgDiv.innerHTML = new Date().toLocaleTimeString() + ' | ' + msg + '<br>' + dbgDiv.innerHTML;
                let lines = dbgDiv.innerHTML.split('<br>');
                if(lines.length > 4) dbgDiv.innerHTML = lines.slice(0,4).join('<br>');
            }
        }

        let chart = null;
        let candleSeries = null;
        let lastPrice = 1.0;
        let currentTimeframe = 1; 
        let isDarkTheme = true; 

        const themeColors = {
            dark: { bg: '#05080d', grid: 'rgba(255, 255, 255, 0.03)', text: '#94a3b8', upCandle: '#00ffa3', downCandle: '#ff3366' },
            light: { bg: '#ffffff', grid: 'rgba(0, 0, 0, 0.06)', text: '#334155', upCandle: '#00c853', downCandle: '#ff1744' }
        };

        // 📊 চার্ট আর্কিটেকচার বুটস্ট্র্যাপ (১৮০px উচ্চতায় লক)
        function initTradingViewChart() {
            if (!window.LightweightCharts) return;
            container.innerHTML = '';
            const activeColors = isDarkTheme ? themeColors.dark : themeColors.light;

            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth || window.innerWidth,
                height: 180, // 👈 ২৬০ থেকে কমিয়ে ১৮০px করা হয়েছে
                layout: { background: { type: 'solid', color: activeColors.bg }, textColor: activeColors.text },
                grid: { vertLines: { color: activeColors.grid }, horzLines: { color: activeColors.grid } },
                timeScale: { timeVisible: true, secondsVisible: false, borderColor: activeColors.grid }
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: activeColors.upCandle, downColor: activeColors.downCandle,
                borderUpColor: activeColors.upCandle, borderDownColor: activeColors.downCandle,
                wickUpColor: activeColors.upCandle, wickDownColor: activeColors.downCandle,
            });
        }

        // 📜 ফায়ারবেস (Firebase API) ডাটা লোড
        async function fetchFirebaseHistory() {
            try {
                log("📡 Firebase থেকে ক্যান্ডেল ব্যাকআপ আনা হচ্ছে...");
                const res = await fetch('/api/candles?_cb=' + Date.now(), { credentials: 'include' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                const data = await res.json();
                let historyCandles = data.candles || [];

                if (candleSeries && historyCandles.length > 0) {
                    let parsed = historyCandles.map(c => {
                        let t = parseInt(c.time);
                        if (t > 9999999999) t = Math.floor(t / 1000); 
                        return {
                            time: t,
                            open: parseFloat(c.open),
                            high: parseFloat(c.high),
                            low: parseFloat(c.low),
                            close: parseFloat(c.close)
                        };
                    });
                    parsed.sort((a, b) => a.time - b.time); 
                    candleSeries.setData(parsed);
                    chart.timeScale().fitContent();
                    log(`✅ Firebase থেকে ${parsed.length}টি ক্যান্ডেল সাজানো হয়েছে`);
                }
            } catch (err) {
                log("⚠️ ফায়ারবেস ডাটাবেস হিস্ট্রি কানেকশন পেন্ডিং...");
            }
        }

        // 🕯️ মঙ্গোডিবি (MongoDB Live API) থেকে লাইভ রিয়েল-টাইম ডাটা রিফ্রেশ ও সেভ মেকানিজম
        async function syncMongoDBLive() {
            try {
                const res = await fetch('/api/market/price?_cb=' + Date.now(), { credentials: 'include' });
                const data = await res.json();
                
                if (data && data.live_price) {
                    const livePriceFromMongo = parseFloat(data.live_price);
                    
                    const priceEl = document.getElementById('live-price');
                    if (priceEl) {
                        priceEl.innerHTML = `৳ ${livePriceFromMongo.toFixed(4)}`;
                        priceEl.style.color = (livePriceFromMongo >= lastPrice) ? '#00ffa3' : '#ff3366';
                    }

                    if (candleSeries && livePriceFromMongo) {
                        const now = Math.floor(Date.now() / 1000);
                        const interval = currentTimeframe * 60;
                        const currentBarTime = Math.floor(now / interval) * interval;

                        candleSeries.update({
                            time: currentBarTime,
                            open: lastPrice || livePriceFromMongo,
                            high: Math.max(lastPrice, livePriceFromMongo) * 1.001,
                            low: Math.min(lastPrice, livePriceFromMongo) * 0.999,
                            close: livePriceFromMongo
                        });
                    }
                    lastPrice = livePriceFromMongo;
                }
            } catch (e) {
                // এরর ইগনোর
            }
        }

        // 🔄 ইউজার ডাটা (ব্যালেন্স ফিক্স) এবং ৬০ সেকেন্ড পর পর ক্যান্ডেল ক্লোজিং ও পার্মানেন্ট সেভ লজিক
        async function syncUserDataAndClosing() {
            try {
                const res = await fetch('/api/user/me?_cb=' + Date.now(), { credentials: 'include' });
                if (res.status === 401) { window.location.href = '/login'; return; }
                const data = await res.json();
                
                if (data.status === 'success') {
                    if(document.getElementById('user-cash')) document.getElementById('user-cash').innerHTML = `৳ ${(parseFloat(data.user.cash) || 0).toFixed(2)}`;
                    if(document.getElementById('user-aaf')) document.getElementById('user-aaf').innerHTML = (parseFloat(data.user.aaf) || 0).toFixed(4);
                }

                // 🎯 ৬০টি ক্যান্ডেলের পর নতুন ক্যান্ডেল পার্মানেন্টলি সেভ না হওয়ার সমাধান:
                const secs = new Date().getSeconds();
                const mins = new Date().getMinutes();
                // কাঁটায় কাঁটায় টাইমফ্রেম শেষ হওয়া মাত্রই ব্যাকএন্ডে পোস্ট রিকোয়েস্ট পাঠিয়ে ডাটা সেভ লক করা হচ্ছে
                if (secs === 0 && mins % currentTimeframe === 0) {
                    log("🔄 নতুন ক্যান্ডেল ক্লোজড! Firebase-এ ডাটা রাইট (Save) হচ্ছে...");
                    
                    await fetch('/api/market/update_candle', { method: 'POST', credentials: 'include' });
                    
                    // সেভ হওয়ার ঠিক ১.৫ সেকেন্ড পর চার্ট রিলোড দিয়ে নতুন ক্যান্ডেল স্ক্রিনে টেনে আনা
                    setTimeout(fetchFirebaseHistory, 1500); 
                }
            } catch (err) {
                // এরর ইগনোর
            }
        }

        // 🎨 থিম সুইচার লিসেনার ফিক্স
        function setupThemeToggleListener() {
            const toggleBtn = document.getElementById('chart-theme-toggle');
            const statusText = document.getElementById('theme-status');
            if (!toggleBtn) return;

            toggleBtn.replaceWith(toggleBtn.cloneNode(true));
            const activeToggleBtn = document.getElementById('chart-theme-toggle');

            activeToggleBtn.addEventListener('click', function() {
                isDarkTheme = !isDarkTheme;
                const activeColors = isDarkTheme ? themeColors.dark : themeColors.light;

                if (isDarkTheme) {
                    if (statusText) statusText.innerText = "DARK";
                    activeToggleBtn.querySelector('i').className = "fas fa-moon";
                    log("🌙 ডার্ক মোড অ্যাক্টিভেটেড");
                } else {
                    if (statusText) statusText.innerText = "LIGHT";
                    activeToggleBtn.querySelector('i').className = "fas fa-sun";
                    log("☀️ লাইট মোড অ্যাক্টিভেটেড");
                }

                if (chart && candleSeries) {
                    chart.applyOptions({
                        layout: { background: { color: activeColors.bg }, textColor: activeColors.text },
                        grid: { vertLines: { color: activeColors.grid }, horzLines: { color: activeColors.grid } },
                        timeScale: { borderColor: activeColors.grid }
                    });
                    candleSeries.applyOptions({
                        upColor: activeColors.upCandle, downColor: activeColors.downCandle,
                        borderUpColor: activeColors.upCandle, borderDownColor: activeColors.downCandle,
                        wickUpColor: activeColors.upCandle, wickDownColor: activeColors.downCandle
                    });
                }
            });
        }

        // ⏳ টাইমফ্রেম লিসেনার
        function setupTimeframeListeners() {
            document.querySelectorAll('.tf-btn').forEach(btn => {
                btn.replaceWith(btn.cloneNode(true));
            });

            document.querySelectorAll('.tf-btn').forEach(btn => {
                const tfVal = parseInt(btn.getAttribute('data-tf'));
                if (tfVal === currentTimeframe) {
                    btn.style.background = "var(--cyan, #00f2fe)";
                    btn.style.color = "#000";
                } else {
                    btn.style.background = "";
                    btn.style.color = "";
                }

                btn.addEventListener('click', function() {
                    const selectedTf = parseInt(this.getAttribute('data-tf'));
                    if (selectedTf && selectedTf !== currentTimeframe) {
                        currentTimeframe = selectedTf;
                        log(`⏳ টাইমফ্রেম সুইচ: ${currentTimeframe}M`);
                        initTradingViewChart();
                        fetchFirebaseHistory();
                        setupTimeframeListeners();
                    }
                });
            });
        }

        // ইঞ্জিন স্টার্টার
        function startTradingEngine() {
            initTradingViewChart();
            fetchFirebaseHistory();
            setupThemeToggleListener();
            setupTimeframeListeners();
            
            setInterval(syncMongoDBLive, 1000); // প্রতি সেকেন্ডে রিয়েল-টাইম লাইভ ক্যান্ডেল কাঁপবে
            setInterval(syncUserDataAndClosing, 3000); // ব্যালেন্স এবং ক্যান্ডেল সেভ ট্রিপল চেক
            
            log("🚀 ফিক্সড ফ্রন্টএন্ড সাকসেসফুলি সিঙ্কড!");
        }

        if (document.readyState === 'complete') {
            startTradingEngine();
        } else {
            window.addEventListener('load', startTradingEngine);
        }
    })();
    </script>
</body>
</html>
