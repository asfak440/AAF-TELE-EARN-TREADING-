<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Trading | Pro Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Hind+Siliguri:wght@400;600&display=swap');
        :root {
            --bg: #05080d; --card: #0f172a; --border: rgba(255,255,255,0.05);
            --cyan: #00f2fe; --green: #00ffa3; --red: #ff3366; --text: #94a3b8;
        }
        body { background: var(--bg); color: #fff; font-family: 'Hind Siliguri', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        /* Fixed Headers */
        .header { position: fixed; top: 0; left: 0; width: 100%; height: 35px; z-index: 3000; background: #0f172a; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; box-sizing: border-box; border-bottom: 1px solid var(--border); }
        #admin-ad-box { position: fixed; top: 35px; left: 0; width: 100%; height: 25px; background: #1e293b; z-index: 2999; display: flex; align-items: center; }
        .tf-bar { position: fixed; top: 60px; left: 0; width: 100%; height: 35px; z-index: 2998; background: #000; display: flex; gap: 8px; padding: 5px 15px; box-sizing: border-box; overflow-x: auto; }
        
        /* Chart Section */
        #chart-wrapper { position: fixed; top: 95px; left: 0; width: 100%; height: 250px; z-index: 2997; background: #000; border-bottom: 1px solid var(--border); }
        #chart-container { width: 100%; height: 100%; }
        
        /* Theme Toggle Button Over Logo */
        #chart-theme-toggle { 
            position: absolute; left: 10px; bottom: 10px; z-index: 3001; 
            padding: 4px 8px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); 
            background: #1e293b; color: white; font-size: 10px; font-weight: bold;
        }

        /* Responsive UI Elements */
        .container { padding-top: 360px; padding-bottom: 100px; max-width: 350px; margin: auto; padding-left: 15px; padding-right: 15px; }
        .tf-btn { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .tf-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,242,254,0.1); }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-card span { font-size: 10px; color: var(--text); display: block; }
        .stat-card b { font-family: 'Rajdhani'; font-size: 16px; color: #fff; }
        
        .trade-box { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); position: relative; }
        .input-group { display: flex; gap: 8px; align-items: center; margin-bottom: 15px; }
        .input-box { flex: 1; position: relative; }
        .input-box input { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; color: var(--cyan); font-size: 16px; border-radius: 8px; box-sizing: border-box; outline: none; }
        .input-box span { position: absolute; right: 8px; top: 14px; color: var(--text); font-size: 10px; }
        
        .fee-card { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 10px; border: 1px dashed var(--border); margin-bottom: 15px; }
        .fee-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 12px; text-transform: uppercase; }
        .buy { background: var(--green); color: #000; }
        .sell { background: var(--red); color: #fff; }
        .btn:disabled { opacity: 0.3; filter: grayscale(1); }

        .bottom-nav { position: fixed; bottom: 15px; left: 5%; width: 90%; height: 60px; background: rgba(15,23,42,0.95); backdrop-filter: blur(15px); border-radius: 30px; border: 1px solid rgba(0,242,254,0.2); display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { text-decoration: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--cyan); }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 9px; font-weight: bold; }
    </style>
</head>
<body>
    <!-- পপ-আপ বার (ড্যাশবোর্ডের মতো) -->
<div id="active-user-bar" style="position: fixed; top: 80px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(0, 255, 136, 0.2); border: 1px solid #00ff88; padding: 10px; border-radius: 12px; display: none; align-items: center; gap: 10px; z-index: 9999; backdrop-filter: blur(10px); animation: slideDown 0.5s forwards;">
    <i class="fas fa-bolt" style="color: #00ff88;"></i>
    <span id="popup-text" style="font-size: 12px; font-weight: bold; color: #fff;"></span>
</div>

<!-- এনিমেশন স্টাইল -->
<style>
@keyframes slideDown { from { top: -50px; } to { top: 80px; } }
</style>
    
    <header class="header">
        <h2 style="font-size: 12px; margin: 0;">AAF TRADING</h2>
        <span id="live-price" style="font-size: 12px; color: var(--green);">৳ 0.0000</span>
    </header>

    <div id="admin-ad-box">
        <marquee id="admin-ad-text" behavior="scroll" direction="left" style="color: #00f2fe; font-size: 11px;">Loading announcements...</marquee>
    </div>

    <div class="tf-bar">
        <button class="tf-btn active">1M</button>
        <button class="tf-btn">5M</button>
        <button class="tf-btn">15M</button>
        <button class="tf-btn">1H</button>
        <button class="tf-btn">4H</button>
        <button class="tf-btn">1D</button>
    </div>

    <div id="chart-wrapper">
        <div id="chart-theme-toggle">
            <img src="IMG_20260513_040838_796.jpg" alt="AAF Logo" style="width: 25px; height: auto; border-radius: 2px;">
            <span id="theme-status" style="font-size: 9px; color: #94a3b8; font-weight: bold; font-family: 'Rajdhani';">DARK</span>
        </div>
        <div id="chart-container"></div>
    </div>

    <div class="container">
        <div class="stat-grid">
            <div class="stat-card"><span>আপনার AAF</span><b id="user-aaf">0.00</b></div>
            <div class="stat-card"><span>টাকা ব্যালেন্স</span><b id="user-cash">৳ 0.00</b></div>
        </div>

        <div class="trade-box">
            <div class="input-group">
                <div class="input-box"><input type="number" id="taka-input" placeholder="0.00"><span>BDT</span></div>
                <i class="fas fa-exchange-alt" style="color:var(--text)"></i>
                <div class="input-box"><input type="number" id="coin-input" placeholder="0.00"><span>AAF</span></div>
            </div>

            <div class="fee-card">
                <div class="fee-row"><span>ফি (<span id="fee-perc">0.5</span>%):</span><b id="fee-amount">৳ 0.00</b></div>
                <div class="fee-row"><span>মোট খরচ:</span><b id="total-cost" style="color:var(--cyan)">৳ 0.00</b></div>
                <div id="balance-warning" style="color:var(--red); font-size: 9px; display:none; text-align:center; margin-top:5px;">⚠️ ব্যালেন্স অপর্যাপ্ত</div>
            </div>

            <div class="btn-group">
                <button id="buy-btn" class="btn buy">BUY SPOT</button>
                <button id="sell-btn" class="btn sell">SELL SPOT</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="/task" class="nav-item"><i class="fas fa-tasks"></i><span>Task</span></a>
        <a href="/trading" class="nav-item active"><i class="fas fa-chart-line"></i><span>Trading</span></a>
        <a href="/wallet" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="/account" class="nav-item"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    </nav>

    <script>
        const API = window.location.origin;
        let chart, candleSeries, lastPrice = 1.0;
        let userCash = 0, userAAF = 0, currentFee = 0.5;
        let isDarkMode = true;

        function initChart() {
            const container = document.getElementById('chart-container');
            if (!container) return;
            container.innerHTML = ''; 

            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 250,
                layout: { 
                    background: { type: 'solid', color: '#000000' },
                    textColor: '#d1d4dc',
                },
                grid: {
                    vertLines: { color: 'rgba(42, 46, 57, 0.1)' },
                    horzLines: { color: 'rgba(42, 46, 57, 0.1)' },
                },
                timeScale: { timeVisible: true, secondsVisible: false, borderColor: '#485c7b' },
                handleScroll: true,
                handleScale: true,
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350', 
                borderVisible: false, wickUpColor: '#26a69a', wickDownColor: '#ef5350',
            });

            window.addEventListener('resize', () => {
                chart.applyOptions({ width: container.clientWidth });
            });
        }

        async function loadHistoricalCandles() {
            try {
                const res = await fetch(`${API}/api/candles`);
                const data = await res.json();
                if (data.candles && data.candles.length > 0) {
                    const unique = [];
                    const seen = new Set();
                    data.candles.sort((a,b) => a.time - b.time).forEach(c => {
                        if(!seen.has(c.time)) { unique.push(c); seen.add(c.time); }
                    });
                    candleSeries.setData(unique);
                    setTimeout(() => chart.timeScale().fitContent(), 200);
                }
            } catch(e) {
                console.error("Candle Load Failed", e);
            }
        }

        async function fetchLiveCandle() {
            try {
                const res = await fetch(`${API}/api/market/live-candle`);
                const candle = await res.json();
                if (candle && candle.time) candleSeries.update(candle);
            } catch(e) {}
        }

        async function fetchPrice() {
            try {
                const res = await fetch(`${API}/api/market/price`);
                const data = await res.json();
                if (data.price) {
                    lastPrice = data.price;
                    document.getElementById('live-price').innerText = `৳ ${lastPrice.toFixed(4)}`;
                }
            } catch(e) {}
        }

        // ১. ইউজার ডাটা সিঙ্ক করার ফাংশন
async function syncUserData() {
    try {
        // ড্যাশবোর্ড কোড অনুযায়ী এখানে 'telegram_id' ব্যবহার করা হয়েছে
        const token = localStorage.getItem('telegram_id'); 
        
        if (!token) {
            console.error("লগইন টোকেন (telegram_id) পাওয়া যায়নি।");
            return;
        }
        
        const res = await fetch(`${API}/api/user/me`, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json'
            },
            // সেশন এবং কুকি সাপোর্ট করার জন্য এটি গুরুত্বপূর্ণ
            credentials: "include" 
        });
        
        const data = await res.json();
        
        if (data.status === "success") {
            userCash = data.user.cash || 0;
            userAAF = data.user.aaf || 0;
            currentFee = data.admin.trading_fee || 0.5;
            
            // UI আপডেট
            document.getElementById('fee-perc').innerText = currentFee;
            const adEl = document.getElementById('admin-ad-text');
            if(adEl) adEl.innerText = data.admin.trading_ad_text || "Welcome to Trading";
            
            document.getElementById('user-cash').innerText = `৳ ${parseFloat(userCash).toFixed(2)}`;
            document.getElementById('user-aaf').innerText = parseFloat(userAAF).toFixed(2);
            
            // ক্যালকুলেশন আপডেট
            calculate(); 
        } else if (data.message === "session_expired") {
            alert("সেশন শেষ হয়ে গেছে, দয়া করে আবার লগইন করুন।");
            window.location.href = "/login";
        }
    } catch(e) {
        console.error("ডাটা সিঙ্ক করতে সমস্যা হয়েছে:", e);
    }
}

// ২. ট্রেড এক্সিকিউট করার ফাংশন
async function executeTrade(type) {
    // ... আপনার আগের কোড ...
    
    // উদাহরন: যদি ইউজার জয়েন না থাকে বা ব্যালেন্স কম থাকে
    if (userCash < totalCost) {
        triggerPopup("❌ আপনার ব্যালেন্স অপর্যাপ্ত!"); // এখানে অ্যানিমেশন আসবে
        return;
    }

    try {
        const res = await fetch(`${API}/api/trade/execute`, { ... });
        const data = await res.json();
        
        if(data.status === "success") {
            triggerPopup("✅ ট্রেড সফল হয়েছে!"); // এখানেও অ্যানিমেশন আসবে
        } else {
            triggerPopup("❌ " + data.message); 
        }
        syncUserData(); 
    } catch(e) { 
        triggerPopup("❌ সার্ভার কানেকশন এরর!"); 
    }
}
        
        
        window.onload = () => {
            initChart();
            loadHistoricalCandles();
            syncUserData();
            fetchPrice();
            setInterval(fetchPrice, 5000);
            setInterval(fetchLiveCandle, 10000);
            setInterval(syncUserData, 30000);
        };

        function triggerPopup(message) {
    const bar = document.getElementById('active-user-bar');
    const text = document.getElementById('popup-text');
    if (!bar || !text) return;
    text.innerText = message;
    bar.style.display = "flex";
    setTimeout(() => {
        bar.style.display = "none";
    }, 3000); // ৩ সেকেন্ড পর অটো চলে যাবে
        }
        
    </script>
</body>
</html>
