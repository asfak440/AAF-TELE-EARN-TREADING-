<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF Trading Engine v18.0 Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --bg: #020617;
            --primary: #00f2fe;
            --accent: #00ff88;
            --danger: #ff0055;
            --glass: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-muted: #94a3b8;
        }

        body { 
            background: var(--bg); color: #fff; 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; padding: 20px;
            background-image: radial-gradient(circle at 50% 0%, rgba(112, 0, 255, 0.15) 0%, transparent 70%);
        }
        
        .premium-card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h2, h4 { font-family: 'Syncopate'; text-transform: uppercase; letter-spacing: 1px; }

        /* Trading Area */
        #candle-view {
            height: 180px; background: rgba(0,0,0,0.4); 
            border: 1px dashed var(--glass-border); border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; margin: 15px 0;
            color: var(--primary); font-weight: bold;
        }

        /* History Section Styles */
        .history-container { display: none; margin-top: 20px; animation: fadeIn 0.4s ease; }
        .trade-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        .trade-table th { color: var(--text-muted); text-align: left; padding: 12px 10px; border-bottom: 1px solid var(--glass-border); font-size: 10px; }
        .trade-table td { padding: 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        
        .btn-history {
            background: rgba(0, 242, 254, 0.05); border: 1px solid var(--primary);
            color: var(--primary); padding: 14px; border-radius: 15px;
            cursor: pointer; width: 100%; font-weight: bold; font-family: 'Syncopate';
            font-size: 10px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-history:active { transform: scale(0.96); background: var(--primary); color: #000; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="premium-card">
        <h2 style="font-size: 14px; color: var(--primary);">
            <i class="fas fa-chart-line"></i> LIVE TRADING ENGINE
        </h2>
        
        <div id="trading-controls">
            <div id="candle-view">
                <i class="fas fa-spinner fa-spin"></i> &nbsp; STREAMING FROM FIREBASE...
            </div>
            </div>

        <button class="btn-history" onclick="toggleTradeHistory()">
            <i class="fas fa-database"></i> VIEW MONGOL-BD HISTORY
        </button>

        <div id="history-section" class="history-container">
            <h4 style="font-size: 11px; color: var(--accent); margin-bottom: 5px;">
                <i class="fas fa-history"></i> TRADE LOGS (MONGODB)
            </h4>
            <div style="overflow-x: auto;">
                <table class="trade-table">
                    <thead>
                        <tr>
                            <th>ASSET</th>
                            <th>AMOUNT</th>
                            <th>RESULT</th>
                            <th>TIME</th>
                        </tr>
                    </thead>
                    <tbody id="mongo-data-list">
                        <tr><td colspan="4" style="text-align:center; padding: 20px; color: var(--text-muted);">Ready to fetch data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // --- ১. FIREBASE সেটআপ (শুধুমাত্র ক্যান্ডেল/মার্কেট ডাটার জন্য) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "https://teleearnbd-781d6-default-rtdb.firebaseio.com",
            projectId: "teleearnbd-781d6",
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // ফায়ারবেস থেকে ক্যান্ডেলস্টিক ডাটা শো করার উদাহরণ
        function streamMarketData() {
            db.ref('market_candles').on('value', (snapshot) => {
                // এখানে আপনার ক্যান্ডেল চার্ট আপডেট করার কোড থাকবে
                console.log("Firebase Market Data Updated");
            });
        }

        // --- ২. MONGOL-BD (MONGODB) লজিক (ট্রেড হিস্ট্রির জন্য) ---
        
        async function toggleTradeHistory() {
            const section = document.getElementById('history-section');
            if (section.style.display === "block") {
                section.style.display = "none";
            } else {
                section.style.display = "block";
                await fetchMongoHistory(); 
            }
        }

        async function fetchMongoHistory() {
            const listBody = document.getElementById('mongo-data-list');
            listBody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:20px;'><i class='fas fa-sync fa-spin'></i> Connecting to Mongol-BD...</td></tr>";

            try {
                // আপনার ব্যাকএন্ড এপিআই এন্ডপয়েন্ট (যেমন: /get_trade_history)
                const response = await fetch('/get_trade_history'); 
                const result = await response.json();

                if (result.success && result.trades.length > 0) {
                    listBody.innerHTML = ""; 
                    
                    result.trades.forEach(trade => {
                        const statusColor = trade.result === 'Win' ? '#00ff88' : '#ff0055';
                        const timeStr = trade.time || 'N/A';
                        
                        listBody.innerHTML += `
                            <tr>
                                <td style="font-weight: bold;">${trade.asset}</td>
                                <td style="font-family: 'Syncopate';">৳${trade.amount}</td>
                                <td style="color: ${statusColor}; font-weight: bold;">${trade.result}</td>
                                <td style="color: var(--text-muted); font-size: 11px;">${timeStr}</td>
                            </tr>
                        `;
                    });
                } else {
                    listBody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:20px;'>No trades found in Mongol-BD.</td></tr>";
                }
            } catch (error) {
                listBody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:20px; color: var(--danger);'>Server Connection Failed!</td></tr>";
                console.error("MongoDB Fetch Error:", error);
            }
        }

        // ৩. পেজ ইনিশিয়ালাইজেশন
        window.onload = function() {
            streamMarketData(); // ফায়ারবেস কানেকশন শুরু
            console.log("Trading Engine & Mongol-BD Bridge Ready");
        };
    </script>
</body>
</html>
