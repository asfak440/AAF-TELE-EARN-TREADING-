<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Exchange | Spot Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --bg: #030712;
            --glass: rgba(17, 24, 39, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --cyan: #00f2fe;
            --cyan-glow: rgba(0, 242, 254, 0.5);
            --nav-bg: #0d111c;
            --danger: #ff3366;
            --accent: #00ffa3;
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.15), transparent);
        }

        /* --- Header & Chart (Fixed) --- */
        .fixed-top {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            background: var(--bg); border-bottom: 1px solid var(--border);
        }
        .header { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(3, 7, 18, 0.95); backdrop-filter: blur(20px);
        }
        .header h2 { font-family: 'Syncopate'; font-size: 12px; margin: 0; color: var(--cyan); text-shadow: 0 0 10px var(--cyan-glow); }
        #live-price { font-family: 'Syncopate'; font-size: 16px; color: var(--accent); }

        #chart-wrapper { width: 100%; height: 300px; background: #000; position: relative; }
        #chart-container { width: 100%; height: 100%; }

        /* --- Scrollable Content --- */
        .scrollable-content {
            margin-top: 365px; height: calc(100vh - 465px); 
            overflow-y: auto; padding: 20px; scrollbar-width: none;
        }
        .scrollable-content::-webkit-scrollbar { display: none; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .card { 
            background: var(--glass); padding: 15px; border-radius: 20px; border: 1px solid var(--border);
            border-left: 3px solid var(--cyan);
        }
        .card span { font-size: 10px; color: #94a3b8; display: block; margin-bottom: 5px; font-family: 'Syncopate'; }
        .card b { font-size: 18px; color: #fff; }

        /* --- Trade Box --- */
        .trade-box { background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 25px; border: 1px solid var(--border); }
        input { 
            width: 100%; background: #000; border: 1px solid var(--border); padding: 15px; 
            color: var(--cyan); font-size: 20px; border-radius: 15px; text-align: center; outline: none; 
            font-family: 'Rajdhani'; font-weight: 700; box-sizing: border-box;
        }

        .fee-info { display: flex; justify-content: space-between; margin: 12px 5px; font-size: 11px; font-family: 'Syncopate'; color: #64748b; }
        .fee-info b { color: var(--cyan); }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .btn { padding: 16px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-family: 'Syncopate'; font-size: 10px; transition: 0.2s; }
        .buy { background: linear-gradient(135deg, #00f2fe, #00ffa3); color: #020617; }
        .sell { background: linear-gradient(135deg, #ff3366, #ff6b6b); color: #fff; }

        /* --- History (Mongol-BD) --- */
        .btn-history {
            margin-top: 20px; width: 100%; padding: 15px; border-radius: 15px;
            background: rgba(0, 242, 254, 0.05); border: 1px solid var(--cyan);
            color: var(--cyan); font-family: 'Syncopate'; font-size: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .history-container { display: none; margin-top: 15px; }
        .trade-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .trade-table th { color: #64748b; text-align: left; padding: 10px; font-size: 9px; border-bottom: 1px solid var(--border); }
        .trade-table td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        /* --- Navigation --- */
        .nav-container { position: fixed; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 2000; }
        .nav-bar { 
            width: 90%; max-width: 400px; background: var(--nav-bg); 
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 50px; 
            display: flex; justify-content: space-around; padding: 12px; backdrop-filter: blur(20px);
        }
        .nav-item { text-decoration: none; text-align: center; color: #64748b; font-size: 10px; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--cyan); }
    </style>
</head>
<body>

    <div class="fixed-top">
        <header class="header">
            <h2>AAF EXCHANGE <span style="opacity: 0.6;">SPOT</span></h2>
            <span id="live-price">0.0000</span>
        </header>
        <div id="chart-wrapper"><div id="chart-container"></div></div>
    </div>

    <div class="scrollable-content">
        <div class="stat-grid">
            <div class="card"><span>AAF HOLDINGS</span><b id="aaf-bal">0.00</b></div>
            <div class="card"><span>CASH BALANCE</span><b id="tk-bal">৳ 0.00</b></div>
        </div>

        <div class="trade-box">
            <input type="number" id="trade-amount" placeholder="ENTER AMOUNT (৳)" oninput="calculateNet()">
            <div class="fee-info">
                <span>SERVICE FEE: <b id="display-fee">৳ 0.00</b></span>
                <span>NET ASSET: <b id="display-net">৳ 0.00</b></span>
            </div>
            <div class="btn-group">
                <button class="btn buy" onclick="initiateTrade('BUY')">BUY ASSET</button>
                <button class="btn sell" onclick="initiateTrade('SELL')">SELL ASSET</button>
            </div>
        </div>

        <button class="btn-history" onclick="toggleTradeHistory()">
            <i class="fas fa-history"></i> ASSET HISTORY (MONGOL-BD)
        </button>

        <div id="history-section" class="history-container">
            <div class="card" style="border-left: 3px solid var(--accent);">
                <table class="trade-table">
                    <thead><tr><th>ASSET</th><th>QTY</th><th>STATUS</th></tr></thead>
                    <tbody id="mongo-data-list">
                        <tr><td colspan="3" style="text-align:center; padding:15px; color:#64748b;">No recent assets.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div style="height: 100px;"></div>
    </div>

    <div class="nav-container">
        <nav class="nav-bar">
            <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="/trade" class="nav-item active"><i class="fas fa-chart-line"></i><span>Trading</span></a>
            <a href="/wallet" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        </nav>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://teleearnbd-781d6-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const fb_db = firebase.database();

        let currentFeePercent = 0;

        async function calculateNet() {
            const amount = parseFloat(document.getElementById('trade-amount').value) || 0;
            if(currentFeePercent === 0) {
                try {
                    const res = await fetch('/admin/api/config');
                    const config = await res.json();
                    currentFeePercent = parseFloat(config.trade_fee) || 0;
                } catch(e) { currentFeePercent = 0; }
            }
            const fee = (amount * currentFeePercent) / 100;
            const net = amount - fee;
            document.getElementById('display-fee').innerText = `৳ ${fee.toFixed(2)}`;
            document.getElementById('display-net').innerText = `৳ ${net.toFixed(2)}`;
        }

        function initChart() {
            const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
                layout: { background: { color: '#000' }, textColor: '#64748b' },
                grid: { vertLines: { visible: false }, horzLines: { color: '#111' } },
                timeScale: { borderColor: '#222' },
            });
            const candleSeries = chart.addCandlestickSeries({
                upColor: '#00ffa3', downColor: '#ff3366', borderUpColor: '#00ffa3', borderDownColor: '#ff3366',
                wickUpColor: '#00ffa3', wickDownColor: '#ff3366'
            });

            fb_db.ref('trading/aaf_coin').on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) document.getElementById('live-price').innerText = parseFloat(data.price).toFixed(4);
            });
        }

        async function initiateTrade(type) {
            const amount = parseFloat(document.getElementById('trade-amount').value);
            if(!amount || amount <= 0) return alert("Enter amount!");
            const fee = (amount * currentFeePercent) / 100;
            const net = amount - fee;
            
            // হালাল স্পট ট্রেডিং কনফার্মেশন
            const msg = type === 'BUY' ? `Buy AAF Asset?\nInvest: ৳${net.toFixed(2)}\nFee: ৳${fee.toFixed(2)}` : `Sell your AAF Asset?`;
            
            if(confirm(msg)) {
                // আপনার Mongol-BD এপিআই এখানে কল হবে
                alert("Processing Spot Asset...");
            }
        }

        async function toggleTradeHistory() {
            const section = document.getElementById('history-section');
            section.style.display = (section.style.display === "block") ? "none" : "block";
            if(section.style.display === "block") fetchMongoHistory();
        }

        async function fetchMongoHistory() {
            const listBody = document.getElementById('mongo-data-list');
            try {
                const res = await fetch('/get_trade_history');
                const result = await res.json();
                if(result.success && result.trades.length > 0) {
                    listBody.innerHTML = result.trades.map(t => `
                        <tr>
                            <td style="font-weight:600;">${t.asset || 'AAF/BDT'}</td>
                            <td>৳${t.amount}</td>
                            <td style="color:#00ffa3">Success</td>
                        </tr>
                    `).join('');
                }
            } catch (err) { console.log("History error"); }
        }

        window.onload = () => { initChart(); calculateNet(); };
    </script>
</body>
</html>
