<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Trading | Pro Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Hind+Siliguri:wght@400;600&family=Syncopate:wght@400;700&display=swap');
        
        :root {
            --bg: #05080d; --card: #0f172a; --border: rgba(255,255,255,0.05);
            --cyan: #00f2fe; --green: #00ffa3; --red: #ff3366; --text: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding-bottom: 110px; overflow-x: hidden; }
        
        /* Fixed Headers */
        .header { position: fixed; top: 0; left: 0; width: 100%; height: 35px; z-index: 3000; background: #0f172a; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; box-sizing: border-box; border-bottom: 1px solid var(--border); }
        #admin-ad-box { position: fixed; top: 35px; left: 0; width: 100%; height: 25px; background: #1e293b; z-index: 2999; display: flex; align-items: center; }
        .tf-bar { position: fixed; top: 60px; left: 0; width: 100%; height: 35px; z-index: 2998; background: #000; display: flex; gap: 8px; padding: 5px 15px; box-sizing: border-box; overflow-x: auto; }
        
        /* Chart Section */
        #chart-wrapper { position: fixed; top: 95px; left: 0; width: 100%; height: 250px; z-index: 2997; background: #000; border-bottom: 1px solid var(--border); }
        #chart-container { width: 100%; height: 100% !important; min-height: 250px; }
        .tv-lightweight-charts-logo { display: none !important; }

        #chart-theme-toggle { 
            position: absolute; left: 10px; bottom: 10px; z-index: 3001; 
            padding: 4px 8px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); 
            background: #1e293b; color: white; display: flex; align-items: center; gap: 6px;
        }

        .container { padding-top: 360px; padding-bottom: 100px; max-width: 350px; margin: auto; padding-left: 15px; padding-right: 15px; }
        .tf-btn { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .tf-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,242,254,0.1); }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-card span { font-size: 10px; color: var(--text); display: block; }
        .stat-card b { font-family: 'Rajdhani'; font-size: 16px; color: #fff; }
        
        .trade-box { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); position: relative; }
        .input-group { display: flex; gap: 8px; align-items: center; margin-bottom: 15px; }
        .input-box { flex: 1; position: relative; }
        .input-box input { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; color: var(--cyan); font-size: 16px; border-radius: 8px; box-sizing: border-box; outline: none; }
        .input-box span { position: absolute; right: 8px; top: 14px; color: var(--text); font-size: 10px; }
        
        .fee-card { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 10px; border: 1px dashed var(--border); margin-bottom: 15px; }
        .fee-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 12px; text-transform: uppercase; transition: 0.2s; }
        .buy { background: var(--green); color: #000; }
        .sell { background: var(--red); color: #fff; }
        .btn:disabled { opacity: 0.3; filter: grayscale(1); }

        #active-user-bar { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(15, 23, 42, 0.95); border: 1px solid var(--cyan); padding: 10px; border-radius: 12px; display: none; align-items: center; gap: 10px; z-index: 9999; backdrop-filter: blur(10px); animation: slideDown 0.4s forwards; }
        @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 80px; opacity: 1; } }

        .dock-container { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; z-index: 5000; }
        .dock-nav {
            width: 90%; max-width: 400px; height: 55px; background: rgba(15, 23, 42, 0.95);
            border-radius: 35px; border: 1px solid var(--glass-border); display: flex;
            justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }
        .nav-item { color: #94a3b8; text-decoration: none; font-size: 8px; text-align: center; transition: 0.3s; display: flex; flex-direction: column; align-items: center; font-family: 'Rajdhani'; font-weight: 600; text-transform: uppercase; }
        .nav-item i { font-size: 16px; display: block; margin-bottom: 2px; }
        .nav-item.active { color: var(--cyan); text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }
    </style>
</head>
<body>
    <div id="active-user-bar">
        <i class="fas fa-bolt" style="color: var(--cyan);"></i>
        <span id="popup-text" style="font-size: 12px; color: #fff; font-weight: bold;"></span>
    </div>

    <header class="header">
        <h2 style="font-size: 10px; margin: 0; font-family: 'Syncopate';">AAF TRADING</h2>
        <span id="live-price" style="font-size: 12px; color: var(--green); font-family: 'Rajdhani';">৳ 0.0000</span>
    </header>

    <div id="admin-ad-box">
        <marquee id="admin-ad-text" behavior="scroll" direction="left" style="color: #00f2fe; font-size: 10px;">Loading announcements...</marquee>
    </div>

    <div class="tf-bar">
        <button class="tf-btn active">1M</button>
        <button class="tf-btn">5M</button>
        <button class="tf-btn">15M</button>
        <button class="tf-btn">1H</button>
        <button class="tf-btn">4H</button>
        <button class="tf-btn">1D</button>
    </div>

    <div id="chart-wrapper">
        <div id="chart-theme-toggle">
            <img src="/static/logo.png" alt="AAF" id="toggle-logo" style="width: 20px; height: 20px; border-radius: 3px;" onerror="this.src='https://via.placeholder.com/20'">
            <span id="theme-status" style="font-size: 9px; color: #94a3b8; font-weight: bold;">DARK</span>
        </div>
        <div id="chart-container"></div>
    </div>

    <div class="container">
        <div class="stat-grid">
            <div class="stat-card"><span>আপনার AAF</span><b id="user-aaf">0.00</b></div>
            <div class="stat-card"><span>টাকা ব্যালেন্স</span><b id="user-cash">৳ 0.00</b></div>
        </div>

        <div class="trade-box">
            <div class="input-group">
                <div class="input-box"><input type="number" id="taka-input" placeholder="0.00"><span>BDT</span></div>
                <i class="fas fa-exchange-alt" style="color:var(--text)"></i>
                <div class="input-box"><input type="number" id="coin-input" placeholder="0.00"><span>AAF</span></div>
            </div>
            <div class="fee-card">
                <div class="fee-row"><span>ফি (<span id="fee-perc">0.5</span>%):</span><b id="fee-amount">৳ 0.00</b></div>
                <div class="fee-row"><span>মোট খরচ:</span><b id="total-cost" style="color:var(--cyan)">৳ 0.00</b></div>
            </div>
            <div class="btn-group">
                <button id="buy-btn" class="btn buy" onclick="executeTrade('buy')">BUY SPOT</button>
                <button id="sell-btn" class="btn sell" onclick="executeTrade('sell')">SELL SPOT</button>
            </div>
        </div>
    </div>

    <div class="dock-container">
        <nav class="dock-nav">
            <a href="/dashboard" class="nav-item"><i class="fas fa-house"></i>Home</a>
            <a href="/task" class="nav-item"><i class="fas fa-tasks"></i>Task</a>
            <a href="/trading" class="nav-item active"><i class="fas fa-chart-line"></i>Trading</a>
            <a href="/wallet" class="nav-item"><i class="fas fa-wallet"></i>Wallet</a>
            <a href="/account" class="nav-item"><i class="fas fa-user-circle"></i>Account</a>
        </nav>
    </div>

    <script>

        const API = window.location.origin;
let chart, candleSeries, lastPrice = 1.0;
let userCash = 0, userAAF = 0, currentFee = 0.5;
let isDarkMode = true;

function triggerPopup(msg) {
    const bar = document.getElementById('active-user-bar');
    if (bar) {
        document.getElementById('popup-text').innerText = msg;
        bar.style.display = "flex";
        setTimeout(() => { bar.style.display = "none"; }, 4000);
    }
}

// ১. ক্যান্ডেলস্টিক চার্ট তৈরি (Lightweight Charts)
function initChart() {
    const container = document.getElementById('chart-container');
    if (!container) return;
    container.innerHTML = ''; 

    chart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: 250,
        layout: { background: { type: 'solid', color: '#000000' }, textColor: '#d1d4dc' },
        grid: { vertLines: { color: 'rgba(42, 46, 57, 0.05)' }, horzLines: { color: 'rgba(42, 46, 57, 0.05)' } },
        timeScale: { borderColor: '#485c7b', timeVisible: true, secondsVisible: false },
    });

    candleSeries = chart.addCandlestickSeries({
        upColor: '#00ffa3', downColor: '#ff3366', 
        borderVisible: false, wickUpColor: '#00ffa3', wickDownColor: '#ff3366',
    });
}

// ২. ড্যাশবোর্ডের মতো কুকি/সেশন ব্যবহার করে ডেটা এবং চার্ট সিঙ্ক
async function syncTradingData() {
    try {
        // credentials: "include" দেওয়ার কারণে ব্রাউজার অটোমেটিক টেলিগ্রাম সেশন/কুকি ব্যাকএন্ডে পাঠিয়ে দেবে
        const res = await fetch(`${API}/api/user/me`, {
            headers: { 'Content-Type': 'application/json' },
            credentials: "include" 
        });
        
        const data = await res.json();
        
        if (data.status === "success") {
            // লাইভ প্রাইস সেটআপ (ব্যাকএন্ডের ভ্যারিয়েবল অনুযায়ী অটো-ডিটেক্ট)
            let adminPrice = data.admin.server_trading || data.admin.market_price || data.price || 1.0;
            lastPrice = parseFloat(adminPrice);
            
            const livePriceEl = document.getElementById('live-price');
            if (livePriceEl) livePriceEl.innerText = `৳ ${lastPrice.toFixed(4)}`;

            // ইউজার ব্যালেন্স ও অ্যাড টেক্সট ড্যাশবোর্ডের মতো ইনস্ট্যান্ট আপডেট
            userCash = data.user.cash || 0;
            userAAF = data.user.aaf || 0;
            currentFee = data.admin.trading_fee || 0.5;
            
            if (document.getElementById('fee-perc')) document.getElementById('fee-perc').innerText = currentFee;
            if (document.getElementById('admin-ad-text')) document.getElementById('admin-ad-text').innerText = data.admin.trading_ad_text || "Welcome to AAF Trading";
            if (document.getElementById('user-cash')) document.getElementById('user-cash').innerText = `৳ ${parseFloat(userCash).toFixed(2)}`;
            if (document.getElementById('user-aaf')) document.getElementById('user-aaf').innerText = parseFloat(userAAF).toFixed(2);
            
            // রিয়েল-টাইম লাইভ ক্যান্ডেল আপডেট
            updateChartCandles(lastPrice);
            
            calculate(); 
        } else if (data.message === "session_expired") {
            console.error("টেলিগ্রাম সেশন পাওয়া যায়নি! দয়া করে বট থেকে আবার প্রবেশ করুন।");
        }
    } catch (e) { 
        console.error("Data Sync Error:", e); 
    }
}

// ৩. লাইভ ক্যান্ডেলস্টিক মেকার লজিক
let generatedCandles = [];
function updateChartCandles(currentPrice) {
    const now = Math.floor(Date.now() / 1000);
    const currentMinuteTime = now - (now % 60); 

    // চার্ট প্রথমবার লোড হলে ড্যাশবোর্ডের প্রাইস দিয়ে ২০টি ব্যাকগ্রাউন্ড ক্যান্ডেল তৈরি করবে
    if (generatedCandles.length === 0) {
        let basePrice = currentPrice;
        for (let i = 20; i >= 1; i--) {
            let mockTime = currentMinuteTime - (i * 60);
            let change = (Math.random() - 0.5) * 0.02;
            generatedCandles.push({
                time: mockTime,
                open: basePrice + change,
                high: basePrice + Math.abs(change) + 0.01,
                low: basePrice - Math.abs(change) - 0.01,
                close: basePrice
            });
            basePrice = basePrice + change;
        }
        candleSeries.setData(generatedCandles);
        chart.timeScale().fitContent();
    }

    // প্রতি সেকেন্ডের প্রাইস মুভমেন্ট অনুযায়ী কারেন্ট ক্যান্ডেল লাইভ আপ-ডাউন করবে
    candleSeries.update({
        time: currentMinuteTime,
        open: generatedCandles[generatedCandles.length - 1]?.close || currentPrice,
        high: currentPrice + 0.005,
        low: currentPrice - 0.005,
        close: currentPrice
    });
}

// ৪. সেশন ভিত্তিক বাই/সেল (ট্রেড) এক্সিকিউট ফাংশন
async function executeTrade(type) {
    const tkVal = parseFloat(document.getElementById('taka-input').value);
    const coVal = parseFloat(document.getElementById('coin-input').value);
    
    if (!tkVal || tkVal <= 0) { triggerPopup("সঠিক পরিমাণ লিখুন"); return; }

    try {
        const res = await fetch(`${API}/api/trade/execute`, {
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                type: type,
                taka: tkVal,
                coin: coVal,
                price: lastPrice
                // এখানে আর আলাদা করে telegram_id পাঠাতে হবে না, Flask ব্যাকএন্ড সেশন থেকেই আইডি রিড করে নেবে
            }),
            credentials: "include" // সেশন ভেরিফিকেশনের জন্য মাস্ট
        });
        
        const data = await res.json();
        triggerPopup(data.message);
        syncTradingData(); // ট্রেড হওয়ার সাথে সাথে ড্যাশবোর্ডের মতো ব্যালেন্স সিঙ্ক হবে
    } catch (e) { 
        triggerPopup("সার্ভার এরর!"); 
    }
}

// ৫. হিসাব-নিকাশ (Calculation) লজিক
const tkIn = document.getElementById('taka-input');
const coIn = document.getElementById('coin-input');

function calculate() {
    if (!tkIn || !coIn) return;
    let tk = parseFloat(tkIn.value) || 0;
    let co = parseFloat(coIn.value) || 0;
    let fee = tk * currentFee / 100;
    let total = tk + fee;
    
    if (document.getElementById('fee-amount')) document.getElementById('fee-amount').innerText = `৳ ${fee.toFixed(2)}`;
    if (document.getElementById('total-cost')) document.getElementById('total-cost').innerText = `৳ ${total.toFixed(2)}`;
    
    if (document.getElementById('buy-btn')) document.getElementById('buy-btn').disabled = !(tk >= 10 && total <= userCash);
    if (document.getElementById('sell-btn')) document.getElementById('sell-btn').disabled = !(co > 0 && co <= userAAF);
}

if (tkIn) tkIn.oninput = () => { coIn.value = (tkIn.value / lastPrice).toFixed(4); calculate(); };
if (coIn) coIn.oninput = () => { tkIn.value = (coIn.value * lastPrice).toFixed(2); calculate(); };

// পেজ লোড হলে রান হবে
window.onload = () => {
    initChart();
    
    // ড্যাশবোর্ডের মতো দ্রুত ডেটা লোড শুরু করা
    syncTradingData();
    
    // প্রতি ২ সেকেন্ড পর পর ব্যাকএন্ড কুকি চেক করে ডেটা ও চার্ট রিফ্রেশ হবে
    setInterval(syncTradingData, 2000);
    
    // থিম টগল (লাইট/ডার্ক মোড)
    const themeBtn = document.getElementById('chart-theme-toggle');
    if (themeBtn) {
        themeBtn.onclick = function() {
            isDarkMode = !isDarkMode;
            const ts = document.getElementById('theme-status');
            if (isDarkMode) {
                chart.applyOptions({ layout: { background: { color: '#000000' }, textColor: '#d1d4dc' } });
                this.style.background = "#1e293b"; if (ts) { ts.innerText = "DARK"; ts.style.color = "#94a3b8"; }
            } else {
                chart.applyOptions({ layout: { background: { color: '#ffffff' }, textColor: '#191919' } });
                this.style.background = "#f1f5f9"; if (ts) { ts.innerText = "LIGHT"; ts.style.color = "#000"; }
            }
        };
    }
};
    
    </script>
</body>
</html>
