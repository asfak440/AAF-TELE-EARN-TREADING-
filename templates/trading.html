<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Trading | Pro Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Lightweight Charts CDN (প্রফেশনাল চার্ট) -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.js"></script>
    <style>
           @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Hind+Siliguri:wght@400;600&family=Syncopate:wght@400;700&display=swap');

:root {
    --bg: #05080d;
    --card: #0f172a;
    --border: rgba(255, 255, 255, 0.05);
    --cyan: #00f2fe;
    --green: #00ffa3;
    --red: #ff3366;
    --text: #94a3b8;
    --glass-border: rgba(255, 255, 255, 0.1);
}

/* ---------- বেস স্টাইল ---------- */
body {
    background: #0f172a;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    margin: 0;
    padding-bottom: 110px;
    overflow-x: hidden;
}

/* ---------- হেডার ও ফিক্সড এলিমেন্ট ---------- */
.header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 35px;
    z-index: 3000;
    background: #0f172a;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 15px;
    box-sizing: border-box;
    border-bottom: 1px solid var(--border);
}

#admin-ad-box {
    position: fixed;
    top: 35px;
    left: 0;
    width: 100%;
    height: 25px;
    background: #1e293b;
    z-index: 2999;
    display: flex;
    align-items: center;
}

.tf-bar {
    position: fixed;
    top: 60px;
    left: 0;
    width: 100%;
    height: 35px;
    z-index: 2998;
    background: #000;
    display: flex;
    gap: 8px;
    padding: 5px 15px;
    overflow-x: auto;
    box-sizing: border-box;
}

.tf-btn {
    background: #1e293b;
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #94a3b8;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.tf-btn.active {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0, 242, 254, 0.1);
}

/* ---------- চার্ট এলিমেন্ট ---------- */
#chart-wrapper {
    position: fixed;
    top: 95px;
    left: 0;
    width: 100%;
    height: 250px;
    z-index: 2997;
    background: #0f172a;
    border-bottom: 1px solid var(--border);
}

#chart-container {
    width: 100%;
    height: 100% !important;
    min-height: 250px;
    background: #0f172a;
    touch-action: none;
    overflow: hidden;
    position: relative;
}

.tv-lightweight-charts-logo {
    display: none !important;
}

/* ক্যান্ডেল ক্যানভাস */
#candleCanvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: crisp-edges;
    image-rendering: pixelated;
}

#chart-theme-toggle {
    position: absolute;
    left: 10px;
    bottom: 10px;
    z-index: 3001;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: #1e293b;
    color: white;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
}

/* ---------- কন্টেইনার ও কার্ড ---------- */
.container {
    padding-top: 360px;
    padding-bottom: 100px;
    max-width: 350px;
    margin: auto;
    padding-left: 15px;
    padding-right: 15px;
}

.stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 15px;
}

.stat-card {
    background: var(--card);
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    text-align: center;
}

.stat-card span {
    font-size: 10px;
    color: var(--text);
    display: block;
}

.stat-card b {
    font-family: 'Rajdhani';
    font-size: 16px;
    color: #fff;
}

.trade-box {
    background: var(--card);
    padding: 15px;
    border-radius: 15px;
    border: 1px solid var(--border);
    position: relative;
}

.input-group {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 15px;
}

.input-box {
    flex: 1;
    position: relative;
}

.input-box input {
    width: 100%;
    background: #000;
    border: 1px solid var(--border);
    padding: 12px;
    color: var(--cyan);
    font-size: 16px;
    border-radius: 8px;
    box-sizing: border-box;
    outline: none;
}

.input-box span {
    position: absolute;
    right: 8px;
    top: 14px;
    color: var(--text);
    font-size: 10px;
}

.fee-card {
    background: rgba(255, 255, 255, 0.02);
    padding: 12px;
    border-radius: 10px;
    border: 1px dashed var(--border);
    margin-bottom: 15px;
}

.fee-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 4px;
}

.btn-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.btn {
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    font-size: 12px;
    text-transform: uppercase;
    transition: 0.2s;
}

.buy {
    background: var(--green);
    color: #000;
}

.sell {
    background: var(--red);
    color: #fff;
}

.btn:disabled {
    opacity: 0.3;
    filter: grayscale(1);
    cursor: not-allowed;
}

/* ---------- পপআপ ও নেভিগেশন ---------- */
#active-user-bar {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid var(--cyan);
    padding: 10px;
    border-radius: 12px;
    display: none;
    align-items: center;
    gap: 10px;
    z-index: 9999;
    backdrop-filter: blur(10px);
    animation: slideDown 0.4s forwards;
}

@keyframes slideDown {
    from {
        top: -50px;
        opacity: 0;
    }
    to {
        top: 80px;
        opacity: 1;
    }
}

.dock-container {
    position: fixed;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
    z-index: 5000;
}

.dock-nav {
    width: 90%;
    max-width: 400px;
    height: 55px;
    background: rgba(15, 23, 42, 0.95);
    border-radius: 35px;
    border: 1px solid var(--glass-border);
    display: flex;
    justify-content: space-around;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(10px);
}

.nav-item {
    color: #94a3b8;
    text-decoration: none;
    font-size: 8px;
    text-align: center;
    transition: 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Rajdhani';
    font-weight: 600;
    text-transform: uppercase;
}

.nav-item i {
    font-size: 16px;
    display: block;
    margin-bottom: 2px;
}

.nav-item.active {
    color: var(--cyan);
    text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
}

.loading-spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    border-top-color: var(--cyan);
    animation: spin 0.6s linear infinite;
    margin-right: 5px;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

/* ========== লাইট থিম ওভাররাইড ========== */
body.light {
    background: #ffffff;
}

body.light #chart-wrapper,
body.light #chart-container {
    background: #ffffff;
}

body.light .header,
body.light .dock-nav {
    background: #f0f0f0;
    border-bottom: 1px solid #ddd;
}

body.light .tf-btn {
    background: #e0e0e0;
    color: #333;
    border: none;
}

body.light .tf-btn.active {
    background: #2962ff;
    color: #fff;
}

body.light .stat-card {
    background: #f5f5f5;
    border: 1px solid #ddd;
}

body.light .stat-card span,
body.light .stat-card b {
    color: #333;
}

body.light .trade-box {
    background: #f5f5f5;
    border: 1px solid #ddd;
}

body.light .fee-card {
    background: #e8e8e8;
}

body.light .fee-row span,
body.light .fee-row b {
    color: #333;
}

body.light #candleCanvas {
    background: #ffffff;
}

body.light #chart-theme-toggle {
    background: #e0e0e0;
    border: 1px solid #ccc;
    color: #333;
        }
    </style>
</head>
<body>
    <div id="active-user-bar">
        <i class="fas fa-bolt" style="color: var(--cyan);"></i>
        <span id="popup-text" style="font-size: 12px; color: #fff; font-weight: bold;"></span>
    </div>

    <header class="header">
        <h2 style="font-size: 10px; margin: 0; font-family: 'Syncopate';">AAF TRADING</h2>
        <span id="live-price" style="font-size: 12px; color: var(--green); font-family: 'Rajdhani';">৳ 0.0000</span>
    </header>

    <div id="admin-ad-box">
        <marquee id="admin-ad-text" behavior="scroll" direction="left" style="color: #00f2fe; font-size: 10px;">লোড হচ্ছে...</marquee>
    </div>

    <div class="tf-bar">
        <button class="tf-btn" data-tf="1">1M</button>
        <button class="tf-btn" data-tf="5">5M</button>
        <button class="tf-btn" data-tf="15">15M</button>
        <button class="tf-btn" data-tf="60">1H</button>
        <button class="tf-btn" data-tf="240">4H</button>
        <button class="tf-btn" data-tf="1440">1D</button>
    </div>

    <div id="chart-wrapper">
        <div id="chart-theme-toggle">
            <i class="fas fa-moon"></i>
            <span id="theme-status">DARK</span>
        </div>
        <div id="chart-container"></div>
    </div>

    <div class="container">
        <div class="stat-grid">
            <div class="stat-card"><span>আপনার AAF</span><b id="user-aaf">0.00</b></div>
            <div class="stat-card"><span>টাকা ব্যালেন্স</span><b id="user-cash">৳ 0.00</b></div>
        </div>

        <div class="trade-box">
            <div class="input-group">
                <div class="input-box"><input type="number" id="taka-input" placeholder="0.00" step="any"><span>BDT</span></div>
                <i class="fas fa-exchange-alt" style="color:var(--text)"></i>
                <div class="input-box"><input type="number" id="coin-input" placeholder="0.00" step="any"><span>AAF</span></div>
            </div>
            <div class="fee-card">
                <div class="fee-row"><span>ফি (<span id="fee-perc">0.5</span>%):</span><b id="fee-amount">৳ 0.00</b></div>
                <div class="fee-row"><span>মোট খরচ:</span><b id="total-cost" style="color:var(--cyan)">৳ 0.00</b></div>
            </div>
            <div class="btn-group">
                <button id="buy-btn" class="btn buy">BUY SPOT</button>
                <button id="sell-btn" class="btn sell">SELL SPOT</button>
            </div>
        </div>
    </div>

    <div class="dock-container">
        <nav class="dock-nav">
            <a href="/dashboard" class="nav-item"><i class="fas fa-house"></i>Home</a>
            <a href="/task" class="nav-item"><i class="fas fa-tasks"></i>Task</a>
            <a href="/trading" class="nav-item active"><i class="fas fa-chart-line"></i>Trading</a>
            <a href="/wallet" class="nav-item"><i class="fas fa-wallet"></i>Wallet</a>
            <a href="/account" class="nav-item"><i class="fas fa-user-circle"></i>Account</a>
        </nav>
    </div>
<script>
(function(){
    // ---------- ডিবাগ লগ সিস্টেম ----------
    let dbgDiv = document.createElement('div');
    dbgDiv.id = 'live-debug';
    dbgDiv.style.cssText = 'position:fixed; bottom:80px; left:5px; right:5px; background:rgba(0,0,0,0.9); color:#0f0; font-size:10px; padding:5px; border-radius:6px; z-index:9999; font-family:monospace; border:1px solid #00f2fe; word-break:break-all; pointer-events:none;';
    document.body.appendChild(dbgDiv);
    function log(msg) {
        console.log(msg);
        if(dbgDiv) {
            dbgDiv.innerHTML = new Date().toLocaleTimeString() + ' | ' + msg + '<br>' + dbgDiv.innerHTML;
            if(dbgDiv.innerHTML.split('<br>').length > 5) dbgDiv.innerHTML = dbgDiv.innerHTML.split('<br>').slice(0,5).join('<br>');
        }
    }

    // ---------- ভেরিয়েবলস ----------
    const container = document.getElementById('chart-container');
    let lastPrice = 1.0, userCash = 0, userAAF = 0, currentFee = 0.5;
    let currentTimeframe = '1m', isProcessing = false;
    let isDarkTheme = true;
    let candleSeries;
    let chart;
    let wsConnection;

    // ---------- ১. TradingView Lightweight Charts ইঞ্জিন তৈরি ----------
    function initTradingViewChart() {
        if (!container) return;
        container.innerHTML = ''; // পুরনো ক্যানভাস মুছে ফেলা

        chart = LightweightCharts.createChart(container, {
            width: container.clientWidth,
            height: container.clientHeight || 250,
            layout: {
                background: { type: 'vertical', color: isDarkTheme ? '#0f172a' : '#ffffff' },
                textColor: isDarkTheme ? '#94a3b8' : '#333333',
            },
            grid: {
                vertLines: { color: isDarkTheme ? 'rgba(255, 255, 255, 0.03)' : 'rgba(0, 0, 0, 0.05)' },
                horzLines: { color: isDarkTheme ? 'rgba(255, 255, 255, 0.03)' : 'rgba(0, 0, 0, 0.05)' },
            },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: isDarkTheme ? 'rgba(255, 255, 255, 0.1)' : '#ddd' },
            timeScale: { 
                borderColor: isDarkTheme ? 'rgba(255, 255, 255, 0.1)' : '#ddd',
                timeVisible: true,
                secondsVisible: false
            },
            handleScale: { mouseWheel: true, pinch: true },
            handleScroll: { mouseMove: true, touchMove: true }
        });

        // বাইনান্সের অফিশিয়াল গ্রিন ও রেড কালার কোড
        candleSeries = chart.addCandlestickSeries({
            upColor: '#26a69a',
            downColor: '#ef5350',
            borderDownColor: '#ef5350',
            borderUpColor: '#26a69a',
            wickDownColor: '#ef5350',
            wickUpColor: '#26a69a',
        });

        // রেসপন্সিভ চার্ট রিলোজ লজিক
        window.addEventListener('resize', () => {
            chart.resize(container.clientWidth, container.clientHeight || 250);
        });
    }

    // ---------- ২. বাইনান্স লাইভ WebSocket কানেকশন ----------
    function connectBinanceSocket(timeframe = '1m') {
        if (wsConnection) {
            wsConnection.close();
            log("🔄 পুরনো ডাটাস্ট্রিম বন্ধ করা হয়েছে");
        }

        log(`📡 Binance WebSocket কানেক্ট হচ্ছে (${timeframe})...`);
        
        // সোলানা (SOL/USDT) পেয়ারের লাইভ ডাটা স্ট্রিম
        wsConnection = new WebSocket(`wss://stream.binance.com:9443/ws/solusdt@kline_${timeframe}`);

        wsConnection.onmessage = (event) => {
            const message = JSON.parse(event.data);
            const kline = message.k;

            const candleData = {
                time: Math.floor(kline.t / 1000), // মিলি-সেকেন্ডকে সেকেন্ডে রূপান্তর (বাধ্যতামূলক)
                open: parseFloat(kline.o),
                high: parseFloat(kline.h),
                low: parseFloat(kline.l),
                close: parseFloat(kline.c)
            };

            // চার্ট আপডেট
            candleSeries.update(candleData);

            // আপনার UI-তে লাইভ প্রাইস আপডেট করা
            lastPrice = parseFloat(kline.c);
            const priceEl = document.getElementById('live-price');
            if (priceEl) {
                priceEl.innerHTML = `৳ ${lastPrice.toFixed(4)}`;
                priceEl.style.color = (kline.c >= kline.o) ? '#00ffa3' : '#ff3366';
            }
            calculateTradeCost();
        };

        wsConnection.onerror = (err) => log("❌ WebSocket ত্রুটি ঘটেছে");
        wsConnection.onclose = () => log("🔌 লাইভ ডাটা কানেকশন বিচ্ছিন্ন");
    }

    // ---------- ৩. হিস্টোরিক্যাল ডাটা লোড (ব্যাকআপ লজিক) ----------
    async function loadHistoricalCandles() {
        try {
            const res = await fetch('/api/candles', { credentials: 'include' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            let raw = data.candles || [];
            if (raw.length) {
                let parsed = raw.map(c => ({
                    time: c.time > 1e11 ? Math.floor(c.time / 1000) : parseInt(c.time),
                    open: parseFloat(c.open),
                    high: parseFloat(c.high),
                    low: parseFloat(c.low),
                    close: parseFloat(c.close)
                })).sort((a, b) => a.time - b.time);
                
                candleSeries.setData(parsed);
                log(`✅ ডাটাবেস ক্যান্ডেল সফলভাবে চার্টে সেট হয়েছে`);
            }
        } catch (e) {
            log("⚠️ আপনার এপিআই ক্যান্ডেল খালি, বাইনান্স লাইভ ফিড চালু আছে");
        }
    }

    // ---------- ৪. ইউজার ডাটা এবং সিঙ্ক লজিক ----------
    async function syncUserData() {
        try {
            const res = await fetch('/api/user/me', { credentials: 'include', headers: { 'Cache-Control': 'no-cache' } });
            if (res.status === 401) { window.location.href = '/login'; return; }
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (data.status === 'success') {
                userCash = parseFloat(data.user.cash) || 0;
                userAAF = parseFloat(data.user.aaf) || 0;
                currentFee = parseFloat(data.admin.trading_fee) || 0.5;
                
                document.getElementById('user-cash').innerHTML = `৳ ${userCash.toFixed(2)}`;
                document.getElementById('user-aaf').innerHTML = userAAF.toFixed(4);
                document.getElementById('fee-perc').innerHTML = currentFee;
                document.getElementById('admin-ad-text').innerHTML = data.admin.trading_ad_text || "✅ ট্রেডিং লাইভ";
                calculateTradeCost();
            }
        } catch (e) { console.error("সিঙ্ক এরর:", e); }
    }

    function calculateTradeCost() {
        let taka = parseFloat(document.getElementById('taka-input').value) || 0;
        let coin = parseFloat(document.getElementById('coin-input').value) || 0;
        if (document.activeElement === document.getElementById('taka-input') && taka > 0) {
            coin = taka / lastPrice;
            document.getElementById('coin-input').value = coin.toFixed(4);
        } else if (document.activeElement === document.getElementById('coin-input') && coin > 0) {
            taka = coin * lastPrice;
            document.getElementById('taka-input').value = taka.toFixed(2);
        }
        const fee = (taka * currentFee) / 100;
        const total = taka + fee;
        
        if(document.getElementById('fee-amount')) document.getElementById('fee-amount').innerHTML = `৳ ${fee.toFixed(2)}`;
        if(document.getElementById('total-cost')) document.getElementById('total-cost').innerHTML = `৳ ${total.toFixed(2)}`;
        
        document.getElementById('buy-btn').disabled = (taka < 10 || total > userCash);
        document.getElementById('sell-btn').disabled = (coin <= 0 || coin > userAAF);
    }

    // ---------- ৫. ট্রেড এক্সিকিউশন ----------
    async function executeTrade(type) {
        if (isProcessing) { showPopup("⏳ আগের লেনদেন প্রসেসিং..."); return; }
        let taka = parseFloat(document.getElementById('taka-input').value) || 0;
        let coin = parseFloat(document.getElementById('coin-input').value) || 0;
        
        if (type === 'buy') {
            if (taka < 10) { showPopup("❌ ন্যূনতম ১০ টাকা ট্রেড করতে হবে!"); return; }
            const fee = (taka * currentFee) / 100;
            if (taka + fee > userCash) { showPopup(`❌ টাকা কম! প্রয়োজন ${(taka + fee).toFixed(2)}`); return; }
        } else {
            if (coin <= 0) { showPopup("❌ সঠিক কয়েন দিন!"); return; }
            if (coin > userAAF) { showPopup(`❌ আপনার কাছে ${userAAF.toFixed(4)} AAF আছে`); return; }
        }
        
        isProcessing = true;
        const buyBtn = document.getElementById('buy-btn'), sellBtn = document.getElementById('sell-btn');
        buyBtn.disabled = sellBtn.disabled = true;
        
        try {
            const res = await fetch('/api/trade/execute', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
                body: JSON.stringify({ type, taka, coin, price: lastPrice })
            });
            const data = await res.json();
            if (data.status === 'success') {
                showPopup(`✅ ${data.message}`);
                document.getElementById('taka-input').value = '';
                document.getElementById('coin-input').value = '';
                await syncUserData();
            } else { showPopup(`❌ ${data.message || 'ট্রেড ব্যর্থ!'}`); }
        } catch (e) { showPopup("❌ সার্ভার ত্রুটি"); }
        finally {
            isProcessing = false;
            buyBtn.disabled = sellBtn.disabled = false;
            calculateTradeCost();
        }
    }

    function showPopup(msg) {
        const bar = document.getElementById('active-user-bar');
        if (bar) { document.getElementById('popup-text').innerText = msg; bar.style.display = 'flex'; setTimeout(() => bar.style.display = 'none', 3000); }
        else alert(msg);
    }

    // ---------- ৬. টাইমফ্রেম হ্যান্ডলার ----------
    function updateTimeframe(tfValue) {
        let binanceTf = '1m';
        if (tfValue === 5) binanceTf = '5m';
        if (tfValue === 15) binanceTf = '15m';
        if (tfValue === 60) binanceTf = '1h';
        if (tfValue === 240) binanceTf = '4h';
        if (tfValue === 1440) binanceTf = '1d';

        currentTimeframe = binanceTf;
        
        document.querySelectorAll('.tf-btn').forEach(btn => {
            if (parseInt(btn.dataset.tf) === tfValue) btn.classList.add('active');
            else btn.classList.remove('active');
        });

        // নতুন টাইমফ্রেম রিইনিশিয়ালাইজ করা
        initTradingViewChart();
        loadHistoricalCandles();
        connectBinanceSocket(binanceTf);
    }

    function toggleTheme() {
        isDarkTheme = !isDarkTheme;
        const themeSpan = document.getElementById('theme-status');
        const themeBtn = document.getElementById('chart-theme-toggle');
        
        if (isDarkTheme) {
            themeSpan.innerText = 'DARK';
            themeBtn.innerHTML = '<i class="fas fa-moon"></i> DARK';
            document.body.classList.remove('light');
        } else {
            themeSpan.innerText = 'LIGHT';
            themeBtn.innerHTML = '<i class="fas fa-sun"></i> LIGHT';
            document.body.classList.add('light');
        }
        
        // থিম অনুযায়ী চার্ট রি-রেন্ডার
        initTradingViewChart();
        loadHistoricalCandles();
        connectBinanceSocket(currentTimeframe);
    }

    // ---------- ইভেন্ট লিসেনারস ----------
    document.getElementById('taka-input')?.addEventListener('input', calculateTradeCost);
    document.getElementById('coin-input')?.addEventListener('input', calculateTradeCost);
    document.getElementById('buy-btn')?.addEventListener('click', () => executeTrade('buy'));
    document.getElementById('sell-btn')?.addEventListener('click', () => executeTrade('sell'));
    
    document.querySelectorAll('.tf-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            let tf = parseInt(btn.dataset.tf);
            if (!isNaN(tf)) updateTimeframe(tf);
        });
    });
    
    document.getElementById('chart-theme-toggle')?.addEventListener('click', toggleTheme);

    // ---------- বুটস্ট্র্যাপ / স্টার্ট ----------
    window.addEventListener('DOMContentLoaded', async () => {
        log("🚀 প্রফেশনাল লাইটওয়েট চার্ট লোড হচ্ছে...");
        initTradingViewChart();
        await syncUserData();
        await loadHistoricalCandles();
        connectBinanceSocket('1m');
        setInterval(syncUserData, 8000); // ব্যাকএন্ড ব্যালেন্স ট্র্যাকিং
    });
})();
</script>
</body>
</html>
