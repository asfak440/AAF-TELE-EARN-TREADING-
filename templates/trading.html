<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Trading | Pro Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Lightweight Charts CDN (প্রফেশনাল চার্ট) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.1/lightweight-charts.standalone.production.min.js"></script>
    <style>
           @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Hind+Siliguri:wght@400;600&family=Syncopate:wght@400;700&display=swap');

:root {
    --bg: #05080d;
    --card: #0f172a;
    --border: rgba(255, 255, 255, 0.05);
    --cyan: #00f2fe;
    --green: #00ffa3;
    --red: #ff3366;
    --text: #94a3b8;
    --glass-border: rgba(255, 255, 255, 0.1);
}

/* ---------- বেস স্টাইল ---------- */
body {
    background: #0f172a;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    margin: 0;
    padding-bottom: 110px;
    overflow-x: hidden;
}

/* ---------- হেডার ও ফিক্সড এলিমেন্ট ---------- */
.header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 35px;
    z-index: 3000;
    background: #0f172a;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 15px;
    box-sizing: border-box;
    border-bottom: 1px solid var(--border);
}

#admin-ad-box {
    position: fixed;
    top: 35px;
    left: 0;
    width: 100%;
    height: 25px;
    background: #1e293b;
    z-index: 2999;
    display: flex;
    align-items: center;
}

.tf-bar {
    position: fixed;
    top: 60px;
    left: 0;
    width: 100%;
    height: 35px;
    z-index: 2998;
    background: #000;
    display: flex;
    gap: 8px;
    padding: 5px 15px;
    overflow-x: auto;
    box-sizing: border-box;
}

.tf-btn {
    background: #1e293b;
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #94a3b8;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.tf-btn.active {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0, 242, 254, 0.1);
}

/* ---------- চার্ট এলিমেন্ট ---------- */
#chart-wrapper {
    position: fixed;
    top: 95px;
    left: 0;
    width: 100%;
    height: 250px;
    z-index: 2997;
    background: #0f172a;
    border-bottom: 1px solid var(--border);
}

#chart-container {
    width: 100%;
    height: 100% !important;
    min-height: 250px;
    background: #0f172a;
    touch-action: none;
    overflow: hidden;
    position: relative;
}

.tv-lightweight-charts-logo {
    display: none !important;
}

/* ক্যান্ডেল ক্যানভাস */
#candleCanvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: crisp-edges;
    image-rendering: pixelated;
}

#chart-theme-toggle {
    position: absolute;
    left: 10px;
    bottom: 10px;
    z-index: 3001;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: #1e293b;
    color: white;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
}

/* ---------- কন্টেইনার ও কার্ড ---------- */
.container {
    padding-top: 360px;
    padding-bottom: 100px;
    max-width: 350px;
    margin: auto;
    padding-left: 15px;
    padding-right: 15px;
}

.stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 15px;
}

.stat-card {
    background: var(--card);
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    text-align: center;
}

.stat-card span {
    font-size: 10px;
    color: var(--text);
    display: block;
}

.stat-card b {
    font-family: 'Rajdhani';
    font-size: 16px;
    color: #fff;
}

.trade-box {
    background: var(--card);
    padding: 15px;
    border-radius: 15px;
    border: 1px solid var(--border);
    position: relative;
}

.input-group {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 15px;
}

.input-box {
    flex: 1;
    position: relative;
}

.input-box input {
    width: 100%;
    background: #000;
    border: 1px solid var(--border);
    padding: 12px;
    color: var(--cyan);
    font-size: 16px;
    border-radius: 8px;
    box-sizing: border-box;
    outline: none;
}

.input-box span {
    position: absolute;
    right: 8px;
    top: 14px;
    color: var(--text);
    font-size: 10px;
}

.fee-card {
    background: rgba(255, 255, 255, 0.02);
    padding: 12px;
    border-radius: 10px;
    border: 1px dashed var(--border);
    margin-bottom: 15px;
}

.fee-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 4px;
}

.btn-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.btn {
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    font-size: 12px;
    text-transform: uppercase;
    transition: 0.2s;
}

.buy {
    background: var(--green);
    color: #000;
}

.sell {
    background: var(--red);
    color: #fff;
}

.btn:disabled {
    opacity: 0.3;
    filter: grayscale(1);
    cursor: not-allowed;
}

/* ---------- পপআপ ও নেভিগেশন ---------- */
#active-user-bar {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid var(--cyan);
    padding: 10px;
    border-radius: 12px;
    display: none;
    align-items: center;
    gap: 10px;
    z-index: 9999;
    backdrop-filter: blur(10px);
    animation: slideDown 0.4s forwards;
}

@keyframes slideDown {
    from {
        top: -50px;
        opacity: 0;
    }
    to {
        top: 80px;
        opacity: 1;
    }
}

.dock-container {
    position: fixed;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
    z-index: 5000;
}

.dock-nav {
    width: 90%;
    max-width: 400px;
    height: 55px;
    background: rgba(15, 23, 42, 0.95);
    border-radius: 35px;
    border: 1px solid var(--glass-border);
    display: flex;
    justify-content: space-around;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(10px);
}

.nav-item {
    color: #94a3b8;
    text-decoration: none;
    font-size: 8px;
    text-align: center;
    transition: 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Rajdhani';
    font-weight: 600;
    text-transform: uppercase;
}

.nav-item i {
    font-size: 16px;
    display: block;
    margin-bottom: 2px;
}

.nav-item.active {
    color: var(--cyan);
    text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
}

.loading-spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    border-top-color: var(--cyan);
    animation: spin 0.6s linear infinite;
    margin-right: 5px;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

/* ========== লাইট থিম ওভাররাইড ========== */
body.light {
    background: #ffffff;
}

body.light #chart-wrapper,
body.light #chart-container {
    background: #ffffff;
}

body.light .header,
body.light .dock-nav {
    background: #f0f0f0;
    border-bottom: 1px solid #ddd;
}

body.light .tf-btn {
    background: #e0e0e0;
    color: #333;
    border: none;
}

body.light .tf-btn.active {
    background: #2962ff;
    color: #fff;
}

body.light .stat-card {
    background: #f5f5f5;
    border: 1px solid #ddd;
}

body.light .stat-card span,
body.light .stat-card b {
    color: #333;
}

body.light .trade-box {
    background: #f5f5f5;
    border: 1px solid #ddd;
}

body.light .fee-card {
    background: #e8e8e8;
}

body.light .fee-row span,
body.light .fee-row b {
    color: #333;
}

body.light #candleCanvas {
    background: #ffffff;
}

body.light #chart-theme-toggle {
    background: #e0e0e0;
    border: 1px solid #ccc;
    color: #333;
        }
    </style>
</head>
<body>
    <div id="active-user-bar">
        <i class="fas fa-bolt" style="color: var(--cyan);"></i>
        <span id="popup-text" style="font-size: 12px; color: #fff; font-weight: bold;"></span>
    </div>

    <header class="header">
        <h2 style="font-size: 10px; margin: 0; font-family: 'Syncopate';">AAF TRADING</h2>
        <span id="live-price" style="font-size: 12px; color: var(--green); font-family: 'Rajdhani';">৳ 0.0000</span>
    </header>

    <div id="admin-ad-box">
        <marquee id="admin-ad-text" behavior="scroll" direction="left" style="color: #00f2fe; font-size: 10px;">লোড হচ্ছে...</marquee>

    <div class="tf-bar">
        <button class="tf-btn" data-tf="1">1M</button>

        <button class="tf-btn" data-tf="1440">1D</button>
    </div>

    <div id="chart-wrapper">
        <div id="chart-theme-toggle">
            <i class="fas fa-moon"></i>
            <span id="theme-status">DARK</span>
        </div>
        <div id="chart-container"></div>
    </div>

    <div class="container">
        <div class="stat-grid">
            <div class="stat-card"><span>আপনার AAF</span><b id="user-aaf">0.00</b></div>
            <div class="stat-card"><span>টাকা ব্যালেন্স</span><b id="user-cash">৳ 0.00</b></div>
        </div>

        <div class="trade-box">
            <div class="input-group">
                <div class="input-box"><input type="number" id="taka-input" placeholder="0.00" step="any"><span>BDT</span></div>
                <i class="fas fa-exchange-alt" style="color:var(--text)"></i>
                <div class="input-box"><input type="number" id="coin-input" placeholder="0.00" step="any"><span>AAF</span></div>
            </div>
            <div class="fee-card">
                <div class="fee-row"><span>ফি (<span id="fee-perc">0.5</span>%):</span><b id="fee-amount">৳ 0.00</b></div>

                <button id="buy-btn" class="btn buy">BUY SPOT</button>

        </div>
    </div>

    <div class="dock-container">
        <nav class="dock-nav">
            <a href="/dashboard" class="nav-item"><i class="fas fa-house"></i>Home</a>
            <a href="/task" class="nav-item"><i class="fas fa-tasks"></i>Task</a>
            <a href="/trading" class="nav-item active"><i class="fas fa-chart-line"></i>Trading</a>
            <a href="/wallet" class="nav-item"><i class="fas fa-wallet"></i>Wallet</a>
            <a href="/account" class="nav-item"><i class="fas fa-user-circle"></i>Account</a>
        </nav>
    </div>
    <script src="/static/js/lightweight-charts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.1/lightweight-charts.standalone.production.min.js"></script>
    
<script>
(function() {
    const container = document.getElementById('chart-container');
    if (!container) return;

    container.style.cssText = "width: 100%; height: 260px; min-height: 260px; display: block; position: relative;";

    // রিয়েল-টাইম লাইভ ডিবাগ লগ স্ক্রিন
    let dbgDiv = document.getElementById('live-debug');
    if(!dbgDiv) {
        dbgDiv = document.createElement('div');
        dbgDiv.id = 'live-debug';
        dbgDiv.style.cssText = 'position:fixed; bottom:75px; left:5px; right:5px; background:rgba(15,23,42,0.95); color:#00ffa3; font-size:10px; padding:6px; border-radius:6px; z-index:9999; font-family:monospace; border:1px solid #00f2fe; pointer-events:none;';
        document.body.appendChild(dbgDiv);
    }
    
    function log(msg) {
        if(dbgDiv) {
            dbgDiv.innerHTML = new Date().toLocaleTimeString() + ' | ' + msg + '<br>' + dbgDiv.innerHTML;
            let lines = dbgDiv.innerHTML.split('<br>');
            if(lines.length > 4) dbgDiv.innerHTML = lines.slice(0,4).join('<br>');
        }
    }

    let chart = null;
    let candleSeries = null;
    let lastPrice = 1.0;
    let currentTimeframe = 1; 
    let isDarkTheme = true; 

    const themeColors = {
        dark: { bg: '#0f172a', grid: 'rgba(255, 255, 255, 0.05)', text: '#94a3b8', upCandle: '#00ffa3', downCandle: '#ff3366' },
        light: { bg: '#ffffff', grid: 'rgba(0, 0, 0, 0.06)', text: '#334155', upCandle: '#00c853', downCandle: '#ff1744' }
    };

    // 📊 চার্ট আর্কিটেকচার বুটস্ট্র্যাপ
    function initTradingViewChart() {
        if (!window.LightweightCharts) return;
        container.innerHTML = '';
        const activeColors = isDarkTheme ? themeColors.dark : themeColors.light;

        chart = LightweightCharts.createChart(container, {
            width: container.clientWidth || window.innerWidth,
            height: 260,
            layout: { background: { type: 'solid', color: activeColors.bg }, textColor: activeColors.text },
            grid: { vertLines: { color: activeColors.grid }, horzLines: { color: activeColors.grid } },
            timeScale: { timeVisible: true, secondsVisible: false, borderColor: activeColors.grid }
        });

        candleSeries = chart.addCandlestickSeries({
            upColor: activeColors.upCandle, downColor: activeColors.downCandle,
            borderUpColor: activeColors.upCandle, borderDownColor: activeColors.downCandle,
            wickUpColor: activeColors.upCandle, wickDownColor: activeColors.downCandle,
        });
    }

    // 📜 ১. ফায়ারবেস (Firebase API) থেকে ২ মাসের ওল্ড ক্যান্ডেল হিস্ট্রি লোড
    async function fetchFirebaseHistory() {
        try {
            log("📡 Firebase থেকে ২ মাসের ক্যান্ডেল ব্যাকআপ আনা হচ্ছে...");
            // আপনার ব্যাকএন্ডের ফায়ারবেস হিস্ট্রি এপিআই রুট (যা ফায়ারবেস রেফারেন্স থেকে ডাটা পাঠায়)
            const res = await fetch('/api/candles?_cb=' + Date.now(), { credentials: 'include' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            
            const data = await res.json();
            let historyCandles = data.candles || [];

            if (candleSeries && historyCandles.length > 0) {
                let parsed = historyCandles.map(c => {
                    let t = parseInt(c.time);
                    if (t > 9999999999) t = Math.floor(t / 1000); // সেকেন্ডে রূপান্তর
                    return {
                        time: t,
                        open: parseFloat(c.open),
                        high: parseFloat(c.high),
                        low: parseFloat(c.low),
                        close: parseFloat(c.close)
                    };
                });
                parsed.sort((a, b) => a.time - b.time); // টাইম সিকোয়েন্স ফিক্স
                candleSeries.setData(parsed);
                chart.timeScale().fitContent();
                log(`✅ Firebase থেকে ${parsed.length}টি ক্যান্ডেল চার্টে সাজানো হয়েছে`);
            }
        } catch (err) {
            log("⚠️ ফায়ারবেস ডাটাবেস হিস্ট্রি কানেকশন পেন্ডিং...");
        }
    }

    // 🕯️ ২. মঙ্গোডিবি (MongoDB Live API) থেকে লাইভ ক্যান্ডেলস্টিক জেনারেট ও রিয়েল-টাইম কাঁপানো
    async function syncMongoDBLive() {
        try {
            // আপনার প্রোভাইড করা লাইভ মার্কেট প্রাইস এপিআই রুট
            const res = await fetch('/api/market/price?_cb=' + Date.now(), { credentials: 'include' });
            const data = await res.json();
            
            if (data && data.live_price) {
                const livePriceFromMongo = parseFloat(data.live_price);
                
                // লাইভ প্রাইস টেক্সট ডাইনামিক রেন্ডারিং
                const priceEl = document.getElementById('live-price');
                if (priceEl) {
                    priceEl.innerHTML = `৳ ${livePriceFromMongo.toFixed(4)}`;
                    priceEl.style.color = (livePriceFromMongo >= lastPrice) ? '#00ffa3' : '#ff3366';
                }

                // মঙ্গোডিবির প্রাইস সরাসরি চার্টের লাইভ রানিং বারে পুশ করা
                if (candleSeries && livePriceFromMongo) {
                    const now = Math.floor(Date.now() / 1000);
                    const interval = currentTimeframe * 60;
                    const currentBarTime = Math.floor(now / interval) * interval;

                    candleSeries.update({
                        time: currentBarTime,
                        open: lastPrice || livePriceFromMongo,
                        high: Math.max(lastPrice, livePriceFromMongo) * 1.001,
                        low: Math.min(lastPrice, livePriceFromMongo) * 0.999,
                        close: livePriceFromMongo
                    });
                }

                lastPrice = livePriceFromMongo;
            }
        } catch (e) {
            // সাইলেন্ট এরর হ্যান্ডলার
        }
    }

    // 🔄 ৩. ইউজার ডাটা এবং এক মিনিট পর পর ক্যান্ডেল ক্লোজিং এপিআই হিট
    async function syncUserDataAndClosing() {
        try {
            // আপনার ইউজার প্রোফাইল এপিআই (ব্যালেন্স আপডেট করার জন্য)
            const res = await fetch('/api/user/me?_cb=' + Date.now(), { credentials: 'include' });
            if (res.status === 401) { window.location.href = '/login'; return; }
            const data = await res.json();
            
            if (data.status === 'success') {
                if(document.getElementById('user-cash')) document.getElementById('user-cash').innerHTML = `৳ ${(parseFloat(data.user.cash) || 0).toFixed(2)}`;
                if(document.getElementById('user-aaf')) document.getElementById('user-aaf').innerHTML = (parseFloat(data.user.aaf) || 0).toFixed(4);
            }

            // যখন কাঁটায় কাঁটায় ১ মিনিট (বা নির্দিষ্ট টাইমফ্রেম) পূর্ণ হবে
            const secs = new Date().getSeconds();
            const mins = new Date().getMinutes();
            if (secs === 0 && mins % currentTimeframe === 0) {
                log("🔄 ক্যান্ডেল টাইম শেষ! MongoDB ক্লোজড ডাটা Firebase-এ পাঠাচ্ছে...");
                
                // আপনার ব্যাকএন্ডের ক্যান্ডেল আপডেট রুট হিট করা
                await fetch('/api/market/update_candle', { method: 'POST', credentials: 'include' });
                
                // ফায়ারবেস থেকে ফ্রেশ ক্যান্ডেল হিস্ট্রি চার্টে রি-রেন্ডার করা
                setTimeout(fetchFirebaseHistory, 1500); 
            }
        } catch (err) {
            // কানেকশন এরর হ্যান্ডলার
        }
    }

    // 🎨 থিম সুইচার লিসেনার
    function setupThemeToggleListener() {
        const toggleBtn = document.getElementById('chart-theme-toggle');
        const statusText = document.getElementById('theme-status');
        if (!toggleBtn) return;

        toggleBtn.replaceWith(toggleBtn.cloneNode(true));
        const activeToggleBtn = document.getElementById('chart-theme-toggle');

        activeToggleBtn.addEventListener('click', function() {
            isDarkTheme = !isDarkTheme;
            const activeColors = isDarkTheme ? themeColors.dark : themeColors.light;

            if (isDarkTheme) {
                if (statusText) statusText.innerText = "DARK";
                activeToggleBtn.querySelector('i').className = "fas fa-moon";
                activeToggleBtn.style.color = "#fff";
                log("🌙 ডার্ক মোড অ্যাক্টিভেটেড");
            } else {
                if (statusText) statusText.innerText = "LIGHT";
                activeToggleBtn.querySelector('i').className = "fas fa-sun";
                activeToggleBtn.style.color = "#ffb703";
                log("☀️ লাইট মোড অ্যাক্টিভেটেড");
            }

            if (chart && candleSeries) {
                chart.applyOptions({
                    layout: { background: { color: activeColors.bg }, textColor: activeColors.text },
                    grid: { vertLines: { color: activeColors.grid }, horzLines: { color: activeColors.grid } },
                    timeScale: { borderColor: activeColors.grid }
                });
                candleSeries.applyOptions({
                    upColor: activeColors.upCandle, downColor: activeColors.downCandle,
                    borderUpColor: activeColors.upCandle, borderDownColor: activeColors.downCandle,
                    wickUpColor: activeColors.upCandle, wickDownColor: activeColors.downCandle
                });
            }
        });
    }

    // ⏳ টাইমফ্রেম লিসেনার
    function setupTimeframeListeners() {
        document.querySelectorAll('.tf-btn').forEach(btn => {
            btn.replaceWith(btn.cloneNode(true));
        });

        document.querySelectorAll('.tf-btn').forEach(btn => {
            const tfVal = parseInt(btn.getAttribute('data-tf'));
            if (tfVal === currentTimeframe) {
                btn.style.background = "var(--cyan, #00f2fe)";
                btn.style.color = "#000";
            } else {
                btn.style.background = "";
                btn.style.color = "";
            }

            btn.addEventListener('click', function() {
                const selectedTf = parseInt(this.getAttribute('data-tf'));
                if (selectedTf && selectedTf !== currentTimeframe) {
                    currentTimeframe = selectedTf;
                    log(`⏳ টাইমফ্রেম সুইচ: ${currentTimeframe}M`);
                    initTradingViewChart();
                    fetchFirebaseHistory();
                    setupTimeframeListeners();
                }
            });
        });
    }

    // বুট রানার
    function startTradingEngine() {
        initTradingViewChart();
        fetchFirebaseHistory();
        setupThemeToggleListener();
        setupTimeframeListeners();
        
        // মঙ্গোডিবি থেকে লাইভ ডাটা টিক টিক করে পড়ার জন্য (প্রতি ১ সেকেন্ডে)
        setInterval(syncMongoDBLive, 1000);
        
        // ইউজার ব্যালেন্স ও ক্যান্ডেল ক্লোজিং চেক করার জন্য (প্রতি ৩ সেকেন্ডে)
        setInterval(syncUserDataAndClosing, 3000);
        
        log("🚀 আপনার Flask এপিআই-এর সাথে ফ্রন্টএন্ড ইঞ্জিন সিঙ্কড!");
    }

    if (document.readyState === 'complete') {
        startTradingEngine();
    } else {
        window.addEventListener('load', startTradingEngine);
    }
})();
</script>
</body>
</html>
