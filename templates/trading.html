<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF Exchange</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --bg: #030712;
            --glass: rgba(17, 24, 39, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --cyan: #00f2fe;
            --cyan-glow: rgba(0, 242, 254, 0.4);
            --gold: #ffaa00;
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            margin: 0; padding-bottom: 120px; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.1), transparent);
        }

        /* Header */
        .header { 
            padding: 20px; background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
        }
        .header h2 { font-family: 'Syncopate'; font-size: 13px; margin: 0; color: var(--cyan); text-shadow: 0 0 15px var(--cyan-glow); }
        #live-price { font-family: 'Syncopate'; font-size: 16px; color: #00ffa3; }

        /* Banner Ad Slot */
        .ad-container { padding: 15px 20px 0 20px; max-width: 500px; margin: auto; }
        #banner-ad-link { display: none; } 
        .banner-img { width: 100%; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* Chart */
        #chart-wrapper { width: 100%; height: 320px; background: #000; position: relative; border-bottom: 1px solid var(--border); margin-top: 15px; }
        #chart-container { width: 100%; height: 100%; }
        .tv-lightweight-charts-logo { display: none !important; }

        /* Stats & Trade */
        .content { padding: 20px; max-width: 500px; margin: auto; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .card { 
            background: var(--glass); padding: 15px; border-radius: 20px; border: 1px solid var(--border);
            border-left: 3px solid var(--cyan); box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .card.gold { border-left-color: var(--gold); }
        .card span { font-size: 10px; color: #94a3b8; display: block; margin-bottom: 5px; }
        .card b { font-size: 18px; color: #fff; }

        .trade-box { 
            background: rgba(255, 255, 255, 0.02); padding: 25px; border-radius: 30px; border: 1px solid var(--border);
        }
        input { 
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border); padding: 18px; 
            color: var(--cyan); font-size: 22px; border-radius: 18px; text-align: center; outline: none; 
            font-family: 'Rajdhani'; font-weight: 700; box-sizing: border-box;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn { padding: 18px; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; font-family: 'Syncopate'; font-size: 10px; transition: 0.3s; }
        .buy { background: linear-gradient(135deg, #00f2fe, #00ffa3); color: #020617; }
        .sell { background: linear-gradient(135deg, #ff3366, #ff6b6b); color: #fff; }

        /* --- SCREENSHOT MATCHING NAVIGATION BAR (Fixed) --- */
        .nav-container { position: fixed; bottom: 25px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 9999; }
        .nav-bar { 
            width: 90%; max-width: 420px; 
            background: rgba(13, 17, 28, 0.95); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 100px; /* Pillow shape matching screenshot */
            display: flex; justify-content: space-around; padding: 12px 10px; backdrop-filter: blur(20px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .nav-item { text-decoration: none; text-align: center; color: #6b7280; font-size: 10px; display: flex; flex-direction: column; align-items: center; width: 60px; }
        .nav-item i { font-size: 20px; margin-bottom: 5px; }
        
        /* Active State with Cyan Glow (No Yellow) */
        .nav-item.active { color: var(--cyan); }
        .nav-item.active i { filter: drop-shadow(0 0 8px var(--cyan)); }
    </style>
</head>
<body>

    <header class="header">
        <h2>AAF EXCHANGE</h2>
        <span id="live-price">0.0000</span>
    </header>

    <div class="ad-container">
        <a id="banner-ad-link" href="#" target="_blank">
            <img id="banner-ad-img" src="" class="banner-img" alt="Promo">
        </a>
    </div>

    <div id="chart-wrapper">
        <div id="chart-container"></div>
    </div>

    <div class="content">
        <div class="stat-grid">
            <div class="card"><span>AAF HOLDINGS</span><b id="aaf-bal">0.00</b></div>
            <div class="card gold"><span>TOTAL CASH</span><b id="tk-bal">৳ 0.00</b></div>
        </div>

        <div class="trade-box">
            <input type="number" id="trade-amount" placeholder="ENTER TK">
            <div class="btn-group">
                <button class="btn buy" onclick="initiateTrade('BUY')">BUY</button>
                <button class="btn sell" onclick="initiateTrade('SELL')">SELL</button>
            </div>
        </div>
    </div>

    <div class="nav-container">
        <nav class="nav-bar">
            <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="/task" class="nav-item"><i class="fas fa-tasks"></i><span>Task</span></a>
            <a href="/trade" class="nav-item active"><i class="fas fa-chart-line"></i><span>Trading</span></a>
            <a href="/wallet" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
            <a href="/account" class="nav-item"><i class="fas fa-user-circle"></i><span>Account</span></a>
        </nav>
    </div>

    <script>
        // আপনার Firebase কি এখানে বসান
        const firebaseConfig = { apiKey: "YOUR_API", databaseURL: "YOUR_URL", projectId: "YOUR_ID" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Chart Setup
        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            layout: { background: { color: '#000000' }, textColor: '#94a3b8', fontFamily: 'Rajdhani' },
            grid: { vertLines: { visible: false }, horzLines: { color: '#111827' } },
            timeScale: { borderColor: '#1e293b', timeVisible: true },
        });
        const candleSeries = chart.addCandlestickSeries({ 
            upColor: '#00ffa3', downColor: '#ff3366', borderVisible: false,
            wickUpColor: '#00ffa3', wickDownColor: '#ff3366'
        });

        // Live Admin Control (Firebase)
        db.ref('candles').limitToLast(1).on('child_added', (snapshot) => {
            const data = snapshot.val();
            candleSeries.update(data);
            const priceEl = document.getElementById('live-price');
            priceEl.innerText = data.close.toFixed(4);
            priceEl.style.color = data.close >= data.open ? "#00ffa3" : "#ff3366";
        });

        // Banner Ad Logic
        db.ref('settings/ads/banner').on('value', (snapshot) => {
            const ad = snapshot.val();
            if(ad && ad.active) {
                document.getElementById('banner-ad-img').src = ad.image_url;
                document.getElementById('banner-ad-link').href = ad.link_url;
                document.getElementById('banner-ad-link').style.display = 'block';
            } else {
                document.getElementById('banner-ad-link').style.display = 'none';
            }
        });
    </script>
</body>
</html>
