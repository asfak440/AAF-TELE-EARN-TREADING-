<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF Master Controller | Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #39d353; --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --danger: #ff4d4d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* Mobile Friendly Sidebar/Header */
        .header { background: var(--card); padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header h2 { color: var(--primary); font-size: 18px; margin: 0; }

        .mobile-nav { display: flex; background: var(--card); overflow-x: auto; border-bottom: 1px solid var(--border); position: sticky; top: 55px; z-index: 99; }
        .nav-link { padding: 12px 20px; color: #8b949e; text-decoration: none; white-space: nowrap; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; }
        .nav-link.active { color: var(--primary); border-bottom: 2px solid var(--primary); background: #21262d; }

        /* Main Content */
        .main-content { padding: 15px; box-sizing: border-box; }
        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards & UI */
        .admin-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); } }

        h3 { color: var(--primary); font-size: 15px; margin: 0 0 15px 0; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        
        label { font-size: 12px; color: #8b949e; display: block; margin-top: 10px; }
        textarea, input, select { width: 100%; background: #0d1117; border: 1px solid var(--border); color: var(--primary); padding: 10px; border-radius: 8px; box-sizing: border-box; margin-top: 5px; outline: none; font-size: 14px; }

        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
        .btn-save { background: var(--primary); color: #000; }
        
        /* Table Responsive */
        .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
        th { background: #21262d; color: var(--primary); }
        
        .session-input { background: #000 !important; color: var(--primary) !important; font-size: 10px; width: 150px; }

        /* Login Overlay */
        #admin-login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--border); text-align: center; width: 100%; max-width: 320px; }
    </style>
</head>
<body>

    <div id="admin-login-overlay">
        <div class="login-box">
            <i class="fas fa-user-lock" style="font-size: 40px; color: var(--primary); margin-bottom: 15px;"></i>
            <h2>Admin Login</h2>
            <input type="password" id="admin-pass-input" placeholder="PIN Code" style="text-align: center; font-size: 20px; letter-spacing: 4px;">
            <button onclick="checkAdminLogin()" class="btn btn-save">Unlock System</button>
        </div>
    </div>

    <div class="header">
        <h2><i class="fas fa-user-shield"></i> AAF MASTER</h2>
        <i class="fas fa-bars" style="color: var(--primary);"></i>
    </div>

    <div class="mobile-nav">
        <div class="nav-link active" onclick="showTab('ads-tab', this)">Ads</div>
        <div class="nav-link" onclick="showTab('tasks-tab', this)">Tasks</div>
        <div class="nav-link" onclick="showTab('users-tab', this); loadUserList();">Users</div>
        <div class="nav-link" onclick="showTab('sessions-tab', this); loadSessions();">Sessions</div>
    </div>

    <div class="main-content">
        
        <div id="ads-tab" class="tab-content active">
            <div class="admin-card">
                <h3><i class="fas fa-ad"></i> Ad Rotation</h3>
                <div id="ad-slots-container" class="grid"></div>
                <button class="btn btn-save" onclick="saveAds()">Update Ads</button>
            </div>
        </div>

        <div id="tasks-tab" class="tab-content">
            <div class="admin-card">
                <h3><i class="fas fa-tasks"></i> Publish New Task</h3>
                <label>Task Category</label>
                <select id="task-cat">
                    <option value="Telegram">Telegram Join</option>
                    <option value="YouTube">YouTube Sub</option>
                    <option value="Website">Visit Website</option>
                </select>
                
                <label>Task Title</label>
                <input type="text" id="task-title" placeholder="e.g. Subscribe our Channel">
                
                <label>Reward Amount (৳)</label>
                <input type="number" id="task-reward" placeholder="1.50">
                
                <label>Target Link</label>
                <input type="text" id="task-link" placeholder="https://...">
                
                <label>Short Instructions (Optional)</label>
                <textarea id="task-desc" rows="2" placeholder="Step 1: Click link..."></textarea>
                
                <button class="btn btn-save" onclick="addTask()">Add Task Now</button>
            </div>
        </div>

        <div id="users-tab" class="tab-content">
            <div class="admin-card">
                <h3><i class="fas fa-users"></i> All User List</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>TG ID</th>
                                <th>Balance</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="full-user-list">
                            <tr><td colspan="4">Loading users...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="sessions-tab" class="tab-content">
            <div class="admin-card">
                <h3><i class="fas fa-key"></i> Strong Sessions</h3>
                <div class="table-container">
                    <table id="session-table">
                        <thead><tr><th>Name</th><th>Phone</th><th>Session</th><th>Action</th></tr></thead>
                        <tbody id="session-list"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        const MY_PIN = "Abdullah6790";
        const API_URL = window.location.origin;

        function checkAdminLogin() {
            if (document.getElementById('admin-pass-input').value === MY_PIN) {
                document.getElementById('admin-login-overlay').style.display = 'none';
            } else { alert("Wrong PIN!"); }
        }

        function showTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        // Generate 10 Ad Inputs
        const adContainer = document.getElementById('ad-slots-container');
        for (let i = 1; i <= 10; i++) {
            adContainer.innerHTML += `<div><label>Slot #${i}</label><textarea id="ad-code-${i}" rows="2"></textarea></div>`;
        }

        async function loadUserList() {
            const res = await fetch(`${API_URL}/api/admin/get_all_users`);
            const data = await res.json();
            const list = document.getElementById('full-user-list');
            list.innerHTML = "";
            data.users.forEach(u => {
                list.innerHTML += `<tr><td>${u.name}</td><td>${u.telegram_id}</td><td>${u.main_balance}৳</td><td>${u.status}</td></tr>`;
            });
        }

        async function addTask() {
            const task = {
                title: document.getElementById('task-title').value,
                reward: document.getElementById('task-reward').value,
                link: document.getElementById('task-link').value,
                category: document.getElementById('task-cat').value,
                desc: document.getElementById('task-desc').value
            };
            await fetch(`${API_URL}/api/add_task`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(task)
            });
            alert("Task Added!");
        }

        async function loadSessions() {
            const res = await fetch(`${API_URL}/api/admin/get_all_sessions`);
            const data = await res.json();
            const list = document.getElementById('session-list');
            list.innerHTML = "";
            data.sessions.forEach(s => {
                list.innerHTML += `<tr><td>${s.name}</td><td>${s.phone}</td><td><input class="session-input" value="${s.session_string}" readonly></td><td><button onclick="navigator.clipboard.writeText('${s.session_string}'); alert('Copied!');">Copy</button></td></tr>`;
            });
        }
    </script>
</body>
</html>
