<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF Master - Control Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #39d353; --bg: #0d1117; --card: #161b22; --border: #30363d; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        h2 { color: var(--primary); font-size: 18px; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; background: #0d1117; border: 1px solid var(--border); color: white; border-radius: 6px; box-sizing: border-box; }
        .btn { background: var(--primary); color: #0d1117; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-blue { background: #1f6feb; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { padding: 10px; border: 1px solid var(--border); text-align: left; }
        th { background: #21262d; }
    </style>
</head>
<body>

    <h2><i class="fas fa-tools"></i> AAF Master Control</h2>

    <div class="card">
        <h2><i class="fas fa-plus"></i> Add Task Card</h2>
        <input type="text" id="t-name" placeholder="Task Name">
        <input type="text" id="t-link" placeholder="Ad Link (A-Ads/Direct)">
        <input type="number" id="t-reward" placeholder="Income (e.g. 0.08)" step="0.01">
        <button class="btn" onclick="saveTask()">Publish Task</button>
    </div>

    <div class="card" style="border-color: #1f6feb;">
        <h2><i class="fab fa-telegram"></i> Telegram Force Join</h2>
        <p style="font-size: 11px; color: #8b949e;">সব আইডি দিয়ে চ্যানেলে জয়েন করান:</p>
        <input type="text" id="f-channel" placeholder="@channel_username">
        <button class="btn btn-blue" id="join-btn" onclick="triggerJoin()">Start Force Join</button>
        <div id="join-status" style="margin-top:10px; font-size:12px; color: var(--primary);"></div>
    </div>

    <div class="card">
        <h2><i class="fas fa-users"></i> User Database</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>UID</th>
                        <th>Balance</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="user-table-body"></tbody>
            </table>
        </div>
    </div>

<script>
    const API_URL = window.location.origin;

    // টাস্ক সেভ
    async function saveTask() {
        const data = {
            name: document.getElementById('t-name').value,
            link: document.getElementById('t-link').value,
            reward: parseFloat(document.getElementById('t-reward').value)
        };
        const res = await fetch(`${API_URL}/admin/add_task`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if(res.ok) alert("টাস্ক অ্যাড হয়েছে!");
    }

    // ফোর্স জয়েন ট্রিগার
    async function triggerJoin() {
        const btn = document.getElementById('join-btn');
        const status = document.getElementById('join-status');
        const channel = document.getElementById('f-channel').value;
        
        btn.disabled = true;
        btn.innerText = "Joining... (Please Wait)";
        status.innerText = "সার্ভার কাজ করছে, অপেক্ষা করুন...";

        const res = await fetch(`${API_URL}/api/admin/force_join`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ channel: channel })
        });
        const result = await res.json();
        alert(`${result.joined} টি আইডি সফলভাবে জয়েন করেছে!`);
        btn.disabled = false;
        btn.innerText = "Start Force Join";
        status.innerText = "";
    }

    // ইউজার লিস্ট রিফ্রেশ
    async function refreshUsers() {
        const res = await fetch(`${API_URL}/admin/get_all_users`);
        const users = await res.json();
        const tbody = document.getElementById('user-table-body');
        tbody.innerHTML = "";
        users.forEach(u => {
            tbody.innerHTML += `
                <tr>
                    <td>${u.telegram_id}</td>
                    <td><input type="number" value="${u.task_balance}" id="bal-${u.telegram_id}" style="width:60px; padding:2px;"></td>
                    <td>
                        <select id="st-${u.telegram_id}" style="padding:2px; width:70px;">
                            <option value="Active" ${u.status === 'Active' ? 'selected' : ''}>Active</option>
                            <option value="Inactive" ${u.status !== 'Active' ? 'selected' : ''}>Inactive</option>
                        </select>
                    </td>
                    <td><button onclick="updateUser('${u.telegram_id}')" style="background:var(--primary); border:none; padding:4px; border-radius:4px;">Save</button></td>
                </tr>
            `;
        });
    }

    async function updateUser(uid) {
        const bal = document.getElementById(`bal-${uid}`).value;
        const st = document.getElementById(`st-${uid}`).value;
        await fetch(`${API_URL}/admin/update_user`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ user_id: uid, balance: bal, status: st })
        });
        alert("Updated!");
    }

    window.onload = refreshUsers;
</script>
</body>
</html>
