<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF Master Controller</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #39d353; --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 240px; background: var(--card); border-right: 1px solid var(--border); height: 100vh; position: fixed; }
        .sidebar h2 { color: var(--primary); text-align: center; font-size: 18px; padding: 20px; border-bottom: 1px solid var(--border); }
        .nav-link { padding: 15px 20px; display: block; color: #8b949e; text-decoration: none; cursor: pointer; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: #21262d; color: var(--primary); border-left: 3px solid var(--primary); }

        /* Main */
        .main-content { margin-left: 240px; padding: 30px; width: 100%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Cards & Forms */
        .admin-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        h3 { color: var(--primary); font-size: 16px; margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        textarea, input { width: 100%; background: #0d1117; border: 1px solid var(--border); color: var(--primary); padding: 10px; border-radius: 8px; box-sizing: border-box; margin-top: 5px; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-save { background: var(--primary); color: #000; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2><i class="fas fa-user-shield"></i> AAF ADMIN</h2>
        <div class="nav-link active" onclick="showTab('ads-tab', this)"><i class="fas fa-ad"></i> Ads Manager</div>
        <div class="nav-link" onclick="showTab('tasks-tab', this)"><i class="fas fa-tasks"></i> Task Manager</div>
        <div class="nav-link" onclick="showTab('users-tab', this)"><i class="fas fa-users-cog"></i> Users & Withdraw</div>
    </div>

    <div class="main-content">
        <div id="ads-tab" class="tab-content active">
            <div class="admin-card">
                <h3><i class="fas fa-ad"></i> Ad Rotation (10 Slots)</h3>
                <div class="grid" id="ad-slots-container"></div>
                <button class="btn btn-save" onclick="saveAds()">Update All Ads</button>
            </div>
        </div>

        <div id="tasks-tab" class="tab-content">
            <div class="admin-card">
                <h3><i class="fas fa-tasks"></i> Add New Task</h3>
                <label>Task Title</label><input type="text" id="task-title" placeholder="Job Name">
                <label>Reward (৳)</label><input type="number" id="task-reward" placeholder="0.50">
                <label>Link</label><input type="text" id="task-link" placeholder="https://t.me/...">
                <button class="btn btn-save" onclick="addTask()">Publish Task</button>
            </div>
        </div>

        <div id="users-tab" class="tab-content">
            <div class="grid">
                <div class="admin-card">
                    <h3>User Edit</h3>
                    <label>Telegram ID</label><input type="number" id="search-uid">
                    <label>New Balance</label><input type="number" id="edit-bal">
                    <button class="btn btn-save" onclick="updateUser()">Update User</button>
                </div>
                <div class="admin-card">
                    <h3>Withdrawal Requests</h3>
                    <table>
                        <thead><tr><th>User</th><th>Amount</th><th>Action</th></tr></thead>
                        <tbody id="withdraw-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://aaf-tele-earn-treading.onrender.com";

        function showTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        // Generate 10 Ad Slots
        const adContainer = document.getElementById('ad-slots-container');
        for (let i = 1; i <= 10; i++) {
            adContainer.innerHTML += `<div><label>Slot #${i}</label><textarea id="ad-code-${i}" rows="3"></textarea></div>`;
        }

        async function saveAds() {
            let ads = [];
            for (let i = 1; i <= 10; i++) {
                let code = document.getElementById(`ad-code-${i}`).value;
                if(code) ads.push({ slot: i, code: code });
            }
            const res = await fetch(`${API_URL}/api/update_ads`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ads: ads })
            });
            alert("Ads Updated!");
        }

        async function addTask() {
            const task = {
                title: document.getElementById('task-title').value,
                reward: document.getElementById('task-reward').value,
                link: document.getElementById('task-link').value
            };
            await fetch(`${API_URL}/api/add_task`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(task)
            });
            alert("Task Added!");
        }

        async function updateUser() {
            const data = { 
                telegram_id: document.getElementById('search-uid').value, 
                balance: document.getElementById('edit-bal').value 
            };
            await fetch(`${API_URL}/api/admin/update_user`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            alert("User Updated!");
        }
    </script>
</body>
</html>
