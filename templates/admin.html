<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF MASTER | NEURAL ADMIN v4.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --bg: #020617; --card: #0d111c; --border: rgba(255, 255, 255, 0.08);
            --cyan: #00f2fe; --purple: #7000ff; --accent: #00ff88;
            --danger: #ff0055; --gold: #ffaa00; --glass: rgba(15, 23, 42, 0.8);
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            margin: 0; padding-bottom: 30px; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(112, 0, 255, 0.15), transparent);
        }

        /* Login Overlay */
        #admin-login-overlay { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9999; 
            display: flex; justify-content: center; align-items: center; backdrop-filter: blur(20px);
        }
        .login-box { 
            background: var(--card); padding: 40px 30px; border-radius: 30px; 
            border: 2px solid var(--cyan); text-align: center; width: 85%; max-width: 350px;
        }
        .login-box input {
            width: 100%; background: #000; border: 1px solid var(--cyan); padding: 15px;
            border-radius: 12px; color: var(--cyan); font-family: 'Orbitron'; font-size: 20px;
            margin-top: 20px; text-align: center; outline: none;
        }

        /* Header & Nav */
        .admin-header { 
            padding: 15px 20px; background: var(--glass); border-bottom: 1px solid var(--cyan); 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
        }
        .admin-header h1 { font-family: 'Orbitron'; font-size: 14px; margin: 0; color: var(--cyan); }
        
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .mini-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 20px; text-align: center; }
        
        .nav-scroller { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 15px; scrollbar-width: none; }
        .tab-btn { padding: 12px 20px; border-radius: 15px; border: 1px solid var(--border); background: var(--card); color: #8b949e; font-family: 'Syncopate'; font-size: 9px; white-space: nowrap; cursor: pointer; }
        .tab-btn.active { background: linear-gradient(135deg, var(--cyan), var(--purple)); color: #fff; border: none; }

        .data-section { display: none; }
        .data-section.active { display: block; }
        
        .premium-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 25px; margin-bottom: 15px; }
        input, select { width: 100%; background: #050912; border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: #fff; margin-top: 8px; outline: none; }
    </style>
</head>
<body>
    <div id="admin-login-overlay">
        <div class="login-box">
            <h2 style="font-family: 'Orbitron'; font-size: 16px; color: var(--cyan);">CORE ACCESS</h2>
            <input type="password" id="admin-pass" placeholder="PIN">
            <button class="tab-btn active" style="width:100%; margin-top:20px;" onclick="checkAuth()">INITIALIZE</button>
        </div>
    </div>

    <header class="admin-header">
        <h1>AAF MASTER CONTROL</h1>
        <div style="display:flex; gap:10px;">
            <div class="stat-pill" style="font-size:10px;"><i class="fas fa-users"></i> <span id="st-users">0</span></div>
        </div>
    </header>

    <div class="container">
        <div class="admin-grid">
            <div class="mini-card"><span>PENDING (Mongo)</span><br><b id="st-payouts">0</b></div>
            <div class="mini-card"><span>SOL PRICE (FB)</span><br><b id="st-price">$0.00</b></div>
        </div>

        <div class="nav-scroller">
            <button class="tab-btn active" onclick="openTab(event, 'payouts')">PAYMENTS</button>
            <button class="tab-btn" onclick="openTab(event, 'trading')">TRADING</button>
            <button class="tab-btn" onclick="openTab(event, 'tasks')">TASKS</button>
            <button class="tab-btn" onclick="openTab(event, 'config')">SYSTEM</button>
        </div>

        <div id="payouts" class="data-section active">
            <div class="premium-card">
                <h3 style="font-family: 'Syncopate'; font-size: 10px; color: var(--cyan);">PENDING PAYOUTS (MONGODB)</h3>
                <div id="payout-list" style="margin-top:15px;"></div>
            </div>
        </div>

        <div id="trading" class="data-section">
            <div class="premium-card">
                <h3 style="font-family: 'Syncopate'; font-size: 10px; color: var(--purple);">TRADING CONTROL (FIREBASE)</h3>
                <input type="number" id="inp-price" step="0.01" placeholder="Set SOL Price">
                <select id="inp-vol">
                    <option value="stable">Stable</option>
                    <option value="volatile">Volatile</option>
                    <option value="crash">Crash</option>
                </select>
                <button class="tab-btn active" style="width:100%; margin-top:15px;" onclick="pushTrading()">PUSH TO FIREBASE</button>
            </div>
        </div>

        <div id="tasks" class="data-section">
            <div class="premium-card">
                <h3 style="font-family: 'Syncopate'; font-size: 10px; color: var(--accent);">ADD TASK (MONGODB)</h3>
                <input type="text" id="t-title" placeholder="Task Title">
                <input type="text" id="t-link" placeholder="Task Link">
                <input type="number" id="t-reward" placeholder="Reward ৳">
                <button class="tab-btn active" style="width:100%; margin-top:15px;" onclick="saveTask()">SAVE TO MONGODB</button>
            </div>
        </div>

        <div id="config" class="data-section">
            <div class="premium-card">
                <h3 style="font-family: 'Syncopate'; font-size: 10px; color: var(--gold);">SYSTEM CONFIG (MONGODB)</h3>
                <label>Join Bonus ৳</label>
                <input type="number" id="c-join">
                <label>Min Withdraw ৳</label>
                <input type="number" id="c-min">
                <button class="tab-btn active" style="width:100%; margin-top:15px;" onclick="updateSystem()">SYNC MONGODB</button>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG (For Candlesticks ONLY)
        const firebaseConfig = { 
            apiKey: "AIzaSyAJ5cl8HOMpmeREyWu19EKZQsNgrEY_zL4", 
            databaseURL: "https://teleearnbd-781d6-default-rtdb.firebaseio.com", 
            projectId: "teleearnbd-781d6" 
        };
        firebase.initializeApp(firebaseConfig);
        const fb_db = firebase.database();
        const MASTER_PIN = "Abdullah6790";

        // MONGODB API BASE (Via app.py)
        const API_BASE = window.location.origin;

        function checkAuth() {
            if(document.getElementById('admin-pass').value === MASTER_PIN) {
                document.getElementById('admin-login-overlay').style.display = 'none';
                syncAllData();
            } else { alert("ACCESS DENIED"); }
        }

        function openTab(evt, name) {
            document.querySelectorAll('.data-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        // --- ডাটা সিঙ্ক্রোনাইজেশন ---
        function syncAllData() {
            // ১. Firebase থেকে ক্যান্ডেলস্টিক ডাটা রিড (শুধু ডিসপ্লের জন্য)
            fb_db.ref('trading/candles').on('value', s => {
                if(s.val()) document.getElementById('st-price').innerText = "$" + s.val().current_price;
            });

            // ২. MongoDB থেকে ইউজার এবং পেমেন্ট ডাটা রিড (via app.py)
            fetch(`${API_BASE}/admin/get-data`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('st-users').innerText = data.total_users;
                    document.getElementById('st-payouts').innerText = data.pending_count;
                    // পেমেন্ট লিস্ট রেন্ডার করা
                    const list = document.getElementById('payout-list');
                    list.innerHTML = data.payouts.map(p => `
                        <div class="mini-card" style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <span>৳${p.amount} (${p.user_id})</span>
                            <button onclick="approveMongoPay('${p._id}')" style="color:var(--accent); background:none; border:none;"><i class="fas fa-check-circle"></i></button>
                        </div>
                    `).join('');
                });
        }

        // --- ফাংশন: সরাসরি Firebase (Candlestick) ---
        function pushTrading() {
            fb_db.ref('trading/candles').update({
                current_price: parseFloat(document.getElementById('inp-price').value),
                intensity: document.getElementById('inp-vol').value,
                last_update: Date.now()
            }).then(() => alert("Firebase Candlestick Updated! 📈"));
        }

        // --- ফাংশন: MongoDB তে পাঠানো (via app.py) ---
        async function saveTask() {
            const task = { title: document.getElementById('t-title').value, link: document.getElementById('t-link').value, reward: document.getElementById('t-reward').value };
            const res = await fetch(`${API_BASE}/admin/save-task`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(task) });
            if(res.ok) alert("Task Saved to MongoDB! ✅");
        }

        async function approveMongoPay(id) {
            const res = await fetch(`${API_BASE}/admin/approve-pay`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id: id}) });
            if(res.ok) { alert("Payment Processed in MongoDB!"); syncAllData(); }
        }

        async function updateSystem() {
            const config = { bonus: document.getElementById('c-join').value, min: document.getElementById('c-min').value };
            const res = await fetch(`${API_BASE}/admin/update-config`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(config) });
            if(res.ok) alert("System Settings Synced to MongoDB! ⚙️");
        }
    </script>
</body>
</html>
