<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF | Admin Controller</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #39d353; --bg: #0d1117; --card: #161b22; --border: #30363d; --text-dim: #8b949e; --danger: #ff4d4d; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 15px; margin-bottom: 25px; }
        .admin-header h2 { margin: 0; color: var(--primary); font-size: 20px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .admin-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; }
        .admin-card h3 { font-size: 16px; margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; color: var(--primary); }

        /* অ্যাড কন্ট্রোল স্টাইল */
        .ad-input-group { margin-bottom: 15px; }
        .ad-input-group label { display: block; font-size: 12px; margin-bottom: 5px; color: var(--text-dim); }
        textarea { width: 100%; background: #0d1117; border: 1px solid var(--border); color: #39d353; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; resize: vertical; box-sizing: border-box; }

        /* ইউজার ম্যানেজমেন্ট টেবিল */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
        th { color: var(--text-dim); }

        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-save { background: var(--primary); color: #000; }
        .btn-approve { background: #0088cc; color: white; padding: 5px 10px; font-size: 11px; }
        .btn-reject { background: var(--danger); color: white; padding: 5px 10px; font-size: 11px; }

        .status-badge { padding: 4px 8px; border-radius: 5px; font-size: 11px; }
        .pending { background: #f1c40f; color: #000; }
    </style>
</head>
<body>

    <div class="admin-header">
        <h2><i class="fas fa-user-shield"></i> AAF Master Controller</h2>
        <span id="server-status" style="font-size: 12px; color: var(--primary);">● Server Live</span>
    </div>

    <div class="grid">
        
        <div class="admin-card">
            <h3><i class="fas fa-ad"></i> Ad Network Manager (Rotate 10s)</h3>
            <div id="ad-settings">
                <div class="ad-input-group">
                    <label>Ad Slot 1 (A-Ads/Direct)</label>
                    <textarea id="ad-slot-1" rows="3" placeholder="Paste Ad HTML/JS Code Here..."></textarea>
                </div>
                <div class="ad-input-group">
                    <label>Ad Slot 2 (A-Ads/Direct)</label>
                    <textarea id="ad-slot-2" rows="3" placeholder="Paste Ad HTML/JS Code Here..."></textarea>
                </div>
            </div>
            <button class="btn btn-save" onclick="saveAds()">Update All Ads</button>
        </div>

        <div class="admin-card">
            <h3><i class="fas fa-users-cog"></i> User Management</h3>
            <div class="ad-input-group">
                <label>Find User (Telegram ID)</label>
                <input type="number" id="search-uid" style="width:100%; background:#0d1117; border:1px solid var(--border); padding:10px; color:white; border-radius:8px;">
            </div>
            <div id="user-edit-area" style="margin-top:15px;">
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <label style="font-size:10px;">Balance (৳)</label>
                        <input type="number" id="edit-bal" style="width:100%; padding:8px; background:#000; color:var(--primary); border:1px solid var(--border);">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:10px;">Trades Count</label>
                        <input type="number" id="edit-trades" style="width:100%; padding:8px; background:#000; color:var(--primary); border:1px solid var(--border);">
                    </div>
                </div>
                <button class="btn btn-save" onclick="updateUser()">Apply Changes</button>
            </div>
        </div>

        <div class="admin-card" style="grid-column: span 1;">
            <h3><i class="fas fa-money-check-alt"></i> Withdrawal Requests</h3>
            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Amount</th>
                        <th>Number</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="withdraw-list">
                    <tr>
                        <td>#AAF98765</td>
                        <td>৳ 50.00</td>
                        <td>017XXXXXXXX</td>
                        <td>
                            <button class="btn-approve">Approve</button>
                            <button class="btn-reject">Reject</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        const API_URL = "https://aaf-api-free.onrender.com";

        // ১. অ্যাড সেভ করার ফাংশন
        async function saveAds() {
            const ads = [
                document.getElementById('ad-slot-1').value,
                document.getElementById('ad-slot-2').value
                // এভাবেই ১০টি স্লট থেকে ডাটা নিতে হবে
            ];

            try {
                const res = await fetch(`${API_URL}/api/admin/update_ads`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ads: ads })
                });
                if(res.ok) alert("বিজ্ঞাপন সফলভাবে আপডেট হয়েছে!");
            } catch (e) { alert("Server Connection Failed!"); }
        }

        // ২. ইউজার ডাটা আপডেট (ব্যালেন্স ও ট্রেড লক)
        async function updateUser() {
            const uid = document.getElementById('search-uid').value;
            const bal = document.getElementById('edit-bal').value;
            const trades = document.getElementById('edit-trades').value;

            if(!uid) return alert("User ID দিন!");

            try {
                const res = await fetch(`${API_URL}/api/admin/update_user`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ telegram_id: uid, balance: bal, total_trades: trades })
                });
                alert("ইউজার ডাটা আপডেট হয়েছে!");
            } catch (e) { console.log(e); }
        }

        // ৩. লোড পেন্ডিং উইথড্র (অটো লোড)
        async function loadWithdrawals() {
            // এখানে আপনার উইথড্র লিস্ট ডাটাবেস থেকে আসবে
            console.log("Fetching withdrawals...");
        }

        window.onload = loadWithdrawals;
    </script>
</body>
</html>
