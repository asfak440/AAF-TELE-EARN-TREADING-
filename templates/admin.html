<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAF মাস্টার কন্ট্রোল প্যানেল v8.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        :root {
            --bg: #020617; --card: #0d111c; --border: rgba(0, 242, 254, 0.15);
            --cyan: #00f2fe; --purple: #7000ff; --accent: #00ff88;
            --danger: #ff0055; --gold: #ffaa00; --sidebar-width: 260px;
        }
        body { background: var(--bg); color: #fff; font-family: 'Hind Siliguri', sans-serif; margin: 0; display: flex; overflow-x: hidden; }
        
        .sidebar { width: var(--sidebar-width); background: var(--card); height: 100vh; position: fixed; border-right: 1px solid var(--border); z-index: 100; transition: 0.3s; }
        .logo-area { padding: 30px 20px; text-align: center; font-size: 22px; font-weight: 800; color: var(--cyan); letter-spacing: 1px; border-bottom: 1px solid var(--border); }
        .nav-links { list-style: none; padding: 20px 15px; margin: 0; }
        .nav-links li { padding: 15px; cursor: pointer; transition: 0.3s; border-radius: 12px; margin-bottom: 10px; color: #94a3b8; display: flex; align-items: center; font-weight: 600; }
        .nav-links li i { margin-right: 15px; width: 20px; font-size: 18px; }
        .nav-links li:hover, .nav-links li.active { background: linear-gradient(135deg, rgba(0, 242, 254, 0.1), rgba(112, 0, 255, 0.1)); color: var(--cyan); border: 1px solid var(--border); }

        .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); min-height: 100vh; padding: 30px; box-sizing: border-box; }
        .page-section { display: none; animation: fadeIn 0.4s ease; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .premium-card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 24px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--cyan); display: flex; align-items: center; gap: 10px; }
        input, textarea { width: 100%; background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 14px; color: #fff; margin-top: 10px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; background: linear-gradient(90deg, var(--cyan), var(--purple)); color: #fff; transition: 0.3s; }
        .btn-main:hover { opacity: 0.9; transform: scale(1.02); }
        
        .dot-online { height: 10px; width: 10px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-offline { height: 10px; width: 10px; background: var(--danger); border-radius: 50%; display: inline-block; margin-right: 5px; }

        #admin-login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; }

        @media (max-width: 768px) {
            .sidebar { width: 80px; } .nav-links span, .logo-area span { display: none; }
            .main-content { margin-left: 80px; width: calc(100% - 80px); padding: 15px; }
            .nav-links li i { margin-right: 0; }
        }
    </style>
</head>
<body>

    <div id="admin-login-overlay">
        <div style="background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid var(--cyan); text-align: center; width: 320px;">
            <h2 style="color:var(--cyan)">মাস্টার কন্ট্রোল</h2>
            <input type="password" id="admin-pass" placeholder="গোপন পিন দিন" style="text-align: center; font-size: 24px;">
            <button class="btn-main" onclick="checkAuth()">আনলক প্যানেল</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="logo-area"><span>AAF</span> PANEL</div>
        <ul class="nav-links">
            <li class="active" onclick="openTab(event, 'dashboard')"><i class="fas fa-th-large"></i> <span>ড্যাশবোর্ড</span></li>
            <li onclick="openTab(event, 'task')"><i class="fas fa-tasks"></i> <span>টাস্ক কন্ট্রোল</span></li>
            <li onclick="openTab(event, 'trading')"><i class="fas fa-chart-line"></i> <span>ট্রেডিং ইঞ্জিন</span></li>
            <li onclick="openTab(event, 'wallet')"><i class="fas fa-wallet"></i> <span>ওয়ালেট</span></li>
            <li onclick="openTab(event, 'account')"><i class="fas fa-users"></i> <span>ইউজার অ্যাকাউন্ট</span></li>
        </ul>
    </div>

    <div class="main-content">
        
        <div id="dashboard" class="page-section active">
            <div class="premium-card">
                <div class="card-title"><i class="fas fa-ad"></i> ড্যাশবোর্ড পপ-আপ অ্যাড</div>
                <input type="text" id="ad-link-dash" placeholder="অ্যাড লিঙ্ক বা মেসেজ">
                <button class="btn-main" onclick="saveAd('dash')">সেভ অ্যাড</button>
            </div>
        </div>

        <div id="task" class="page-section">
            <div class="premium-card">
                <div class="card-title"><i class="fas fa-ad"></i> টাস্ক পেজ পপ-আপ অ্যাড</div>
                <input type="text" id="ad-link-task" placeholder="অ্যাড লিঙ্ক বা মেসেজ">
                <button class="btn-main" onclick="saveAd('task')">সেভ অ্যাড</button>
            </div>
        </div>

        <div id="trading" class="page-section">
            <div class="premium-card">
                <div class="card-title"><i class="fas fa-ad"></i> ট্রেডিং পেজ পপ-আপ অ্যাড</div>
                <input type="text" id="ad-link-trade" placeholder="অ্যাড লিঙ্ক বা মেসেজ">
                <button class="btn-main" onclick="saveAd('trade')">সেভ অ্যাড</button>
            </div>
        </div>

        <div id="wallet" class="page-section">
            <div class="premium-card">
                <div class="card-title"><i class="fas fa-ad"></i> ওয়ালেট পেজ পপ-আপ অ্যাড</div>
                <input type="text" id="ad-link-wallet" placeholder="অ্যাড লিঙ্ক বা মেসেজ">
                <button class="btn-main" onclick="saveAd('wallet')">সেভ অ্যাড</button>
            </div>
        </div>

        <div id="account" class="page-section">
            <div class="premium-card">
                <div class="card-title"><i class="fas fa-users"></i> ইউজার লিস্ট (MongoDB)</div>
                <div style="overflow-x:auto;">
                    <table style="width:100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="color:var(--cyan); border-bottom:1px solid var(--border);">
                                <th style="padding:12px;">ইউজার</th>
                                <th>ব্যালেন্স</th>
                                <th>স্ট্যাটাস</th>
                            </tr>
                        </thead>
                        <tbody id="member-list-body"></tbody>
                    </table>
                </div>
            </div>
            <div class="premium-card">
                <div class="card-title"><i class="fas fa-ad"></i> অ্যাকাউন্ট পেজ পপ-আপ অ্যাড</div>
                <input type="text" id="ad-link-account" placeholder="অ্যাড লিঙ্ক বা মেসেজ">
                <button class="btn-main" onclick="saveAd('account')">সেভ অ্যাড</button>
            </div>
        </div>

    </div>

    <script>
        // Firebase কনফিগারেশন
    const firebaseConfig = { databaseURL: "https://teleearnbd-781d6-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const fb_db = firebase.database();
    
    // API_BASE: এখানে আপনার রেন্ডার লিঙ্কটি বসান (যেমন: "https://your-app.onrender.com")
    // লিঙ্ক না থাকলে window.location.origin কাজ করবে যদি একই ডোমেইনে থাকে
    const API_BASE = window.location.origin; 
    const MASTER_PIN = "Abdullah6790";

    // ১. অথেন্টিকেশন চেক (লগইন)
    function checkAuth() {
        const pin = document.getElementById('admin-pass').value;
        if(pin === MASTER_PIN) {
            document.getElementById('admin-login-overlay').style.display = 'none';
            initDashboard(); // লগইন সফল হলে ড্যাশবোর্ড ডাটা লোড হবে
        } else { 
            alert("ভুল পিন! সঠিক পিন দিন।"); 
        }
    }

    // ২. ট্যাব সুইচিং লজিক
    function openTab(evt, tabName) {
        // সব সেকশন থেকে 'active' ক্লাস সরানো
        document.querySelectorAll('.page-section, .data-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-links li').forEach(l => l.classList.remove('active'));
        
        // টার্গেট ট্যাব দেখানো
        const target = document.getElementById(tabName);
        if(target) {
            target.classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        // ট্যাব অনুযায়ী ডাটা রিফ্রেশ করা
        if(tabName === 'account' || tabName === 'users') loadUsers();
        if(tabName === 'task' || tabName === 'tasks') renderTaskList();
        if(tabName === 'wallet') loadStats();
    }

    // ৩. ড্যাশবোর্ড ডাটা ইনিশিয়ালাইজ (Firebase + MongoDB)
    function initDashboard() {
        // Firebase থেকে লাইভ ট্রেডিং প্রাইস রিড করা
        fb_db.ref('trading/aaf_coin').on('value', snap => {
            const val = snap.val();
            if(val) {
                if(document.getElementById('st-price')) document.getElementById('st-price').innerText = "৳" + val.price;
                if(document.getElementById('live-price-display')) document.getElementById('live-price-display').innerText = "৳" + val.price;
                if(document.getElementById('inp-price')) document.getElementById('inp-price').value = val.price;
            }
        });
        
        loadStats();  // MongoDB থেকে পরিসংখ্যান লোড
        loadConfig(); // কনফিগ লোড
    }

    // ৪. MongoDB ইউজার লিস্ট লোড করা
    async function loadUsers() {
        const tbody = document.getElementById('member-list-body');
        if(!tbody) return;
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">লোড হচ্ছে...</td></tr>';

        try {
            const res = await fetch(`${API_BASE}/api/admin/users`, {
                headers: { 'Authorization': MASTER_PIN }
            });
            const data = await res.json();
            
            tbody.innerHTML = ''; // ক্লিয়ার করা
            data.forEach(user => {
                tbody.innerHTML += `
                    <tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
                        <td style="padding:15px;">${user.name || 'User'}<br><small>${user.phone}</small></td>
                        <td>৳${parseFloat(user.balance || 0).toFixed(2)}</td>
                        <td>
                            <span class="${user.is_active ? 'dot-online' : 'dot-offline'}"></span> 
                            ${user.status || 'Active'}
                        </td>
                    </tr>`;
            });
        } catch (err) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:red;">ইউজার লোড হতে সমস্যা হয়েছে!</td></tr>';
        }
    }

    // ৫. পপ-আপ অ্যাড সেভ করা (Firebase)
    function saveAd(pageKey) {
        const inputField = document.getElementById('ad-link-' + pageKey);
        if(!inputField) return;
        
        const content = inputField.value;
        if (!content) { alert("কিছু লিখুন!"); return; }

        fb_db.ref('popup_ads/' + pageKey).set({
            message: content,
            timestamp: Date.now()
        }).then(() => {
            alert(pageKey.toUpperCase() + " অ্যাড আপডেট হয়েছে!");
        });
    }

    // ৬. ট্রেডিং প্রাইস আপডেট (Firebase)
    function pushTrading() {
        const price = parseFloat(document.getElementById('inp-price').value);
        if(price) {
            fb_db.ref('trading/aaf_coin').update({ 
                price: price, 
                last_updated: Date.now() 
            });
            alert("প্রাইস আপডেট হয়েছে!");
        }
    }

    // ৭. টাস্ক ম্যানেজমেন্ট (MongoDB)
    async function saveTask() {
        const task = { 
            title: document.getElementById('t-title').value, 
            link: document.getElementById('t-link').value, 
            reward: document.getElementById('t-reward').value 
        };
        await fetch(`${API_BASE}/admin/api/tasks`, { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(task) 
        });
        alert("টাস্ক পাবলিশ হয়েছে!");
        renderTaskList();
    }

    async function renderTaskList() {
        const res = await fetch(`${API_BASE}/admin/api/tasks`);
        const tasks = await res.json();
        const listDiv = document.getElementById('current-task-list');
        if(!listDiv) return;

        listDiv.innerHTML = tasks.map(t => `
            <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid var(--border); align-items:center;">
                <span>${t.title} (৳${t.reward})</span>
                <button class="btn-danger" style="background:var(--danger); border:none; color:#fff; padding:5px; border-radius:5px;" onclick="deleteTask('${t._id}')">মুছুন</button>
            </div>
        `).join('');
    }

    async function deleteTask(id) {
        if(confirm("টাস্কটি মুছে ফেলবেন?")) {
            await fetch(`${API_BASE}/admin/api/tasks/${id}`, { method: 'DELETE' });
            renderTaskList();
        }
    }

    // ৮. স্ট্যাটাস ও সেটিংস লোড (MongoDB)
    async function loadStats() {
        try {
            const res = await fetch(`${API_BASE}/admin/api/all-data`);
            const data = await res.json();
            if(document.getElementById('st-users')) document.getElementById('st-users').innerText = data.total_users || 0;
            if(document.getElementById('st-payouts')) document.getElementById('st-payouts').innerText = data.pending_count || 0;
        } catch(e) { console.log("Stats load error"); }
    }

    async function loadConfig() {
        try {
            const res = await fetch(`${API_BASE}/admin/api/config`);
            const config = await res.json();
            if(config) {
                if(document.getElementById('c-fee')) document.getElementById('c-fee').value = config.trade_fee || 0;
                if(document.getElementById('c-min')) document.getElementById('c-min').value = config.min_withdraw || 0;
                if(document.getElementById('c-join')) document.getElementById('c-join').value = config.join_bonus || 0;
                if(document.getElementById('quick-link')) document.getElementById('quick-link').value = config.telegram_link || "";
            }
        } catch(e) { console.log("Config load failed"); }
    }
    </script>
</body>
</html>
