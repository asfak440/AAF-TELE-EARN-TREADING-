<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF TELE-EARN-TRADING - Login</title>
    <style>
        :root { --neon: #00ffcc; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 25px; border: 1px solid var(--neon); text-align: center; width: 90%; max-width: 350px; backdrop-filter: blur(10px); }
        .logo { width: 80px; margin-bottom: 20px; box-shadow: 0 0 15px var(--neon); border-radius: 50%; }
        h1 { font-size: 18px; margin-bottom: 30px; letter-spacing: 1px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn-auth { width: 100%; padding: 15px; background: var(--neon); color: black; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div class="login-card" id="auth-container">
        <img src="https://i.ibb.co/vzN5Y9Y/logo.png" class="logo">
        <h1>AAF TELE-EARN-TRADING</h1>
        
        <div id="login-fields">
            <input type="text" id="user-name" placeholder="Full Name (Sign up only)">
            <input type="number" id="tg-number" placeholder="Telegram Number">
            <button class="btn-auth" onclick="startAuth()">LOGIN WITH TELEGRAM</button>
        </div>
    </div>

    <script>
        // একবার লগইন থাকলে সরাসরি ড্যাশবোর্ডে নিয়ে যাবে
        if(localStorage.getItem('aaf_session')) {
            window.location.href = "dashboard.html";
        }

        async function startAuth() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('tg-number').value;

            if(!phone) return alert("Enter Telegram Number");

            // এখানে আপনার Bot এবং API এর মাধ্যমে Telegram OTP পাঠানো হবে
            alert("Sending OTP via Telegram...");
            
            // সেশন এনক্রিপশন ও সেভ (সিমুলেশন)
            localStorage.setItem('aaf_session', 'encrypted_token_here');
            localStorage.setItem('user_name', name || "User");
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
