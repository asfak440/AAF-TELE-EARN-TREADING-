<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF TELE-EARN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #39d353; --bg: #0d1117; --card: #161b22; --border: #30363d; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; padding-bottom: 90px; }

        .header { margin-bottom: 15px; display: flex; justify-content: space-between; }
        .user-info h2 { color: var(--neon); margin: 0; font-size: 18px; }

        /* এনালিটিক্স কার্ড */
        .analytics-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-align: center; margin-top: 10px; }
        .stat-box { background: #0d1117; border: 1px solid var(--border); padding: 8px; border-radius: 8px; }
        .stat-box small { font-size: 9px; color: #8b949e; display: block; }
        .stat-box strong { font-size: 14px; color: white; }

        /* ব্যালেন্স কার্ড */
        .balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .b-card { background: var(--card); border: 1px solid var(--neon); border-radius: 12px; padding: 15px; }
        .b-card span { font-size: 9px; color: #8b949e; font-weight: bold; }
        .b-card strong { font-size: 18px; display: block; margin-top: 5px; color: white; }

        /* অ্যাকাউন্ট লিস্ট ও অ্যাড */
        .acc-item { background: #1c2128; border-left: 4px solid var(--neon); padding: 12px; border-radius: 8px; margin-top: 10px; border: 1px solid var(--border); border-left-width: 4px; }
        .ad-slot { width: 100%; height: 60px; background: #000; margin: 10px 0; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }

        /* নিচের ৫টি বাটন (অ্যাকাউন্ট বাটনসহ) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0d1117; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-link { text-align: center; color: #8b949e; font-size: 10px; text-decoration: none; flex: 1; }
        .nav-link.active { color: var(--neon); }
        .nav-link i { display: block; font-size: 18px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <h2 id="u-name">Abdullah</h2>
            <p style="font-size:10px; color:#8b949e">UID: #AAF10701214</p>
        </div>
        <div style="color: var(--neon); font-size: 10px; font-weight: bold;">● Online</div>
    </div>

    <div class="analytics-card">
        <span style="font-size: 10px; font-weight: bold;"><i class="fas fa-server"></i> SERVER ACCOUNT ANALYTICS</span>
        <div class="analytics-grid">
            <div class="stat-box"><small>TOTAL</small><strong id="total-val">0</strong></div>
            <div class="stat-box"><small>ACTIVE</small><strong id="active-val" style="color:var(--neon)">0</strong></div>
            <div class="stat-box"><small>INACTIVE</small><strong id="inactive-val" style="color:#ff4d4d">0</strong></div>
        </div>
    </div>

    <div class="balance-grid">
        <div class="b-card"><span>MAIN BALANCE</span><strong>৳ 0.00</strong></div>
        <div class="b-card"><span>TASK BALANCE</span><strong>৳ 0.00</strong></div>
    </div>

    <div id="content-area"></div>

    <div class="bottom-nav">
        <a href="#" class="nav-link active"><i class="fas fa-home"></i>Home</a>
        <a href="task.html" class="nav-link"><i class="fas fa-tasks"></i>Task</a>
        <a href="trade.html" class="nav-link"><i class="fas fa-chart-line"></i>Trade</a>
        <a href="accounts.html" class="nav-link"><i class="fas fa-user-circle"></i>Account</a>
        <a href="wallet.html" class="nav-link"><i class="fas fa-wallet"></i>Wallet</a>
    </div>

    <script>
        const API_URL = "https://aaf-api-free.onrender.com"; 

        async function loadData() {
            try {
                // ১. অ্যাকাউন্ট স্ট্যাটাস ডাটাবেজ থেকে আনা
                const statsRes = await fetch(`${API_URL}/api/get_stats`); // আপনার এপিআই অনুযায়ী
                const stats = await statsRes.json();
                document.getElementById('total-val').innerText = stats.total || 0;
                document.getElementById('active-val').innerText = stats.active || 0;
                document.getElementById('inactive-val').innerText = stats.inactive || 0;

                // ২. অ্যাড এবং অ্যাকাউন্ট লিস্ট রেন্ডার
                const adRes = await fetch(`${API_URL}/api/get_admin_tasks`);
                const tasks = await adRes.json();
                const adLinks = tasks.map(t => t.link);

                const container = document.getElementById('content-area');
                // আপনার ডাটাবেজে যতগুলো অ্যাকাউন্ট আছে শুধু ততগুলো দেখাবে
                const accountList = stats.accounts || []; 

                if(accountList.length === 0) {
                    container.innerHTML = "<p style='text-align:center; font-size:12px; color:#8b949e; margin-top:20px;'>No accounts added yet.</p>";
                }

                accountList.forEach((acc, index) => {
                    // অ্যাকাউন্ট কার্ড
                    const accDiv = document.createElement('div');
                    accDiv.className = "acc-item";
                    accDiv.innerHTML = `<strong>${acc.name || 'Account '+ (index+1)}</strong> <br> <small>Status: ${acc.status}</small>`;
                    container.appendChild(accDiv);

                    // অ্যাড
                    if(adLinks.length > 0) {
                        const adDiv = document.createElement('div');
                        adDiv.className = "ad-slot";
                        adDiv.innerHTML = `<iframe src="${adLinks[index % adLinks.length]}"></iframe>`;
                        container.appendChild(adDiv);
                    }
                });
            } catch (e) { console.log("Data connection error"); }
        }

        window.onload = loadData;
    </script>
</body>
</html>
