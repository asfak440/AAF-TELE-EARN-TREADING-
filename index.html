<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF TELE-EARN-TRADING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon: #39d353; 
            --bg: #0d1117; 
            --card-bg: #161b22;
            --border: #30363d;
        }
        body { 
            background: var(--bg); 
            color: #c9d1d9; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 15px;
            padding-bottom: 90px;
        }

        /* প্রোফাইল সেকশন */
        .profile-header { margin-bottom: 20px; }
        .user-name { color: var(--neon); font-size: 20px; font-weight: bold; margin: 0; }
        .uid { font-size: 12px; color: #8b949e; }

        /* কার্ড স্টাইল - আপনার আগের ডিজাইনের মতো */
        .card-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .main-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            position: relative;
        }

        .main-card.neon-border { border-color: var(--neon); }
        
        .card-label { font-size: 10px; color: #8b949e; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
        .card-value { font-size: 18px; font-weight: bold; color: white; margin-top: 8px; display: block; }

        /* লাইভ উইথড্র কার্ড - এখন মাঝখানে */
        .wide-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        /* একাউন্ট লিস্ট কার্ড */
        .acc-list-item {
            background: #1c2128;
            border: 1px solid var(--border);
            border-left: 4px solid var(--neon);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        /* অ্যাড স্লট */
        .ad-box {
            width: 100%;
            height: 60px;
            background: #000;
            margin: 10px 0 20px 0;
            border-radius: 8px;
            overflow: hidden;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* বটম নেভিগেশন */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #0d1117; border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; padding: 10px 0;
        }
        .nav-item { text-align: center; color: #8b949e; font-size: 10px; text-decoration: none; }
        .nav-item.active { color: var(--neon); }
        .nav-item i { display: block; font-size: 18px; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <p class="user-name" id="display-name">Abdullah</p>
        <p class="uid">UID: #AAF10701214 <span style="float: right; color: var(--neon);">● Online</span></p>
    </div>

    <div class="wide-card">
        <div class="card-label"><i class="fas fa-broadcast-tower"></i> TOTAL WITHDRAW (LIVE)</div>
        <div class="card-value" style="color: #58a6ff;">৳ 0.00</div>
    </div>

    <div class="card-container">
        <div class="main-card neon-border">
            <div class="card-label"><i class="fas fa-wallet"></i> MAIN BALANCE</div>
            <div class="card-value">৳ 0.00</div>
        </div>
        <div class="main-card neon-border">
            <div class="card-label"><i class="fas fa-users"></i> ACTIVE ACCOUNT</div>
            <div class="card-value" id="active-count">60</div>
        </div>
    </div>

    <div class="card-container">
        <div class="main-card">
            <div class="card-label">TASK</div>
            <div class="card-value">0.00</div>
        </div>
        <div class="main-card">
            <div class="card-label">TRADE</div>
            <div class="card-value">0.00</div>
        </div>
    </div>

    <div id="dynamic-accounts">
        </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="task.html" class="nav-item"><i class="fas fa-tasks"></i>Task</a>
        <a href="#" class="nav-item"><i class="fas fa-chart-line"></i>Trade</a>
        <a href="#" class="nav-item"><i class="fas fa-wallet"></i>Wallet</a>
    </div>

    <script>
        // অ্যাডমিন প্যানেল থেকে আসা অ্যাড লিঙ্ক
        const adLinks = ["//ad.a-ads.com/2430456/?size=320x50"];

        function loadAccounts() {
            const container = document.getElementById('dynamic-accounts');
            const total = 60; // আপনার একাউন্ট সংখ্যা

            for(let i = 1; i <= total; i++) {
                // একাউন্ট কার্ড
                let acc = document.createElement('div');
                acc.className = "acc-list-item";
                acc.innerHTML = `<strong>Account User #${i}</strong> <br> <small style="color:#8b949e">Server Status: Running</small>`;
                container.appendChild(acc);

                // অ্যাড স্লট (প্রতি একাউন্টের পর ১টি)
                let ad = document.createElement('div');
                ad.className = "ad-box";
                ad.innerHTML = `<iframe src="${adLinks[0]}"></iframe>`;
                container.appendChild(ad);
            }
        }

        window.onload = loadAccounts;
    </script>
</body>
</html>
