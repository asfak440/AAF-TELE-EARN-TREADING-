<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF TELE-EARN - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon: #39d353; 
            --bg: #0d1117; 
            --card-bg: #161b22;
            --border: #30363d;
        }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; padding-bottom: 90px; }

        /* আব্দুল্লাহ প্রোফাইল সেকশন */
        .header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .user-info h2 { color: var(--neon); margin: 0; font-size: 20px; }
        .user-info p { font-size: 11px; color: #8b949e; margin: 2px 0; }
        .status-online { color: var(--neon); font-size: 11px; font-weight: bold; }

        /* কার্ড ডিজাইন */
        .main-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .card-label { font-size: 10px; color: #8b949e; font-weight: bold; margin-bottom: 8px; display: block; }
        .card-value { font-size: 20px; font-weight: bold; color: white; display: block; }

        /* ছোট ছোট গ্রিড কার্ড */
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .mini-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; }
        .neon-border { border-color: var(--neon); }

        /* একাউন্ট কার্ড ডিজাইন */
        .account-box { background: #1c2128; border: 1px solid var(--border); border-left: 4px solid var(--neon); padding: 12px; border-radius: 8px; margin-bottom: 5px; }

        /* অ্যাড স্লট */
        .ad-unit { width: 100%; height: 60px; background: #000; margin-bottom: 15px; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }

        /* বটম মেনু */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0d1117; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { text-align: center; color: #8b949e; font-size: 10px; text-decoration: none; }
        .nav-item.active { color: var(--neon); }
        .nav-item i { display: block; font-size: 18px; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <h2 id="user-name">Abdullah</h2>
            <p>UID: #AAF10701214</p>
        </div>
        <div class="status-online">● Online <br><small style="color:#8b949e; float:right">v2.0 Standard</small></div>
    </div>

    <div class="main-card">
        <span class="card-label">TOTAL WITHDRAW (LIVE)</span>
        <span class="card-value" style="color: #58a6ff;">৳ 0.00</span>
    </div>

    <div class="card-grid">
        <div class="mini-card neon-border">
            <span class="card-label"><i class="fas fa-wallet"></i> MAIN BALANCE</span>
            <span class="card-value">৳ 0.00</span>
        </div>
        <div class="mini-card neon-border">
            <span class="card-label"><i class="fas fa-users"></i> ACTIVE ACCOUNT</span>
            <span class="card-value" style="color: var(--neon);">60</span>
        </div>
    </div>

    <div class="card-grid">
        <div class="mini-card">
            <span class="card-label">TASK</span>
            <span class="card-value">0.00</span>
        </div>
        <div class="mini-card">
            <span class="card-label">TRADE</span>
            <span class="card-value">0.00</span>
        </div>
    </div>

    <div id="account-list">
        </div>

    <div class="nav">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="task.html" class="nav-item"><i class="fas fa-tasks"></i>Task</a>
        <a href="#" class="nav-item"><i class="fas fa-chart-line"></i>Trade</a>
        <a href="#" class="nav-item"><i class="fas fa-wallet"></i>Wallet</a>
    </div>

    <script>
        // আপনার অ্যাডমিন প্যানেল থেকে আসা অ্যাড লিঙ্ক
        const AD_LINK = "//ad.a-ads.com/2430456/?size=320x50";

        async function loadAccounts() {
            const list = document.getElementById('account-list');
            const totalAccounts = 60; // আপনার ডাটাবেস অনুযায়ী সংখ্যা

            for(let i = 1; i <= totalAccounts; i++) {
                // ১টি একাউন্ট কার্ড
                const acc = document.createElement('div');
                acc.className = "account-box";
                acc.innerHTML = `<strong>Telegram ID #${i}</strong> <br> <small style="color:#8b949e">Server: Active</small>`;
                list.appendChild(acc);

                // ঠিক তার পরেই ১টি অ্যাড স্লট
                const ad = document.createElement('div');
                ad.className = "ad-unit";
                ad.innerHTML = `<iframe src="${AD_LINK}"></iframe>`;
                list.appendChild(ad);
            }
        }

        window.onload = loadAccounts;
    </script>
</body>
</html>
