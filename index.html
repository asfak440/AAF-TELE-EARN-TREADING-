<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAF TELE-EARN-TRADING - Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon: #39d353; 
            --bg: #0d1117; 
            --input-bg: #161b22;
            --border: #30363d;
        }
        body { 
            background: var(--bg); 
            color: #c9d1d9; 
            font-family: 'Inter', -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; /* অ্যাডগুলো উপরে নিচে সাজানোর জন্য */
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        
        .login-card { 
            background: var(--input-bg); 
            padding: 40px 30px; 
            border-radius: 20px; 
            border: 1px solid var(--border); 
            text-align: center; 
            width: 90%; 
            max-width: 380px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 20px 0; /* অ্যাডের সাথে গ্যাপ রাখার জন্য */
        }
        
        .logo { 
            width: 70px; 
            height: 70px; 
            margin-bottom: 20px; 
            border-radius: 50%; 
            border: 2px solid var(--neon); 
            padding: 3px;
        }
        
        h1 { 
            font-size: 20px; 
            margin-bottom: 5px; 
            color: white; 
            font-weight: 600; 
        }
        
        .sub-text { 
            font-size: 11px; 
            color: #8b949e; 
            margin-bottom: 30px; 
            display: block; 
        }
        
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        
        input { 
            width: 100%; 
            padding: 14px 16px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            background: #0d1117; 
            color: white; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 14px;
            transition: 0.3s;
        }
        
        input:focus { 
            border-color: var(--neon); 
            box-shadow: 0 0 8px rgba(57, 211, 83, 0.2);
        }
        
        .btn-auth { 
            width: 100%; 
            padding: 15px; 
            background: var(--neon); 
            color: #0d1117; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 15px; 
            margin-top: 10px;
            transition: 0.2s;
        }
        
        .btn-auth:active { transform: scale(0.97); }
        .btn-auth:disabled { background: #30363d; color: #8b949e; }

        /* বিজ্ঞাপন দেখানোর জন্য স্টাইল */
        .ad-unit-wrapper {
            width: 320px;
            margin: auto;
        }
    </style>
</head>
<body>

    <div class="ad-unit-wrapper">
        <div id="frame" style="width: 320px;margin: auto;z-index: 99998;height: auto">
            <iframe data-aa='2430456' src='//ad.a-ads.com/2430456/?size=320x50'
                    style='border:0; padding:0; width:320px; height:50px; overflow:hidden;display: block;margin: auto'></iframe>
        </div>
    </div>

    <div class="login-card" id="auth-container">
        <img src="https://t.me/i/userpic/320/aaf_tele_earn.jpg" class="logo" alt="AAF Logo">
        <h1>Welcome Back</h1>
        <span class="sub-text">Connect your account to start earning</span>
        
        <div id="login-fields">
            <div class="input-group">
                <input type="text" id="user-name" placeholder="Full Name">
            </div>
            <div class="input-group">
                <input type="number" id="tg-number" placeholder="Telegram Number (+8801...)">
            </div>
            <button class="btn-auth" id="login-btn" onclick="startAuth()">ACCESS DASHBOARD</button>
        </div>
    </div>

    <div class="ad-unit-wrapper">
        <div style="width: 320px;margin: auto;">
            <iframe data-aa='2430456' src='//ad.a-ads.com/2430456/?size=320x50'
                    style='border:0; padding:0; width:320px; height:50px; overflow:hidden;display: block;margin: auto'></iframe>
        </div>
    </div>

    <script>
        // আপনার সার্ভারের লিঙ্কটি এখানে দিন
        const API_URL = "https://aaf-api-free.onrender.com"; 

        // সেশন চেক (আগে লগইন করা থাকলে সরাসরি ড্যাশবোর্ডে যাবে)
        if(localStorage.getItem('user_id')) {
            window.location.href = "dashboard.html";
        }

        async function startAuth() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('tg-number').value;
            const btn = document.getElementById('login-btn');

            if(!phone || !name) return alert("Please fill in all details");

            btn.innerText = "Authenticating...";
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/api/user_data_login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: phone, 
                        name: name,
                        telegram_id: phone.slice(-8)
                    })
                });

                const data = await response.json();

                if (data.status === "success" || data.message === "Account linked to server!") {
                    localStorage.setItem('user_id', phone.slice(-8)); 
                    localStorage.setItem('user_name', name);
                    window.location.href = "dashboard.html";
                } else {
                    alert("Authentication Failed: " + (data.message || "Invalid input"));
                    btn.innerText = "ACCESS DASHBOARD";
                    btn.disabled = false;
                }
            } catch (error) {
                alert("Server connection error. Please try again later.");
                btn.innerText = "ACCESS DASHBOARD";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
